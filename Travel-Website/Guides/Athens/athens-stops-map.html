<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<link rel="stylesheet" href="../../assets/stops-map-style.css">
<title>Athens — All Stops Map</title>
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Athens — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
  <button class="day-btn" data-day="5" style="--dc:#e67e22">Day 5</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "Acropolis of Athens",
    "query": "Acropolis of Athens Dionysiou Areopagitou",
    "lat": 37.9685331,
    "lng": 23.7284706
  },
  {
    "day": 1,
    "name": "Acropolis Museum",
    "query": "Acropolis Museum Dionysiou Areopagitou 15 Athens",
    "lat": 37.9685331,
    "lng": 23.7284706
  },
  {
    "day": 1,
    "name": "Areopagus Hill",
    "query": "Areopagus Hill Theorias Athens",
    "lat": 37.9722473,
    "lng": 23.7233487
  },
  {
    "day": 1,
    "name": "Anafiotika",
    "query": "Anafiotika Stratonos Plaka Athens",
    "lat": 37.9724074,
    "lng": 23.7281334
  },
  {
    "day": 2,
    "name": "Ancient Agora of Athens",
    "query": "Ancient Agora of Athens Adrianou 24",
    "lat": 37.9750214,
    "lng": 23.7241932
  },
  {
    "day": 2,
    "name": "Roman Agora",
    "query": "Roman Agora Polygnotou 3 Athens",
    "lat": 37.9743035,
    "lng": 23.7263311
  },
  {
    "day": 2,
    "name": "Hadrian's Library",
    "query": "Hadrian's Library Areos 3 Athens",
    "lat": 37.9753992,
    "lng": 23.7265715
  },
  {
    "day": 2,
    "name": "Monastiraki Square",
    "query": "Monastiraki Square Athens",
    "lat": 37.9763614,
    "lng": 23.7259471
  },
  {
    "day": 3,
    "name": "Temple of Olympian Zeus",
    "query": "Temple of Olympian Zeus Vasilissis Olgas Athens",
    "lat": 37.969437,
    "lng": 23.7330955
  },
  {
    "day": 3,
    "name": "Panathenaic Stadium",
    "query": "Panathenaic Stadium Vasileos Konstantinou Athens",
    "lat": 37.9684357,
    "lng": 23.7409451
  },
  {
    "day": 3,
    "name": "Syntagma Square",
    "query": "Syntagma Square Athens",
    "lat": 37.9755158,
    "lng": 23.7349503
  },
  {
    "day": 3,
    "name": "Mount Lycabettus",
    "query": "Mount Lycabettus Athens",
    "lat": null,
    "lng": null
  },
  {
    "day": 3,
    "name": "National Archaeological Museum",
    "query": "National Archaeological Museum 28is Oktovriou 44 Athens",
    "lat": 37.9890123,
    "lng": 23.7329577
  },
  {
    "day": 4,
    "name": "Benaki Museum of Greek Culture",
    "query": "Benaki Museum, Koumbari 1, Athens",
    "lat": null,
    "lng": null
  },
  {
    "day": 4,
    "name": "Museum of Cycladic Art",
    "query": "Museum of Cycladic Art, Neofytou Douka 4, Athens",
    "lat": 37.975697,
    "lng": 23.7423066
  },
  {
    "day": 4,
    "name": "Kerameikos Archaeological Site",
    "query": "Kerameikos Archaeological Site, Ermou 148, Athens",
    "lat": 37.9786336,
    "lng": 23.7182209
  },
  {
    "day": 4,
    "name": "Philopappos Monument",
    "query": "Philopappos Monument Filopappou Hill Athens",
    "lat": 37.9673635,
    "lng": 23.7213682
  },
  {
    "day": 5,
    "name": "Ancient Corinth Archaeological Site",
    "query": "Ancient Corinth Archaeological Site Archaia Korinthos",
    "lat": 37.9054879,
    "lng": 22.8792778
  },
  {
    "day": 5,
    "name": "Acrocorinth",
    "query": "Acrocorinth Ancient Corinth",
    "lat": 37.890077,
    "lng": 22.8690521
  },
  {
    "day": 5,
    "name": "Corinth Canal",
    "query": "Corinth Canal Isthmia bridge",
    "lat": null,
    "lng": null
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6", "5": "#e67e22"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
