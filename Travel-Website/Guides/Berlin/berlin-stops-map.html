<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>Berlin — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Berlin — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
  <button class="day-btn" data-day="5" style="--dc:#e67e22">Day 5</button>
  <button class="day-btn" data-day="6" style="--dc:#16a085">Day 6</button>
  <button class="day-btn" data-day="7" style="--dc:#e74c3c">Day 7</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "Brandenburg Gate",
    "query": "Brandenburg Gate Pariser Platz Mitte Berlin",
    "lat": 52.5162699,
    "lng": 13.3777034
  },
  {
    "day": 1,
    "name": "Reichstag Building",
    "query": "Reichstag Platz der Republik 1 Mitte Berlin",
    "lat": 52.5186538,
    "lng": 13.3761015
  },
  {
    "day": 1,
    "name": "Memorial to the Murdered Jews of Europe",
    "query": "Memorial to the Murdered Jews of Europe Berlin",
    "lat": 52.5138731,
    "lng": 13.3787346
  },
  {
    "day": 1,
    "name": "Gendarmenmarkt",
    "query": "Gendarmenmarkt Mitte Berlin",
    "lat": 52.5135698,
    "lng": 13.392297
  },
  {
    "day": 2,
    "name": "Berlin Cathedral",
    "query": "Berliner Dom Am Lustgarten Mitte Berlin",
    "lat": 52.5190822,
    "lng": 13.4010942
  },
  {
    "day": 2,
    "name": "Neues Museum",
    "query": "Neues Museum Bodestrasse 1 Mitte Berlin",
    "lat": 52.5201701,
    "lng": 13.3977174
  },
  {
    "day": 2,
    "name": "Fernsehturm",
    "query": "Berliner Fernsehturm Panoramastrasse 1 Alexanderplatz Berlin",
    "lat": 52.5208279,
    "lng": 13.4094214
  },
  {
    "day": 3,
    "name": "Berlin Wall Memorial",
    "query": "Gedenkstaette Berliner Mauer Bernauer Strasse 119 Berlin",
    "lat": 52.5337903,
    "lng": 13.3874459
  },
  {
    "day": 3,
    "name": "Topography of Terror",
    "query": "Topography of Terror Niederkirchnerstrasse 8 Berlin",
    "lat": 52.5062137,
    "lng": 13.3841548
  },
  {
    "day": 3,
    "name": "Checkpoint Charlie",
    "query": "Checkpoint Charlie Friedrichstrasse 43 Berlin",
    "lat": 52.5074321,
    "lng": 13.3903814
  },
  {
    "day": 3,
    "name": "East Side Gallery",
    "query": "East Side Gallery Muehlenstrasse Friedrichshain Berlin",
    "lat": 52.5044542,
    "lng": 13.4408392
  },
  {
    "day": 4,
    "name": "Charlottenburg Palace",
    "query": "Schloss Charlottenburg Spandauer Damm 10 Charlottenburg Berlin",
    "lat": 52.5206424,
    "lng": 13.2927104
  },
  {
    "day": 4,
    "name": "Kaiser Wilhelm Memorial Church",
    "query": "Kaiser-Wilhelm-Gedaechtniskirche Breitscheidplatz Charlottenburg Berlin",
    "lat": 52.5048945,
    "lng": 13.3346131
  },
  {
    "day": 4,
    "name": "Victory Column",
    "query": "Siegessaeule Grosser Stern Tiergarten Berlin",
    "lat": 52.5145082,
    "lng": 13.3501108
  },
  {
    "day": 7,
    "name": "Sanssouci Palace",
    "query": "Schloss Sanssouci Maulbeerallee Potsdam",
    "lat": null,
    "lng": null
  },
  {
    "day": 7,
    "name": "Park Sanssouci",
    "query": "Park Sanssouci An der Orangerie 1 Potsdam",
    "lat": null,
    "lng": null
  },
  {
    "day": 5,
    "name": "Gemäldegalerie",
    "query": "Matthäikirchplatz Tiergarten Berlin",
    "lat": 52.5084424,
    "lng": 13.3677277
  },
  {
    "day": 5,
    "name": "Neue Nationalgalerie",
    "query": "Potsdamer Strasse 50 Tiergarten Berlin",
    "lat": 52.5070408,
    "lng": 13.3676212
  },
  {
    "day": 5,
    "name": "Hamburger Bahnhof",
    "query": "Invalidenstrasse 50 Tiergarten Berlin",
    "lat": 52.5286316,
    "lng": 13.3718665
  },
  {
    "day": 6,
    "name": "Jewish Museum Berlin",
    "query": "Lindenstrasse 9 Kreuzberg Berlin",
    "lat": 52.5016941,
    "lng": 13.3951413
  },
  {
    "day": 6,
    "name": "Tempelhofer Feld",
    "query": "Tempelhofer Damm Tempelhof Berlin",
    "lat": 52.4703941,
    "lng": 13.3855088
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6", "5": "#e67e22", "6": "#16a085", "7": "#e74c3c"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
