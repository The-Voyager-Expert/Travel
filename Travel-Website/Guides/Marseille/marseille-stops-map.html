<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>Marseille — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Marseille — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
  <button class="day-btn" data-day="5" style="--dc:#e67e22">Day 5</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "MuCEM — Museum of European &amp; Mediterranean Civilisations",
    "query": "MuCEM 7 Promenade Robert Laffont Marseille",
    "lat": 43.2967288,
    "lng": 5.3610255
  },
  {
    "day": 1,
    "name": "Centre de la Vieille Charité",
    "query": "Centre de la Vieille Charité 2 Rue de la Charité Marseille",
    "lat": 43.3005666,
    "lng": 5.368268
  },
  {
    "day": 1,
    "name": "Notre-Dame de la Garde",
    "query": "Notre-Dame de la Garde Rue Fort du Sanctuaire Marseille",
    "lat": 43.28604,
    "lng": 5.370677
  },
  {
    "day": 2,
    "name": "Château d'If",
    "query": "Château d'If Île d'If Marseille",
    "lat": 43.279856,
    "lng": 5.325284
  },
  {
    "day": 2,
    "name": "Cité Radieuse — Unité d'Habitation",
    "query": "Cité Radieuse 280 Boulevard Michelet Marseille",
    "lat": 43.26146,
    "lng": 5.3962763
  },
  {
    "day": 3,
    "name": "Abbaye Saint-Victor",
    "query": "3 Rue de l'Abbaye Marseille",
    "lat": 43.2900236,
    "lng": 5.3653123
  },
  {
    "day": 3,
    "name": "Vallon des Auffes",
    "query": "Rue du Vallon des Auffes Marseille",
    "lat": 43.285409,
    "lng": 5.3517341
  },
  {
    "day": 3,
    "name": "Corniche Kennedy",
    "query": "Corniche Président John Fitzgerald Kennedy Marseille",
    "lat": 43.282735,
    "lng": 5.3505274
  },
  {
    "day": 3,
    "name": "Palais Longchamp",
    "query": "Palais Longchamp Place Henri Dunant Marseille",
    "lat": 43.3038629,
    "lng": 5.3932763
  },
  {
    "day": 4,
    "name": "Musée d'Histoire de Marseille",
    "query": "Musée d'Histoire de Marseille 2 Rue Henri-Barbusse Marseille",
    "lat": 43.2975573,
    "lng": 5.3756864
  },
  {
    "day": 4,
    "name": "Cours Julien",
    "query": "Cours Julien Marseille",
    "lat": 43.295083,
    "lng": 5.3828064
  },
  {
    "day": 4,
    "name": "Friche la Belle de Mai",
    "query": "Friche la Belle de Mai 41 Rue Jobin Marseille",
    "lat": 43.3104849,
    "lng": 5.3900447
  },
  {
    "day": 5,
    "name": "Les Arènes d'Arles",
    "query": "Les Arènes d'Arles Rond-point des Arènes Arles",
    "lat": null,
    "lng": null
  },
  {
    "day": 5,
    "name": "Les Alyscamps",
    "query": "Les Alyscamps Avenue des Alyscamps Arles",
    "lat": 43.6644136,
    "lng": 4.6400771
  },
  {
    "day": 5,
    "name": "Fondation Vincent van Gogh Arles",
    "query": "Fondation Vincent van Gogh Arles 35 ter Rue du Docteur-Fanton Arles",
    "lat": null,
    "lng": null
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6", "5": "#e67e22"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps ↗</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
