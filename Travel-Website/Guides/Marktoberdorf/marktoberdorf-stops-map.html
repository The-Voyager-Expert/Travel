<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>Marktoberdorf — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Marktoberdorf — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
  <button class="day-btn" data-day="5" style="--dc:#e67e22">Day 5</button>
  <button class="day-btn" data-day="6" style="--dc:#16a085">Day 6</button>
  <button class="day-btn" data-day="7" style="--dc:#e74c3c">Day 7</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "St. Martin's Parish Church",
    "query": "Stadtpfarrkirche St. Martin Marktoberdorf",
    "lat": null,
    "lng": null
  },
  {
    "day": 1,
    "name": "Schloss Marktoberdorf",
    "query": "Schloss Marktoberdorf Kurfürstenstraße 19",
    "lat": 47.7796684,
    "lng": 10.6213487
  },
  {
    "day": 1,
    "name": "Künstlerhaus Marktoberdorf",
    "query": "Künstlerhaus Marktoberdorf Kemptener Straße 5",
    "lat": 47.7768744,
    "lng": 10.6159405
  },
  {
    "day": 2,
    "name": "Hohenschwangau Castle",
    "query": "Schloss Hohenschwangau Alpseestraße 30 Schwangau",
    "lat": 47.5555583,
    "lng": 10.7360534
  },
  {
    "day": 2,
    "name": "Neuschwanstein Castle",
    "query": "Schloss Neuschwanstein Neuschwansteinstraße 20 Schwangau",
    "lat": null,
    "lng": null
  },
  {
    "day": 2,
    "name": "Forggensee",
    "query": "Forggensee Füssen",
    "lat": 47.6168596,
    "lng": 10.7427626
  },
  {
    "day": 3,
    "name": "Wieskirche",
    "query": "Wieskirche Wies 12 Steingaden",
    "lat": null,
    "lng": null
  },
  {
    "day": 3,
    "name": "Rottenbuch Abbey",
    "query": "Klosterkirche Rottenbuch",
    "lat": null,
    "lng": null
  },
  {
    "day": 4,
    "name": "Residenz Kempten",
    "query": "Residenz Kempten Residenzplatz 4",
    "lat": null,
    "lng": null
  },
  {
    "day": 4,
    "name": "St. Lorenz Basilica",
    "query": "Basilika St. Lorenz Kempten",
    "lat": 47.7284361,
    "lng": 10.3116322
  },
  {
    "day": 4,
    "name": "Kempten Old Town",
    "query": "Rathausplatz Kempten",
    "lat": 47.726304,
    "lng": 10.3181776
  },
  {
    "day": 4,
    "name": "Archäologischer Park Cambodunum",
    "query": "Archäologischer Park Cambodunum Kempten",
    "lat": 47.7270456,
    "lng": 10.3269086
  },
  {
    "day": 5,
    "name": "Breitachklamm",
    "query": "Breitachklamm Klammstraße 47 Oberstdorf",
    "lat": null,
    "lng": null
  },
  {
    "day": 5,
    "name": "Nebelhorn",
    "query": "Nebelhornbahn Nebelhornstraße 67 Oberstdorf",
    "lat": 47.4047907,
    "lng": 10.285764
  },
  {
    "day": 6,
    "name": "Hohenfreyberg &amp; Eisenberg Castle Ruins",
    "query": "Burgruine Eisenberg Hohenfreyberg Eisenberg",
    "lat": null,
    "lng": null
  },
  {
    "day": 6,
    "name": "Hohes Schloss Füssen",
    "query": "Hohes Schloss Füssen Magnusplatz 10",
    "lat": null,
    "lng": null
  },
  {
    "day": 6,
    "name": "Lechfall",
    "query": "Lechfall Füssen",
    "lat": 47.5617736,
    "lng": 10.6948451
  },
  {
    "day": 7,
    "name": "Marienplatz &amp; New Town Hall",
    "query": "Marienplatz München",
    "lat": 48.1371436,
    "lng": 11.5753989
  },
  {
    "day": 7,
    "name": "Frauenkirche",
    "query": "Frauenkirche München",
    "lat": 48.1385821,
    "lng": 11.573592
  },
  {
    "day": 7,
    "name": "Munich Residenz",
    "query": "Residenz München Residenzstraße 1",
    "lat": 48.140809,
    "lng": 11.5775546
  },
  {
    "day": 7,
    "name": "Englischer Garten",
    "query": "Eisbachwelle München",
    "lat": 48.1434851,
    "lng": 11.5877586
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6", "5": "#e67e22", "6": "#16a085", "7": "#e74c3c"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
