<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>Taipei — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Taipei — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "Huashan 1914 Creative Park",
    "query": "Huashan 1914 Creative Park No 1 Section 1 Bade Road Zhongzheng Taipei",
    "lat": 25.0446089,
    "lng": 121.5291829
  },
  {
    "day": 1,
    "name": "Chiang Kai-shek Memorial Hall",
    "query": "Chiang Kai-shek Memorial Hall No 21 Zhongshan South Road Zhongzheng Taipei",
    "lat": 25.0345759,
    "lng": 121.5217812
  },
  {
    "day": 1,
    "name": "Elephant Mountain",
    "query": "Elephant Mountain Xiangshan MRT Exit 2 Xinyi Taipei",
    "lat": 25.0265411,
    "lng": 121.575542
  },
  {
    "day": 1,
    "name": "Taipei 101",
    "query": "Taipei 101 No 7 Section 5 Xinyi Road Xinyi Taipei",
    "lat": 25.0338352,
    "lng": 121.5644995
  },
  {
    "day": 2,
    "name": "Grand Hotel Taipei",
    "query": "Grand Hotel Taipei No 1 Section 4 Zhongshan North Road Zhongshan Taipei",
    "lat": 25.0787653,
    "lng": 121.5262059
  },
  {
    "day": 2,
    "name": "National Palace Museum",
    "query": "National Palace Museum No 221 Section 2 Zhishan Road Shilin Taipei",
    "lat": 25.1015744,
    "lng": 121.5488623
  },
  {
    "day": 2,
    "name": "Beitou Thermal Valley",
    "query": "Beitou Thermal Valley No 30-10 Zhongshan Road Beitou Taipei",
    "lat": 25.1380498,
    "lng": 121.5118058
  },
  {
    "day": 2,
    "name": "Xiaoyoukeng",
    "query": "Xiaoyoukeng No 1-20 Zhuzihu Road Beitou Taipei",
    "lat": 25.1771932,
    "lng": 121.5473094
  },
  {
    "day": 3,
    "name": "Longshan Temple",
    "query": "Longshan Temple Taipei Taiwan",
    "lat": 25.0352844,
    "lng": 121.4995813
  },
  {
    "day": 3,
    "name": "Dihua Street",
    "query": "Dihua Street Taipei Taiwan",
    "lat": 25.0561728,
    "lng": 121.5102161
  },
  {
    "day": 3,
    "name": "Ximending",
    "query": "Ximending Taipei Taiwan",
    "lat": 25.0362404,
    "lng": 121.5082828
  },
  {
    "day": 3,
    "name": "Ximen Red House",
    "query": "Ximen Red House Taipei Taiwan",
    "lat": null,
    "lng": null
  },
  {
    "day": 4,
    "name": "Fort San Domingo",
    "query": "Fort San Domingo No 1 Lane 28 Zhongzheng Road Tamsui New Taipei",
    "lat": null,
    "lng": null
  },
  {
    "day": 4,
    "name": "Fisherman's Wharf",
    "query": "Fisherman's Wharf No 199 Guanhai Road Tamsui New Taipei",
    "lat": 25.18387,
    "lng": 121.41118
  },
  {
    "day": 4,
    "name": "Huwei Fort",
    "query": "Huwei Fort No 34-1 Lane 6 Section 5 Zhongzheng Road Tamsui New Taipei",
    "lat": null,
    "lng": null
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps ↗</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
