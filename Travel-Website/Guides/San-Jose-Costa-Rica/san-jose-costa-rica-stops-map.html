<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>San-Jose-Costa-Rica — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="San-Jose-Costa-Rica — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
  <button class="day-btn" data-day="5" style="--dc:#e67e22">Day 5</button>
  <button class="day-btn" data-day="6" style="--dc:#16a085">Day 6</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "Museo Nacional de Costa Rica",
    "query": "Museo Nacional Costa Rica Calle 17 San Jose",
    "lat": 9.932832,
    "lng": -84.0717353
  },
  {
    "day": 1,
    "name": "Museo del Jade",
    "query": "Museo del Jade San Jose Costa Rica Avenida 7",
    "lat": 9.9331261,
    "lng": -84.072805
  },
  {
    "day": 1,
    "name": "Teatro Nacional",
    "query": "Teatro Nacional Avenida 2 San Jose Costa Rica",
    "lat": 9.933158,
    "lng": -84.0769722
  },
  {
    "day": 1,
    "name": "Parque Metropolitano La Sabana",
    "query": "Parque Metropolitano La Sabana San Jose Costa Rica",
    "lat": 9.9355564,
    "lng": -84.1045042
  },
  {
    "day": 2,
    "name": "Poás Volcano National Park",
    "query": "Poas Volcano National Park Alajuela Costa Rica",
    "lat": null,
    "lng": null
  },
  {
    "day": 2,
    "name": "La Paz Waterfall Gardens",
    "query": "La Paz Waterfall Gardens Vara Blanca Heredia Costa Rica",
    "lat": null,
    "lng": null
  },
  {
    "day": 2,
    "name": "Sarapiquí River",
    "query": "Sarapiqui River La Virgen Heredia Costa Rica",
    "lat": null,
    "lng": null
  },
  {
    "day": 2,
    "name": "Braulio Carrillo National Park",
    "query": "Braulio Carrillo National Park Zurqui Heredia Costa Rica",
    "lat": 10.2447349,
    "lng": -84.0510694
  },
  {
    "day": 3,
    "name": "Carara National Park",
    "query": "Carara National Park Puntarenas Costa Rica",
    "lat": 9.7900999,
    "lng": -84.5709133
  },
  {
    "day": 3,
    "name": "Tarcoles Bridge",
    "query": "Tarcoles Bridge Route 34 Puntarenas Costa Rica",
    "lat": null,
    "lng": null
  },
  {
    "day": 3,
    "name": "Quepos",
    "query": "Quepos Puntarenas Costa Rica",
    "lat": 9.4127862,
    "lng": -84.0649206
  },
  {
    "day": 3,
    "name": "Manuel Antonio National Park",
    "query": "Manuel Antonio National Park Puntarenas Costa Rica",
    "lat": 9.0605046,
    "lng": -84.2449917
  },
  {
    "day": 4,
    "name": "Arenal Volcano National Park",
    "query": "Arenal Volcano National Park La Fortuna Alajuela Costa Rica",
    "lat": 10.4287963,
    "lng": -84.7031956
  },
  {
    "day": 4,
    "name": "Mistico Arenal Hanging Bridges Park",
    "query": "Mistico Arenal Hanging Bridges Park La Fortuna Alajuela",
    "lat": 10.4880492,
    "lng": -84.7537775
  },
  {
    "day": 4,
    "name": "La Fortuna Waterfall",
    "query": "La Fortuna Waterfall Catarata Rio Fortuna La Fortuna Alajuela",
    "lat": null,
    "lng": null
  },
  {
    "day": 5,
    "name": "Monteverde Cloud Forest Reserve",
    "query": "Monteverde Cloud Forest Reserve Santa Elena Puntarenas Costa Rica",
    "lat": 10.3036512,
    "lng": -84.7877117
  },
  {
    "day": 5,
    "name": "Selvatura Park",
    "query": "Selvatura Park Santa Elena Monteverde Puntarenas Costa Rica",
    "lat": null,
    "lng": null
  },
  {
    "day": 6,
    "name": "Irazú Volcano National Park",
    "query": "Irazu Volcano National Park Cartago Costa Rica",
    "lat": 9.9749784,
    "lng": -83.8492544
  },
  {
    "day": 6,
    "name": "Lankester Botanical Garden",
    "query": "Lankester Botanical Garden Cartago Costa Rica",
    "lat": null,
    "lng": null
  },
  {
    "day": 6,
    "name": "Tapantí National Park",
    "query": "Tapanti National Park Orosi Cartago Costa Rica",
    "lat": 9.749137,
    "lng": -83.7818824
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6", "5": "#e67e22", "6": "#16a085"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
