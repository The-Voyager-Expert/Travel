<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>New-York — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="New-York — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
  <button class="day-btn" data-day="5" style="--dc:#e67e22">Day 5</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "9/11 Memorial &amp; Museum",
    "query": "180 Greenwich Street New York NY",
    "lat": 40.7113675,
    "lng": -74.0132704
  },
  {
    "day": 1,
    "name": "One World Observatory",
    "query": "285 Fulton Street New York NY",
    "lat": 40.7129992,
    "lng": -74.0131894
  },
  {
    "day": 1,
    "name": "Brooklyn Bridge",
    "query": "Brooklyn Bridge New York NY pedestrian entrance Manhattan",
    "lat": 40.7062175,
    "lng": -73.9970208
  },
  {
    "day": 1,
    "name": "Brooklyn Heights Promenade",
    "query": "Brooklyn Heights Promenade New York",
    "lat": 40.6973713,
    "lng": -73.9973894
  },
  {
    "day": 2,
    "name": "The Frick Collection",
    "query": "1 East 70th Street New York NY",
    "lat": 40.7712536,
    "lng": -73.9670961
  },
  {
    "day": 2,
    "name": "Metropolitan Museum of Art",
    "query": "1000 Fifth Avenue New York NY",
    "lat": 40.8021613,
    "lng": -73.9453686
  },
  {
    "day": 2,
    "name": "Solomon R. Guggenheim Museum",
    "query": "1071 Fifth Avenue New York NY",
    "lat": 40.8021613,
    "lng": -73.9453686
  },
  {
    "day": 3,
    "name": "Museum of Modern Art",
    "query": "11 West 53rd Street New York NY",
    "lat": 40.7616124,
    "lng": -73.9774992
  },
  {
    "day": 3,
    "name": "Top of the Rock",
    "query": "30 Rockefeller Plaza New York NY",
    "lat": 40.7591232,
    "lng": -73.979556
  },
  {
    "day": 3,
    "name": "High Line",
    "query": "820 Washington Street New York NY High Line",
    "lat": 40.742333,
    "lng": -74.0076832
  },
  {
    "day": 3,
    "name": "Edge at Hudson Yards",
    "query": "30 Hudson Yards New York NY",
    "lat": 40.753983,
    "lng": -74.0006028
  },
  {
    "day": 4,
    "name": "Brooklyn Museum",
    "query": "200 Eastern Parkway Brooklyn New York",
    "lat": 40.6709546,
    "lng": -73.9632948
  },
  {
    "day": 4,
    "name": "Brooklyn Botanic Garden",
    "query": "990 Washington Avenue Brooklyn New York",
    "lat": 40.6694128,
    "lng": -73.9628997
  },
  {
    "day": 4,
    "name": "Prospect Park",
    "query": "Prospect Park Brooklyn New York",
    "lat": 40.6617743,
    "lng": -73.9710896
  },
  {
    "day": 5,
    "name": "Liberty Bell Center",
    "query": "526 Market Street Philadelphia PA",
    "lat": 39.9499569,
    "lng": -75.1502062
  },
  {
    "day": 5,
    "name": "Philadelphia Museum of Art",
    "query": "2600 Benjamin Franklin Parkway Philadelphia PA",
    "lat": 39.9655661,
    "lng": -75.1815202
  },
  {
    "day": 5,
    "name": "Eastern State Penitentiary",
    "query": "2027 Fairmount Avenue Philadelphia PA",
    "lat": 39.9683406,
    "lng": -75.1726626
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6", "5": "#e67e22"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
