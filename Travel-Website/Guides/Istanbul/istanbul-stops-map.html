<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>Istanbul — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Istanbul — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
  <button class="day-btn" data-day="5" style="--dc:#e67e22">Day 5</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "Hagia Sophia",
    "query": "Hagia Sophia Sultanahmet Square Istanbul",
    "lat": 41.0085046,
    "lng": 28.9800112
  },
  {
    "day": 1,
    "name": "Topkapi Palace",
    "query": "Topkapi Palace Museum Cankurtaran Sultanahmet Istanbul",
    "lat": 41.011344,
    "lng": 28.9832034
  },
  {
    "day": 1,
    "name": "Basilica Cistern",
    "query": "Basilica Cistern Yerebatan Caddesi 1 Sultanahmet Istanbul",
    "lat": 41.0084795,
    "lng": 28.9783826
  },
  {
    "day": 1,
    "name": "Blue Mosque",
    "query": "Blue Mosque Sultan Ahmed Mosque Sultanahmet Istanbul",
    "lat": 41.0053843,
    "lng": 28.9768534
  },
  {
    "day": 2,
    "name": "Istanbul Archaeological Museums",
    "query": "Istanbul Archaeological Museums Osman Hamdi Bey Yokusu Gulhane Istanbul",
    "lat": 41.0116481,
    "lng": 28.9817301
  },
  {
    "day": 2,
    "name": "Süleymaniye Mosque",
    "query": "Suleymaniye Mosque Prof Siddik Sami Onar Caddesi Fatih Istanbul",
    "lat": 41.0162287,
    "lng": 28.9639548
  },
  {
    "day": 2,
    "name": "Galata Tower",
    "query": "Galata Tower Bereketzade Mahallesi Beyoglu Istanbul",
    "lat": 41.0256406,
    "lng": 28.9742134
  },
  {
    "day": 3,
    "name": "Dolmabahçe Palace",
    "query": "Dolmabahce Palace Dolmabahce Caddesi Besiktas Istanbul",
    "lat": 41.0387794,
    "lng": 28.9995272
  },
  {
    "day": 3,
    "name": "Bosphorus Cruise",
    "query": "Eminonu Ferry Pier Sehir Hatlari Istanbul",
    "lat": null,
    "lng": null
  },
  {
    "day": 4,
    "name": "Chora Church",
    "query": "Chora Church Kariye Mosque Edirnekapı Istanbul",
    "lat": 41.0312136,
    "lng": 28.9389547
  },
  {
    "day": 4,
    "name": "Fener-Balat",
    "query": "Balat Neighborhood Fatih Istanbul",
    "lat": 41.029879,
    "lng": 28.9463407
  },
  {
    "day": 4,
    "name": "Pierre Loti Hill",
    "query": "Pierre Loti Hill Eyup Istanbul",
    "lat": null,
    "lng": null
  },
  {
    "day": 5,
    "name": "Beylerbeyi Palace",
    "query": "Beylerbeyi Palace Abdullah Agha Caddesi Beylerbeyi Uskudar Istanbul",
    "lat": 41.0427184,
    "lng": 29.0400359
  },
  {
    "day": 5,
    "name": "Çamlıca Hill",
    "query": "Camlica Hill Uskudar Istanbul",
    "lat": 41.0274921,
    "lng": 29.0679744
  },
  {
    "day": 5,
    "name": "Maiden's Tower",
    "query": "Maiden Tower Kiz Kulesi Uskudar Istanbul",
    "lat": 41.0211379,
    "lng": 29.004058
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6", "5": "#e67e22"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
