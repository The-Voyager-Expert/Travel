<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>Osaka — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Osaka — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
  <button class="day-btn" data-day="5" style="--dc:#e67e22">Day 5</button>
  <button class="day-btn" data-day="6" style="--dc:#16a085">Day 6</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "Osaka Castle",
    "query": "Osaka Castle Chuo-ku Japan",
    "lat": 34.6873735,
    "lng": 135.5258555
  },
  {
    "day": 1,
    "name": "Osaka Museum of History",
    "query": "Osaka Museum of History Chuo-ku Japan",
    "lat": 34.6826183,
    "lng": 135.5208131
  },
  {
    "day": 1,
    "name": "Namba Yasaka Shrine",
    "query": "Namba Yasaka Shrine Naniwa-ku Japan",
    "lat": 34.6614819,
    "lng": 135.4967325
  },
  {
    "day": 1,
    "name": "Dotonbori",
    "query": "Dotonbori Chuo-ku Japan",
    "lat": 34.6690306,
    "lng": 135.5015715
  },
  {
    "day": 2,
    "name": "Sumiyoshi Taisha",
    "query": "Sumiyoshi Taisha Sumiyoshi-ku Japan",
    "lat": 34.6130027,
    "lng": 135.4931012
  },
  {
    "day": 2,
    "name": "Tsutenkaku Tower",
    "query": "Tsutenkaku Tower Naniwa-ku Japan",
    "lat": 34.652541,
    "lng": 135.506541
  },
  {
    "day": 2,
    "name": "Osaka Aquarium Kaiyukan",
    "query": "Osaka Aquarium Kaiyukan Minato-ku Japan",
    "lat": 34.6545464,
    "lng": 135.4289211
  },
  {
    "day": 3,
    "name": "Cup Noodles Museum Osaka Ikeda",
    "query": "Cup Noodles Museum Ikeda Japan",
    "lat": null,
    "lng": null
  },
  {
    "day": 3,
    "name": "Umeda Sky Building",
    "query": "Umeda Sky Building Kita-ku Japan",
    "lat": 34.7052927,
    "lng": 135.4905349
  },
  {
    "day": 3,
    "name": "Osaka Tenmangu",
    "query": "Osaka Tenmangu Kita-ku Japan",
    "lat": 34.6960904,
    "lng": 135.5127654
  },
  {
    "day": 4,
    "name": "Shitenno-ji",
    "query": "1-11-18 Shitennoji Tennoji-ku Osaka",
    "lat": 34.6547194,
    "lng": 135.5167979
  },
  {
    "day": 4,
    "name": "Isshinji",
    "query": "2-8-69 Tennoji Tennoji-ku Osaka",
    "lat": 34.6737301,
    "lng": 135.5207906
  },
  {
    "day": 4,
    "name": "Osaka Central Public Hall",
    "query": "1-1-27 Nakanoshima Kita-ku Osaka",
    "lat": 34.6928558,
    "lng": 135.505468
  },
  {
    "day": 4,
    "name": "National Museum of Art Osaka",
    "query": "4-2-55 Nakanoshima Kita-ku Osaka",
    "lat": 34.6916929,
    "lng": 135.492151
  },
  {
    "day": 5,
    "name": "Nakanoshima Library",
    "query": "1-2-10 Nakanoshima Kita-ku Osaka",
    "lat": 34.6928558,
    "lng": 135.505468
  },
  {
    "day": 5,
    "name": "Osaka Science Museum",
    "query": "4-2-1 Nakanoshima Kita-ku Osaka",
    "lat": 34.6928558,
    "lng": 135.505468
  },
  {
    "day": 5,
    "name": "Osaka Museum of Natural History",
    "query": "1-23 Nagai Nakamozu Sumiyoshi-ku Osaka",
    "lat": null,
    "lng": null
  },
  {
    "day": 5,
    "name": "Tempozan Ferris Wheel",
    "query": "1-1-10 Kaigandori Minato-ku Osaka",
    "lat": 34.6499095,
    "lng": 135.442364
  },
  {
    "day": 6,
    "name": "Minō Falls",
    "query": "Mino Waterfall Minoo Osaka",
    "lat": 34.8538872,
    "lng": 135.4719727
  },
  {
    "day": 6,
    "name": "Katsuo-ji",
    "query": "2-19-1 Katsuo-ji Minoo Osaka",
    "lat": 34.8656228,
    "lng": 135.4922571
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6", "5": "#e67e22", "6": "#16a085"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
