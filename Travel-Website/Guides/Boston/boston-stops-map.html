<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>Boston — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Boston — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
  <button class="day-btn" data-day="5" style="--dc:#e67e22">Day 5</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "Boston Common &amp; Public Garden",
    "query": "Boston Public Garden 4 Charles St Boston MA",
    "lat": null,
    "lng": null
  },
  {
    "day": 1,
    "name": "Beacon Hill",
    "query": "Acorn St Beacon Hill Boston MA",
    "lat": 42.3576199,
    "lng": -71.0688367
  },
  {
    "day": 1,
    "name": "Old North Church",
    "query": "Old North Church 193 Salem St Boston MA",
    "lat": 42.366316,
    "lng": -71.0544478
  },
  {
    "day": 1,
    "name": "USS Constitution",
    "query": "USS Constitution Charlestown Navy Yard Charlestown Boston MA",
    "lat": 42.3724407,
    "lng": -71.0565466
  },
  {
    "day": 2,
    "name": "Museum of Fine Arts",
    "query": "Museum of Fine Arts Boston 465 Huntington Ave Boston MA",
    "lat": 42.3394573,
    "lng": -71.093897
  },
  {
    "day": 2,
    "name": "Fenway Park",
    "query": "Fenway Park Gate D 4 Jersey St Boston MA",
    "lat": 42.3464614,
    "lng": -71.0970999
  },
  {
    "day": 2,
    "name": "View Boston",
    "query": "View Boston 800 Boylston St Boston MA",
    "lat": 42.3586425,
    "lng": -71.0623931
  },
  {
    "day": 2,
    "name": "Trinity Church",
    "query": "Trinity Church 206 Clarendon St Boston MA",
    "lat": 42.3500677,
    "lng": -71.0754254
  },
  {
    "day": 3,
    "name": "Faneuil Hall",
    "query": "Faneuil Hall 4 South Market St Boston MA",
    "lat": 42.3600335,
    "lng": -71.0562341
  },
  {
    "day": 3,
    "name": "Paul Revere House",
    "query": "Paul Revere House 19 North Square Boston MA",
    "lat": 42.3637378,
    "lng": -71.0536827
  },
  {
    "day": 3,
    "name": "Harvard Yard",
    "query": "Harvard Yard 1350 Massachusetts Ave Cambridge MA",
    "lat": null,
    "lng": null
  },
  {
    "day": 3,
    "name": "Isabella Stewart Gardner Museum",
    "query": "Isabella Stewart Gardner Museum 25 Evans Way Boston MA",
    "lat": 42.338245,
    "lng": -71.0991538
  },
  {
    "day": 4,
    "name": "Old State House",
    "query": "Old State House 206 Washington St Boston MA",
    "lat": 42.3587306,
    "lng": -71.0574681
  },
  {
    "day": 4,
    "name": "Old South Meeting House",
    "query": "Old South Meeting House 310 Washington St Boston MA",
    "lat": 42.3569828,
    "lng": -71.0583767
  },
  {
    "day": 4,
    "name": "Massachusetts State House",
    "query": "Massachusetts State House 24 Beacon St Boston MA",
    "lat": 42.358602,
    "lng": -71.0638751
  },
  {
    "day": 4,
    "name": "Boston Public Library",
    "query": "Boston Public Library 700 Boylston St Boston MA",
    "lat": 42.3493298,
    "lng": -71.0786547
  },
  {
    "day": 5,
    "name": "Peabody Essex Museum",
    "query": "Peabody Essex Museum 161 Essex St Salem MA",
    "lat": 42.5215925,
    "lng": -70.8921931
  },
  {
    "day": 5,
    "name": "Witch House",
    "query": "Witch House 310 Essex St Salem MA",
    "lat": 42.5215539,
    "lng": -70.8988987
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6", "5": "#e67e22"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
