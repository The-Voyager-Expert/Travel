<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>Buenos-Aires — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Buenos-Aires — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
  <button class="day-btn" data-day="5" style="--dc:#e67e22">Day 5</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "Teatro Colón",
    "query": "Teatro Colón, Cerrito 628, Buenos Aires",
    "lat": -34.6010855,
    "lng": -58.3831869
  },
  {
    "day": 1,
    "name": "Palacio Barolo",

    "lat": -34.6096625,
    "lng": -58.3857277
  },
  {
    "day": 1,
    "name": "Casa Rosada",
    "query": "Casa Rosada, Balcarce 78, Buenos Aires",
    "lat": -34.6080692,
    "lng": -58.3702762
  },
  {
    "day": 1,
    "name": "Puente de la Mujer",
    "query": "Puente de la Mujer, Puerto Madero, Buenos Aires",
    "lat": -34.6080163,
    "lng": -58.365129
  },
  {
    "day": 2,
    "name": "Recoleta Cemetery",
    "query": "Cementerio de la Recoleta, Juniín 1760, Buenos Aires",
    "lat": -34.5876575,
    "lng": -58.3935953
  },
  {
    "day": 2,
    "name": "Floralis Genérica",
    "query": "Floralis Genérica, Plaza de las Naciones Unidas, Buenos Aires",
    "lat": -34.5816892,
    "lng": -58.3940018
  },
  {
    "day": 2,
    "name": "Caminito",
    "query": "Caminito, La Boca, Buenos Aires",
    "lat": -34.6393589,
    "lng": -58.3625689
  },
  {
    "day": 2,
    "name": "Fundación PROA",
    "query": "Fundación PROA, Av. Pedro de Mendoza 1929, Buenos Aires",
    "lat": -34.6398968,
    "lng": -58.3621017
  },
  {
    "day": 3,
    "name": "MALBA – Museo de Arte Latinoamericano de Buenos Aires",
    "query": "MALBA, Av. Figueroa Alcorta 3415, Palermo, Buenos Aires",
    "lat": -34.5768817,
    "lng": -58.4033919
  },
  {
    "day": 3,
    "name": "Jardín Japonés",
    "query": "Jardín Japonés, Av. Casares 3450, Palermo, Buenos Aires",
    "lat": -34.5751398,
    "lng": -58.4092629
  },
  {
    "day": 3,
    "name": "Parque 3 de Febrero · Bosques de Palermo",
    "query": "Parque 3 de Febrero, Palermo, Buenos Aires",
    "lat": null,
    "lng": null
  },
  {
    "day": 3,
    "name": "Monumento de los Españoles",
    "query": "Monumento de los Españoles, Av. del Libertador y Av. Sarmiento, Palermo, Buenos Aires",
    "lat": -34.5749657,
    "lng": -58.4150562
  },
  {
    "day": 4,
    "name": "Iglesia Nuestra Señora de Belén",
    "query": "Iglesia Nuestra Señora de Belén, Humberto Primo 340, San Telmo, Buenos Aires",
    "lat": null,
    "lng": null
  },
  {
    "day": 4,

    "query": "Parque Lezama, Defensa y Brasil, San Telmo, Buenos Aires",
    "lat": -34.6271211,

  },
  {
    "day": 4,

  },
  {
    "day": 4,

    "query": "Plaza Dorrego, San Telmo, Buenos Aires",

  },
  {
    "day": 5,
    "name": "Museo Nacional de Bellas Artes",
    "query": "Av del Libertador 1473, Recoleta, Buenos Aires",
    "lat": -34.5839152,
    "lng": -58.3929152
  },
  {
    "day": 5,
    "name": "Basílica de la Inmaculada Concepción",
    "query": "Vuelta de Obligado 1994, Belgrano, Buenos Aires",
    "lat": -34.5625701,
    "lng": -58.4548325
  },
  {
    "day": 5,
    "name": "Barrio Chino",
    "query": "Arribeños 2100, Belgrano, Buenos Aires",
    "lat": -34.5629184,
    "lng": -58.446222
  },
  {
    "day": 5,
    "name": "Barrancas de Belgrano",
    "query": "Vuelta de Obligado y 11 de Septiembre, Belgrano, Buenos Aires",
    "lat": -34.5600475,
    "lng": -58.4474292
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6", "5": "#e67e22"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps ↗</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
