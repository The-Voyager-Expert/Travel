<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>Florianopolis — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Florianopolis — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
  <button class="day-btn" data-day="5" style="--dc:#e67e22">Day 5</button>
  <button class="day-btn" data-day="6" style="--dc:#16a085">Day 6</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "Mirante do Morro da Cruz",
    "query": "Mirante do Morro da Cruz Florianopolis",
    "lat": -27.5884779,
    "lng": -48.5338176
  },
  {
    "day": 1,
    "name": "Fortaleza de São José da Ponta Grossa",
    "query": "Fortaleza de Sao Jose da Ponta Grossa Florianopolis",
    "lat": -27.4315348,
    "lng": -48.5178891
  },
  {
    "day": 1,
    "name": "Trilha do Morro das Aranhas",
    "query": "Trilha do Morro das Aranhas Praia do Santinho Florianopolis",
    "lat": null,
    "lng": null
  },
  {
    "day": 2,
    "name": "Mirante da Lagoa da Conceição",
    "query": "Mirante da Lagoa da Conceicao Florianopolis",
    "lat": -27.600911,
    "lng": -48.4813096
  },
  {
    "day": 2,
    "name": "Dunas da Joaquina",
    "query": "Dunas da Joaquina Florianopolis",
    "lat": -27.6345257,
    "lng": -48.4587226
  },
  {
    "day": 2,
    "name": "Ilha do Campeche",
    "query": "Praia da Armacao Florianopolis",
    "lat": -27.7360351,
    "lng": -48.5079032
  },
  {
    "day": 3,
    "name": "Mirante do Morro das Pedras",
    "query": "Mirante Morro das Pedras Florianopolis",
    "lat": -27.7202969,
    "lng": -48.5033271
  },
  {
    "day": 3,
    "name": "Lagoa do Peri",
    "query": "Lagoa do Peri Florianopolis",
    "lat": -27.7325953,
    "lng": -48.5257438
  },
  {
    "day": 3,
    "name": "Lagoinha do Leste",
    "query": "Lagoinha do Leste Florianopolis",
    "lat": -27.772453,
    "lng": -48.4908905
  },
  {
    "day": 4,
    "name": "Ponte Hercílio Luz",
    "query": "Ponte Hercilio Luz Florianopolis",
    "lat": -27.5938202,
    "lng": -48.5654433
  },
  {
    "day": 4,
    "name": "Palácio Cruz e Souza",
    "query": "Palacio Cruz e Sousa Praca XV de Novembro 227 Florianopolis",
    "lat": -27.5969138,
    "lng": -48.5500835
  },
  {
    "day": 4,
    "name": "Catedral Metropolitana",
    "query": "Catedral Metropolitana Florianopolis Praca XV de Novembro",
    "lat": -27.5964453,
    "lng": -48.5492633
  },
  {
    "day": 5,
    "name": "Santo Antônio de Lisboa",
    "query": "Santo Antonio de Lisboa Florianopolis",
    "lat": -27.5061508,
    "lng": -48.5188698
  },
  {
    "day": 5,
    "name": "Jurerê Internacional",
    "query": "Jurere Internacional Florianopolis",
    "lat": -27.4402665,
    "lng": -48.5027484
  },
  {
    "day": 5,
    "name": "Praia dos Ingleses",
    "query": "Praia dos Ingleses Florianopolis",
    "lat": -27.4294468,
    "lng": -48.3965338
  },
  {
    "day": 6,
    "name": "Barra da Lagoa",
    "query": "Barra da Lagoa Florianopolis",
    "lat": -27.574778,
    "lng": -48.4258352
  },
  {
    "day": 6,
    "name": "Praia Mole",
    "query": "Praia Mole Florianopolis",
    "lat": -27.6031328,
    "lng": -48.4333337
  },
  {
    "day": 6,
    "name": "Ribeirão da Ilha",
    "query": "Ribeirao da Ilha Florianopolis",
    "lat": -27.709003,
    "lng": -48.5586078
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6", "5": "#e67e22", "6": "#16a085"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps ↗</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
