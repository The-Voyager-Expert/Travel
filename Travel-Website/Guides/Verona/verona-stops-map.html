<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>Verona — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Verona — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "Castelvecchio",
    "query": "Corso Castelvecchio 2, Verona",
    "lat": 45.4399535,
    "lng": 10.987865
  },
  {
    "day": 1,
    "name": "Arena di Verona",
    "query": "Piazza Bra 1, Verona",
    "lat": 45.4380438,
    "lng": 10.9937904
  },
  {
    "day": 1,
    "name": "Piazza delle Erbe",
    "query": "Piazza delle Erbe, Verona",
    "lat": 45.443059,
    "lng": 10.9971729
  },
  {
    "day": 1,
    "name": "Torre dei Lamberti",
    "query": "Via della Costa 1, Verona",
    "lat": 45.4431249,
    "lng": 10.9975901
  },
  {
    "day": 1,
    "name": "Ponte Pietra",
    "query": "Ponte Pietra, Verona",
    "lat": 45.4478527,
    "lng": 11.0001035
  },
  {
    "day": 2,
    "name": "Casa di Giulietta",
    "query": "Via Cappello 23, Verona",
    "lat": 45.4418827,
    "lng": 10.9983024
  },
  {
    "day": 2,
    "name": "Piazza dei Signori",
    "query": "Piazza dei Signori, Verona",
    "lat": 45.4434665,
    "lng": 10.9980787
  },
  {
    "day": 2,
    "name": "Arche Scaligere",
    "query": "Arche Scaligere, Via Santa Maria Antica, Verona",
    "lat": 45.4436592,
    "lng": 10.9989946
  },
  {
    "day": 2,
    "name": "Basilica di San Zeno Maggiore",
    "query": "Piazza San Zeno 2, Verona",
    "lat": 45.4426095,
    "lng": 10.9784666
  },
  {
    "day": 3,
    "name": "Sant'Anastasia",
    "query": "Piazza di Sant'Anastasia, Verona",
    "lat": 45.4453597,
    "lng": 11.0002451
  },
  {
    "day": 3,
    "name": "Cattedrale di Verona",
    "query": "Piazza Duomo 21, Verona",
    "lat": 45.4471596,
    "lng": 10.9964823
  },
  {
    "day": 3,
    "name": "Teatro Romano",
    "query": "Regaste Redentore 2, Verona",
    "lat": 45.4471208,
    "lng": 11.0016939
  },
  {
    "day": 3,
    "name": "Giardino Giusti",
    "query": "Via Giardino Giusti 2, Verona",
    "lat": 45.4430411,
    "lng": 11.0063804
  },
  {
    "day": 4,
    "name": "San Fermo Maggiore",
    "query": "Stradone San Fermo, Verona",
    "lat": 45.4385514,
    "lng": 10.9984336
  },
  {
    "day": 4,
    "name": "Palazzo Maffei Museo",
    "query": "Piazza delle Erbe 38, Verona",
    "lat": 45.4436367,
    "lng": 10.9967704
  },
  {
    "day": 4,
    "name": "Porta Borsari",
    "query": "Corso Porta Borsari, Verona",
    "lat": 45.442001,
    "lng": 10.9935304
  },
  {
    "day": 4,
    "name": "Museo Lapidario Maffeiano",
    "query": "Piazza Bra 28, Verona",
    "lat": 45.4381803,
    "lng": 10.9913534
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps ↗</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
