<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>Las-Vegas — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Las-Vegas — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
  <button class="day-btn" data-day="5" style="--dc:#e67e22">Day 5</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "The STRAT SkyPod",
    "query": "2000 S Las Vegas Blvd Nevada",
    "lat": 36.1476992,
    "lng": -115.1561024
  },
  {
    "day": 1,
    "name": "Neon Museum",
    "query": "770 N Las Vegas Blvd Nevada",
    "lat": 36.1765127,
    "lng": -115.1352767
  },
  {
    "day": 1,
    "name": "The Mob Museum",
    "query": "300 Stewart Ave Nevada",
    "lat": 36.1727999,
    "lng": -115.1413908
  },
  {
    "day": 1,
    "name": "Springs Preserve",
    "query": "333 S Valley View Blvd Nevada",
    "lat": 36.1712694,
    "lng": -115.1898566
  },
  {
    "day": 2,
    "name": "Fremont Street Experience",
    "query": "425 Fremont St Nevada",
    "lat": 36.169191,
    "lng": -115.141039
  },
  {
    "day": 2,
    "name": "Bellagio Conservatory & Botanical Gardens",
    "query": "3600 S Las Vegas Blvd Nevada",
    "lat": 36.1123192,
    "lng": -115.178723
  },
  {
    "day": 2,
    "name": "Fountains of Bellagio",
    "query": "3600 S Las Vegas Blvd Nevada",
    "lat": 36.1123192,
    "lng": -115.178723
  },
  {
    "day": 2,
    "name": "High Roller at The LINQ",
    "query": "3545 S Las Vegas Blvd Nevada",
    "lat": 36.1177429,
    "lng": -115.1693967
  },
  {
    "day": 2,
    "name": "AREA15",
    "query": "3215 S Rancho Dr Nevada",
    "lat": 36.1323137,
    "lng": -115.1816066
  },
  {
    "day": 3,
    "name": "Red Rock Canyon National Conservation Area",
    "query": "1000 Scenic Loop Dr Nevada",
    "lat": null,
    "lng": null
  },
  {
    "day": 3,
    "name": "Seven Magic Mountains",
    "query": "Las Vegas Blvd S Jean Nevada",
    "lat": 35.7745316,
    "lng": -115.3315
  },
  {
    "day": 4,
    "name": "Hoover Dam",
    "query": "81 Hoover Dam Access Rd Nevada",
    "lat": 36.0161726,
    "lng": -114.7499118
  },
  {
    "day": 4,
    "name": "Lake Mead National Recreation Area",
    "query": "601 Nevada Way Nevada",
    "lat": 36.0381381,
    "lng": -114.982472
  },
  {
    "day": 4,
    "name": "National Atomic Testing Museum",
    "query": "755 E Flamingo Rd Nevada",
    "lat": 36.1139519,
    "lng": -115.1483835
  },
  {
    "day": 4,
    "name": "Pinball Hall of Fame",
    "query": "4925 Las Vegas Blvd S Nevada",
    "lat": 36.0848073,
    "lng": -115.1708164
  },
  {
    "day": 5,
    "name": "The Venetian Gondola Rides",
    "query": "3355 S Las Vegas Blvd Nevada",
    "lat": 36.1217073,
    "lng": -115.1693352
  },
  {
    "day": 5,
    "name": "Paris Las Vegas Eiffel Tower Experience",
    "query": "3655 S Las Vegas Blvd Nevada",
    "lat": 36.1121618,
    "lng": -115.170638
  },
  {
    "day": 5,
    "name": "Big Apple Coaster at New York-New York",
    "query": "3790 S Las Vegas Blvd Nevada",
    "lat": 36.1021436,
    "lng": -115.1744946
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6", "5": "#e67e22"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps ↗</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
