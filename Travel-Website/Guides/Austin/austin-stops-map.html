<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>Austin — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Austin — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
  <button class="day-btn" data-day="5" style="--dc:#e67e22">Day 5</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "Texas State Capitol",
    "query": "Texas State Capitol 1100 Congress Ave Austin TX",
    "lat": null,
    "lng": null
  },
  {
    "day": 1,
    "name": "Bullock Texas State History Museum",
    "query": "Bullock Texas State History Museum 1800 N Congress Ave Austin TX",
    "lat": null,
    "lng": null
  },
  {
    "day": 1,
    "name": "LBJ Presidential Library",
    "query": "LBJ Presidential Library 2313 Red River St Austin TX",
    "lat": null,
    "lng": null
  },
  {
    "day": 1,
    "name": "Congress Avenue Bridge",
    "query": "Congress Avenue Bridge 100 S Congress Ave Austin TX",
    "lat": null,
    "lng": null
  },
  {
    "day": 2,
    "name": "Barton Springs Pool",
    "query": "Barton Springs Pool 2201 Barton Springs Rd Austin TX",
    "lat": null,
    "lng": null
  },
  {
    "day": 2,
    "name": "Zilker Botanical Garden",
    "query": "Zilker Botanical Garden 2220 Barton Springs Rd Austin TX",
    "lat": null,
    "lng": null
  },
  {
    "day": 2,
    "name": "Lady Bird Lake",
    "query": "Ann and Roy Butler Hike-and-Bike Trail Austin TX",
    "lat": null,
    "lng": null
  },
  {
    "day": 2,
    "name": "Mount Bonnell",
    "query": "Mount Bonnell 3800 Mount Bonnell Rd Austin TX",
    "lat": null,
    "lng": null
  },
  {
    "day": 3,
    "name": "Rainey Street Historic District",
    "query": "Rainey St Austin TX 78701",
    "lat": null,
    "lng": null
  },
  {
    "day": 3,
    "name": "Stevie Ray Vaughan Memorial",
    "query": "800 W Riverside Dr Austin TX 78704",
    "lat": null,
    "lng": null
  },
  {
    "day": 3,
    "name": "South Congress Avenue",
    "query": "South Congress Ave Austin TX 78704",
    "lat": null,
    "lng": null
  },
  {
    "day": 3,
    "name": "Umlauf Sculpture Garden &amp; Museum",
    "query": "605 Azie Morton Rd Austin TX 78704",
    "lat": null,
    "lng": null
  },
  {
    "day": 4,
    "name": "Harry Ransom Center",
    "query": "Harry Ransom Center 300 W 21st St Austin TX",
    "lat": null,
    "lng": null
  },
  {
    "day": 4,
    "name": "Blanton Museum of Art",
    "query": "Blanton Museum of Art 200 E Martin Luther King Jr Blvd Austin TX",
    "lat": null,
    "lng": null
  },
  {
    "day": 4,
    "name": "Ellsworth Kelly's Austin",
    "query": "Ellsworth Kelly Austin 2510 San Jacinto Blvd Austin TX",
    "lat": null,
    "lng": null
  },
  {
    "day": 4,
    "name": "Mexic-Arte Museum",
    "query": "Mexic-Arte Museum 419 Congress Ave Austin TX",
    "lat": null,
    "lng": null
  },
  {
    "day": 5,
    "name": "The Contemporary Austin – Laguna Gloria",
    "query": "The Contemporary Austin Laguna Gloria 3809 W 35th St Austin TX",
    "lat": null,
    "lng": null
  },
  {
    "day": 5,
    "name": "Wild Basin Wilderness Preserve",
    "query": "Wild Basin Wilderness Preserve 805 N Capital of Texas Hwy Austin TX",
    "lat": null,
    "lng": null
  },
  {
    "day": 5,
    "name": "Cathedral of Junk",
    "query": "Cathedral of Junk 4422 Lareina Dr Austin TX",
    "lat": null,
    "lng": null
  },
  {
    "day": 5,
    "name": "Sixth Street Historic District",
    "query": "Sixth Street Austin TX 78701",
    "lat": null,
    "lng": null
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6", "5": "#e67e22"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps ↗</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
