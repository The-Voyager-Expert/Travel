<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>Washington-DC — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Washington-DC — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
  <button class="day-btn" data-day="5" style="--dc:#e67e22">Day 5</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "Lincoln Memorial",
    "query": "Lincoln Memorial Circle NW Washington DC",
    "lat": 38.8902519,
    "lng": -77.0498069
  },
  {
    "day": 1,
    "name": "National Gallery of Art",
    "query": "4th St NW National Mall Washington DC",
    "lat": 38.8913116,
    "lng": -77.0199045
  },
  {
    "day": 1,
    "name": "Library of Congress",
    "query": "101 Independence Ave SE Washington DC",
    "lat": 38.8867409,
    "lng": -77.0047055
  },
  {
    "day": 1,
    "name": "US Capitol",
    "query": "East Capitol St NE Capitol Hill Washington DC",
    "lat": 38.8903704,
    "lng": -76.9899682
  },
  {
    "day": 2,
    "name": "Washington Monument",
    "query": "2 15th St NW Washington DC",
    "lat": 38.8894754,
    "lng": -77.0352426
  },
  {
    "day": 2,
    "name": "National WWII Memorial",
    "query": "1750 Independence Ave SW Washington DC",
    "lat": 38.8875903,
    "lng": -77.0094978
  },
  {
    "day": 2,
    "name": "Jefferson Memorial",
    "query": "16 Basin Dr SW Washington DC",
    "lat": 38.8841262,
    "lng": -77.0458797
  },
  {
    "day": 2,
    "name": "Martin Luther King Jr. Memorial",
    "query": "1964 Independence Ave SW Washington DC",
    "lat": 38.8893951,
    "lng": -77.040308
  },
  {
    "day": 3,
    "name": "National Museum of African American History and Culture",
    "query": "1400 Constitution Ave NW Washington DC",
    "lat": 38.891067,
    "lng": -77.032704
  },
  {
    "day": 3,
    "name": "National Museum of American History",
    "query": "1300 Constitution Ave NW Washington DC",
    "lat": 38.8912397,
    "lng": -77.0300205
  },
  {
    "day": 3,
    "name": "National Museum of Natural History",
    "query": "10th St NW Constitution Ave Washington DC",
    "lat": 38.8919589,
    "lng": -77.0263648
  },
  {
    "day": 3,
    "name": "National Air and Space Museum",
    "query": "655 Jefferson Dr SW Washington DC",
    "lat": 38.8881349,
    "lng": -77.0198154
  },
  {
    "day": 3,
    "name": "National Archives Museum",
    "query": "700 Pennsylvania Ave NW Washington DC",
    "lat": 38.8927368,
    "lng": -77.0229201
  },
  {
    "day": 4,
    "name": "Arlington National Cemetery",
    "query": "1 Memorial Ave Arlington VA",
    "lat": 38.8851014,
    "lng": -77.0616831
  },
  {
    "day": 4,
    "name": "Marine Corps War Memorial",
    "query": "Marshall Dr Arlington VA",
    "lat": 38.8880106,
    "lng": -77.0663834
  },
  {
    "day": 4,
    "name": "Old Stone House",
    "query": "3051 M St NW Washington DC",
    "lat": 38.9054188,
    "lng": -77.060379
  },
  {
    "day": 4,
    "name": "Kennedy Center",
    "query": "2700 F St NW Washington DC",
    "lat": 38.8957359,
    "lng": -77.0557586
  },
  {
    "day": 5,
    "name": "Independence Hall",
    "query": "520 Chestnut St Philadelphia PA",
    "lat": 39.9488873,
    "lng": -75.150026
  },
  {
    "day": 5,
    "name": "Liberty Bell",
    "query": "526 Market St Philadelphia PA",
    "lat": 39.9499569,
    "lng": -75.1502062
  },
  {
    "day": 5,
    "name": "Eastern State Penitentiary",
    "query": "2027 Fairmount Ave Philadelphia PA",
    "lat": 39.9683406,
    "lng": -75.1726626
  },
  {
    "day": 5,
    "name": "Philadelphia Museum of Art",
    "query": "2600 Benjamin Franklin Pkwy Philadelphia PA",
    "lat": 39.9655661,
    "lng": -75.1815202
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6", "5": "#e67e22"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps ↗</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
