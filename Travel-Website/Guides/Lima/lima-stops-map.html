<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>Lima — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Lima — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
  <button class="day-btn" data-day="5" style="--dc:#e67e22">Day 5</button>
  <button class="day-btn" data-day="6" style="--dc:#16a085">Day 6</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "Plaza Mayor &amp; Historic Center",
    "query": "Plaza Mayor Lima Historic Center",
    "lat": null,
    "lng": null
  },
  {
    "day": 1,
    "name": "Convento San Francisco &amp; Catacombs",
    "query": "Basilica Convento San Francisco Lima Jr Ancash 459",
    "lat": null,
    "lng": null
  },
  {
    "day": 1,
    "name": "Larco Museum",
    "query": "Larco Museum Av Simon Bolivar 1515 Pueblo Libre Lima",
    "lat": -12.0727381,
    "lng": -77.0709165
  },
  {
    "day": 1,
    "name": "Circuito Mágico del Agua",
    "query": "Circuito Magico del Agua Parque de la Reserva Lima",
    "lat": -12.0710422,
    "lng": -77.0337701
  },
  {
    "day": 2,
    "name": "Huaca Pucllana",
    "query": "Huaca Pucllana General Borgono Miraflores Lima",
    "lat": -12.1115677,
    "lng": -77.0332872
  },
  {
    "day": 2,
    "name": "Malecón de Miraflores &amp; Parque del Amor",
    "query": "Parque del Amor Malecon de la Reserva Miraflores Lima",
    "lat": null,
    "lng": null
  },
  {
    "day": 2,
    "name": "MATE — Museo Mario Testino",
    "query": "MATE Museo Mario Testino Av Pedro de Osma 409 Barranco Lima",
    "lat": null,
    "lng": null
  },
  {
    "day": 2,
    "name": "Puente de los Suspiros",
    "query": "Puente de los Suspiros Bajada de Banos Barranco Lima",
    "lat": -12.1491725,
    "lng": -77.0225942
  },
  {
    "day": 3,
    "name": "Barranco Arts District",
    "query": "Bajada de Banos Barranco Lima Peru",
    "lat": -12.1487098,
    "lng": -77.0223601
  },
  {
    "day": 3,
    "name": "Museo de Arte de Lima",
    "query": "Museo de Arte de Lima MALI Av 9 de Diciembre 125 Lima Peru",
    "lat": -12.0604856,
    "lng": -77.0370231
  },
  {
    "day": 3,

    "query": "Huaca Huallamarca Nicolas de Rivera 201 San Isidro Lima Peru",
    "lat": -12.0974038,
    "lng": -77.040492
  },
  {
    "day": 3,
    "name": "Bosque El Olivar",
    "query": "Bosque El Olivar San Isidro Lima Peru",
    "lat": null,
    "lng": null
  },
  {
    "day": 4,
    "name": "Pachacamac Archaeological Site",
    "query": "Pachacamac Archaeological Site Antigua Panamericana Sur km 31.5 Lurin Lima Peru",
    "lat": -12.2498244,
    "lng": -76.9067942
  },
  {
    "day": 4,

    "query": "Fortaleza Real Felipe Plaza Independencia Callao Lima Peru",
    "lat": -12.0617116,

  },
  {
    "day": 4,

    "query": "Monumental Callao Jiron Constitucion Callao Lima Peru",

  {

  },
  {

    "query": "Pantanos de Villa Wildlife Refuge Panamericana Sur Chorrillos Lima",
    "lat": null,

  },
  {

    "lat": -12.1746636,
    "lng": -77.0335499
  },
  {
    "day": 5,

    "query": "Gold Museum Peru Alonso de Molina 1100 Monterrico Surco Lima",
    "lat": null,
    "lng": null
  },
  {
    "day": 6,
    "name": "Parque de las Leyendas",
    "query": "Parque de las Leyendas Avenida Universitaria 1201 San Miguel Lima",
    "lat": -12.0694979,
    "lng": -77.0861056
  },
  {
    "day": 6,
    "name": "Plaza San Martín",
    "query": "Plaza San Martin Cercado de Lima Peru",
    "lat": -12.0507405,
    "lng": -77.0348159
  },
  {
    "day": 6,
    "name": "Jirón de la Unión",
    "query": "Jiron de la Union Cercado Lima Peru",
    "lat": -12.0446366,
    "lng": -77.0303121
  },
  {
    "day": 6,
    "name": "Barrio Chino Lima",
    "query": "Barrio Chino Jiron Ucayali Cercado Lima Peru",
    "lat": -12.0481037,
    "lng": -77.0261378
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6", "5": "#e67e22", "6": "#16a085"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
