<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>Dublin — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Dublin — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
  <button class="day-btn" data-day="5" style="--dc:#e67e22">Day 5</button>
  <button class="day-btn" data-day="6" style="--dc:#16a085">Day 6</button>
  <button class="day-btn" data-day="7" style="--dc:#e74c3c">Day 7</button>
  <button class="day-btn" data-day="8" style="--dc:#f39c12">Day 8</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "Book of Kells at Trinity College",
    "query": "Trinity College College Green South-East Inner City",
    "lat": null,
    "lng": null
  },
  {
    "day": 1,
    "name": "National Museum of Archaeology",
    "query": "National Museum Ireland Kildare Street Kildare-Merrion",
    "lat": null,
    "lng": null
  },
  {
    "day": 1,
    "name": "National Gallery of Ireland",
    "query": "National Gallery Ireland Merrion Square West Merrion Square",
    "lat": 53.3411207,
    "lng": -6.2526671
  },
  {
    "day": 2,
    "name": "Christ Church Cathedral",
    "query": "Christ Church Cathedral Christ Church Place Liberties",
    "lat": 53.3434078,
    "lng": -6.2712027
  },
  {
    "day": 2,
    "name": "St. Patrick's Cathedral",
    "query": "St Patrick's Cathedral Saint Patrick's Close Liberties",
    "lat": 53.3395644,
    "lng": -6.2714758
  },
  {
    "day": 2,
    "name": "Museum of Literature Ireland",
    "query": "Museum of Literature Ireland 86 St Stephen's Green Saint Stephen's Green",
    "lat": 53.3367897,
    "lng": -6.2604217
  },
  {
    "day": 3,
    "name": "Kilmainham Gaol",
    "query": "Kilmainham Gaol Inchicore Road Kilmainham",
    "lat": 53.3416911,
    "lng": -6.309565
  },
  {
    "day": 3,
    "name": "Guinness Storehouse",
    "query": "Guinness Storehouse St James's Gate Liberties",
    "lat": 53.3419328,
    "lng": -6.2867297
  },
  {
    "day": 4,
    "name": "14 Henrietta Street",
    "query": "14 Henrietta Street Parnell",
    "lat": 53.3523486,
    "lng": -6.2701544
  },
  {
    "day": 4,
    "name": "GPO Witness History",
    "query": "GPO Museum O'Connell Street Lower North City Centre",
    "lat": null,
    "lng": null
  },
  {
    "day": 4,
    "name": "EPIC The Irish Emigration Museum",
    "query": "EPIC Irish Emigration Museum Custom House Quay Docklands",
    "lat": 53.3482653,
    "lng": -6.2479785
  },
  {
    "day": 4,
    "name": "Jeanie Johnston Tall Ship",
    "query": "Jeanie Johnston Tall Ship Custom House Quay Docklands",
    "lat": null,
    "lng": null
  },
  {
    "day": 5,
    "name": "James Joyce Tower",
    "query": "James Joyce Tower Sandycove Point Sandycove",
    "lat": 53.2886714,
    "lng": -6.1136084
  },
  {
    "day": 5,
    "name": "Dalkey Castle",
    "query": "Dalkey Castle Heritage Centre Castle Street Dalkey",
    "lat": 53.2780168,
    "lng": -6.1054716
  },
  {
    "day": 6,
    "name": "Glasnevin Cemetery Museum",
    "query": "Glasnevin Cemetery Museum Finglas Road Glasnevin",
    "lat": null,
    "lng": null
  },
  {
    "day": 6,
    "name": "National Botanic Gardens",
    "query": "National Botanic Gardens Botanic Road Glasnevin",
    "lat": 53.3722355,
    "lng": -6.2721469
  },
  {
    "day": 7,
    "name": "National Museum – Decorative Arts &amp; History",
    "query": "National Museum Ireland Decorative Arts Benburb Street Smithfield",
    "lat": null,
    "lng": null
  },
  {
    "day": 7,
    "name": "Marsh's Library",
    "query": "Marsh's Library St Patrick's Close Liberties",
    "lat": 53.3392033,
    "lng": -6.2705776
  },
  {
    "day": 7,
    "name": "Irish Museum of Modern Art",
    "query": "Irish Museum of Modern Art Military Road Kilmainham",
    "lat": 53.3429169,
    "lng": -6.2994648
  },
  {
    "day": 8,
    "name": "Kilkenny Castle",
    "query": "Kilkenny Castle The Parade Kilkenny City Centre",
    "lat": 52.6497896,
    "lng": -7.249457
  },
  {
    "day": 8,
    "name": "St. Canice's Cathedral",
    "query": "St Canice's Cathedral Coach Road Kilkenny City Centre",
    "lat": null,
    "lng": null
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6", "5": "#e67e22", "6": "#16a085", "7": "#e74c3c", "8": "#f39c12"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps ↗</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
