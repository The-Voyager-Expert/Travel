<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>Florence — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Florence — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "Florence Cathedral &amp; Brunelleschi's Dome",
    "query": "Piazza del Duomo, Florence",
    "lat": 43.7731014,
    "lng": 11.2554774
  },
  {
    "day": 1,
    "name": "Piazza della Signoria",
    "query": "Piazza della Signoria, Florence",
    "lat": 43.7695737,
    "lng": 11.2558641
  },
  {
    "day": 1,
    "name": "Uffizi Gallery",
    "query": "Piazzale degli Uffizi 6, Florence",
    "lat": 43.7682095,
    "lng": 11.2554494
  },
  {
    "day": 1,
    "name": "Ponte Vecchio",
    "query": "Ponte Vecchio, Florence",
    "lat": 43.7680254,
    "lng": 11.253158
  },
  {
    "day": 2,
    "name": "Galleria dell'Accademia",
    "query": "Galleria dell'Accademia, Via Ricasoli 58, Florence",
    "lat": 43.7769174,
    "lng": 11.2587579
  },
  {
    "day": 2,
    "name": "Medici Chapels",
    "query": "Cappelle Medicee, Piazza di Madonna degli Aldobrandini 6, Florence",
    "lat": null,
    "lng": null
  },
  {
    "day": 2,
    "name": "Basilica di Santa Maria Novella",
    "query": "Basilica di Santa Maria Novella, Piazza Santa Maria Novella 18, Florence",
    "lat": 43.7746511,
    "lng": 11.2493727
  },
  {
    "day": 3,
    "name": "Palazzo Pitti",
    "query": "Palazzo Pitti, Piazza de Pitti 1, Florence",
    "lat": 43.7652813,
    "lng": 11.2502566
  },
  {
    "day": 3,
    "name": "Boboli Gardens",
    "query": "Giardino di Boboli, Florence",
    "lat": 43.7632781,
    "lng": 11.2498992
  },
  {
    "day": 3,
    "name": "Piazzale Michelangelo",
    "query": "Piazzale Michelangelo, Florence",
    "lat": 43.7628279,
    "lng": 11.2649932
  },
  {
    "day": 3,
    "name": "San Miniato al Monte",
    "query": "San Miniato al Monte, Via delle Porte Sante 34, Florence",
    "lat": null,
    "lng": null
  },
  {
    "day": 4,
    "name": "Museo dell'Opera del Duomo",
    "query": "Museo dell'Opera del Duomo, Piazza del Duomo 9, Florence",
    "lat": 43.7733279,
    "lng": 11.2579865
  },
  {
    "day": 4,
    "name": "Palazzo Vecchio",
    "query": "Palazzo Vecchio, Piazza della Signoria, Florence",
    "lat": 43.7691435,
    "lng": 11.2561399
  },
  {
    "day": 4,
    "name": "Basilica di Santa Croce",
    "query": "Basilica di Santa Croce, Piazza di Santa Croce, Florence",
    "lat": 43.768365,
    "lng": 11.2630201
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
