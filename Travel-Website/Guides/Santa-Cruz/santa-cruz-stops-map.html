<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>Santa-Cruz — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Santa-Cruz — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
  <button class="day-btn" data-day="5" style="--dc:#e67e22">Day 5</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "Santa Cruz Beach Boardwalk",
    "query": "400 Beach St Santa Cruz CA",
    "lat": 36.9645628,
    "lng": -122.0153842
  },
  {
    "day": 1,
    "name": "Santa Cruz Municipal Wharf",
    "query": "21 Municipal Wharf Santa Cruz CA",
    "lat": 36.9625706,
    "lng": -122.023648
  },
  {
    "day": 1,
    "name": "Natural Bridges State Beach",
    "query": "2531 West Cliff Dr Santa Cruz CA",
    "lat": 36.9508085,
    "lng": -122.0558931
  },
  {
    "day": 1,
    "name": "Henry Cowell Redwoods State Park",
    "query": "101 Big Trees Park Rd Felton CA",
    "lat": 37.077624,
    "lng": -122.1174804
  },
  {
    "day": 2,
    "name": "Santa Cruz Surfing Museum",
    "query": "701 West Cliff Dr Santa Cruz CA",
    "lat": 36.9641171,
    "lng": -122.0255619
  },
  {
    "day": 2,
    "name": "Mission Santa Cruz",
    "query": "144 School St Santa Cruz CA",
    "lat": 36.9776996,
    "lng": -122.027901
  },
  {
    "day": 2,
    "name": "UC Santa Cruz",
    "query": "1156 High St Santa Cruz CA",
    "lat": 36.9773836,
    "lng": -122.0549357
  },
  {
    "day": 2,
    "name": "Wilder Ranch State Park",
    "query": "1401 Coast Rd Santa Cruz CA",
    "lat": 36.960305,
    "lng": -122.083136
  },
  {
    "day": 3,
    "name": "Mystery Spot",
    "query": "465 Mystery Spot Rd Santa Cruz CA",
    "lat": 37.0172695,
    "lng": -122.0033138
  },
  {
    "day": 3,
    "name": "Felton Covered Bridge",
    "query": "6281 Graham Hill Rd Felton CA",
    "lat": 37.0527896,
    "lng": -122.0727863
  },
  {
    "day": 3,
    "name": "Roaring Camp Railroads",
    "query": "5401 Graham Hill Rd Felton CA",
    "lat": 37.0527896,
    "lng": -122.0727863
  },
  {
    "day": 4,
    "name": "Venetian Court",
    "query": "1500 Wharf Rd Capitola CA",
    "lat": 36.9715268,
    "lng": -121.9536763
  },
  {
    "day": 4,
    "name": "New Brighton State Beach",
    "query": "1500 Park Ave Capitola CA",
    "lat": 36.979562,
    "lng": -121.938844
  },
  {
    "day": 4,
    "name": "Seacliff State Beach",
    "query": "201 State Park Dr Aptos CA",
    "lat": 36.9690675,
    "lng": -121.9069057
  },
  {
    "day": 4,
    "name": "The Forest of Nisene Marks State Park",
    "query": "Aptos Creek Rd Aptos CA",
    "lat": 36.9777526,
    "lng": -121.9024734
  },
  {
    "day": 5,
    "name": "Davenport",
    "query": "Davenport CA",
    "lat": 43.669118,
    "lng": -79.4452544
  },
  {
    "day": 5,
    "name": "Big Basin Redwoods State Park",
    "query": "21600 Big Basin Way Boulder Creek CA",
    "lat": 37.1562566,
    "lng": -122.1618395
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6", "5": "#e67e22"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
