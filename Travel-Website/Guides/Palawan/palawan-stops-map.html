<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>Palawan — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Palawan — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
  <button class="day-btn" data-day="5" style="--dc:#e67e22">Day 5</button>
  <button class="day-btn" data-day="6" style="--dc:#16a085">Day 6</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "Puerto Princesa Subterranean River National Park",
    "query": "Sabang Wharf Puerto Princesa Palawan",
    "lat": null,
    "lng": null
  },
  {
    "day": 1,
    "name": "Sabang Mangrove Paddle Boat Tour",
    "query": "Sabang Wharf Puerto Princesa Palawan",
    "lat": null,
    "lng": null
  },
  {
    "day": 1,
    "name": "Sabang Beach",
    "query": "Sabang Beach Puerto Princesa Palawan",
    "lat": 11.4533345,
    "lng": 120.1745739
  },
  {
    "day": 1,
    "name": "Sabang X Zipline",
    "query": "Sabang Beach Puerto Princesa Palawan",
    "lat": 11.4533345,
    "lng": 120.1745739
  },
  {
    "day": 2,
    "name": "Honda Bay — Pambato Reef",
    "query": "Santa Lourdes Pier Honda Bay Puerto Princesa",
    "lat": null,
    "lng": null
  },
  {
    "day": 2,
    "name": "Honda Bay — Luli Island",
    "query": "Luli Island Honda Bay Palawan",
    "lat": null,
    "lng": null
  },
  {
    "day": 2,
    "name": "Baker's Hill — Puerto Princesa",
    "query": "Baker's Hill Bgy San Pedro Puerto Princesa Palawan",
    "lat": null,
    "lng": null
  },
  {
    "day": 2,
    "name": "Iwahig River Firefly Watching",
    "query": "Iwahig River Puerto Princesa Palawan",
    "lat": null,
    "lng": null
  },
  {
    "day": 3,
    "name": "Ugong Rock Adventures — Puerto Princesa",
    "query": "Ugong Rock Adventures Barangay Tagabinet Puerto Princesa",
    "lat": null,
    "lng": null
  },
  {
    "day": 3,
    "name": "Palawan Wildlife Rescue and Conservation Center",
    "query": "Palawan Wildlife Rescue Conservation Center Irawan Puerto Princesa",
    "lat": null,
    "lng": null
  },
  {
    "day": 3,
    "name": "Palawan Massacre Memorial — Plaza Cuartel",
    "query": "Plaza Cuartel Taft Street Puerto Princesa Palawan",
    "lat": null,
    "lng": null
  },
  {
    "day": 3,
    "name": "Immaculate Conception Cathedral",
    "query": "Immaculate Conception Cathedral Rizal Avenue Puerto Princesa Palawan",
    "lat": null,
    "lng": null
  },
  {
    "day": 4,
    "name": "Nagtabon Beach — Puerto Princesa",
    "query": "Nagtabon Beach Barangay Bacungan Puerto Princesa Palawan",
    "lat": null,
    "lng": null
  },
  {
    "day": 4,
    "name": "Mitra's Ranch — Puerto Princesa",
    "query": "Mitra's Ranch Barangay Santa Monica Puerto Princesa Palawan",
    "lat": null,
    "lng": null
  },
  {
    "day": 4,
    "name": "Puerto Princesa Baywalk",
    "query": "Puerto Princesa Baywalk Rizal Avenue Puerto Princesa Palawan",
    "lat": null,
    "lng": null
  },
  {
    "day": 5,
    "name": "Palawan Museum — Puerto Princesa",
    "query": "Palawan Museum Valencia Street Puerto Princesa Palawan",
    "lat": 9.7391028,
    "lng": 118.7664461
  },
  {
    "day": 5,
    "name": "Palawan Capitol — Puerto Princesa",
    "query": "Palawan Capitol Rizal Avenue Puerto Princesa Palawan",
    "lat": 9.7392487,
    "lng": 118.7440452
  },
  {
    "day": 5,
    "name": "Iwahig Prison and Penal Farm",
    "query": "Iwahig Prison Penal Farm Barangay Iwahig Puerto Princesa Palawan",
    "lat": null,
    "lng": null
  },
  {
    "day": 6,
    "name": "Honda Bay — Starfish Island",
    "query": "Starfish Island Honda Bay Puerto Princesa Palawan",
    "lat": null,
    "lng": null
  },
  {
    "day": 6,
    "name": "Honda Bay — Cowrie Island",
    "query": "Cowrie Island Honda Bay Puerto Princesa Palawan",
    "lat": null,
    "lng": null
  },
  {
    "day": 6,
    "name": "Honda Bay — Barlas Island",
    "query": "Barlas Island Honda Bay Puerto Princesa Palawan",
    "lat": null,
    "lng": null
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6", "5": "#e67e22", "6": "#16a085"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
