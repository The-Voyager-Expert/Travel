<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>Azores — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Azores — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "Miradouro da Vista do Rei",
    "query": "Miradouro da Vista do Rei Sete Cidades São Miguel Azores",
    "lat": null,
    "lng": null
  },
  {
    "day": 1,
    "name": "Lagoa das Sete Cidades",
    "query": "Lagoa das Sete Cidades São Miguel Azores",
    "lat": null,
    "lng": null
  },
  {
    "day": 1,
    "name": "Caldeira Velha",
    "query": "Caldeira Velha Ribeira Grande São Miguel Azores",
    "lat": 37.7815346,
    "lng": -25.4995078
  },
  {
    "day": 1,
    "name": "Lagoa do Fogo",
    "query": "Lagoa do Fogo Água de Alto São Miguel Azores",
    "lat": 37.7621496,
    "lng": -25.4763733
  },
  {
    "day": 2,
    "name": "Caldeiras das Furnas",
    "query": "Caldeiras das Furnas Furnas Povoação São Miguel Azores",
    "lat": 37.7685547,
    "lng": -25.3315462
  },
  {
    "day": 2,
    "name": "Parque Terra Nostra",
    "query": "Parque Terra Nostra Furnas Povoação São Miguel Azores",
    "lat": 37.7704387,
    "lng": -25.3119786
  },
  {
    "day": 2,
    "name": "Lagoa das Furnas",
    "query": "Lagoa das Furnas Furnas Povoação São Miguel Azores",
    "lat": 37.7596769,
    "lng": -25.3338251
  },
  {
    "day": 2,
    "name": "Miradouro do Pico do Ferro",
    "query": "Miradouro do Pico do Ferro Furnas Povoação São Miguel Azores",
    "lat": null,
    "lng": null
  },
  {
    "day": 3,
    "name": "Gorreana Tea Plantation",
    "query": "Gorreana Tea Plantation Maia Ribeira Grande São Miguel Azores",
    "lat": null,
    "lng": null
  },
  {
    "day": 3,
    "name": "Salto do Cabrito",
    "query": "Salto do Cabrito Ribeira Grande São Miguel Azores",
    "lat": 37.7962049,
    "lng": -25.4943751
  },
  {
    "day": 3,
    "name": "Miradouro do Pico da Barrosa",
    "query": "Miradouro Pico da Barrosa São Miguel Azores",
    "lat": null,
    "lng": null
  },
  {
    "day": 3,
    "name": "Ribeira Grande historic centre",
    "query": "Ribeira Grande historic centre São Miguel Azores",
    "lat": null,
    "lng": null
  },
  {
    "day": 4,
    "name": "Miradouro de Nossa Senhora da Paz",
    "query": "Miradouro de Nossa Senhora da Paz Vila Franca do Campo São Miguel Azores",
    "lat": null,
    "lng": null
  },
  {
    "day": 4,
    "name": "Lagoa do Congro",
    "query": "Lagoa do Congro São Miguel Azores",
    "lat": 37.7566021,
    "lng": -25.4078853
  },
  {
    "day": 4,
    "name": "Miradouro da Ponta do Sossego",
    "query": "Miradouro da Ponta do Sossego Nordeste São Miguel Azores",
    "lat": 37.7991915,
    "lng": -25.145753
  },
  {
    "day": 4,
    "name": "Nordeste village &amp; cliffs",
    "query": "Nordeste São Miguel Azores",
    "lat": null,
    "lng": null
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
