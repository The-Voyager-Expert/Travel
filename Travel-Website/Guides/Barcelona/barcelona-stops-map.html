<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/web-travel-style.css">
<link rel="stylesheet" href="../../assets/mobile.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/leaflet.min.css">
<link rel="stylesheet" href="../../Trip-Essentials/Maps/vendor/MarkerCluster.min.css">
<title>Barcelona — All Stops Map</title>
<link rel="stylesheet" href="../../assets/stops-map-style.css">
</head>
<body>
<div data-toolbar data-depth="2" data-maxwidth="1400" data-title="Barcelona — All Stops"></div>
<div id="filter-row">
  <button class="day-btn active" data-day="all" style="--dc:#b85c2a">All days</button>
  <button class="day-btn" data-day="1" style="--dc:#b85c2a">Day 1</button>
  <button class="day-btn" data-day="2" style="--dc:#4a90d9">Day 2</button>
  <button class="day-btn" data-day="3" style="--dc:#7ab648">Day 3</button>
  <button class="day-btn" data-day="4" style="--dc:#9b59b6">Day 4</button>
  <button class="day-btn" data-day="5" style="--dc:#e67e22">Day 5</button>
  <button class="day-btn" data-day="6" style="--dc:#16a085">Day 6</button>
</div>
<div id="map-wrap"><div id="map"></div></div>
<script src="../../Trip-Essentials/Maps/vendor/leaflet.min.js"></script>
<script src="../../Trip-Essentials/Maps/vendor/markercluster.min.js"></script>
<script src="../../assets/toolbar.js"></script>
<script>
const STOPS = [
  {
    "day": 1,
    "name": "Palau de la Música Catalana",
    "query": "Carrer del Palau de la Música, 4-6, Barcelona",
    "lat": 41.3875837,
    "lng": 2.1752316
  },
  {
    "day": 1,
    "name": "Barri Gòtic",
    "query": "Pla de la Seu, s/n, Barcelona",
    "lat": 41.3843529,
    "lng": 2.1760669
  },
  {
    "day": 1,
    "name": "Passeig del Born",
    "query": "Passeig del Born, Barcelona",
    "lat": 41.3847576,
    "lng": 2.1828059
  },
  {
    "day": 1,
    "name": "Palau Güell",
    "query": "Carrer Nou de la Rambla, 3-5, Barcelona",
    "lat": 41.3730747,
    "lng": 2.1680448
  },
  {
    "day": 2,
    "name": "Casa Milà",
    "query": "Passeig de Gràcia, 92, Barcelona",
    "lat": 41.3952564,
    "lng": 2.1615724
  },
  {
    "day": 2,
    "name": "Casa Batlló",
    "query": "Passeig de Gràcia, 43, Barcelona",
    "lat": 41.3915446,
    "lng": 2.1646961
  },
  {
    "day": 2,
    "name": "Sant Pau Recinte Modernista",
    "query": "Carrer de Sant Antoni Maria Claret, 167, Barcelona",
    "lat": 41.4134216,
    "lng": 2.1771034
  },
  {
    "day": 2,
    "name": "Sagrada Família",
    "query": "Carrer de Mallorca, 401, Barcelona",
    "lat": 41.4035046,
    "lng": 2.1744283
  },
  {
    "day": 3,
    "name": "Park Güell",
    "query": "Carrer d'Olot, 7, Barcelona",
    "lat": 41.4134771,
    "lng": 2.1531078
  },
  {
    "day": 3,
    "name": "Bunkers del Carmel",
    "query": "Carrer de Mühlberg, Barcelona",
    "lat": 41.4178573,
    "lng": 2.1587866
  },
  {
    "day": 4,
    "name": "Telefèric de Montjuïc",
    "query": "Avinguda de Miramar, 30, Barcelona",
    "lat": 41.3688267,
    "lng": 2.1630348
  },
  {
    "day": 4,
    "name": "Montjuïc Castle",
    "query": "Carretera de Montjuïc, 66, Barcelona",
    "lat": 41.369392,
    "lng": 2.1702054
  },
  {
    "day": 4,
    "name": "Barcelona Pavilion",
    "query": "Avinguda de Francesc Ferrer i Guàrdia, 7, Barcelona",
    "lat": 41.370557,
    "lng": 2.1499593
  },
  {
    "day": 5,
    "name": "Temple Expiatori del Sagrat Cor",
    "query": "Pl. del Tibidabo 1, Barcelona",
    "lat": 41.4215877,
    "lng": 2.1187224
  },
  {
    "day": 5,
    "name": "Parc d'Atraccions Tibidabo",
    "query": "Pl. del Tibidabo 3-4, Barcelona",
    "lat": 41.421592,
    "lng": 2.1190832
  },
  {
    "day": 5,
    "name": "Torre de Collserola",
    "query": "Ctra. de Vallvidrera al Tibidabo 47-51, Barcelona",
    "lat": 41.423113,
    "lng": 2.1205382
  },
  {
    "day": 6,
    "name": "Catedral de Girona",
    "query": "Plaça de la Catedral, s/n, Girona",
    "lat": 41.9876619,
    "lng": 2.8252009
  },
  {
    "day": 6,
    "name": "El Call",
    "query": "Carrer de la Força, Girona",
    "lat": 41.9864444,
    "lng": 2.8251965
  },
  {
    "day": 6,
    "name": "Muralles de Girona",
    "query": "Plaça dels Jurats, Girona",
    "lat": 41.9883336,
    "lng": 2.8262879
  }
];
const DAY_COLORS = {"1": "#b85c2a", "2": "#4a90d9", "3": "#7ab648", "4": "#9b59b6", "5": "#e67e22", "6": "#16a085"};

const map = L.map('map', {zoomControl: true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a> \u00a9 <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const cluster = L.markerClusterGroup({maxClusterRadius: 40, showCoverageOnHover: false});
const markers = [];

function pinIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -12]
  });
}

STOPS.filter(s => s.lat != null && s.lng != null).forEach(s => {
  const color = DAY_COLORS[String(s.day)] || '#b85c2a';
  const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.query);
  const marker = L.marker([s.lat, s.lng], {icon: pinIcon(color)});
  marker.bindPopup(
    '<div class="stop-popup">' +
    '<strong>' + s.name + '</strong>' +
    '<span class="day-tag" style="background:' + color + '">Day ' + s.day + '</span><br>' +
    '<a href="' + mapsUrl + '" target="_blank">Open in Google Maps ↗</a>' +
    '</div>'
  );
  marker._day = s.day;
  markers.push(marker);
  cluster.addLayer(marker);
});
map.addLayer(cluster);

function fitVisible(list) {
  if (!list.length) return;
  map.fitBounds(L.latLngBounds(list.map(m => m.getLatLng())), {padding: [44, 44]});
}
fitVisible(markers);

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const day = btn.dataset.day;
    cluster.clearLayers();
    const visible = day === 'all' ? markers : markers.filter(m => String(m._day) === day);
    visible.forEach(m => cluster.addLayer(m));
    fitVisible(visible);
  });
});
</script>
</body>
</html>
