<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../assets/web-travel-style.css">
<link rel="stylesheet" href="../assets/mobile.css?v=50">
<title>Time Zones</title>
<style>/* .wrap — fluid width from web-travel-style.css */
/* ── Page header — from web-travel-style.css ── */
.page-desc { font-size: 12px; color: var(--muted); margin: -8px 0 14px; }
/* ── Seattle home row ── */
.home-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 16px;
}
.home-label { font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
.home-city  { font-size: 30px; font-weight: 400; color: var(--text); }
.home-right { text-align: right; }
.home-time  { font-size: 42px; font-weight: 700; color: #b85c2a; font-variant-numeric: tabular-nums; letter-spacing: -.01em; line-height: 1; }
.home-day   { font-size: 12px; color: var(--muted); font-weight: 500; margin-top: 3px; }
/* ── Controls ── */
.controls { display: flex; flex-direction: column; gap: 14px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.search-wrap { position: relative; }
input.search {
  width: 360px; padding: 11px 18px; padding-left: 36px;
  border: 1.5px solid #e6e2da; border-radius: 6px;
  background: #fff var(--search-icon) no-repeat 13px center; font-family: inherit; font-size: 16px; color: var(--text, #1a1917);
  outline: none; transition: border-color .15s, box-shadow .15s;
}
input.search::placeholder { color: #A8895A; }
input.search:focus { border-color: #c8b99a; box-shadow: none; }
.pills { display: flex; gap: 4px; flex-wrap: wrap; }
.pill {
  padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border2);
  background: #fff; font-family: inherit; font-size: 13px; line-height: 1; color: var(--text);
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.pill:hover, .pill.active { background: linear-gradient(135deg,#7a3b1e 0%,#b85c2a 55%,#d4874a 100%); color: #fff; border-color: #b85c2a; }
/* ── Grid ── */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(196px, 1fr)); gap: 10px; }
.card {
  background: var(--surface); border: 1px solid var(--border2); border-radius: 8px;
  padding: 12px 14px; display: flex; flex-direction: column; gap: 6px;
  transition: border-color .15s, box-shadow .15s, transform .08s;
}
.card-link { text-decoration: none; color: inherit; cursor: pointer;
  transition: border-color .15s, box-shadow .15s, transform .08s; }
.card-link:hover  { border-color: #b85c2a; box-shadow: 0 3px 10px rgba(184,92,42,.12); color: inherit; text-decoration: none; }
.card-link:active { border-color: #b85c2a; box-shadow: 0 1px 3px rgba(184,92,42,.10); color: inherit; text-decoration: none; transform: scale(.97) translateY(1px); }
.card-top    { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; }
.card-top-left { display: flex; align-items: center; gap: 6px; }
.card-flag   { font-size: 15px; line-height: 1; flex-shrink: 0; }
.card-city   { font-size: 13px; font-weight: 500; color: var(--text); }
.card-country{ font-size: 9.5px; color: var(--muted); text-align: right; flex-shrink: 0; max-width: 90px; line-height: 1.3; letter-spacing: .02em; }
.card-clock  { display: flex; align-items: baseline; gap: 5px; }
.card-time   { font-size: 22px; font-weight: 600; color: #b85c2a; font-variant-numeric: tabular-nums; letter-spacing: -.01em; line-height: 1; cursor: copy; }
.card-day    { font-size: 11px; color: var(--muted); font-weight: 400; }
.card-meta   { display: flex; align-items: center; justify-content: space-between; }
.utc-offset  { font-size: 11px; color: var(--muted); }
.vs-sea      { font-size: 11px; font-weight: 500; padding: 1px 6px; border-radius: 6px; }
.vs-sea.ahead  { color: #1e6b2e; background: #edf7ed; }
.vs-sea.behind { color: #9b2020; background: #fdecea; }
.vs-sea.same   { color: var(--muted); background: transparent; }
.empty { grid-column: 1 / -1; text-align: center; padding: 48px 0; color: var(--muted); font-size: 13px; }
/* ── Sleep indicator ── */
.sleep-icon { font-size: 11px; margin-left: 4px; opacity: .7; }
/* ── Mobile overrides ── */
@media (max-width: 600px) {
  /* Controls: search full-width on top, pills below */
  .controls { flex-direction: column; align-items: center; gap: 8px; }
  .search-wrap { min-width: 0; }
  input.search { max-width: 100%; box-sizing: border-box; }
  /* Region + sort pills as clean uniform grids so they line up together instead
     of ragged flex-wrap (region was 4+2 with Europe running to the edge). */
  #region-pills { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; align-self: stretch; }
  #sort-pills   { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; align-self: stretch; }
  #region-pills .pill, #sort-pills .pill { width: 100%; justify-content: center; padding-left: 6px; padding-right: 6px; }
  /* .pill size comes from the shared filter-pill standard in assets/mobile.css */
  /* Home row: stack left and right blocks vertically */
  .home-row { flex-direction: column; align-items: flex-start; gap: 8px; }
  .home-right { align-self: stretch; display: flex; align-items: baseline; gap: 10px; }
  .home-time { font-size: 36px; }
  .home-day  { font-size: 12px; }
  /* Grid: 2 columns on phones ≥ 360px, 1 column on very small */
  .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  /* Cards: tighten up */
  .card { padding: 10px 11px; gap: 5px; }
  .card-time { font-size: 19px; }
  /* Shorten the "Same" label so it fits the chip */
  /* (handled in JS — see vsSeattle short labels for mobile) */
  /* Search input: keep font-size 16px (from mobile.css) to prevent iOS zoom — don't override */
}
@media (max-width: 359px) {
  .grid { grid-template-columns: 1fr; }
}</style>

  {name:'Dubai',           country:'UAE',                  tz:'Asia/Dubai',                     region:'other',     flag:'🇦🇪', url:'../Guides/Dubai/dubai_v1.html'},
  {name:'Petra',           country:'Jordan',               tz:'Asia/Amman',                     region:'other',     flag:'🇯🇴', url:'../Guides/Petra/petra_v1.html'},
  {name:'Lagos',           country:'Nigeria',              tz:'Africa/Lagos',                   region:'other',     flag:'🇳🇬', url:'../Guides/Lagos/lagos_v1.html'},
  {name:'Marrakech',       country:'Morocco',              tz:'Africa/Casablanca',              region:'other',     flag:'🇲🇦', url:'../Guides/Marrakech/marrakech_v1.html'},
];

var SEA_TZ = 'America/Los_Angeles';

function getOffsetMinutes(tz, date) {
  var d   = new Date(date.toLocaleString('en-US', {timeZone: tz}));
  var utc = new Date(date.toLocaleString('en-US', {timeZone: 'UTC'}));
  return (d - utc) / 60000;
}

function formatTime(tz, date) {
  var s = new Intl.DateTimeFormat('en-US', {
    timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false
  }).format(date);
  return s.replace(/^24:/, '00:');
}

function formatFullDay(tz, date) {
  return new Intl.DateTimeFormat('en-US', {
    timeZone: tz, weekday: 'long', month: 'short', day: 'numeric'
  }).format(date);
}

function formatShortDay(tz, date) {
  return new Intl.DateTimeFormat('en-US', {
    timeZone: tz, weekday: 'short'
  }).format(date);
}

function relativeDay(tz, date) {
  function ymd(d, zone) {
    var f = new Intl.DateTimeFormat('en-CA', {timeZone: zone, year:'numeric', month:'2-digit', day:'2-digit'});
    return f.format(d);
  }
  var cityDay = ymd(date, tz);
  var seaDay  = ymd(date, SEA_TZ);
  if (cityDay === seaDay)   return 'today';
  var seaDate = new Date(seaDay + 'T12:00:00Z');
  var cityDate= new Date(cityDay + 'T12:00:00Z');
  var diff = Math.round((cityDate - seaDate) / 86400000);
  if (diff === 1)  return 'tomorrow';
  if (diff === -1) return 'yesterday';
  return formatShortDay(tz, date);
}

function formatUTCOffset(tz, date) {
  var mins = getOffsetMinutes(tz, date);
  var h = Math.floor(Math.abs(mins) / 60);
  var m = Math.abs(mins) % 60;
  var sign = mins >= 0 ? '+' : '−';
  return 'UTC' + sign + h + (m ? ':' + String(m).padStart(2, '0') : '');
}

function vsSeattle(tz, date) {
  var seaMins  = getOffsetMinutes(SEA_TZ, date);
  var cityMins = getOffsetMinutes(tz, date);
  var diffH = (cityMins - seaMins) / 60;
  if (diffH === 0) return {label: 'Same', cls: 'same'};
  var abs  = Math.abs(diffH);
  var sign = diffH > 0 ? '+' : '−';
  var label = sign + abs + (abs === 1 ? ' hr' : ' hrs');
  return {label: label, cls: diffH > 0 ? 'ahead' : 'behind'};
}

var activeRegion = 'all';
var searchVal    = '';
var activeSort   = 'alpha';

function render() {
  var now  = new Date();
  var grid = document.getElementById('grid');

  document.getElementById('sea-time').textContent = formatTime(SEA_TZ, now);
  document.getElementById('sea-day').textContent  = formatFullDay(SEA_TZ, now);

  var filtered = CITIES.filter(function(c) {
    if (activeRegion !== 'all' && c.region !== activeRegion) return false;
    if (searchVal) {
      var q = searchVal;
      // Expand abbreviated countries so a full-name search matches (UK -> United Kingdom, etc.)
      var cc = c.country.toLowerCase()
        .replace(/\buk\b/g, 'uk united kingdom')
        .replace(/\buae\b/g, 'uae united arab emirates')
        .replace(/\busa?\b/g, 'us usa united states');
      if (c.name.toLowerCase().indexOf(q) === -1 && cc.indexOf(q) === -1) return false;
    }
    return true;
  });

  var seaMins = getOffsetMinutes(SEA_TZ, now);
  if (activeSort === 'time') {
    filtered.sort(function(a, b) {
      var da = Math.abs(getOffsetMinutes(a.tz, now) - seaMins);
      var db = Math.abs(getOffsetMinutes(b.tz, now) - seaMins);
      return da !== db ? da - db : a.name.localeCompare(b.name);
    });
  } else {
    filtered.sort(function(a, b) { return a.name.localeCompare(b.name); });
  }

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">No cities match “' + searchVal + '”</div>';
    return;
  }

  grid.innerHTML = filtered.map(function(c) {
    var time = formatTime(c.tz, now);
    var day  = relativeDay(c.tz, now);
    var utc  = formatUTCOffset(c.tz, now);
    var vs   = vsSeattle(c.tz, now);
    var hour = parseInt(time.split(':')[0], 10);
    var sleeping = hour >= 22 || hour < 7;
    var sleepMark = sleeping ? '<span class="sleep-icon">🌙</span>' : '';
    var cardCls = 'card' + (sleeping ? ' sleeping' : '');
    var inner =
      '<div class="card-top">' +
        '<div class="card-top-left">' +
          '<span class="card-flag">' + c.flag + '</span>' +
          '<div class="card-city">' + c.name + sleepMark + '</div>' +
        '</div>' +
        '<div class="card-country">' + (c.country.indexOf(' · ') !== -1 ? c.country.split(' · ').slice(1).join(' · ') + '<br>' + c.country.split(' · ')[0] : c.country) + '</div>' +
      '</div>' +
      '<div class="card-clock">' +
        '<span class="card-time" title="Tap to copy">' + time + '</span>' +
        '<span class="card-day">'  + day  + '</span>' +
      '</div>' +
      '<div class="card-meta">' +
        '<span class="utc-offset">' + utc + '</span>' +
        '<span class="vs-sea ' + vs.cls + '">' + vs.label + '</span>' +
      '</div>';
    return c.url
      ? '<a class="' + cardCls + ' card-link" href="' + c.url + '">' + inner + '</a>'
      : '<div class="' + cardCls + '">' + inner + '</div>';
  }).join('');
}

document.getElementById('region-pills').addEventListener('click', function(e) {
  var btn = e.target.closest('.pill');
  if (!btn) return;
  activeRegion = btn.dataset.region;
  document.querySelectorAll('#region-pills .pill').forEach(function(p) { p.classList.remove('active'); });
  btn.classList.add('active');
  render();
});

document.getElementById('search').addEventListener('input', function(e) {
  searchVal = e.target.value.toLowerCase().trim();
  render();
});

document.getElementById('sort-pills').addEventListener('click', function(e) {
  var btn = e.target.closest('.sort-pill');
  if (!btn) return;
  activeSort = btn.dataset.sort;
  document.querySelectorAll('.sort-pill').forEach(function(p) { p.classList.remove('active'); });
  btn.classList.add('active');
  render();
});

// Click-to-copy: clicking the time on a card copies "City · HH:MM · Day"
document.getElementById('grid').addEventListener('click', function(e) {
  var timeEl = e.target.closest('.card-time');
  if (!timeEl) return;
  var card = e.target.closest('.card');
  if (!card) return;
  var city = card.querySelector('.card-city');
  var day  = card.querySelector('.card-day');
  if (!city) return;
  var cityText = city.textContent.replace('🌙', '').trim();
  var text = cityText + ' · ' + timeEl.textContent + (day ? ' · ' + day.textContent : '');
  navigator.clipboard.writeText(text).then(function() {
    var orig = timeEl.textContent;
    timeEl.textContent = 'Copied!';
    setTimeout(function() { timeEl.textContent = orig; }, 1200);
  }).catch(function() {});
});

// Hash-based deep link: Time-Zones.html#Barcelona pre-selects that city
(function () {
  var hashCity = decodeURIComponent(location.hash.slice(1)).toLowerCase();
  if (!hashCity) return;
  // Match against c.guide (folder name exceptions) or c.name
  var match = CITIES.find(function (c) {
    return (c.guide && c.guide.toLowerCase() === hashCity) ||
           c.name.toLowerCase() === hashCity;
  });
  if (!match) return;
  searchVal = match.name.toLowerCase();
  document.getElementById('search').value = match.name;
})();

render();
setInterval(render, 60000);
</script>
