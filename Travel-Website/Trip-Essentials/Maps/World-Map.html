/* ── Resilient JSON loader: retry a stumbled request instead of giving up.
   A single slow/failed fetch used to paint the "could not load map data"
   banner permanently (no retry); now each request self-heals with a short
   backoff before the catch is ever reached. ── */
function getJSON(url, tries = 3) {
  return fetch(url)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .catch(err => {
      if (tries <= 1) throw err;
      return new Promise(res => setTimeout(res, 400 * (4 - tries)))
        .then(() => getJSON(url, tries - 1));
    });
}

/* ── Region bounds in Leaflet order [[south,west],[north,east]] ── */
const REGIONS = {
  world: [[-50, -160], [72, 178]],
  eu:    [[35, -25], [67, 42]],
  na:    [[17, -162], [66, -66]],
  cb:    [[11, -85], [27, -58]],
  as:    [[-12, 48], [44, 146]],
  af:    [[-36, -19], [38, 52]],
  sa:    [[-56, -82], [13, -34]],
  oc:    [[-48, 140], [-31, 177]],
};

/* ── Map init ── */
// maxBoundsViscosity: 0 (hard boundary, no elastic resistance) — the prior 0.7
// viscosity fought Leaflet's CSS-transition zoom animation and caused animated
// zoom (scroll wheel, pinch, +/-, fitBounds, flyToBounds) to freeze indefinitely.
// With viscosity 0 the bounds are still enforced as a hard clamp; zoomAnimation
// can be true and all animated zoom/pan paths work normally.
const map = L.map('map', {
  zoomControl: false,
  attributionControl: false,
  minZoom: 1,
  maxZoom: 11,
  worldCopyJump: false,
  zoomSnap: 0.25,
  zoomDelta: 0.5,
  maxBounds: [[-85, -200], [85, 200]],
  maxBoundsViscosity: 0,
});
L.control.zoom({ position: 'bottomright' }).addTo(map);
map.createPane('countryLabels');
map.getPane('countryLabels').style.zIndex = 590;
map.getPane('countryLabels').style.pointerEvents = 'none';
map.createPane('stateLabels');
map.getPane('stateLabels').style.zIndex = 591;
map.getPane('stateLabels').style.pointerEvents = 'none';
map.createPane('minorLabels');           // all non-major country names
map.getPane('minorLabels').style.zIndex = 589;
map.getPane('minorLabels').style.pointerEvents = 'none';
// State/province names smear across the US/Canada at world zoom — reveal them only
// when zoomed into the country. Minor country names reveal one level earlier, at
// continent zoom, so the region buttons (Africa, S. America, Caribbean) show every
// country. The ~45 major countries stay labelled at world zoom (countryLabels).
map.createPane('cityDots');              // major non-guide world cities
map.getPane('cityDots').style.zIndex = 585;
map.getPane('cityDots').style.pointerEvents = 'none';
map.createPane('cityLabels');
map.getPane('cityLabels').style.zIndex = 586;
map.getPane('cityLabels').style.pointerEvents = 'none';
// Slow staged reveal: WORLD (major countries only) → CONTINENTS (all country names,
// z>=3) → COUNTRIES (states/provinces, z>=4.5) → CITIES (dots z>=4.5, names z>=6).
function toggleStateLabels() {
  map.getPane('stateLabels').style.display = (map.getZoom() >= 4.5) ? '' : 'none';
}
function toggleMinorLabels() {
  map.getPane('minorLabels').style.display = (map.getZoom() >= 3) ? '' : 'none';
}
map.on('zoomend', () => { toggleStateLabels(); toggleMinorLabels(); });
// Major cities: render only the ones IN VIEW, biggest-first, up to a per-zoom
// population tier — so we can carry 12k cities without lag. Declared here (before
// the handler) so an early moveend can't hit them in the temporal dead zone;
// CITY_DATA is filled by the fetch below, renderCities() is hoisted.
let CITY_DATA = [];
const cityIcon = L.divIcon({ className: 'city-anchor', iconSize: [0, 0] });
const cityLayer = L.layerGroup().addTo(map);
// Guide-pin name labels are permanent (always shown when the pin itself is
// visible) and take priority over world-city names in the collision pass —
// pinMarkers/labelPlacedRects declared here, before the initial fitBounds, for
// the same TDZ reason as CITY_DATA above. labelPlacedRects is reset and re-
// filled by renderPinLabels() first, then renderCities() builds on top of it
// so a city name never lands on top of a guide pin's name.
let pinMarkers = [];
let labelPlacedRects = [];
let pinCluster = null;
// Admin-1 regions for continents too large to overlay eagerly (every continent
// besides North America, which gets US states + Canada provinces above): each is
// lazy-loaded the first time you zoom toward it, drawn as filled canvas polygons
// (same look as the US/Canada overlay) with viewport-culled, collision-avoided
// names — same idea as the cities.
const euRegionLayer = L.layerGroup().addTo(map);
const euCanvas = L.canvas({ padding: 0.4 });
const blankIcon = L.divIcon({ className: 'eu-region-anchor', iconSize: [0, 0] });
const REGION_SOURCES = {
  eu: { bbox: L.latLngBounds([34, -25], [72, 45]), file: 'data/europe-regions.json' },
  sa: { bbox: L.latLngBounds([-56, -82], [13, -34]), file: 'data/south-america-regions.json' },
  af: { bbox: L.latLngBounds([-36, -19], [38, 52]), file: 'data/africa-regions.json' },
  as: { bbox: L.latLngBounds([-12, 48], [44, 146]), file: 'data/asia-regions.json' },
  oc: { bbox: L.latLngBounds([-48, 140], [-31, 177]), file: 'data/oceania-regions.json' },
  cb: { bbox: L.latLngBounds([11, -85], [27, -58]), file: 'data/caribbean-regions.json' },
};
const regionState = {};
Object.keys(REGION_SOURCES).forEach(k => { regionState[k] = { loaded: false, lines: null, regions: [] }; });
map.on('moveend', () => { renderPinLabels(); renderCities(); maybeLoadRegions(); toggleRegionLines(); renderRegions(); });

// Keep the framed region clear of the overlay controls: pad left for the
// desktop panel, pad bottom for the mobile docked bar.
function fitOpts(animated) {
  const base = (window.innerWidth <= 640)
    ? { paddingTopLeft: [12, 12], paddingBottomRight: [12, 86] }
    : { paddingTopLeft: [150, 14], paddingBottomRight: [14, 14] };
  if (!animated) base.animate = false;
  return base;
}
map.fitBounds(REGIONS.world, fitOpts(false));

/* ── Country polygons from world-atlas TopoJSON (GeoJSON-only, no tiles) ── */
getJSON('data/countries-50m.json')
  .then(world => {
    const fc = topojson.feature(world, world.objects.countries);
    // Antimeridian guard: Russia and Fiji have rings that wrap past ±180°
    // (Chukotka, the Fiji group), which Mercator smears into a horizontal
    // band across the whole map. Pin any wrapped (far-negative) vertex to the
    // right edge so the polygon crops cleanly instead of streaking.
    const clampWrap = lon => (lon < -100) ? 179.9 : lon;
    const fixCoords = c => (typeof c[0] === 'number') ? [clampWrap(c[0]), c[1]] : c.map(fixCoords);
    fc.features.forEach(f => {
      if (+f.id === 643 || +f.id === 242) f.geometry.coordinates = fixCoords(f.geometry.coordinates);
    });
    const layer = L.geoJSON(fc, {
      style: f => ({
        fillColor: colorFor(+f.id),
        fillOpacity: 1,
        color: darken(colorFor(+f.id), 0.6),
        weight: 0.6,
      }),
      onEachFeature: (f, lyr) => {
        const id = +f.id;
        lyr.on('mouseover', () => lyr.setStyle({ fillColor: darken(colorFor(id), 1.12) }));
        lyr.on('mouseout',  () => lyr.setStyle({ fillColor: colorFor(id) }));
        if (LABEL[id]) {
          const c = CENTERS[id] ? L.latLng(CENTERS[id][0], CENTERS[id][1]) : lyr.getBounds().getCenter();
          lyr.bindTooltip(LABEL[id], {
            permanent: true, direction: 'center', className: 'country-label-tip',
            pane: 'countryLabels', interactive: false,
          });
          lyr.getTooltip().setLatLng(c);
        } else if (f.properties && f.properties.name) {
          // Every other country gets its name too — in the minor-labels pane, which
          // is hidden at world zoom and revealed at continent zoom (region buttons).
          lyr.bindTooltip(f.properties.name, {
            permanent: true, direction: 'center', className: 'minor-label-tip',
            pane: 'minorLabels', interactive: false,
          });
        }
      },
    }).addTo(map);
    layer.bringToBack();
    toggleMinorLabels();   // respect current zoom (hidden until continent zoom)
    buildPins();
  })
  .catch(() => {
    document.getElementById('map').insertAdjacentHTML('beforeend',
      '<div style="position:absolute;inset:0;display:flex;flex-direction:column;gap:12px;align-items:center;justify-content:center;color:#6b4422;font-size:15px;text-align:center;padding:20px;">Could not load map data.<button onclick="location.reload()" style="padding:8px 18px;background:#b85c2a;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;">Retry</button></div>');
  });

/* ── US state boundaries ── world-atlas is country-level (the US is one polygon),
   so overlay all 50 states + DC (lat/lon GeoJSON) on top of the US country so
   every state is visible — guide or not. Non-interactive, lands in the overlay
   pane (below the pins). No antimeridian clamp here: the country clamp pins
   lon < -100° to the right edge, which would destroy the whole western US.
   Names feed the same renderRegions() collision pass as every other continent
   (regionState.us, registered outside REGION_SOURCES since it's loaded eagerly,
   not lazily) — found via mobile testing: Connecticut/Rhode Island and
   Delaware/DC always overlapped because this used a permanent, unculled
   tooltip with zero collision checking. ── */
regionState.us = { loaded: true, lines: null, regions: [] };
getJSON('data/us-states.json')
  .then(us => {
    L.geoJSON(us, {
      interactive: false,
      style: { fillColor: '#cda36e', fillOpacity: 1, color: darken('#cda36e', 0.55), weight: 0.7 },
    }).addTo(map);
    us.features.forEach(f => {
      const nm = f.properties && f.properties.name;
      if (!nm) return;
      const bb = L.geoJSON(f).getBounds(); const c = bb.getCenter();
      const sz = (bb.getEast() - bb.getWest()) * (bb.getNorth() - bb.getSouth());
      regionState.us.regions.push({ name: nm, lat: c.lat, lon: c.lng, sz });
    });
    regionState.us.regions.sort((a, b) => b.sz - a.sz);
    toggleStateLabels(); renderRegions();   // respect current zoom (hidden until zoomed into the US)
  })
  .catch(() => {});

/* ── Canada province/territory boundaries ── same treatment as US states: overlay
   all 13 provinces + territories on top of the single Canada polygon so every one
   is visible, with names revealed at the same zoom gate. ── */
regionState.ca = { loaded: true, lines: null, regions: [] };
getJSON('data/canada-provinces.json')
  .then(ca => {
    L.geoJSON(ca, {
      interactive: false,
      style: { fillColor: '#cda36e', fillOpacity: 1, color: darken('#cda36e', 0.55), weight: 0.7 },
    }).addTo(map);
    ca.features.forEach(f => {
      const nm = f.properties && f.properties.name;
      if (!nm) return;
      const bb = L.geoJSON(f).getBounds(); const c = bb.getCenter();
      const sz = (bb.getEast() - bb.getWest()) * (bb.getNorth() - bb.getSouth());
      regionState.ca.regions.push({ name: nm, lat: c.lat, lon: c.lng, sz });
    });
    regionState.ca.regions.sort((a, b) => b.sz - a.sz);
    toggleStateLabels(); renderRegions();
  })
  .catch(() => {});

/* ── Admin-1 regions (Europe, South America, Africa, Asia, Oceania, Caribbean) ──
   same idea as US states: subdivide every country in these continents with
   filled polygons + names, same look as the US/Canada overlay. Each set is up to
   ~1500 regions / under 1MB (mapshaper-simplified), so each is lazy-loaded the
   first time you zoom toward that continent, drawn on a canvas (filled, not SVG,
   to keep thousands of polygons cheap), with names viewport-culled + collision-
   avoided (biggest region first) like the cities.
   (REGION_SOURCES / regionState declared earlier, before the initial fitBounds —
   that call fires 'moveend' synchronously, which would otherwise hit these in
   their temporal dead zone.) ── */
function maybeLoadRegions() {
  if (map.getZoom() < 4) return;
  Object.entries(REGION_SOURCES).forEach(([key, src]) => {
    const st = regionState[key];
    if (st.loaded || !map.getBounds().intersects(src.bbox)) return;
    st.loaded = true;
    getJSON(src.file)
      .then(geo => {
        st.lines = L.geoJSON(geo, {
          interactive: false, renderer: euCanvas,
          style: { fillColor: '#cda36e', fillOpacity: 1, color: darken('#cda36e', 0.55), weight: 0.7 },
        });
        geo.features.forEach(f => {
          const bb = L.geoJSON(f).getBounds(); const c = bb.getCenter();
          const sz = (bb.getEast() - bb.getWest()) * (bb.getNorth() - bb.getSouth());
          st.regions.push({ name: f.properties.name, lat: c.lat, lon: c.lng, sz });
        });
        st.regions.sort((a, b) => b.sz - a.sz);   // biggest region first
        toggleRegionLines(); renderRegions();
      })
      .catch(() => { st.loaded = false; });
  });
}
function toggleRegionLines() {
  const on = map.getZoom() >= 4;
  Object.values(regionState).forEach(st => {
    if (!st.lines) return;
    if (on && !map.hasLayer(st.lines)) st.lines.addTo(map);
    else if (!on && map.hasLayer(st.lines)) map.removeLayer(st.lines);
  });
}
function renderRegions() {
  euRegionLayer.clearLayers();
  if (map.getZoom() < 4.5) return;
  const all = Object.values(regionState).flatMap(st => st.regions);
  if (!all.length) return;
  const b = map.getBounds();
  // Seeded with guide-pin + city label rects (placed earlier this moveend, see
  // renderPinLabels/renderCities) so a region name never lands on a guide pin's
  // name — found via mobile testing: "Foz do Iguaçu"/"Buenos Aires" pins were
  // overlapping "Caaguazú"/"Colonia" province names at the zoom guides sit at.
  const placed = labelPlacedRects;
  let shown = 0;
  for (const r of all) {                         // biggest region first (within each set)
    if (!b.contains([r.lat, r.lon])) continue;
    const p = map.latLngToContainerPoint([r.lat, r.lon]);
    const w = r.name.length * 6 + 8, h = 14;
    const rect = { x: p.x - w / 2, y: p.y - h / 2, w, h };
    let clash = false;
    for (const q of placed) {
      if (rect.x < q.x + q.w && rect.x + rect.w > q.x && rect.y < q.y + q.h && rect.y + rect.h > q.y) { clash = true; break; }
    }
    if (clash) continue;
    L.marker([r.lat, r.lon], { icon: blankIcon, pane: 'stateLabels', interactive: false, keyboard: false })
      .bindTooltip(r.name, { permanent: true, direction: 'center', className: 'state-label-tip', pane: 'stateLabels', interactive: false })
      .addTo(euRegionLayer);
    placed.push(rect);
    if (++shown >= 90) break;
  }
}

/* ── Major world cities (non-guide) ── 12k cities (pop >= 50k, tiered 0=>1M …
   4=>50k). To carry that many without lag we render ONLY the cities currently in
   view, biggest-first, capped — re-running on every pan/zoom. Guide cities already
   have their own orange pins, so they're filtered out to avoid doubles.
   (CITY_DATA / cityLayer / cityIcon are declared up by the move handler.) */
getJSON('data/world-cities.json')
  .then(cities => {
    const guideNames = new Set(PINS.map(p => p[0].toLowerCase()));
    CITY_DATA = cities.filter(c => !guideNames.has(c[0].toLowerCase()));  // pre-sorted by tier (biggest first)
    renderCities();
  })
  .catch(() => {});

// Progressive disclosure, tier 0=>1M … 4=>50k:
//  DOTS appear first (from continent zoom), NAMES fade in a couple levels later, so
//  the Europe/continent view shows just dots like before, then fills in as you zoom.
function dotTier(z) {            // which cities show as a dot — COUNTRY stage onward
  if (z >= 6.5) return 4;
  if (z >= 6) return 3;
  if (z >= 5.5) return 2;
  if (z >= 5) return 1;
  if (z >= 4.5) return 0;
  return -1;                     // < 4.5 → NO city dots (world/continent stays clean)
}
function nameTier(z) {           // which dots also get a name — CITY stage onward
  if (z >= 8) return 4;
  if (z >= 7.5) return 3;
  if (z >= 7) return 2;
  if (z >= 6.5) return 1;
  if (z >= 6) return 0;
  return -1;                     // < 6 → dots only, no names
}
function renderCities() {
  cityLayer.clearLayers();
  const z = map.getZoom();
  const dt = dotTier(z), nt = nameTier(z);
  if (dt < 0 || !CITY_DATA.length) return;
  const b = map.getBounds();
  const CAP = 260;
  let shown = 0;
  // Seeded with guide-pin label rects (placed first, see renderPinLabels) so a
  // city name never lands on top of a guide pin's permanent name.
  const placed = labelPlacedRects;
  for (const c of CITY_DATA) {        // sorted by tier → biggest cities first
    if (c[3] > dt) break;             // past the dot tier: nothing smaller qualifies
    if (!b.contains([c[2], c[1]])) continue;
    const m = L.marker([c[2], c[1]], { icon: cityIcon, pane: 'cityDots', interactive: false, keyboard: false });
    if (nt >= 0 && c[3] <= nt) {       // big enough to also show its name at this zoom…
      const p = map.latLngToContainerPoint([c[2], c[1]]);
      const w = c[0].length * 6.4 + 8, h = 19;          // est. label box (padded), sits to the right of the dot
      const r = { x: p.x + 4, y: p.y - h / 2, w, h };
      let clash = false;
      for (const q of placed) {
        if (r.x < q.x + q.w && r.x + r.w > q.x && r.y < q.y + q.h && r.y + r.h > q.y) { clash = true; break; }
      }
      if (!clash) {                    // …and only if it doesn't collide with a guide pin's or bigger city's label
        m.bindTooltip(c[0], {
          permanent: true, direction: 'right', offset: [3, 0],
          className: 'city-name-tip', pane: 'cityLabels', interactive: false,
        });
        placed.push(r);
      }
    }
    cityLayer.addLayer(m);
    if (++shown >= CAP) break;
  }
}

/* ── Pins + clustering ── */
function buildPins() {
  pinCluster = L.markerClusterGroup({
    maxClusterRadius: 20,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    disableClusteringAtZoom: 4,   // un-cluster at sub-region zoom so guide-city names show sooner
    iconCreateFunction: c => {
      const n = c.getChildCount();
      const cls = n < 5 ? 'small' : (n < 12 ? '' : 'large');
      return L.divIcon({
        html: '<div>' + n + '</div>',
        className: 'city-cluster ' + cls,
        iconSize: [40, 40],
      });
    },
  });

  const pinIcon = L.divIcon({
    className: '',
    html: '<div class="city-pin" style="width:13px;height:13px;"></div>',
    iconSize: [13, 13],
    iconAnchor: [6.5, 6.5],
  });

  PINS.forEach(p => {
    const m = L.marker([p[2], p[1]], { icon: pinIcon, title: p[0] });
    m.bindTooltip(p[0], {
      permanent: true, direction: 'top', offset: [0, -8],
      className: 'pin-name-tip', interactive: false,
    });
    const href = p[3];
    m.on('click', () => { window.location.href = href; });
    pinCluster.addLayer(m);
    pinMarkers.push(m);
  });

  map.addLayer(pinCluster);
  // Re-run the label collision pass on every event that can change which pins
  // sit at their own screen position (zoom/pan covered by 'moveend'; these two
  // cover spiderfying a tight cluster, which doesn't move the map).
  pinCluster.on('spiderfied unspiderfied animationend', renderPinLabels);
  renderPinLabels();
}

/* ── Guide-pin name collision pass ── runs before renderCities() each moveend
   so guide names always win the spot; a pin hidden inside a cluster bubble has
   no individual marker on screen, so it's skipped (its tooltip stays closed —
   Leaflet never opens a permanent tooltip for a layer that isn't added to the
   map directly). ── */
function renderPinLabels() {
  labelPlacedRects = [];
  if (!pinCluster) return;
  const b = map.getBounds();
  for (const m of pinMarkers) {
    const visible = pinCluster.getVisibleParent(m) === m && b.contains(m.getLatLng());
    if (!visible) { m.closeTooltip(); continue; }
    const name = m.options.title;
    const p = map.latLngToContainerPoint(m.getLatLng());
    const w = name.length * 6.6 + 8, h = 19;   // est. label box (padded), centered above the pin
    const r = { x: p.x - w / 2, y: p.y - 8 - h, w, h };
    let clash = false;
    for (const q of labelPlacedRects) {
      if (r.x < q.x + q.w && r.x + r.w > q.x && r.y < q.y + q.h && r.y + r.h > q.y) { clash = true; break; }
    }
    if (clash) { m.closeTooltip(); continue; }
    m.openTooltip();
    labelPlacedRects.push(r);
  }
}

/* ── Region jump buttons — switch region in place, no page reload.
   flyToBounds() animates a smooth pan+zoom to the target region now that
   maxBoundsViscosity is 0 (the prior 0.7 caused flyTo to freeze indefinitely). ── */
document.querySelectorAll('.rn').forEach(el => {
  el.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('.rn').forEach(r => r.classList.remove('rn-on'));
    el.classList.add('rn-on');
    map.flyToBounds(REGIONS[el.dataset.region], { ...fitOpts(true), duration: 1.2 });
  });
});

/* Hash-based region activation — World-Map.html#eu flies to Europe, etc. */
(function () {
  var hashRegion = (location.hash || '').replace('#', '').toLowerCase();
  if (hashRegion && REGIONS[hashRegion]) {
    var btn = document.querySelector('.rn[data-region="' + hashRegion + '"]');
    if (btn) {
      document.querySelectorAll('.rn').forEach(function (r) { r.classList.remove('rn-on'); });
      btn.classList.add('rn-on');
      map.once('moveend', function () {});
      setTimeout(function () {
        map.flyToBounds(REGIONS[hashRegion], { ...fitOpts(true), duration: 1.2 });
      }, 300);
    }
  }
}());
</script>
</body>
</html>
