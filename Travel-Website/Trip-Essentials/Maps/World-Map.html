<style>
  .tb { margin-bottom: 0 !important; }   /* maps are full-bleed — toolbar sits flush */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100vh; height: 100dvh; background: #f5f4f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple Color Emoji', 'Segoe UI Emoji', Arial, sans-serif; }
  body { display: flex; flex-direction: column; padding-bottom: 0; }
  #wrap { position: relative; flex: 1 1 auto; min-height: 0; overflow: hidden; border-radius: 10px; }
  #map { position: absolute; inset: 0; background: #cfe0e4; }

  /* ── Leaflet surface: kill default chrome so it reads as our warm map ── */
  .leaflet-container { background: #cfe0e4; font-family: Arial, Helvetica, sans-serif; outline: none; }
  .leaflet-control-zoom a { color: #6b4422; border-color: #d8d4cc; }
  .leaflet-bar a:hover { background: #faefd8; }

  /* ── Country polygons ── */
  .country-label-tip { background: none; border: none; box-shadow: none; padding: 0;
    font-size: 12px; font-weight: 700; color: #6b5a45; }
  .country-label-tip::before { display: none; }
  /* US state names — only shown when zoomed into the US (see stateLabels pane toggle) */
  .state-label-tip { background: none; border: none; box-shadow: none; padding: 0;
    font-size: 10px; font-weight: 600; color: #5a3f22; letter-spacing: 0.02em; }
  .state-label-tip::before { display: none; }
  /* Smaller countries (everything outside the always-on major set) — revealed once
     you zoom into a region (see minorLabels pane toggle), so the world view stays clean. */
  .minor-label-tip { background: none; border: none; box-shadow: none; padding: 0;
    font-size: 9.5px; font-weight: 600; color: #6b5a45; letter-spacing: 0.01em; }
  .minor-label-tip::before { display: none; }
  /* Major world cities (non-guide) — small grey dot + name, revealed by population
     as you zoom in (tier gating via the .ctier-N class on #map). */
  .city-dot-icon { width: 5px; height: 5px; border-radius: 50%; background: #5a3d22;
    box-shadow: 0 0 0 1.5px rgba(253,248,240,0.9); }
  .city-name-tip { background: none; border: none; box-shadow: none; padding: 0; margin: 0;
    font-size: 11px; font-weight: 600; color: #2a1d0f; letter-spacing: 0.01em; }
  .city-name-tip::before { display: none; }

  /* ── Pin markers ── */
  .city-pin { background: #b85c2a; border: 1.8px solid #fdf8f0; border-radius: 50%;
    box-shadow: 0 1px 4px rgba(0,0,0,0.30); transition: transform 0.12s, background 0.12s; }
  .city-pin:hover { background: #7a3b1e; transform: scale(1.45); }
  .pin-name-tip { background: none; border: none; box-shadow: none; padding: 0; margin: 0;
    font-size: 12px; font-weight: 700; color: #4a2810; }
  .pin-name-tip::before { display: none; }

  /* ── Cluster bubbles (warm palette to match) ── */
  .city-cluster { background: none; }
  .city-cluster div { width: 36px; height: 36px; margin-left: 2px; margin-top: 2px;
    border-radius: 50%; text-align: center; line-height: 36px;
    color: #fdf8f0; font-weight: 700; font-size: 13px;
    background: radial-gradient(circle at 35% 30%, #c9743a 0%, #b85c2a 55%, #7a3b1e 100%);
    border: 2px solid #fdf8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.28); }
  .city-cluster.small div { width: 30px; height: 30px; line-height: 30px; font-size: 12px; }
  .city-cluster.large div { width: 44px; height: 44px; line-height: 44px; font-size: 14px; }

  #map-left-stack { position:absolute; left:10px; top:16px; display:flex; flex-direction:column; gap:7px; align-items:flex-start; z-index:600; }
  #left-panel { display:flex; flex-direction:column; background:rgba(247,244,238,0.97); border-radius:10px; padding:7px 6px; box-shadow:0 2px 12px rgba(0,0,0,0.13); backdrop-filter:blur(4px); gap:3px; }

  .panel-section-label { font-size: 10px; font-weight:700; color:#9a8870; letter-spacing:0.06em; text-transform:uppercase; padding:1px 3px 2px; }

  #region-nav { display:flex; flex-direction:column; gap:4px; }
  .rn { padding:5px 14px; border-radius:20px; border:1.5px solid #d8d4cc; background:#f5f4f0; color:#6b4422; font-size: 12px; font-weight:600; text-decoration:none; white-space:nowrap; display:flex; align-items:center; gap:5px; transition:background .12s,border-color .12s; cursor:pointer; }

  .rn:hover { background:#faefd8; border-color:#8a6c1a; }

  .rn-wd::before  { background:#8a8270; }
  .rn-eu  { background:#fde8e8 !important; border-color:#f0a0a0 !important; color:#a02020 !important; }
  .rn-eu::before  { background:#dc4444; }
  .rn-na  { background:#fdf0e4 !important; border-color:#f0b878 !important; color:#8a3a08 !important; }
  .rn-na::before  { background:#e87830; }
  .rn-cb  { background:#d8efe9 !important; border-color:#7fcabd !important; color:#0c6b5d !important; }
  .rn-cb::before  { background:#14a18d; }
  .rn-as  { background:#fdf5d8 !important; border-color:#e8d060 !important; color:#7a5000 !important; }
  .rn-as::before  { background:#c8940a; }
  .rn-af  { background:#e4f5e8 !important; border-color:#90d0a0 !important; color:#1a6030 !important; }
  .rn-af::before  { background:#2ea84e; }
  .rn-sa  { background:#e4eef8 !important; border-color:#90b8e8 !important; color:#1a3a8b !important; }
  .rn-sa::before  { background:#3a74d4; }

  .rn-oc::before  { background:#8050d0; }
  .rn.rn-on { background:linear-gradient(135deg,#7a3b1e 0%,#b85c2a 55%,#d4874a 100%) !important; color:#fdf8f0 !important; border-color:#b85c2a !important; }

  #left-panel .rn { width: 100%; }
  /* No focus ring on click — keep it only for keyboard nav */
  .rn:focus:not(:focus-visible) { outline: none; }

@media (max-width: 640px) {
  /* ── Mobile: dock the controls into a slim scrollable bottom bar ── */
  #map-left-stack {
    position: absolute; left: 0; right: 0; bottom: 0; top: auto;

  .rn::before { width: 8px; height: 8px; }
  .leaflet-control-zoom { margin-bottom: 70px !important; }

/* ── Region bounds in Leaflet order [[south,west],[north,east]] ── */
const REGIONS = {
  world: [[-50, -160], [72, 178]],
  eu:    [[35, -25], [67, 42]],
  na:    [[17, -162], [66, -66]],
  cb:    [[11, -85], [27, -58]],
  as:    [[-12, 48], [44, 146]],
  af:    [[-36, -19], [38, 52]],
  sa:    [[-56, -82], [13, -34]],
  oc:    [[-48, 140], [-31, 177]],
};

/* ── Map init ── */
const map = L.map('map', {
  zoomControl: false,
  attributionControl: false,
  minZoom: 1,
  maxZoom: 11,
  worldCopyJump: false,
  zoomSnap: 0.25,
  maxBounds: [[-85, -200], [85, 200]],
  maxBoundsViscosity: 0.7,
});
L.control.zoom({ position: 'bottomright' }).addTo(map);
map.createPane('countryLabels');
map.getPane('countryLabels').style.zIndex = 590;
map.getPane('countryLabels').style.pointerEvents = 'none';
map.createPane('stateLabels');
map.getPane('stateLabels').style.zIndex = 591;
map.getPane('stateLabels').style.pointerEvents = 'none';
map.createPane('minorLabels');           // all non-major country names
map.getPane('minorLabels').style.zIndex = 589;
map.getPane('minorLabels').style.pointerEvents = 'none';
// State/province names smear across the US/Canada at world zoom — reveal them only
// when zoomed into the country. Minor country names reveal one level earlier, at
// continent zoom, so the region buttons (Africa, S. America, Caribbean) show every
// country. The ~45 major countries stay labelled at world zoom (countryLabels).
map.createPane('cityDots');              // major non-guide world cities
map.getPane('cityDots').style.zIndex = 585;
map.getPane('cityDots').style.pointerEvents = 'none';
map.createPane('cityLabels');
map.getPane('cityLabels').style.zIndex = 586;
map.getPane('cityLabels').style.pointerEvents = 'none';
// Slow staged reveal: WORLD (major countries only) → CONTINENTS (all country names,
// z>=3) → COUNTRIES (states/provinces, z>=4.5) → CITIES (dots z>=4.5, names z>=6).
function toggleStateLabels() {
  map.getPane('stateLabels').style.display = (map.getZoom() >= 4.5) ? '' : 'none';
}
function toggleMinorLabels() {
  map.getPane('minorLabels').style.display = (map.getZoom() >= 3) ? '' : 'none';
}
map.on('zoomend', () => { toggleStateLabels(); toggleMinorLabels(); });
// Major cities: render only the ones IN VIEW, biggest-first, up to a per-zoom
// population tier — so we can carry 12k cities without lag. Declared here (before
// the handler) so an early moveend can't hit them in the temporal dead zone;
// CITY_DATA is filled by the fetch below, renderCities() is hoisted.
let CITY_DATA = [];
const cityIcon = L.divIcon({ className: 'city-dot-icon', iconSize: [5, 5], iconAnchor: [2.5, 2.5] });
const cityLayer = L.layerGroup().addTo(map);
// European admin-1 regions (lazy-loaded the first time you zoom into Europe): canvas
// boundary lines + viewport-culled, collision-avoided names — same idea as the cities.
let EU_REGIONS = [], euRegionLines = null, euLoaded = false;
const euRegionLayer = L.layerGroup().addTo(map);
const euCanvas = L.canvas({ padding: 0.4 });
const blankIcon = L.divIcon({ className: 'eu-region-anchor', iconSize: [0, 0] });
map.on('moveend', () => { renderCities(); maybeLoadEurope(); toggleEuLines(); renderRegions(); });

// Keep the framed region clear of the overlay controls: pad left for the
// desktop panel, pad bottom for the mobile docked bar.
function fitOpts() {
  return (window.innerWidth <= 640)
    ? { paddingTopLeft: [12, 12], paddingBottomRight: [12, 86] }
    : { paddingTopLeft: [150, 14], paddingBottomRight: [14, 14] };
}
map.fitBounds(REGIONS.world, fitOpts());

/* ── Country polygons from world-atlas TopoJSON (GeoJSON-only, no tiles) ── */
fetch('data/countries-50m.json')
  .then(r => r.json())
  .then(world => {
    const fc = topojson.feature(world, world.objects.countries);
    // Antimeridian guard: Russia and Fiji have rings that wrap past ±180°
    // (Chukotka, the Fiji group), which Mercator smears into a horizontal
    // band across the whole map. Pin any wrapped (far-negative) vertex to the
    // right edge so the polygon crops cleanly instead of streaking.
    const clampWrap = lon => (lon < -100) ? 179.9 : lon;
    const fixCoords = c => (typeof c[0] === 'number') ? [clampWrap(c[0]), c[1]] : c.map(fixCoords);
    fc.features.forEach(f => {
      if (+f.id === 643 || +f.id === 242) f.geometry.coordinates = fixCoords(f.geometry.coordinates);
    });
    const layer = L.geoJSON(fc, {
      style: f => ({
        fillColor: colorFor(+f.id),
        fillOpacity: 1,
        color: darken(colorFor(+f.id), 0.6),
        weight: 0.6,
      }),
      onEachFeature: (f, lyr) => {
        const id = +f.id;
        lyr.on('mouseover', () => lyr.setStyle({ fillColor: darken(colorFor(id), 1.12) }));
        lyr.on('mouseout',  () => lyr.setStyle({ fillColor: colorFor(id) }));
        if (LABEL[id]) {
          const c = CENTERS[id] ? L.latLng(CENTERS[id][0], CENTERS[id][1]) : lyr.getBounds().getCenter();
          lyr.bindTooltip(LABEL[id], {
            permanent: true, direction: 'center', className: 'country-label-tip',
            pane: 'countryLabels', interactive: false,
          });
          lyr.getTooltip().setLatLng(c);
        } else if (f.properties && f.properties.name) {
          // Every other country gets its name too — in the minor-labels pane, which
          // is hidden at world zoom and revealed at continent zoom (region buttons).
          lyr.bindTooltip(f.properties.name, {
            permanent: true, direction: 'center', className: 'minor-label-tip',
            pane: 'minorLabels', interactive: false,
          });
        }
      },
    }).addTo(map);
    layer.bringToBack();
    toggleMinorLabels();   // respect current zoom (hidden until continent zoom)
    buildPins();
  })
  .catch(() => {
    document.getElementById('map').insertAdjacentHTML('beforeend',
      '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#6b4422;font-size:15px;text-align:center;padding:20px;">Could not load map data — please check your internet connection.</div>');
  });

/* ── US state boundaries ── world-atlas is country-level (the US is one polygon),
   so overlay all 50 states + DC (lat/lon GeoJSON) on top of the US country so
   every state is visible — guide or not. Non-interactive, lands in the overlay
   pane (below the pins). No antimeridian clamp here: the country clamp pins
   lon < -100° to the right edge, which would destroy the whole western US. ── */
fetch('data/us-states.json')
  .then(r => r.json())
  .then(us => {
    L.geoJSON(us, {
      interactive: false,
      style: { fillColor: '#cda36e', fillOpacity: 1, color: darken('#cda36e', 0.55), weight: 0.7 },
      onEachFeature: (f, lyr) => {
        const nm = f.properties && f.properties.name;
        if (!nm) return;
        lyr.bindTooltip(nm, {
          permanent: true, direction: 'center', className: 'state-label-tip',
          pane: 'stateLabels', interactive: false,
        });
      },
    }).addTo(map);
    toggleStateLabels();   // respect current zoom (hidden until zoomed into the US)
  })
  .catch(() => {});

/* ── Canada province/territory boundaries ── same treatment as US states: overlay
   all 13 provinces + territories on top of the single Canada polygon so every one
   is visible, with names revealed at the same zoom gate. ── */
fetch('data/canada-provinces.json')
  .then(r => r.json())
  .then(ca => {
    L.geoJSON(ca, {
      interactive: false,
      style: { fillColor: '#cda36e', fillOpacity: 1, color: darken('#cda36e', 0.55), weight: 0.7 },
      onEachFeature: (f, lyr) => {
        const nm = f.properties && f.properties.name;
        if (!nm) return;
        lyr.bindTooltip(nm, {
          permanent: true, direction: 'center', className: 'state-label-tip',
          pane: 'stateLabels', interactive: false,
        });
      },
    }).addTo(map);
    toggleStateLabels();
  })
  .catch(() => {});

/* ── European regions (admin-1) ── same idea as US states: subdivide every European
   country with boundary lines + names. 1465 regions + 2MB, so it's lazy-loaded the
   first time you zoom toward Europe, drawn on a canvas (lines), with names viewport-
   culled + collision-avoided (biggest region first) like the cities. ── */
const EU_BBOX = L.latLngBounds([34, -25], [72, 45]);
function maybeLoadEurope() {
  if (euLoaded || map.getZoom() < 4) return;
  if (!map.getBounds().intersects(EU_BBOX)) return;
  euLoaded = true;
  fetch('data/europe-regions.json')
    .then(r => r.json())
    .then(geo => {
      euRegionLines = L.geoJSON(geo, {
        interactive: false, renderer: euCanvas,
        style: { fillOpacity: 0, color: '#9c7b50', weight: 0.6 },
      });
      geo.features.forEach(f => {
        const bb = L.geoJSON(f).getBounds(); const c = bb.getCenter();
        const sz = (bb.getEast() - bb.getWest()) * (bb.getNorth() - bb.getSouth());
        EU_REGIONS.push({ name: f.properties.name, lat: c.lat, lon: c.lng, sz });
      });
      EU_REGIONS.sort((a, b) => b.sz - a.sz);   // biggest region first
      toggleEuLines(); renderRegions();
    })
    .catch(() => { euLoaded = false; });
}
function toggleEuLines() {
  if (!euRegionLines) return;
  const on = map.getZoom() >= 4;
  if (on && !map.hasLayer(euRegionLines)) euRegionLines.addTo(map);
  else if (!on && map.hasLayer(euRegionLines)) map.removeLayer(euRegionLines);
}
function renderRegions() {
  euRegionLayer.clearLayers();
  if (!EU_REGIONS.length || map.getZoom() < 4.5) return;
  const b = map.getBounds(); const placed = []; let shown = 0;
  for (const r of EU_REGIONS) {                 // biggest region first
    if (!b.contains([r.lat, r.lon])) continue;
    const p = map.latLngToContainerPoint([r.lat, r.lon]);
    const w = r.name.length * 6 + 8, h = 14;
    const rect = { x: p.x - w / 2, y: p.y - h / 2, w, h };
    let clash = false;
    for (const q of placed) {
      if (rect.x < q.x + q.w && rect.x + rect.w > q.x && rect.y < q.y + q.h && rect.y + rect.h > q.y) { clash = true; break; }
    }
    if (clash) continue;
    L.marker([r.lat, r.lon], { icon: blankIcon, pane: 'stateLabels', interactive: false, keyboard: false })
      .bindTooltip(r.name, { permanent: true, direction: 'center', className: 'state-label-tip', pane: 'stateLabels', interactive: false })
      .addTo(euRegionLayer);
    placed.push(rect);
    if (++shown >= 90) break;
  }
}

/* ── Major world cities (non-guide) ── 12k cities (pop >= 50k, tiered 0=>1M …
   4=>50k). To carry that many without lag we render ONLY the cities currently in
   view, biggest-first, capped — re-running on every pan/zoom. Guide cities already
   have their own orange pins, so they're filtered out to avoid doubles.
   (CITY_DATA / cityLayer / cityIcon are declared up by the move handler.) */
fetch('data/world-cities.json')
  .then(r => r.json())
  .then(cities => {
    const guideNames = new Set(PINS.map(p => p[0].toLowerCase()));
    CITY_DATA = cities.filter(c => !guideNames.has(c[0].toLowerCase()));  // pre-sorted by tier (biggest first)
    renderCities();
  })
  .catch(() => {});

// Progressive disclosure, tier 0=>1M … 4=>50k:
//  DOTS appear first (from continent zoom), NAMES fade in a couple levels later, so
//  the Europe/continent view shows just dots like before, then fills in as you zoom.
function dotTier(z) {            // which cities show as a dot — COUNTRY stage onward
  if (z >= 6.5) return 4;
  if (z >= 6) return 3;
  if (z >= 5.5) return 2;
  if (z >= 5) return 1;
  if (z >= 4.5) return 0;
  return -1;                     // < 4.5 → NO city dots (world/continent stays clean)
}
function nameTier(z) {           // which dots also get a name — CITY stage onward
  if (z >= 8) return 4;
  if (z >= 7.5) return 3;
  if (z >= 7) return 2;
  if (z >= 6.5) return 1;
  if (z >= 6) return 0;
  return -1;                     // < 6 → dots only, no names
}
function renderCities() {
  cityLayer.clearLayers();
  const z = map.getZoom();
  const dt = dotTier(z), nt = nameTier(z);
  if (dt < 0 || !CITY_DATA.length) return;
  const b = map.getBounds();
  const CAP = 260;
  let shown = 0;
  const placed = [];   // screen rects of placed labels — skip any name that would overlap
  for (const c of CITY_DATA) {        // sorted by tier → biggest cities first
    if (c[3] > dt) break;             // past the dot tier: nothing smaller qualifies
    if (!b.contains([c[2], c[1]])) continue;
    const m = L.marker([c[2], c[1]], { icon: cityIcon, pane: 'cityDots', interactive: false, keyboard: false });
    if (nt >= 0 && c[3] <= nt) {       // big enough to also show its name at this zoom…
      const p = map.latLngToContainerPoint([c[2], c[1]]);
      const w = c[0].length * 6.4 + 8, h = 15;          // est. label box, sits to the right of the dot
      const r = { x: p.x + 4, y: p.y - h / 2, w, h };
      let clash = false;
      for (const q of placed) {
        if (r.x < q.x + q.w && r.x + r.w > q.x && r.y < q.y + q.h && r.y + r.h > q.y) { clash = true; break; }
      }
      if (!clash) {                    // …and only if it doesn't collide with a bigger city's label
        m.bindTooltip(c[0], {
          permanent: true, direction: 'right', offset: [3, 0],
          className: 'city-name-tip', pane: 'cityLabels', interactive: false,
        });
        placed.push(r);
      }
    }
    cityLayer.addLayer(m);
    if (++shown >= CAP) break;
  }
}

/* ── Pins + clustering ── */
function buildPins() {
  const cluster = L.markerClusterGroup({
    maxClusterRadius: 32,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    disableClusteringAtZoom: 5,   // un-cluster at sub-region zoom so guide-city names show sooner
    iconCreateFunction: c => {
      const n = c.getChildCount();
      const cls = n < 5 ? 'small' : (n < 12 ? '' : 'large');
      return L.divIcon({
        html: '<div>' + n + '</div>',
        className: 'city-cluster ' + cls,
        iconSize: [40, 40],
      });
    },
  });

  const pinIcon = L.divIcon({
    className: '',
    html: '<div class="city-pin" style="width:13px;height:13px;"></div>',
    iconSize: [13, 13],
    iconAnchor: [6.5, 6.5],
  });

  PINS.forEach(p => {
    const m = L.marker([p[2], p[1]], { icon: pinIcon, title: p[0] });
    m.bindTooltip(p[0], {
      permanent: true, direction: 'top', offset: [0, -8],
      className: 'pin-name-tip', interactive: false,
    });
    const href = p[3];
    m.on('click', () => { window.location.href = href; });
    cluster.addLayer(m);
  });

  map.addLayer(cluster);
}

/* ── Region fly-to buttons — switch region in place, no page reload ── */
document.querySelectorAll('.rn').forEach(el => {
  el.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('.rn').forEach(r => r.classList.remove('rn-on'));
    el.classList.add('rn-on');
    map.flyToBounds(REGIONS[el.dataset.region], Object.assign({ duration: 0.6 }, fitOpts()));
  });
});
</script>
