<style>
  .tb { margin-bottom: 0 !important; }   /* maps are full-bleed — toolbar sits flush */
  html, body.map-page { height: 100vh; height: 100dvh; }
  body.map-page { display: flex; flex-direction: column; padding-bottom: 0; }
  #wrap { position: relative; flex: 1 1 auto; min-height: 0; overflow: hidden; border-radius: 10px; }
  #map { position: absolute; inset: 0; background: #cfe0e4; }

  /* ── Leaflet surface: kill default chrome so it reads as our warm map ── */
  .leaflet-container { background: #cfe0e4; font-family: Arial, Helvetica, sans-serif; outline: none; }
  .leaflet-control-zoom a { color: #6b4422; border-color: var(--border, #d8d4cc); }
  .leaflet-bar a:hover { background: var(--surface, #ffffff); border-color: #b85c2a; }

  /* ── Country polygons ── */
  .country-label-tip { background: none; border: none; box-shadow: none; padding: 0;
    font-size: 12px; font-weight: 700; color: #6b5a45; }
  .country-label-tip::before { display: none; }
  /* US state names — only shown when zoomed into the US (see stateLabels pane toggle) */
  .state-label-tip { background: none; border: none; box-shadow: none; padding: 0;
    font-size: 10px; font-weight: 600; color: #5a3f22; letter-spacing: 0.02em; }
  .state-label-tip::before { display: none; }
  /* Smaller countries (everything outside the always-on major set) — revealed once
     you zoom into a region (see minorLabels pane toggle), so the world view stays clean. */
  .minor-label-tip { background: none; border: none; box-shadow: none; padding: 0;
    font-size: 9.5px; font-weight: 600; color: #6b5a45; letter-spacing: 0.01em; }
  .minor-label-tip::before { display: none; }
  /* Major world cities (non-guide) — name only (no dot marker), revealed by
     population as you zoom in (tier gating via the .ctier-N class on #map). */
  .city-name-tip { background: none; border: none; box-shadow: none; padding: 0; margin: 0;
    font-size: 11px; font-weight: 600; color: #2a1d0f; letter-spacing: 0.01em; }
  .city-name-tip::before { display: none; }

  /* ── Pin markers ── */
  .city-pin { background: #b85c2a; border: 1.8px solid #fdf8f0; border-radius: 50%;
    box-shadow: 0 1px 4px rgba(0,0,0,0.30); transition: transform 0.12s, background 0.12s; }
  .city-pin:hover { background: #7a3b1e; transform: scale(1.45); }
  .pin-name-tip { background: none; border: none; box-shadow: none; padding: 0; margin: 0;
    font-size: 12px; font-weight: 700; color: #4a2810; }
  .pin-name-tip::before { display: none; }

  /* ── Cluster bubbles (warm palette to match) ── */
  .city-cluster { background: none; }
  .city-cluster div { width: 36px; height: 36px; margin-left: 2px; margin-top: 2px;
    border-radius: 50%; text-align: center; line-height: 36px;
    color: var(--warm, #fdf8f0); font-weight: 700; font-size: 13px;
    background: radial-gradient(circle at 35% 30%, #c9743a 0%, #b85c2a 55%, #7a3b1e 100%);
    border: 2px solid #fdf8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.28); }
  .city-cluster.small div { width: 30px; height: 30px; line-height: 30px; font-size: 12px; }
  .city-cluster.large div { width: 44px; height: 44px; line-height: 44px; font-size: 14px; }

  #map-left-stack { position:absolute; left:10px; top:16px; display:flex; flex-direction:column; gap:7px; align-items:flex-start; z-index:600; }
  #left-panel { display:flex; flex-direction:column; background:rgba(247,244,238,0.97); border-radius:10px; padding:7px 6px; box-shadow:0 2px 12px rgba(0,0,0,0.13); backdrop-filter:blur(4px); gap:3px; }
  #visited-pill-mobile { display:flex !important; }

  .panel-section-label { font-size: 10px; font-weight:700; color:#9a8870; letter-spacing:0.06em; text-transform:uppercase; padding:1px 3px 2px; }

  #region-nav { display:flex; flex-direction:column; gap:4px; }
  .rn { padding:5px 14px; border-radius:20px; border:1.5px solid #d8d4cc; background:var(--bg, #f5f4f0); color:#6b4422; font-size: 12px; font-weight:600; text-decoration:none; white-space:nowrap; display:flex; align-items:center; gap:5px; transition:background .12s,border-color .12s; cursor:pointer; }
  .rn::before { content:''; width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .rn:hover { background:var(--surface,#ffffff); border-color:#b85c2a; }
  .rn-wd  { background:#eee9e2 !important; border-color:#c4bcae !important; color:#5a5446 !important; }
  .rn-wd::before  { background:#8a8270; }
  .rn-eu  { background:#fde8e8 !important; border-color:#f0a0a0 !important; color:var(--red, #a02020) !important; }
  .rn-eu::before  { background:#dc4444; }
  .rn-na  { background:#fdf0e4 !important; border-color:#f0b878 !important; color:#8a3a08 !important; }
  .rn-na::before  { background:#e87830; }
  .rn-cb  { background:#d8efe9 !important; border-color:#7fcabd !important; color:#0c6b5d !important; }
  .rn-cb::before  { background:#14a18d; }
  .rn-as  { background:#fdf5d8 !important; border-color:#e8d060 !important; color:#7a5000 !important; }
  .rn-as::before  { background:#c8940a; }
  .rn-af  { background:#e4f5e8 !important; border-color:#90d0a0 !important; color:#1a6030 !important; }
  .rn-af::before  { background:#2ea84e; }
  .rn-sa  { background:#e4eef8 !important; border-color:#90b8e8 !important; color:var(--navy, #1a3a8b) !important; }
  .rn-sa::before  { background:#3a74d4; }
  .rn-oc  { background:#f0e8f8 !important; border-color:#c090e0 !important; color:#4a1880 !important; }
  .rn-oc::before  { background:#8050d0; }
  .rn-vs  { background:#fdf5d8 !important; border-color:#d8c87a !important; color:#7a6000 !important; -webkit-appearance:none; appearance:none; box-sizing:border-box; line-height:19.2px; }
  .rn-vs::before  { background:#c8940a; }
  .rn-vs.rn-on { background:linear-gradient(135deg,#7a3b1e 0%,#b85c2a 55%,#d4874a 100%) !important; color:#fff !important; border-color:#b85c2a !important; }
  .rn.rn-on { background:linear-gradient(135deg,#7a3b1e 0%,#b85c2a 55%,#d4874a 100%) !important; color:var(--warm, #fdf8f0) !important; border-color:#b85c2a !important; }
  .rn.rn-on::before { background:rgba(255,255,255,0.55); }

  /* Uniform pill width so no label sizes the panel differently. */
  #left-panel .rn { width: 100%; }
  /* No focus ring on click — keep it only for keyboard nav */
  .rn:focus:not(:focus-visible) { outline: none; }

@media (max-width: 640px) {
  /* ── Mobile (2026-07-19): the on-page region-nav bottom bar is gone —
     Dani asked for it removed from the map and moved into the site's
     hamburger menu instead (a "Region" section, see toolbar.js). The hash

     Was previously docked as a scrollable bottom bar (see git history for

     keeps it. */
  .leaflet-control-zoom { display: none; }
}

function toggleVisited(btn) {
  var on = btn.getAttribute('data-on') !== '1';
  btn.setAttribute('data-on', on ? '1' : '0');
  btn.classList.toggle('rn-on', on);
  if (window.applyVisitedFilter) window.applyVisitedFilter(on);
}

  var on = btn.getAttribute('data-on') !== '1';

  btn.style.background = on ? '#c8940a' : '#fdf5d8';
  btn.style.color = on ? '#fff' : '#7a6000';
  btn.style.borderColor = on ? '#a07000' : '#d8c87a';
  btn.querySelector('span').style.background = on ? 'rgba(255,255,255,0.7)' : '#c8940a';
  if (window.applyVisitedFilter) window.applyVisitedFilter(on);
}

<script>
/* ── Resilient JSON loader: retry a stumbled request instead of giving up.
   A single slow/failed fetch used to paint the "could not load map data"
   banner permanently (no retry); now each request self-heals with a short
   backoff before the catch is ever reached. ── */
function getJSON(url, tries = 3) {
  return fetch(url)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .catch(err => {
      if (tries <= 1) throw err;
      return new Promise(res => setTimeout(res, 400 * (4 - tries)))
        .then(() => getJSON(url, tries - 1));
    });
}

/* ── Minor country name collision pass — runs after renderPinLabels() (pins
   keep priority, same as renderCities() below) and before renderCities(), so
   a country name never displaces a guide pin's name, but DOES compete fairly
   with world-city names for the same space. Majors (~45) are always shown
   unconditionally — spread across the globe, collisions between them are
   negligible; this only needed to matter for the ~196 minors, which cluster
   densely in places like the Caribbean, Persian Gulf, and Balkans. Two
   independent checks: (1) is this country's on-screen shape even big enough
   to hold a label without spilling into neighbors, (2) does the label rect
   clash with anything already placed this frame. ── */
function renderCountryLabelVisibility() {
  // FIXED (2026-07-19): majors used to be skipped entirely here — always on,
  // never checked against anything. Found the gap by testing a dense city
  // cluster: guide pins that happen to sit inside a major country (Cambridge
  // inside United Kingdom, Bologna inside Italy) collided with that major's
  // label with zero mitigation. Majors now go through the same clash check as
  // minors — the only difference is majors skip the "is this country's shape
  // even big enough on screen" gate, since a major is only ever suppressed by
  // an actual clash, not by being small (that's what makes it "major").
  const b = map.getBounds();
  for (const { lyr, isMinor } of countryLabelEntries) {
    const tt = lyr.getTooltip();
    if (!tt) continue;
    const center = tt.getLatLng();
    if (!b.contains(center)) { lyr.closeTooltip(); continue; }
    if (isMinor) {
      const lb = lyr._voyagerBounds;
      const p1 = map.latLngToContainerPoint(lb.getNorthWest());
      const p2 = map.latLngToContainerPoint(lb.getSouthEast());
      const w = Math.abs(p2.x - p1.x), h = Math.abs(p2.y - p1.y);
      if (w < 40 || h < 20) { lyr.closeTooltip(); continue; }
    }
    const name = tt.getContent();
    const p = map.latLngToContainerPoint(center);
    // +18px pad each side: this estimate has already missed two real overlaps
    // by a small margin (Ljubljana/Slovenia, Thailand/Cambodia) — real DOM
    // rects don't exactly match hand-measured constants, and chasing each
    // miss individually isn't converging. Padding generously trades a bit of
    // extra suppression for actually reaching zero overlaps, verified across
    // 12 regions (Caribbean, Balkans, Persian Gulf, SE Asia, Pacific, West
    // Africa, dense Europe, Central America, dense US, Japan/Korea, world
    // view) — see conversation 2026-07-19. Majors render bigger/bolder
    // (12px 700 vs 9.5px 600) so they get a wider per-character estimate.
    const rw = isMinor ? (name.length * 5.2 + 8 + 18) : (name.length * 6.8 + 10 + 18);
    const rh = (isMinor ? 13 : 16) + 18;
    const rect = { x: p.x - rw / 2, y: p.y - rh / 2, w: rw, h: rh };
    let clash = false;
    for (const q of labelPlacedRects) {
      if (rect.x < q.x + q.w && rect.x + rect.w > q.x && rect.y < q.y + q.h && rect.y + rect.h > q.y) { clash = true; break; }
    }
    if (clash) { lyr.closeTooltip(); continue; }
    lyr.openTooltip();
    labelPlacedRects.push(rect);
  }
}

// desktop panel; no other controls overlay the map on mobile.
function fitOpts(animated) {
  const base = (embedMode || window.innerWidth <= 640)
    ? { paddingTopLeft: [12, 12], paddingBottomRight: [12, 12] }
    : { paddingTopLeft: [150, 14], paddingBottomRight: [14, 14] };
  if (!animated) base.animate = false;
  return base;
}
map.fitBounds(REGIONS.world, fitOpts(false));

/* ── Country polygons from world-atlas TopoJSON (GeoJSON-only, no tiles) ── */
getJSON('data/countries-50m.json')
  .then(world => {
    const fc = topojson.feature(world, world.objects.countries);
    // Antarctica: no guide will ever be built there, and Web Mercator smears
    // it into a huge distorted band across the entire bottom of the world
    // view (the projection stretches toward infinity near the poles) — reads
    // as a giant stray colored blob, not a country. Drop it before the layer
    // is built so it never renders (fill, border, or label).
    fc.features = fc.features.filter(f => (f.properties && f.properties.name) !== 'Antarctica');
    // Antimeridian guard: Russia and Fiji have rings that wrap past ±180°
    // (Chukotka, the Fiji group), which Mercator smears into a horizontal
    // band across the whole map. Pin any wrapped (far-negative) vertex to the
    // right edge so the polygon crops cleanly instead of streaking.
    const clampWrap = lon => (lon < -100) ? 179.9 : lon;
    const fixCoords = c => (typeof c[0] === 'number') ? [clampWrap(c[0]), c[1]] : c.map(fixCoords);
    fc.features.forEach(f => {
      if (+f.id === 643 || +f.id === 242) f.geometry.coordinates = fixCoords(f.geometry.coordinates);
    });
    const layer = L.geoJSON(fc, {
      style: f => {
        const nm = f.properties && f.properties.name;
        return {
          fillColor: colorFor(nm),
          fillOpacity: 1,
          color: darken(colorFor(nm), 0.6),
          weight: 0.6,
        };
      },
      onEachFeature: (f, lyr) => {
        const nm = f.properties && f.properties.name;
        lyr.on('mouseover', () => lyr.setStyle({ fillColor: darken(colorFor(nm), 1.12) }));
        lyr.on('mouseout',  () => lyr.setStyle({ fillColor: colorFor(nm) }));
        const labelCenter = LABEL_CENTERS[nm];
        // PERF FIX (2026-07-19): getBounds() walks every vertex of a polygon
        // (thousands for a complex coastline like Norway/Indonesia/Russia) —
        // computed and cached ONCE here rather than re-called inside
        // renderCountryLabelVisibility() on every single pan/zoom, which was
        // costing 4+ SECONDS per moveend across 241 countries (found via
        // direct performance.now() measurement, not a guess).
        const bounds = lyr.getBounds();
        lyr._voyagerBounds = bounds;
        const c = labelCenter ? L.latLng(labelCenter[0], labelCenter[1]) : bounds.getCenter();
        // Stashed for re-application after .addTo(map) below — Leaflet's own
        // _openTooltip() recomputes a permanent tooltip's position from
        // layer.getCenter() (bbox-center) the moment the layer is added to the
        // map, silently overwriting any setLatLng() called before that point.
        // That's why this was landing on borders/oceans for Somalia etc. even
        // though the "right" coordinate was being set right here.
        lyr._voyagerLabelCenter = c;
        if (nm) {
          const isMajor = MAJOR_COUNTRIES.has(nm);
          lyr.bindTooltip(nm, {
            permanent: true, direction: 'center',
            className: isMajor ? 'country-label-tip' : 'minor-label-tip',
            pane: isMajor ? 'countryLabels' : 'minorLabels',
            interactive: false,
          });
          countryLabelEntries.push({ lyr, isMinor: !isMajor });
        }
      },
    }).addTo(map);
    // Re-apply every tooltip's real position now that the layer is on the map
    // — see the _voyagerLabelCenter comment above for why this has to happen
    // AFTER addTo(map), not during onEachFeature.
    layer.eachLayer(lyr => {
      if (lyr._voyagerLabelCenter && lyr.getTooltip()) {
        lyr.getTooltip().setLatLng(lyr._voyagerLabelCenter);
      }
    });
    layer.bringToBack();
    toggleMinorLabels();   // respect current zoom (hidden until continent zoom)
    buildPins();           // seeds labelPlacedRects via its internal renderPinLabels() call
    renderCountryLabelVisibility();
  })
  .catch(() => {
    document.getElementById('map').insertAdjacentHTML('beforeend',
      '<div style="position:absolute;inset:0;display:flex;flex-direction:column;gap:12px;align-items:center;justify-content:center;color:#6b4422;font-size:15px;text-align:center;padding:20px;">Could not load map data.<button onclick="location.reload()" style="padding:8px 18px;background:#b85c2a;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;">Retry</button></div>');
  });

/* ── US state boundaries ── world-atlas is country-level (the US is one polygon),
   so overlay all 50 states + DC (lat/lon GeoJSON) on top of the US country so
   every state is visible — guide or not. Non-interactive, lands in the overlay
   pane (below the pins). No antimeridian clamp here: the country clamp pins
   lon < -100° to the right edge, which would destroy the whole western US.
   Names feed the same renderRegions() collision pass as every other continent
   (regionState.us, registered outside REGION_SOURCES since it's loaded eagerly,
   not lazily) — found via mobile testing: Connecticut/Rhode Island and
   Delaware/DC always overlapped because this used a permanent, unculled
   tooltip with zero collision checking. ── */
regionState.us = { loaded: true, lines: null, regions: [] };
getJSON('data/us-states.json')
  .then(us => {
    // RE-ENABLED (2026-07-19) — Dani: US keeps state-level names + borders;
    // it's only the rest-of-world admin-1 subdivisions (Africa/Europe/etc,
    // via maybeLoadRegions() below, still disabled) that were the clutter.
    L.geoJSON(us, {
      interactive: false,
      style: { fillOpacity: 0, color: darken(colorFor('United States of America'), 0.55), weight: 0.7 },
    }).addTo(map);
    us.features.forEach(f => {
      const nm = f.properties && f.properties.name;
      if (!nm) return;
      const bb = L.geoJSON(f).getBounds(); const c = bb.getCenter();
      const sz = (bb.getEast() - bb.getWest()) * (bb.getNorth() - bb.getSouth());
      regionState.us.regions.push({ name: nm, lat: c.lat, lon: c.lng, sz });
    });
    regionState.us.regions.sort((a, b) => b.sz - a.sz);
    toggleStateLabels(); renderRegions();   // respect current zoom (hidden until zoomed into the US)
  })
  .catch(() => {});

/* ── Canada province/territory boundaries ── same treatment as US states: overlay
   all 13 provinces + territories on top of the single Canada polygon so every one
   is visible, with names revealed at the same zoom gate. ── */
regionState.ca = { loaded: true, lines: null, regions: [] };
getJSON('data/canada-provinces.json')
  .then(ca => {
    // RE-ENABLED (2026-07-19) — grouped with US as North America; never part
    // of the admin-1 clutter complaint (that was Africa/Europe specifically).
    L.geoJSON(ca, {
      interactive: false,
      style: { fillOpacity: 0, color: darken(colorFor('Canada'), 0.55), weight: 0.7 },
    }).addTo(map);
    ca.features.forEach(f => {
      const nm = f.properties && f.properties.name;
      if (!nm) return;
      const bb = L.geoJSON(f).getBounds(); const c = bb.getCenter();
      const sz = (bb.getEast() - bb.getWest()) * (bb.getNorth() - bb.getSouth());
      regionState.ca.regions.push({ name: nm, lat: c.lat, lon: c.lng, sz });
    });
    regionState.ca.regions.sort((a, b) => b.sz - a.sz);
    toggleStateLabels(); renderRegions();
  })
  .catch(() => {});

/* ── Admin-1 regions (Europe, South America, Africa, Asia, Oceania, Caribbean) ──
   same idea as US states: subdivide every country in these continents with
   filled polygons + names, same look as the US/Canada overlay. Each set is up to
   ~1500 regions / under 1MB (mapshaper-simplified), so each is lazy-loaded the
   first time you zoom toward that continent, drawn on a canvas (filled, not SVG,
   to keep thousands of polygons cheap), with names viewport-culled + collision-
   avoided (biggest region first) like the cities.
   (REGION_SOURCES / regionState declared earlier, before the initial fitBounds —
   that call fires 'moveend' synchronously, which would otherwise hit these in
   their temporal dead zone.) ── */
function maybeLoadRegions() {
  return; // STAYS DISABLED (2026-07-19) — Dani: US/Canada keep subdivisions
  // (re-enabled above), but the rest of the world stays country-level only —
  // this is the lazy loader for the OTHER 6 continents' admin-1 data, which
  // created too much clutter once it actually loaded correctly —
  // Niger/Chad/Sudan/Nigeria all showing 100+ province names at once, same
  // in Europe. Left the rest of
  // this function's body below as dead code rather than deleting it, in case
  // it's wanted back later — it's provably unreachable due to this return.
  if (map.getZoom() < 4) return;
  Object.entries(REGION_SOURCES).forEach(([key, src]) => {
    const st = regionState[key];
    if (st.loaded || !map.getBounds().intersects(src.bbox)) return;
    st.loaded = true;
    getJSON(src.file)
      .then(geo => {
        // FIXED (was: flat neutral fill on top of the status-colored country layer
        // below — since this loads lazily at z>=4, it made "been" countries in
        // Europe/Asia/Africa/S.America/Oceania/Caribbean flip to neutral the moment
        // you zoomed in, while North America (recolored separately, see US/Canada
        // above) stayed correct — the exact inconsistency Dani flagged as "does not
        // make sense" 2026-07-19. fillOpacity: 0 makes every subdivision layer
        // boundary-lines-only, so the country-level fill is always what's visible,
        // consistently, regardless of zoom or which continent.
        // BUG FIX (2026-07-19): this referenced NO_GUIDE_COLOR, a variable that
        // no longer exists after the been/want-color removal — it threw a
        // ReferenceError on every call, silently swallowed by the .catch()
        // below (which just reset st.loaded so it would quietly retry-and-fail
        // forever). That's why Europe/Asia/Africa/S.America/Oceania/Caribbean
        // never showed ANY subdivision lines, while US/Canada (fixed correctly
        // earlier) did. Fixed border color to a plain neutral tone.
        st.lines = L.geoJSON(geo, {
          interactive: false, renderer: euCanvas,
          style: { fillOpacity: 0, color: '#8a8070', weight: 0.7 },
        });
        geo.features.forEach(f => {
          const bb = L.geoJSON(f).getBounds(); const c = bb.getCenter();
          const sz = (bb.getEast() - bb.getWest()) * (bb.getNorth() - bb.getSouth());
          st.regions.push({ name: f.properties.name, lat: c.lat, lon: c.lng, sz });
        });
        st.regions.sort((a, b) => b.sz - a.sz);   // biggest region first
        toggleRegionLines(); renderRegions();
      })
      .catch(() => { st.loaded = false; });
  });
}
function toggleRegionLines() {
  const on = map.getZoom() >= 4;
  Object.values(regionState).forEach(st => {
    if (!st.lines) return;
    if (on && !map.hasLayer(st.lines)) st.lines.addTo(map);
    else if (!on && map.hasLayer(st.lines)) map.removeLayer(st.lines);
  });
}
function renderRegions() {
  // RE-ENABLED (2026-07-19) — maybeLoadRegions() (the 6-continent admin-1
  // lazy loader) stays disabled below, so regionState.eu/sa/af/as/oc/cb.regions
  // stay permanently empty — this naturally only ever renders US/Canada names,
  // with zero code duplication needed to scope it.
  euRegionLayer.clearLayers();
  if (map.getZoom() < 4.5) return;
  const all = Object.values(regionState).flatMap(st => st.regions);
  if (!all.length) return;
  const b = map.getBounds();
  // Seeded with guide-pin + city label rects (placed earlier this moveend, see
  // renderPinLabels/renderCities) so a region name never lands on a guide pin's
  // name — found via mobile testing: "Foz do Iguaçu"/"Buenos Aires" pins were
  // overlapping "Caaguazú"/"Colonia" province names at the zoom guides sit at.
  const placed = labelPlacedRects;
  let shown = 0;
  for (const r of all) {                         // biggest region first (within each set)
    if (!b.contains([r.lat, r.lon])) continue;
    const p = map.latLngToContainerPoint([r.lat, r.lon]);
    const w = r.name.length * 6 + 8, h = 14;
    const rect = { x: p.x - w / 2, y: p.y - h / 2, w, h };
    let clash = false;
    for (const q of placed) {
      if (rect.x < q.x + q.w && rect.x + rect.w > q.x && rect.y < q.y + q.h && rect.y + rect.h > q.y) { clash = true; break; }
    }
    if (clash) continue;
    L.marker([r.lat, r.lon], { icon: blankIcon, pane: 'stateLabels', interactive: false, keyboard: false })
      .bindTooltip(r.name, { permanent: true, direction: 'center', className: 'state-label-tip', pane: 'stateLabels', interactive: false })
      .addTo(euRegionLayer);
    placed.push(rect);
    if (++shown >= 90) break;
  }
}

/* ── Major world cities (non-guide) ── 12k cities (pop >= 50k, tiered 0=>1M …
   4=>50k). To carry that many without lag we render ONLY the cities currently in
   view, biggest-first, capped — re-running on every pan/zoom. Guide cities already
   have their own orange pins, so they're filtered out to avoid doubles.
   (CITY_DATA / cityLayer / cityIcon are declared up by the move handler.) */
getJSON('data/world-cities.json')
  .then(cities => {
    const guideNames = new Set(PINS.map(p => p[0].toLowerCase()));
    CITY_DATA = cities.filter(c => !guideNames.has(c[0].toLowerCase()));  // pre-sorted by tier (biggest first)
    renderCities();
  })
  .catch(() => {});

// Progressive disclosure, tier 0=>1M … 4=>50k:
//  DOTS appear first (from continent zoom), NAMES fade in a couple levels later, so
//  the Europe/continent view shows just dots like before, then fills in as you zoom.
function dotTier(z) {            // which cities show as a dot — COUNTRY stage onward
  if (z >= 6.5) return 4;
  if (z >= 6) return 3;
  if (z >= 5.5) return 2;
  if (z >= 5) return 1;
  if (z >= 4.5) return 0;
  return -1;                     // < 4.5 → NO city dots (world/continent stays clean)
}
function nameTier(z) {           // which dots also get a name — CITY stage onward
  if (z >= 8) return 4;
  if (z >= 7.5) return 3;
  if (z >= 7) return 2;
  if (z >= 6.5) return 1;
  if (z >= 6) return 0;
  return -1;                     // < 6 → dots only, no names
}
function renderCities() {
  cityLayer.clearLayers();
  return; // DISABLED (2026-07-19) — Dani: "pin only where we have a guide
  // period". Non-guide "major world city" name labels are gone; the only
  // markers on the map now are actual guide destinations (PINS array).
  const z = map.getZoom();
  const dt = dotTier(z), nt = nameTier(z);
  if (dt < 0 || !CITY_DATA.length) return;
  const b = map.getBounds();
  const CAP = 260;
  let shown = 0;
  // Seeded with guide-pin label rects (placed first, see renderPinLabels) so a
  // city name never lands on top of a guide pin's permanent name.
  const placed = labelPlacedRects;
  for (const c of CITY_DATA) {        // sorted by tier → biggest cities first
    if (c[3] > dt) break;             // past the dot tier: nothing smaller qualifies
    if (!b.contains([c[2], c[1]])) continue;
    const m = L.marker([c[2], c[1]], { icon: cityIcon, pane: 'cityDots', interactive: false, keyboard: false });
    if (nt >= 0 && c[3] <= nt) {       // big enough to also show its name at this zoom…
      const p = map.latLngToContainerPoint([c[2], c[1]]);
      const w = c[0].length * 6.4 + 8, h = 19;          // est. label box (padded), sits to the right of the dot
      const r = { x: p.x + 4, y: p.y - h / 2, w, h };
      let clash = false;
      for (const q of placed) {
        if (r.x < q.x + q.w && r.x + r.w > q.x && r.y < q.y + q.h && r.y + r.h > q.y) { clash = true; break; }
      }
      if (!clash) {                    // …and only if it doesn't collide with a guide pin's or bigger city's label
        m.bindTooltip(c[0], {
          permanent: true, direction: 'right', offset: [3, 0],
          className: 'city-name-tip', pane: 'cityLabels', interactive: false,
        });
        placed.push(r);
      }
    }
    cityLayer.addLayer(m);
    if (++shown >= CAP) break;
  }
}

/* ── Pins + clustering ── */
function buildPins() {
  pinCluster = L.markerClusterGroup({
    maxClusterRadius: 20,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    disableClusteringAtZoom: 4,   // un-cluster at sub-region zoom so guide-city names show sooner
    iconCreateFunction: c => {
      const n = c.getChildCount();
      const cls = n < 5 ? 'small' : (n < 12 ? '' : 'large');
      return L.divIcon({
        html: '<div>' + n + '</div>',
        className: 'city-cluster ' + cls,
        iconSize: [40, 40],
      });
    },
  });

  const pinIcon = L.divIcon({
    className: '',
    html: '<div class="city-pin" style="width:13px;height:13px;"></div>',
    iconSize: [13, 13],
    iconAnchor: [6.5, 6.5],
  });

  const BEEN_CITIES = new Set(['Amalfi','Amsterdam','Bologna','Bruges','Brussels','Cambridge','Cannes','Capri','Cascais','Cinque Terre','Copenhagen','Corfu','Edinburgh','Florence','Geneva','Gothenburg','Hamburg','London','Luxembourg','Madrid','Marktoberdorf','Monaco','Munich','Nice','Oxford','Paris','Pisa','Porto','Rome','San Sebastian','Sintra','Sorrento','Strasbourg','Stuttgart','Toledo','Turin','Venice','Vienna','Lagos','Chongqing','Atlanta','Austin','Big Island','Chicago','Kauai','La Jolla','Las Vegas','Los Cabos','Maui','Miami','Nashville','New York','Oahu','Orlando','Palo Alto','Pasadena','Puerto Vallarta','San Diego','San Francisco','San Juan Island','Scottsdale','Seattle','Sedona','Toronto','Vancouver','Victoria','Whistler','Athens','Beijing','Kyoto','Seoul','Shanghai','Taipei','Tokyo','Zhangjiajie','Aruba','Cancún','Curaçao','Sint Maarten','Virgin Islands','The Bahamas','Rio de Janeiro']);

  const beenIcon = L.divIcon({
    className: '',
    html: '<div class="city-pin" style="width:13px;height:13px;background:radial-gradient(circle at 35% 30%,#f5c842 0%,#d4a017 55%,#9a6f00 100%);box-shadow:0 0 0 2px rgba(212,160,23,0.35);"></div>',
    iconSize: [13, 13],
    iconAnchor: [6.5, 6.5],
  });

  const markersByName = {};
  PINS.forEach(p => {
    const m = L.marker([p[2], p[1]], { icon: pinIcon, title: p[0] });
    m.bindTooltip(p[0], {
      permanent: true, direction: 'top', offset: [0, -8],
      className: 'pin-name-tip', interactive: false,
    });
    const href = p[3];
    m.on('click', () => { (window.top || window).location.href = href; });
    pinCluster.addLayer(m);
    pinMarkers.push(m);
    markersByName[p[0]] = m;
  });

  let visitedFilterOn = false;
  window.applyVisitedFilter = function(on) {
    visitedFilterOn = on;
    PINS.forEach(p => {
      const m = markersByName[p[0]];
      if (!m) return;
      m.setIcon(on && BEEN_CITIES.has(p[0]) ? beenIcon : pinIcon);
    });
    renderPinLabels();
  };

  window.addEventListener('message', function(e) {
    if (e.data && e.data.action === 'filterBeen') window.applyVisitedFilter && window.applyVisitedFilter(e.data.on);
  });

  map.addLayer(pinCluster);
  // Re-run the label collision pass on every event that can change which pins
  // sit at their own screen position (zoom/pan covered by 'moveend'; these two
  // cover spiderfying a tight cluster, which doesn't move the map).
  pinCluster.on('spiderfied unspiderfied animationend', renderPinLabels);
  renderPinLabels();
}

/* ── Guide-pin name collision pass ── runs before renderCities() each moveend
   so guide names always win the spot; a pin hidden inside a cluster bubble has
   no individual marker on screen, so it's skipped (its tooltip stays closed —
   Leaflet never opens a permanent tooltip for a layer that isn't added to the
   map directly). ── */
function renderPinLabels() {
  labelPlacedRects = [];
  if (!pinCluster) return;
  const b = map.getBounds();
  for (const m of pinMarkers) {
    const visible = pinCluster.getVisibleParent(m) === m && b.contains(m.getLatLng());
    if (!visible) { m.closeTooltip(); continue; }
    const name = m.options.title;
    const p = map.latLngToContainerPoint(m.getLatLng());
    const w = name.length * 6.6 + 8, h = 19;   // est. label box (padded), centered above the pin
    const r = { x: p.x - w / 2, y: p.y - 8 - h, w, h };
    let clash = false;
    for (const q of labelPlacedRects) {
      if (r.x < q.x + q.w && r.x + r.w > q.x && r.y < q.y + q.h && r.y + r.h > q.y) { clash = true; break; }
    }
    if (clash) { m.closeTooltip(); continue; }
    m.openTooltip();
    labelPlacedRects.push(r);
  }
}

/* ── Region jump buttons — switch region in place, no page reload.
   flyToBounds() animates a smooth pan+zoom to the target region now that
   maxBoundsViscosity is 0 (the prior 0.7 caused flyTo to freeze indefinitely). ── */
document.querySelectorAll('.rn[data-region]').forEach(el => {
  el.addEventListener('click', e => {
    e.preventDefault();
    // only reset region pills — never touch the Visited pill
    document.querySelectorAll('.rn[data-region]').forEach(r => r.classList.remove('rn-on'));
    el.classList.add('rn-on');
    map.flyToBounds(REGIONS[el.dataset.region], { ...fitOpts(true), duration: 1.2 });
    // re-apply visited icon state in case flying resets anything
    if (visitedFilterOn && window.applyVisitedFilter) window.applyVisitedFilter(true);
  });
});

/* Hash-based region activation — World-Map.html#eu flies to Europe, etc.
   Also fires on in-page hash changes (2026-07-19), not just initial load —
   the hamburger menu's new "Region" section (toolbar.js) links to
   World-Map.html#eu from ANY page, but clicking that same link while
   ALREADY on World-Map.html is a same-document hash navigation (no page
   reload), which the original load-once IIFE would silently miss. */
function activateRegionFromHash() {
  var hashRegion = (location.hash || '').replace('#', '').toLowerCase();
  if (hashRegion && REGIONS[hashRegion]) {
    var btn = document.querySelector('.rn[data-region="' + hashRegion + '"]');
    if (btn) {
      document.querySelectorAll('.rn').forEach(function (r) { r.classList.remove('rn-on'); });
      btn.classList.add('rn-on');
    }
    // FIXED (2026-07-20): reported live as clicking a region link "flicks and
    // disappears" — animated flyToBounds() + marker clustering has a known
    // Leaflet bug where cluster bubbles can flicker/vanish mid-zoom, since
    // clustering recalculates on different timing than the CSS zoom
    // animation. Couldn't reproduce it visually myself, but instant
    // fitBounds() (no animation, same non-animated call used for the
    // initial world view on page load) removes the whole class of
    // animation-timing glitches rather than patching around one symptom.
    setTimeout(function () {
      map.fitBounds(REGIONS[hashRegion], fitOpts(false));
    }, 300);
  }
}
activateRegionFromHash();
window.addEventListener('hashchange', activateRegionFromHash);
</script>
</body>
</html>
