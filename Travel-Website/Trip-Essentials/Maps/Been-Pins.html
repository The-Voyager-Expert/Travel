  maxZoom: 18
}).addTo(map);

});

  var name = p[0], lon = p[1], lat = p[2], url = p[3];
  L.marker([lat, lon], {icon: icon})
    .bindPopup('<a href="' + url + '" target="_parent">' + name + '</a>')
    .addTo(map);
});

// Fit to been pins
var lats = BEEN.map(function(p){return p[2];});
var lons = BEEN.map(function(p){return p[1];});
map.fitBounds([
  [Math.min.apply(null,lats)-5, Math.min.apply(null,lons)-10],
  [Math.max.apply(null,lats)+5, Math.max.apply(null,lons)+10]
], {animate: false});
