<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/_travel_style.css">
<title>Maps</title>
<style>
:root {
  --bg:     #f5f4f0;
  --warm:   #fdf8f0;
  --surface:#ffffff;
  --border: #d8d4cc;
  --text:   #1a1917;
  --muted:  #6a6660;
  --accent: #8a6c1a;
  --hover:  #faefd8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple Color Emoji', 'Segoe UI Emoji', Arial, sans-serif;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  padding-bottom: 80px;
}
.wrap { max-width: 940px; margin: 0 auto; padding: 0 24px; }
.page-header {
  background: linear-gradient(135deg, #7a3b1e 0%, #b85c2a 55%, #d4874a 100%);
  padding: 14px 18px;
  border-radius: 10px;
  border-bottom: none;
  margin: 8px 0 14px;
}
.eyebrow { font-size: 12px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.page-header h1 {
  font-size: 14px;
  font-weight: bold;
  color: #ffffff;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  line-height: 1.2;
  margin: 0;
}
.page-header p { font-size: 12px; color: rgba(255,255,255,0.72); margin-top: 4px; }
.map-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }
.map-card {
  display: block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 8px;
  padding: 20px 20px;
  text-decoration: none;
  color: inherit;
  transition: box-shadow .15s, background .12s;
}
.map-card:hover { background: var(--hover); box-shadow: 0 3px 12px rgba(138,108,26,.12); }
.map-icon  { font-size: 30px; line-height: 1; margin-bottom: 10px; }
.map-title { font-size: 14px; font-weight: 600; color: var(--text); }
@media (max-width: 680px) { .map-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 400px) { .map-grid { grid-template-columns: 1fr; } }
</style>
<link rel="stylesheet" href="../../assets/mobile.css">
</head>
<body>
<div id="toolbar-mount" data-depth="2" data-maxwidth="940" data-no-footnote="1"></div>
<script src="../../assets/toolbar.js?v=27"></script>
<div class="wrap">
  <div class="page-header">
    <h1>🗺️ Maps</h1>
  </div>
  <div class="map-grid">
    <a class="map-card" href="US%20Map.html">
      <div class="map-icon">🦅</div>
      <div class="map-title">North America</div>
    </a>
    <a class="map-card" href="Caribbean%20Map.html">
      <div class="map-icon">🏝️</div>
      <div class="map-title">Caribbean</div>
    </a>
    <a class="map-card" href="Europe%20Map.html">
      <div class="map-icon">🐻</div>
      <div class="map-title">Europe</div>
    </a>
    <a class="map-card" href="Asia%20Map.html">
      <div class="map-icon">🐼</div>
      <div class="map-title">Asia</div>
    </a>
    <a class="map-card" href="Africa%20Map.html">
      <div class="map-icon">🦁</div>
      <div class="map-title">Africa</div>
    </a>
    <a class="map-card" href="South%20America%20Map.html">
      <div class="map-icon">🦙</div>
      <div class="map-title">South America</div>
    </a>
    <a class="map-card" href="Oceania%20Map.html">
      <div class="map-icon">🦘</div>
      <div class="map-title">Oceania</div>
    </a>
  </div>
</div>
</body>
</html>
