<title>Caribbean Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #f5f4f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple Color Emoji', 'Segoe UI Emoji', Arial, sans-serif; }
  body { display: flex; flex-direction: column; }
  #map-header { background: linear-gradient(135deg, #7a3b1e 0%, #b85c2a 55%, #d4874a 100%); padding: 14px 18px; border-radius: 10px; flex-shrink: 0; margin-bottom: 12px; }
  #map-header h1 { font-size: 14px; font-weight: bold; color: #ffffff; text-transform: uppercase; letter-spacing: 0.04em; }
  /* ── Refined cartographic palette (new standard) ── */
  #wrap { position: relative; flex: 1 1 auto; min-height: 0; background: #cfe0e4; overflow: hidden; }
  svg { width: 100%; height: 100%; display: block; }
  .land { fill: #cdbfa3; stroke: #7b7261; stroke-width: 0.6; cursor: default; transition: fill 0.12s; }
  .land:hover { fill: #c2b393; }
  .borders { fill: none; stroke: none; pointer-events: none; }
  .coast { fill: none; stroke: none; pointer-events: none; }
  .country-label { font-size: 11px; font-weight: 600; fill: #8a8472; letter-spacing: 0.04em; text-anchor: middle; dominant-baseline: central; pointer-events: none; user-select: none; paint-order: stroke; stroke: rgba(207,224,228,0.85); stroke-width: 3px; }
  .pin-group { cursor: pointer; }
  .pin-circle { fill: #b85c2a; stroke: #fdf8f0; stroke-width: 1.8; transition: transform 0.15s, fill 0.15s; transform-origin: center; transform-box: fill-box; }
  .pin-group:hover .pin-circle { fill: #7a3b1e; transform: scale(1.45); }
  .pin-leader { stroke: #b85c2a; stroke-width: 1; opacity: 0.5; pointer-events: none; }
  .pin-label { font-size: 12px; font-weight: 700; fill: #5a3115; text-anchor: middle; dominant-baseline: central; pointer-events: none; user-select: none; paint-order: stroke; stroke: rgba(253,248,240,0.95); stroke-width: 3.5px; }
  .pin-group:hover .pin-label { fill: #b85c2a; }
  #tip { position: absolute; pointer-events: none; background: #6b4422; color: #fdf8f0; padding: 7px 15px; border-radius: 8px; font-size: 12px; font-weight: 600; letter-spacing: 0.02em; box-shadow: 0 4px 18px rgba(0,0,0,0.28); white-space: nowrap; opacity: 0; transition: opacity 0.1s; z-index: 99; }
  .tip-sub { font-size: 12px; color: #e5c99a; margin-top: 2px; }
  #map-left-stack { position:absolute; left:14px; top:35%; transform:translateY(-50%); display:flex; flex-direction:column; gap:12px; align-items:flex-start; z-index:10; }
  #left-panel { display:flex; flex-direction:column; background:rgba(247,244,238,0.97); border-radius:12px; padding:10px 8px; box-shadow:0 2px 12px rgba(0,0,0,0.13); backdrop-filter:blur(4px); }
  #guide-legend { background:rgba(247,244,238,0.97); border-radius:8px; padding:6px 12px; font-size: 12px; color:#6b4422; display:flex; align-items:center; gap:7px; font-weight:600; box-shadow:0 1px 6px rgba(0,0,0,0.10); }
  .ldot { width: 10px; height: 10px; border-radius: 50%; background: #b85c2a; border: 2px solid #fdf8f0; box-shadow: 0 0 0 1px #b85c2a; flex-shrink: 0; }
  #region-nav { display:flex; flex-direction:column; gap:7px; }
  .rn { display:flex; align-items:center; gap:7px; padding:5px 14px; border-radius:20px; border:1.5px solid #d8d4cc; background:#f5f4f0; color:#6b4422; font-size: 12px; font-weight:600; text-decoration:none; white-space:nowrap; transition:background .12s,border-color .12s; flex-shrink:0; box-shadow:0 2px 8px rgba(0,0,0,0.22); }
  .rn::before { content:''; width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .rn:hover { background:#faefd8; border-color:#8a6c1a; }
  .rn-eu  { background:#fde8e8 !important; border-color:#f0a0a0 !important; color:#a02020 !important; }
  .rn-eu::before  { background:#dc4444; }
  .rn-na  { background:#fdf0e4 !important; border-color:#f0b878 !important; color:#8a3a08 !important; }
  .rn-na::before  { background:#e87830; }
  .rn-cb  { background:#d8efe9 !important; border-color:#7fcabd !important; color:#0c6b5d !important; }
  .rn-cb::before  { background:#14a18d; }
  .rn-as  { background:#fdf5d8 !important; border-color:#e8d060 !important; color:#7a5000 !important; }
  .rn-as::before  { background:#c8940a; }
  .rn-af  { background:#e4f5e8 !important; border-color:#90d0a0 !important; color:#1a6030 !important; }
  .rn-af::before  { background:#2ea84e; }
  .rn-sa  { background:#e4eef8 !important; border-color:#90b8e8 !important; color:#1a3a8b !important; }
  .rn-sa::before  { background:#3a74d4; }
  .rn-oc  { background:#f0e8f8 !important; border-color:#c090e0 !important; color:#4a1880 !important; }
  .rn-oc::before  { background:#8050d0; }
  .rn.rn-on { background:linear-gradient(135deg,#7a3b1e 0%,#b85c2a 55%,#d4874a 100%) !important; color:#fdf8f0 !important; border-color:#b85c2a !important; }
  .rn.rn-on::before { background:rgba(255,255,255,0.55); }
@media (max-width: 640px) {
  /* ── Mobile: lift controls off the map into a slim docked bottom bar ── */
  #map-left-stack {
    position: absolute; left: 0; right: 0; bottom: 0; top: auto;
    transform: none; flex-direction: column; align-items: stretch;
    gap: 0; padding: 0; z-index: 30;
  }
  #guide-legend { display: none; }            /* save the row; pins are self-evident */
  #left-panel {
    flex-direction: row; align-items: center; gap: 8px;
    overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
    background: rgba(247,244,238,0.97); backdrop-filter: blur(6px);
    border-radius: 0; border-top: 1px solid #d8d4cc;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.14);
    padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
  }
  #left-panel::-webkit-scrollbar { display: none; }
  #zoom-nav { flex-direction: row; align-items: center; gap: 6px; flex-shrink: 0; }
  .zoom-section-label { font-size: 10px; padding: 0 2px 0 0; flex-shrink: 0; }
  .panel-divider { width: 1px; height: 22px; margin: 0 4px; flex-shrink: 0; align-self: center; }
  #region-nav { flex-direction: row !important; gap: 6px; flex-shrink: 0; }
  .zn, .rn { flex-shrink: 0; padding: 7px 13px; font-size: 12px; white-space: nowrap; }
  .rn::before { width: 8px; height: 8px; }
}

<body>
<div id="toolbar-mount" data-depth="2" data-maxwidth="1400" data-no-footnote="1"></div>
<script src="../../assets/toolbar.js?v=44"></script>

<div id="wrap">
  <svg id="svg"></svg>
<div id="map-left-stack">
<div id="guide-legend"><div class="ldot"></div> Guide available</div>
<div id="left-panel">
<div id="region-nav">

  <a class="rn rn-na" href="US%20Map.html">N. America</a>
  <a class="rn rn-cb rn-on" href="Caribbean%20Map.html">Caribbean</a>
  <a class="rn rn-as" href="Asia%20Map.html">Asia</a>
  <a class="rn rn-af" href="Africa%20Map.html">Africa</a>
  <a class="rn rn-sa" href="South%20America%20Map.html">S. America</a>
  <a class="rn rn-oc" href="Oceania%20Map.html">Oceania</a>
</div>
</div>
</div>
  <div id="tip"><div id="tn"></div><div class="tip-sub" id="ts"></div></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
// Surrounding-land context labels (ISO numeric id → name)
const NAMES = {840:'United States',484:'Mexico',192:'Cuba',44:'The Bahamas',388:'Jamaica',
  332:'Haiti',214:'Dominican Rep.',862:'Venezuela',170:'Colombia',780:'Trinidad',
  84:'Belize',320:'Guatemala',340:'Honduras',558:'Nicaragua',188:'Costa Rica',591:'Panama'};

// Guide pins [name, lon, lat, href]
const PINS = [
  ['The Bahamas',    -77.35, 25.05, '../../Guides/Bahamas/bahamas_v1.html'],
  ['Cayman Islands', -81.24, 19.31, '../../Guides/Cayman Islands/cayman_islands_v1.html'],
  ['Puerto Rico',    -66.10, 18.47, '../../Guides/Puerto Rico/puerto_rico_v1.html'],
  ['Virgin Islands', -64.90, 18.34, '../../Guides/Virgin Islands/virgin_islands_v1.html'],
  ['Sint Maarten',   -63.05, 18.04, '../../Guides/Sint Maarten/sint_maarten_v1.html'],
  ['Barbados',       -59.54, 13.19, '../../Guides/Barbados/barbados_v1.html'],
  ['Aruba',          -70.02, 12.52, '../../Guides/Aruba/aruba_v1.html'],
  ['Curaçao',        -68.97, 12.11, '../../Guides/Curacao/curacao_v1.html'],
];
const BOUNDS = [[-84, 9.5], [-57, 27]];

const tip=document.getElementById('tip'),tn=document.getElementById('tn'),ts=document.getElementById('ts');
const wrap=document.getElementById('wrap');
let worldData=null;

function showTip(e,name,sub){
  tn.textContent=name;ts.textContent=sub||'';tip.style.opacity='1';
  const r=wrap.getBoundingClientRect();
  let x=e.clientX-r.left+14,y=e.clientY-r.top-44;
  const tw=tip.offsetWidth||140;
  if(x+tw>r.width-8)x=e.clientX-r.left-tw-14;
  if(y<4)y=e.clientY-r.top+14;
  tip.style.left=x+'px';tip.style.top=y+'px';
}

let _zoomBeh=null;
function _zoomed(ev){
  var t=ev.transform, g=d3.select('#svg').select('.zroot');
  if(g.empty())return;
  g.attr('transform',t);
  var inv=1/t.k;
  g.selectAll('.pin-group').attr('transform',function(){return 'translate('+this.getAttribute('data-bx')+','+this.getAttribute('data-by')+') scale('+inv+')';});
  g.selectAll('.country-label,.state-label,.cap-label').attr('transform',function(){return 'translate('+this.getAttribute('data-bx')+','+this.getAttribute('data-by')+') scale('+inv+')';});
}
function _tagBase(node){var t=node.getAttribute('transform')||'';var m=/translate\(\s*([-0-9.]+)[ ,]+([-0-9.]+)\s*\)/.exec(t);if(m){node.setAttribute('data-bx',m[1]);node.setAttribute('data-by',m[2]);}}
function _afterRender(){
  var svgSel=d3.select('#svg'), g=svgSel.select('.zroot');
  if(g.empty())return;
  g.selectAll('.pin-group').each(function(){_tagBase(this);});
  g.selectAll('.country-label,.state-label,.cap-label').each(function(){_tagBase(this);});
  var W=(typeof wrap!=='undefined'?wrap.clientWidth:svgSel.node().clientWidth);
  var H=(typeof wrap!=='undefined'?wrap.clientHeight:svgSel.node().clientHeight);
  if(!_zoomBeh){_zoomBeh=d3.zoom().scaleExtent([1,12]).on('zoom',_zoomed);svgSel.call(_zoomBeh);}
  _zoomBeh.extent([[0,0],[W,H]]).translateExtent([[0,0],[W,H]]);
  svgSel.call(_zoomBeh.transform, d3.zoomIdentity);
}
function buildMap(){ _renderMap(); _afterRender(); }
function _renderMap(){
  const W=wrap.clientWidth,H=wrap.clientHeight;
  if(!W||!H||!worldData)return;
  document.getElementById('svg').setAttribute('viewBox','0 0 '+W+' '+H);
  const countries=topojson.feature(worldData,worldData.objects.countries);
  const borders=topojson.mesh(worldData,worldData.objects.countries,(a,b)=>a!==b);
  const coast=topojson.mesh(worldData,worldData.objects.countries,(a,b)=>a===b);
  const proj=d3.geoMercator().fitExtent([[12,10],[W-12,H-10]],
    {type:'Feature',geometry:{type:'LineString',coordinates:[BOUNDS[0],BOUNDS[1]]}});
  const pathGen=d3.geoPath().projection(proj);
  const svgSel=d3.select('#svg'); svgSel.selectAll('*').remove();
  const svg=svgSel.append('g').attr('class','zroot');

  // Land backdrop — uniform refined tone, crisp thin coasts
  svg.selectAll('.land').data(countries.features).join('path').attr('class','land').attr('d',pathGen)
    .on('mousemove',(e,d)=>{ if(NAMES[+d.id]) showTip(e,NAMES[+d.id],''); })
    .on('mouseleave',()=>{tip.style.opacity='0';});
  svg.append('path').datum(borders).attr('class','borders').attr('d',pathGen);
  svg.append('path').datum(coast).attr('class','coast').attr('d',pathGen);

  // ── Collision-aware labels: pins win, context names dropped on collision ──
  const placed=[];
  const _ov=(a,b)=>!(a.x2<b.x1||b.x2<a.x1||a.y2<b.y1||b.y2<a.y1);
  const _fits=r=>!placed.some(p=>_ov(p,r));
  function _reserve(cx,cy,w,h){placed.push({x1:cx-w/2,y1:cy-h/2,x2:cx+w/2,y2:cy+h/2});}
  function _best(cx,cy,w,h,cands){for(const[dx,dy]of cands){const r={x1:cx+dx-w/2,y1:cy+dy-h/2,x2:cx+dx+w/2,y2:cy+dy+h/2};if(_fits(r)){placed.push(r);return[dx,dy];}}return null;}

  const _vis=[];
  PINS.forEach(([name,lon,lat,href])=>{const pt=proj([lon,lat]);if(!pt||isNaN(pt[0]))return;const px=pt[0],py=pt[1];if(px<0||px>W||py<0||py>H)return;_vis.push({name,href,px,py});});
  _vis.forEach(v=>_reserve(v.px,v.py,13,13));

  const pinG=svg.append('g');
  const _FS=11.5;
  _vis.forEach(v=>{
    const g=pinG.append('g').attr('class','pin-group').attr('transform','translate('+v.px+','+v.py+')')
      .on('click',()=>{window.location.href=v.href;})
      .on('mousemove',e=>{showTip(e,v.name,'📖 Open Guide');})
      .on('mouseleave',()=>{tip.style.opacity='0';})
      .on('touchstart',function(e){e.preventDefault();showTip(e.touches[0],v.name,'📖 Open Guide');})
      .on('touchend',function(e){e.preventDefault();tip.style.opacity='0';window.location.href=v.href;});
    const w=v.name.length*_FS*0.62+4,h=_FS+4;
    const up=-(h/2+9),dn=(h/2+9),rt=(w/2+12),lf=-(w/2+12);
    const cands=[[0,up],[0,dn],[rt,0],[lf,0],[rt,up],[lf,up],[rt,dn],[lf,dn],[0,up-h],[0,dn+h],[0,up-2*h],[0,dn+2*h]];
    const s=_best(v.px,v.py,w,h,cands)||[0,up];
    const dist=Math.sqrt(s[0]*s[0]+s[1]*s[1]);
    if(dist>15){const ux=s[0]/dist,uy=s[1]/dist;g.append('line').attr('class','pin-leader').attr('x1',ux*5).attr('y1',uy*5).attr('x2',s[0]-ux*6).attr('y2',s[1]-uy*6);}
    g.append('circle').attr('fill','transparent').attr('stroke','none').attr('r',22);
    g.append('circle').attr('class','pin-circle').attr('r',5.5);
    g.append('text').attr('class','pin-label').attr('x',s[0]).attr('y',s[1]).text(v.name);
  });

  // Context country labels — lowest priority
  const _cl=svg.append('g');
  countries.features.forEach(d=>{
    const nm=NAMES[+d.id]; if(!nm) return;
    const c=pathGen.centroid(d); if(!c||isNaN(c[0])) return;
    if(c[0]<6||c[0]>W-6||c[1]<6||c[1]>H-6) return;
    const w=nm.length*11*0.6+2,h=13;
    const s=_best(c[0],c[1],w,h,[[0,0],[0,-13],[0,13],[18,0],[-18,0]]); if(!s) return;
    _cl.append('text').attr('class','country-label').attr('transform','translate('+(c[0]+s[0])+','+(c[1]+s[1])+')').text(nm);
  });
}

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r=>r.json()).then(w=>{worldData=w;buildMap();})
  .catch(()=>{d3.select('#svg').append('text').attr('x','50%').attr('y','50%').attr('text-anchor','middle').attr('fill','#6b4422').attr('font-size',16).text('Could not load map data — please check your internet connection.');});
let t;window.addEventListener('resize',()=>{clearTimeout(t);t=setTimeout(buildMap,80);});
</script>
</body>
