<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/_travel_style.css">
<title>US Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #f5f4f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple Color Emoji', 'Segoe UI Emoji', Arial, sans-serif; }
  body { display: flex; flex-direction: column; padding-bottom: 0; }
  #map-header { background: linear-gradient(135deg, #7a3b1e 0%, #b85c2a 55%, #d4874a 100%); padding: 14px 18px; border-radius: 10px; flex-shrink: 0; margin-bottom: 12px; }
  #map-header h1 { font-size: 14px; font-weight: bold; color: #ffffff; text-transform: uppercase; letter-spacing: 0.04em; }
  #wrap { position: relative; flex: 1 1 auto; min-height: 0; overflow: hidden; border-radius: 10px; }
  #map { position: absolute; inset: 0; background: #cfe0e4; }

  .leaflet-container { background: #cfe0e4; font-family: inherit; outline: none; }
  .leaflet-control-zoom a { color: #6b4422; border-color: #d8d4cc; }
  .leaflet-bar a:hover { background: #faefd8; }

  .country-label-tip { background: none; border: none; box-shadow: none; padding: 0;
    font-size: 12px; font-weight: 700; color: #9a8b78;
    text-shadow: 0 0 3px rgba(253,248,240,0.95), 0 0 3px rgba(253,248,240,0.95), 0 0 3px rgba(253,248,240,0.95); }
  .country-label-tip::before { display: none; }
  .neighbor-label-tip { color: #9a8c70;
    text-shadow: 0 0 3px rgba(232,223,208,0.9), 0 0 3px rgba(232,223,208,0.9), 0 0 3px rgba(232,223,208,0.9); }

  .city-pin { background: #b85c2a; border: 1.8px solid #fdf8f0; border-radius: 50%;
    box-shadow: 0 1px 4px rgba(0,0,0,0.30); transition: transform 0.12s, background 0.12s; }
  .city-pin:hover { background: #7a3b1e; transform: scale(1.45); }
  .pin-name-tip { background: none; border: none; box-shadow: none; padding: 0; margin: 0;
    font-size: 12px; font-weight: 700; color: #5a3115;
    text-shadow: 0 0 3.5px rgba(253,248,240,0.98), 0 0 3.5px rgba(253,248,240,0.98), 0 0 3.5px rgba(253,248,240,0.98); }
  .pin-name-tip::before { display: none; }

  .city-cluster { background: none; }
  .city-cluster div { width: 36px; height: 36px; margin-left: 2px; margin-top: 2px;
    border-radius: 50%; text-align: center; line-height: 36px;
    color: #fdf8f0; font-weight: 700; font-size: 13px;
    background: radial-gradient(circle at 35% 30%, #c9743a 0%, #b85c2a 55%, #7a3b1e 100%);
    border: 2px solid #fdf8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.28); }
  .city-cluster.small div { width: 30px; height: 30px; line-height: 30px; font-size: 12px; }
  .city-cluster.large div { width: 44px; height: 44px; line-height: 44px; font-size: 14px; }

  #legend { position: absolute; top: 14px; right: 14px; z-index: 600; background: rgba(253,248,240,0.92); border-radius: 8px; padding: 7px 12px; font-size: 12px; color: #6b4422; display: flex; align-items: center; gap: 7px; font-weight: 600; box-shadow: 0 1px 6px rgba(0,0,0,0.10); }
  .ldot { width: 11px; height: 11px; border-radius: 50%; background: #b85c2a; border: 2px solid #fdf8f0; flex-shrink: 0; }

  #map-left-stack { position:absolute; left:10px; top:16px; display:flex; flex-direction:column; gap:7px; align-items:flex-start; z-index:600; }
  #left-panel { display:flex; flex-direction:column; background:rgba(247,244,238,0.97); border-radius:10px; padding:7px 6px; box-shadow:0 2px 12px rgba(0,0,0,0.13); backdrop-filter:blur(4px); gap:3px; }

  #zoom-nav { display:flex; flex-direction:column; gap:3px; }
  .zoom-section-label { font-size: 10px; font-weight:700; color:#9a8870; letter-spacing:0.06em; text-transform:uppercase; padding:1px 3px 0; }
  .zn { padding:3px 9px; border-radius:13px; border:1.5px solid #d8d4cc; background:#f5f4f0; color:#6b4422; font-size: 11px; font-weight:600; text-decoration:none; white-space:nowrap; display:block; cursor:pointer; transition:background .12s,border-color .12s; }
  .zn:hover { background:#faefd8; border-color:#8a6c1a; }
  .zn.zn-on { background:linear-gradient(135deg,#7a3b1e 0%,#b85c2a 55%,#d4874a 100%); color:#fdf8f0; border-color:#b85c2a; }

  .panel-divider { height:1px; background:#ddd9d0; margin:3px 0; }

  #region-nav { display:flex; flex-direction:column; gap:4px; }
  .rn { padding:5px 14px; border-radius:20px; border:1.5px solid #d8d4cc; background:#f5f4f0; color:#6b4422; font-size: 12px; font-weight:600; text-decoration:none; white-space:nowrap; display:flex; align-items:center; gap:5px; transition:background .12s,border-color .12s; }
  .rn::before { content:''; width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .rn:hover { background:#faefd8; border-color:#8a6c1a; }
  .rn-eu  { background:#fde8e8 !important; border-color:#f0a0a0 !important; color:#a02020 !important; }
  .rn-eu::before  { background:#dc4444; }
  .rn-na  { background:#fdf0e4 !important; border-color:#f0b878 !important; color:#8a3a08 !important; }
  .rn-na::before  { background:#e87830; }
  .rn-cb  { background:#d8efe9 !important; border-color:#7fcabd !important; color:#0c6b5d !important; }
  .rn-cb::before  { background:#14a18d; }
  .rn-as  { background:#fdf5d8 !important; border-color:#e8d060 !important; color:#7a5000 !important; }
  .rn-as::before  { background:#c8940a; }
  .rn-af  { background:#e4f5e8 !important; border-color:#90d0a0 !important; color:#1a6030 !important; }
  .rn-af::before  { background:#2ea84e; }
  .rn-sa  { background:#e4eef8 !important; border-color:#90b8e8 !important; color:#1a3a8b !important; }
  .rn-sa::before  { background:#3a74d4; }
  .rn-oc  { background:#f0e8f8 !important; border-color:#c090e0 !important; color:#4a1880 !important; }
  .rn-oc::before  { background:#8050d0; }
  .rn.rn-on { background:linear-gradient(135deg,#7a3b1e 0%,#b85c2a 55%,#d4874a 100%) !important; color:#fdf8f0 !important; border-color:#b85c2a !important; }
  .rn.rn-on::before { background:rgba(255,255,255,0.55); }

  #left-panel .zn, #left-panel .rn { width: 100%; }
  #zoom-nav .zn { text-align: center; }
  .zn:focus:not(:focus-visible), .rn:focus:not(:focus-visible) { outline: none; }

@media (max-width: 640px) {
  #map-left-stack {
    position: absolute; left: 0; right: 0; bottom: 0; top: auto;
    transform: none; flex-direction: column; align-items: stretch;
    gap: 0; padding: 0; z-index: 600;
  }
  #left-panel {
    flex-direction: row; align-items: center; gap: 8px;
    overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
    background: rgba(247,244,238,0.97); backdrop-filter: blur(6px);
    border-radius: 0; border-top: 1px solid #d8d4cc;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.14);
    padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
  }
  #left-panel::-webkit-scrollbar { display: none; }
  #zoom-nav { flex-direction: row; align-items: center; gap: 6px; flex-shrink: 0; }
  .zoom-section-label { font-size: 10px; padding: 0 2px 0 0; flex-shrink: 0; }
  .panel-divider { width: 1px; height: 22px; margin: 0 4px; flex-shrink: 0; align-self: center; }
  #region-nav { flex-direction: row !important; gap: 6px; flex-shrink: 0; }
  .zn, .rn { flex-shrink: 0; width: auto; padding: 7px 13px; font-size: 12px; white-space: nowrap; }
  .rn::before { width: 8px; height: 8px; }
  #legend { display: none; }
  .leaflet-control-zoom { margin-bottom: 70px !important; }
}
</style>

<body>
<div id="toolbar-mount" data-depth="2" data-maxwidth="1400" data-no-footnote="1"></div>
<script src="../../assets/toolbar.js?v=39"></script>

<div id="wrap">
  <div id="map"></div>
  <div id="legend"><div class="ldot"></div> Guide available — tap a pin</div>
  <div id="map-left-stack">
    <div id="left-panel">
      <div id="zoom-nav">
        <span class="zoom-section-label">Zoom</span>
        <a class="zn zn-on" data-key="all"    href="#">Mainland</a>
        <a class="zn"       data-key="alaska" href="#">Alaska</a>
        <a class="zn"       data-key="hawaii" href="#">Hawaii</a>
      </div>
      <div class="panel-divider"></div>
      <div id="region-nav">
        <a class="rn rn-eu" href="Europe%20Map.html">Europe</a>
        <a class="rn rn-na rn-on" href="US%20Map.html">N. America</a>
        <a class="rn rn-cb" href="Caribbean%20Map.html">Caribbean</a>
        <a class="rn rn-as" href="Asia%20Map.html">Asia</a>
        <a class="rn rn-af" href="Africa%20Map.html">Africa</a>
        <a class="rn rn-sa" href="South%20America%20Map.html">S. America</a>
        <a class="rn rn-oc" href="Oceania%20Map.html">Oceania</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const STATES = {
  1:'Alabama',2:'Alaska',4:'Arizona',5:'Arkansas',6:'California',
  8:'Colorado',9:'Connecticut',10:'Delaware',11:'D.C.',12:'Florida',
  13:'Georgia',15:'Hawaii',16:'Idaho',17:'Illinois',18:'Indiana',
  19:'Iowa',20:'Kansas',21:'Kentucky',22:'Louisiana',23:'Maine',
  24:'Maryland',25:'Massachusetts',26:'Michigan',27:'Minnesota',
  28:'Mississippi',29:'Missouri',30:'Montana',31:'Nebraska',32:'Nevada',
  33:'New Hampshire',34:'New Jersey',35:'New Mexico',36:'New York',
  37:'North Carolina',38:'North Dakota',39:'Ohio',40:'Oklahoma',
  41:'Oregon',42:'Pennsylvania',44:'Rhode Island',45:'South Carolina',
  46:'South Dakota',47:'Tennessee',48:'Texas',49:'Utah',50:'Vermont',
  51:'Virginia',53:'Washington',54:'West Virginia',55:'Wisconsin',56:'Wyoming'
};
const SHORT = {
  'Connecticut':'CT','Delaware':'DE','D.C.':'DC','Hawaii':'HI',
  'Massachusetts':'MA','Maryland':'MD','New Hampshire':'NH',
  'New Jersey':'NJ','Rhode Island':'RI','Vermont':'VT'
};
const COLORS = {
  1:'#cda36e',2:'#c98f63',4:'#d8be8f',5:'#bd8a5e',6:'#c7a877',
  8:'#b89066',9:'#d2b07e',10:'#c0905f',11:'#cbb083',12:'#b58a5c',
  13:'#d0a96f',15:'#c19064',16:'#cda36e',17:'#c98f63',18:'#d8be8f',
  19:'#bd8a5e',20:'#c7a877',21:'#b89066',22:'#d2b07e',23:'#c0905f',
  24:'#cbb083',25:'#b58a5c',26:'#d0a96f',27:'#c19064',28:'#cda36e',
  29:'#c98f63',30:'#d8be8f',31:'#bd8a5e',32:'#c7a877',33:'#b89066',
  34:'#d2b07e',35:'#c0905f',36:'#cbb083',37:'#b58a5c',38:'#d0a96f',
  39:'#c19064',40:'#cda36e',41:'#c98f63',42:'#d8be8f',44:'#bd8a5e',
  45:'#c7a877',46:'#b89066',47:'#d2b07e',48:'#c0905f',49:'#cbb083',
  50:'#b58a5c',51:'#d0a96f',53:'#c19064',54:'#cda36e',55:'#c98f63',
  56:'#d8be8f'
};
function darken(hex,f){var n=parseInt(hex.slice(1),16);var r=Math.round(((n>>16)&255)*f),g=Math.round(((n>>8)&255)*f),b=Math.round((n&255)*f);return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}
const LARGE_STATES = new Set([6,8,4,48,30,32,35,41,53,16,27,31,38,46,56,20,19,25,22,13,12,47]);

const PINS = [
  ['Alaska',       -153.00, 64.20, '../../Guides/Alaska/alaska_v1.html'],
  ['Atlanta',      -84.39, 33.77, '../../Guides/Atlanta/atlanta_v1.html'],
  ['Austin',       -97.74, 30.27, '../../Guides/Austin/austin_v1.html'],
  ['Bend',         -121.31, 44.06, '../../Guides/Bend/bend_v2.html'],
  ['Big Island',   -155.50, 19.60, '../../Guides/Big Island/big_island_v1.html'],
  ['Maui',         -156.33, 20.80, '../../Guides/Maui/maui_v1.html'],
  ['Kauai',        -159.50, 22.05, '../../Guides/Kauai/kauai_v1.html'],
  ['Oahu',         -157.85, 21.30, '../../Guides/Oahu/oahu_v1.html'],
  ['Boston',        -71.06, 42.36, '../../Guides/Boston/boston_v1.html'],
  ['Chicago',       -87.63, 41.88, '../../Guides/Chicago/chicago_v1.html'],
  ['Los Angeles',  -118.24, 34.05, '../../Guides/Los Angeles/los_angeles_v1.html'],
  ['Miami',         -80.19, 25.77, '../../Guides/Miami/miami_v1.html'],
  ['New York',      -74.00, 40.71, '../../Guides/New York/new_york_v1.html'],
  ['Orlando',       -81.38, 28.54, '../../Guides/Orlando/orlando_v1.html'],
  ['Palm Desert',  -116.37, 33.72, '../../Guides/Palm Desert/palm_desert_v1.html'],
  ['Palo Alto',    -122.14, 37.44, '../../Guides/Palo Alto/palo_alto_v6.html'],
  ['Pasadena',     -118.14, 34.15, '../../Guides/Pasadena/pasadena_v5.html'],
  ['San Diego',    -117.16, 32.72, '../../Guides/San Diego/san_diego_v1.html'],
  ['San Francisco',-122.42, 37.77, '../../Guides/San Francisco/sf_v3.html'],
  ['Scottsdale',   -111.93, 33.49, '../../Guides/Scottsdale/scottsdale_v1.html'],
  ['Seattle',      -122.33, 47.61, '../../Guides/Seattle/seattle_v1.html'],
  ['Montreal',   -73.57, 45.50, '../../Guides/Montreal/montreal_v1.html'],
  ['Quebec City',-71.21, 46.81, '../../Guides/Quebec City/quebec_city_v1.html'],
  ['Toronto',    -79.38, 43.65, '../../Guides/Toronto/toronto_v1.html'],
  ['Vancouver',  -123.12, 49.28, '../../Guides/Vancouver/vancouver_v1.html'],
];

/* ── Zoom bounds in Leaflet order [[south,west],[north,east]] ── */
const SUBREGIONS = {
  all:    [[24, -126], [50, -66]],     // lower 48 + southern Canada cities
  alaska: [[54, -170], [71.5, -129]],
  hawaii: [[18.4, -160.8], [22.6, -154.0]],
};

const map = L.map('map', {
  zoomControl: false, attributionControl: false,
  minZoom: 3, maxZoom: 11, worldCopyJump: false, zoomSnap: 0.25,
});
L.control.zoom({ position: 'bottomright' }).addTo(map);
map.createPane('countryLabels');
map.getPane('countryLabels').style.zIndex = 590;
map.getPane('countryLabels').style.pointerEvents = 'none';

function fitOpts() {
  return (window.innerWidth <= 640)
    ? { paddingTopLeft: [12, 12], paddingBottomRight: [12, 86] }
    : { paddingTopLeft: [210, 14], paddingBottomRight: [14, 14] };
}
map.fitBounds(SUBREGIONS.all, fitOpts());

/* ── Country/state polygons (GeoJSON-only, no tiles) ── */
Promise.all([
  fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(r => r.json()),
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r => r.json()),
]).then(([us, world]) => {
  // Neighbor backdrop: Canada (124) + Mexico (484), muted, behind states.
  const wf = topojson.feature(world, world.objects.countries);
  const neigh = { type: 'FeatureCollection', features: wf.features.filter(f => +f.id === 124 || +f.id === 484) };
  const neighLayer = L.geoJSON(neigh, {
    interactive: false,
    style: { fillColor: '#cdbfa3', fillOpacity: 1, color: '#a89a7e', weight: 0.6 },
    onEachFeature: (f, lyr) => {
      lyr.bindTooltip(+f.id === 124 ? 'Canada' : 'Mexico', {
        permanent: true, direction: 'center',
        className: 'country-label-tip neighbor-label-tip',
        pane: 'countryLabels', interactive: false,
      });
    },
  }).addTo(map);

  // States. Alaska's Aleutians cross the antimeridian (+170..+180) — clamp those
  // wrapped vertices to ~ -169 so Mercator doesn't smear Alaska across the map.
  const sf = topojson.feature(us, us.objects.states);
  const fixCoords = c => (typeof c[0] === 'number') ? [(c[0] > 0 ? -169 : c[0]), c[1]] : c.map(fixCoords);
  sf.features.forEach(f => { if (+f.id === 2) f.geometry.coordinates = fixCoords(f.geometry.coordinates); });

  const stateLayer = L.geoJSON(sf, {
    style: f => ({
      fillColor: COLORS[+f.id] || '#c2a878', fillOpacity: 1,
      color: darken(COLORS[+f.id] || '#c2a878', 0.6), weight: 0.8,
    }),
    onEachFeature: (f, lyr) => {
      lyr.on('mouseover', () => lyr.setStyle({ fillColor: darken(COLORS[+f.id] || '#c2a878', 1.12) }));
      lyr.on('mouseout',  () => lyr.setStyle({ fillColor: COLORS[+f.id] || '#c2a878' }));
      if (LARGE_STATES.has(+f.id)) {
        const nm = STATES[+f.id];
        lyr.bindTooltip(SHORT[nm] || nm, {
          permanent: true, direction: 'center', className: 'country-label-tip',
          pane: 'countryLabels', interactive: false,
        });
      }
    },
  }).addTo(map);

  neighLayer.bringToBack();
  buildPins();
}).catch(() => {
  document.getElementById('map').insertAdjacentHTML('beforeend',
    '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#6b4422;font-size:15px;text-align:center;padding:20px;">Could not load map data — please check your internet connection.</div>');
});

/* ── Pins + clustering ── */
function buildPins() {
  const cluster = L.markerClusterGroup({
    maxClusterRadius: 44, spiderfyOnMaxZoom: true,
    showCoverageOnHover: false, disableClusteringAtZoom: 9,
    iconCreateFunction: c => {
      const n = c.getChildCount();
      const cls = n < 5 ? 'small' : (n < 12 ? '' : 'large');
      return L.divIcon({ html: '<div>' + n + '</div>', className: 'city-cluster ' + cls, iconSize: [40, 40] });
    },
  });
  const pinIcon = L.divIcon({
    className: '', html: '<div class="city-pin" style="width:13px;height:13px;"></div>',
    iconSize: [13, 13], iconAnchor: [6.5, 6.5],
  });
  PINS.forEach(p => {
    const m = L.marker([p[2], p[1]], { icon: pinIcon, title: p[0] });
    m.bindTooltip(p[0], { permanent: true, direction: 'top', offset: [0, -8], className: 'pin-name-tip', interactive: false });
    const href = p[3];
    m.on('click', () => { window.location.href = href; });
    cluster.addLayer(m);
  });
  map.addLayer(cluster);
}

/* ── Zoom shortcut buttons ── */
document.querySelectorAll('.zn').forEach(el => {
  el.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('.zn').forEach(z => z.classList.remove('zn-on'));
    el.classList.add('zn-on');
    map.flyToBounds(SUBREGIONS[el.dataset.key], Object.assign({ duration: 0.5 }, fitOpts()));
  });
});
</script>
</body>
</html>
