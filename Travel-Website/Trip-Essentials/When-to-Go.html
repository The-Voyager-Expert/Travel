<style>

.wtg-opts { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
.wtg-seg { display: inline-flex; border: 1px solid var(--border2,#e6e2da); border-radius: 6px; overflow: hidden; }
.wtg-seg button { border: none; cursor: pointer; padding: 8px 13px; font-family: var(--font);

.wtg-seg button.on { background: #b85c2a; color: #fff; }
.wtg-sort { padding: 8px 10px; border: 1px solid var(--border2,#e6e2da); border-radius: 6px;

.wtg-spacer { flex: 1; }

.wtg-tier { margin: 20px 0 0; }
.wtg-tier-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.wtg-tier-icon { font-size: 18px; line-height: 1; }

.wtg-tier-count { font-size: 11px; color: var(--muted,#6a6660); }

a.wtg-card { display: block; text-decoration: none; color: inherit; cursor: pointer;

.wtg-city { font-size: var(--fs-body,14px); font-weight: 700; color: #1a1917;

.wtg-city-arrow { font-size: 11px; color: var(--muted,#6a6660); opacity: 0.55; flex-shrink: 0; }

    var month = new Date().getMonth();
    var sort = 'tier';

    var monthsEl = document.getElementById('wtg-months');
    monthsEl.innerHTML = MONTHS.map(function (m, i) {
      return '<button type="button" class="wtg-mon" data-m="' + i + '">' + m + '</button>';
    }).join('');

    function paintMonths() {
      [].forEach.call(monthsEl.children, function (b, i) { b.classList.toggle('on', i === month); });
    }
    monthsEl.addEventListener('click', function (e) {
      var b = e.target.closest('.wtg-mon'); if (!b) return;
      month = parseInt(b.dataset.m, 10); paintMonths(); render();
    });

    var unitEl = document.getElementById('wtg-unit');
    function paintUnit() {
      [].forEach.call(unitEl.children, function (b) { b.classList.toggle('on', b.dataset.u === unit()); });
    }
    unitEl.addEventListener('click', function (e) {
      var b = e.target.closest('button'); if (!b) return;
      setUnit(b.dataset.u); paintUnit(); render();
    });

    var sortEl = document.getElementById('wtg-sort');
    sortEl.addEventListener('change', function () { sort = sortEl.value; render(); });

    function strip(rec) {
      var vals = rec.hi.concat(rec.lo);
      var lo0 = Math.min.apply(null, vals), hi0 = Math.max.apply(null, vals);
      var span = (hi0 - lo0) || 1, H = 34, out = '';
      for (var j = 0; j < 12; j++) {
        var top = (1 - (rec.hi[j] - lo0) / span) * H;
        var bot = (1 - (rec.lo[j] - lo0) / span) * H;
        var bh = Math.max(2, bot - top);
        out += '<div class="wtg-bar"><span style="top:' + top + 'px;height:' + bh + 'px;background:' +
          (j === month ? '#b85c2a' : 'rgba(184,92,42,.28)') + ';"></span></div>';
      }
      return '<div class="wtg-strip">' + out + '</div>';
    }

    function card(k) {
      var rec = CLIM[k];
      var href = GUIDE_LINKS[k];
      var tag = href ? 'a' : 'div';
      var attrs = href ? ' class="wtg-card" href="' + href + '"' : ' class="wtg-card"';
      var arrow = href ? '<span class="wtg-city-arrow">→</span>' : '';
      var countryLine = CITY_COUNTRIES[k] ? '<div class="wtg-country">' + CITY_COUNTRIES[k] + '</div>' : '';
      var rightSlot = '<span style="display:flex;flex-direction:column;align-items:flex-end;gap:1px;flex-shrink:0;">' +
        countryLine + (arrow ? '<span class="wtg-city-arrow" style="align-self:flex-end;">→</span>' : '') + '</span>';
      var rainHtml = '';
      if (rec.rain && rec.rd) {
        rainHtml = '<div class="wtg-rain">' +
          '<div><span class="wtg-rain-val">' + (rec.rain[month] || 0) + '</span><span class="wtg-rain-lbl"> mm</span></div>' +
          '<div><span class="wtg-rain-val">' + (rec.rd[month] || 0) + '</span><span class="wtg-rain-lbl"> rainy days</span></div>' +
        '</div>';
      }
      return '<' + tag + attrs + '>' +
        '<div class="wtg-city"><span>' + (rec.city || k) + '</span>' + rightSlot + '</div>' +
        '<div class="wtg-temps">' +
          '<div><div class="wtg-hi">' + conv(rec.hi[month]) + '°</div><div class="wtg-tlab">High</div></div>' +
          '<div><div class="wtg-lo">' + conv(rec.lo[month]) + '°</div><div class="wtg-tlab">Low</div></div>' +
        '</div>' + rainHtml + strip(rec) +
      '</' + tag + '>';
    }

    function tierFor(hiC) {
      for (var i = 0; i < TIERS.length; i++) {
        if (hiC >= TIERS[i].lo && hiC < TIERS[i].hi) return TIERS[i];
      }
      return TIERS[TIERS.length - 1];
    }

    function sortFn(a, b) {
      var ra = CLIM[a], rb = CLIM[b];
      if (sort === 'warm') return rb.hi[month] - ra.hi[month];
      if (sort === 'cool') return ra.hi[month] - rb.hi[month];
      if (sort === 'dry') {
        var da = (ra.rain ? ra.rain[month] : 999), db = (rb.rain ? rb.rain[month] : 999);
        return da - db;
      }
      if (sort === 'az') return (ra.city || a).localeCompare(rb.city || b);
      return ra.hi[month] - rb.hi[month];
    }

    function render() {
      var summaryEl = document.getElementById('wtg-summary');
      summaryEl.innerHTML = '<b>' + keys.length + '</b> destinations in ' + MONTHS_LONG[month];

      if (sort === 'tier') {
        var buckets = {};
        TIERS.forEach(function (t) { buckets[t.key] = []; });
        keys.forEach(function (k) {
          var t = tierFor(CLIM[k].hi[month]);
          buckets[t.key].push(k);
        });

        var html = '';
        TIERS.forEach(function (t) {
          var items = buckets[t.key];
          if (!items.length) return;
          items.sort(function (a, b) { return CLIM[a].hi[month] - CLIM[b].hi[month]; });
          var loShow = conv(t.lo), hiShow = t.hi >= 50 ? conv(45) + '+' : conv(t.hi);
          var band = loShow + '°–' + hiShow + '°' + unit();
          html += '<div class="wtg-tier">' +
            '<div class="wtg-tier-head">' +
              '<span class="wtg-tier-icon">' + t.icon + '</span>' +
              '<span class="wtg-tier-label">' + t.label + '</span>' +
              '<span class="wtg-tier-count">' + items.length + '</span>' +
              '<span class="wtg-tier-band">' + band + '</span>' +
            '</div>' +
            '<div class="wtg-grid">' + items.map(card).join('') + '</div>' +
          '</div>';
        });
        resultsEl.innerHTML = html;
      } else {
        var sorted = keys.slice().sort(sortFn);
        resultsEl.innerHTML = '<div class="wtg-grid" style="margin-top:14px;">' + sorted.map(card).join('') + '</div>';
      }
    }

    paintMonths(); paintUnit(); render();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();
}());
