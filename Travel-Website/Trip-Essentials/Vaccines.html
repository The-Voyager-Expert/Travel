<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../assets/_travel_style.css">
<link rel="stylesheet" href="../assets/mobile.css?v=50">
<title>Vaccines</title>
<style>
:root {
  --bg:      #f5f4f0;
  --surface: #ffffff;
  --border:  #e6e2da;
  --text:    #1a1917;
  --muted:   #6a6660;
  --accent:  #B8860B;
  --req-bg:  #fff8e6;
  --req-bd:  #f0c040;
  --rec-bg:  #eef6ee;
  --rec-bd:  #6db96d;
  --con-bg:  #f0f4ff;
  --con-bd:  #93a8d8;
  --med-bg:  #fff0f0;
  --med-bd:  #e08080;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  font-size: 14px; line-height: 1.5; min-height: 100vh; padding-bottom: 80px;
}

/* ── Search ── */
.search-wrap { display: flex; justify-content: center; margin-bottom: 16px; }
#vc-search {
  width: 360px; padding: 11px 18px;
  border: 1.5px solid #e6e2da; border-radius: 6px;
  background: #fff; font-family: inherit; font-size: 15px; color: #1a1917;
  outline: none; transition: border-color .15s, box-shadow .15s;
}
#vc-search::placeholder { color: #A8895A; }
#vc-search:focus { border-color: #B8860B; box-shadow: 0 0 0 3px rgba(184,134,11,.12); }

/* ── Region pills ── */
.region-bar {
  display: flex; flex-wrap: wrap; gap: 6px;
  justify-content: center; margin-bottom: 24px;
}
.rpill {
  padding: 6px 14px; border-radius: 6px; border: 1.5px solid var(--border);
  background: var(--surface); font-size: 13px; color: var(--muted);
  cursor: pointer; transition: all .15s; white-space: nowrap; user-select: none;
}
.rpill:hover { border-color: var(--accent); color: var(--text); }
.rpill.active {
  background: var(--accent); border-color: var(--accent);
  color: #fff; font-weight: 600;
}

/* ── Destination panel ── */
#dest-panel { margin-bottom: 28px; }
#dest-panel.hidden { display: none; }
.dest-header {
  font-size: 15px; font-weight: 700; color: var(--text);
  margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.dest-header span { color: var(--muted); font-weight: 400; font-size: 13px; margin-left: 8px; }

/* ── Vaccine cards ── */
.vc-grid { display: flex; flex-direction: column; gap: 8px; }
.vc-card {
  display: grid; grid-template-columns: 200px 1fr; gap: 0 16px;
  border-radius: 8px; padding: 12px 15px; border-left: 4px solid;
}
.vc-card.req  { background: var(--req-bg); border-color: var(--req-bd); }
.vc-card.rec  { background: var(--rec-bg); border-color: var(--rec-bd); }
.vc-card.con  { background: var(--con-bg); border-color: var(--con-bd); }
.vc-card.med  { background: var(--med-bg); border-color: var(--med-bd); }
.vc-card.base { background: var(--surface); border-color: var(--border); border-left-width: 1px; border-radius: 8px; }

.vc-left { display: flex; flex-direction: column; gap: 3px; }
.vc-name { font-size: 13px; font-weight: 700; color: var(--text); }
.vc-badge {
  display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; padding: 2px 7px; border-radius: 4px; width: fit-content;
}
.req .vc-badge  { background: #f0c040; color: #5a3a00; }
.rec .vc-badge  { background: #6db96d; color: #fff; }
.con .vc-badge  { background: #93a8d8; color: #fff; }
.med .vc-badge  { background: #e08080; color: #fff; }
.base .vc-badge { background: #d0cdc7; color: #4a4845; }

.vc-note { font-size: 13px; color: var(--muted); line-height: 1.5; }
.vc-note strong { color: var(--text); }

/* ── Timing note ── */
.timing-bar {
  margin-top: 14px; padding: 10px 14px; border-radius: 6px;
  background: var(--surface); border: 1px solid var(--border);
  font-size: 12px; color: var(--muted);
}
.timing-bar strong { color: var(--text); }

/* ── Routine section ── */
.section-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase;
  color: var(--muted); margin: 24px 0 10px;
}
.routine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
.routine-chip {
  background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  padding: 9px 12px; font-size: 12px; font-weight: 600; color: var(--text);
}
.routine-chip span { display: block; font-size: 11px; font-weight: 400; color: var(--muted); margin-top: 2px; }

/* ── Placeholder (no region selected) ── */
#prompt-text {
  text-align: center; color: var(--muted); font-size: 13px;
  padding: 32px 0 8px;
}

/* ── Search results ── */
.search-row { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 15px; display: none; }
.search-row.match { display: block; }
.sr-name { font-size: 13px; font-weight: 700; }
.sr-dest { font-size: 11px; color: var(--muted); margin-top: 1px; }
.sr-note { font-size: 13px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
#search-panel { display: none; }
#search-panel.active { display: block; }
#main-ui.hidden { display: none; }
#no-results { display: none; color: var(--muted); font-size: 13px; margin-bottom: 12px; text-align: center; }

@media (max-width: 600px) {
  #vc-search { width: 100%; }
  .vc-card { grid-template-columns: 1fr; gap: 4px 0; }
  .region-bar { justify-content: flex-start; }
}
</style>
</head>
<body>
<div class="wrap">

  <div id="toolbar-mount" data-depth="1" data-maxwidth="760"></div>
  <div class="page-header"><h1>Vaccines</h1></div>

  <!-- Search -->
  <div class="search-wrap">
    <input type="text" id="vc-search" placeholder="🔍  Search vaccine or destination" autocomplete="off">
  </div>
  <p id="no-results">Nothing matches your search.</p>

  <!-- Search results (shown when typing) -->
  <div id="search-panel">
    <div id="search-rows"></div>
  </div>

  <!-- Main UI (region picker + cards) -->
  <div id="main-ui">

    <!-- Region pills -->
    <div class="region-bar" id="region-bar">
      <div class="rpill active" data-region="all">All destinations</div>
      <div class="rpill" data-region="africa">Sub-Saharan Africa</div>
      <div class="rpill" data-region="sea">Southeast Asia</div>
      <div class="rpill" data-region="south-asia">South Asia</div>
      <div class="rpill" data-region="latin">Latin America</div>
      <div class="rpill" data-region="caribbean">Caribbean</div>
      <div class="rpill" data-region="mideast">Middle East</div>
      <div class="rpill" data-region="east-asia">East Asia</div>
      <div class="rpill" data-region="europe">Western Europe</div>
    </div>

    <!-- Destination-specific panel -->
    <div id="dest-panel" class="hidden"></div>

    <!-- All-destinations / routine always shown -->
    <div id="all-panel"></div>

  </div><!-- /main-ui -->

</div><!-- /wrap -->

<script>
/* ── Data ── */
var REGIONS = {
  africa: {
    label: 'Sub-Saharan Africa',
    countries: 'Kenya, Tanzania, Ghana, Senegal, Rwanda, Uganda, Zambia, Zimbabwe, and most of sub-Saharan Africa',
    cards: [
      { type:'req', name:'Yellow Fever', badge:'Required for entry', note:'<strong>Proof of vaccination required</strong> to enter most sub-Saharan African countries, and on arrival from endemic countries. Given at certified travel clinics only. One dose — lasts for life.' },
      { type:'rec', name:'Typhoid', badge:'Recommended', note:'Risk is high across the region, especially outside major hotels and tourist restaurants. Oral vaccine (4 doses over 1 week) or single injection — get the injection at least 2 weeks before travel.' },
      { type:'rec', name:'Hepatitis A', badge:'Recommended', note:'Spread through contaminated food and water — common risk in the region. Two doses provide long-term (20+ year) protection. First dose can be given as close as 2 weeks before departure.' },
      { type:'med', name:'Malaria (medication)', badge:'Prescription required', note:'No vaccine. Prescription antimalarials (atovaquone-proguanil, doxycycline, or mefloquine) are essential for most of sub-Saharan Africa. See a travel doctor at least 4–6 weeks before departure. Use DEET repellent and long sleeves at dusk.' },
      { type:'con', name:'Rabies', badge:'Consider if adventuring', note:'Recommended for safari, camping, cycling, or any trip where you\'ll be far from urban medical care. Pre-exposure series is 3 doses over 3 weeks — start at least 4 weeks before travel.' },
    ]
  },
  sea: {
    label: 'Southeast Asia',
    countries: 'Thailand, Vietnam, Indonesia, Cambodia, Laos, Myanmar, Philippines, Malaysia',
    cards: [
      { type:'rec', name:'Hepatitis A', badge:'Recommended', note:'Spread through food and water across the region. Two doses provide long-term protection. First dose can be given as close as 2 weeks before departure.' },
      { type:'rec', name:'Typhoid', badge:'Recommended', note:'High risk if eating at local markets or outside tourist restaurants. Injection preferred for travel to high-risk areas — single dose, effective in 2 weeks.' },
      { type:'con', name:'Japanese Encephalitis', badge:'Consider for rural stays', note:'Recommended if staying in rural areas for more than a month, spending nights outdoors, or traveling outside tourist routes. Urban risk is low. 2-dose vaccine series.' },
      { type:'con', name:'Malaria (medication)', badge:'Consider for rural areas', note:'Risk is low in most cities and major tourist destinations. Prescription antimalarials recommended for rural areas of Myanmar, parts of Indonesia, and border regions. Confirm with a travel clinic based on your specific itinerary.' },
      { type:'con', name:'Rabies', badge:'Consider if adventuring', note:'Recommended for adventure travel, hiking, cycling, or long stays where emergency care is not readily accessible. Pre-exposure series is 3 doses over 3 weeks.' },
    ]
  },
  'south-asia': {
    label: 'South Asia',
    countries: 'India, Nepal, Sri Lanka, Bangladesh, Pakistan',
    cards: [
      { type:'rec', name:'Typhoid', badge:'Recommended', note:'India and Nepal have some of the highest typhoid rates worldwide. Recommended for all travelers regardless of hotel tier — contaminated food and water risk is significant. Single injection or 4-dose oral course.' },
      { type:'rec', name:'Hepatitis A', badge:'Recommended', note:'Risk is high across the region. Two doses provide long-term protection. First dose can be given close to departure.' },
      { type:'con', name:'Japanese Encephalitis', badge:'Consider for rural stays', note:'Recommended for extended rural travel or outdoor activities, particularly in Nepal and parts of India. Urban tourist stays have low risk. 2-dose vaccine series.' },
      { type:'con', name:'Malaria (medication)', badge:'Consider for rural areas', note:'Risk varies significantly by area. Most major cities have low risk. Prescription antimalarials recommended for rural parts of India, Nepal\'s lower elevations, and parts of Pakistan. Verify with a travel clinic.' },
      { type:'con', name:'Rabies', badge:'Consider if adventuring', note:'Significant dog and monkey populations across the region make bite risk higher than average. Recommended for rural travel, trekking, or trips away from major cities.' },
    ]
  },
  latin: {
    label: 'Latin America',
    countries: 'Mexico, Colombia, Peru, Brazil, Ecuador, Bolivia, Argentina, Costa Rica, Panama, and most of Central and South America',
    cards: [
      { type:'rec', name:'Hepatitis A', badge:'Recommended', note:'Spread through food and water throughout the region. Risk is highest outside major resort areas. Two doses provide long-term protection.' },
      { type:'rec', name:'Typhoid', badge:'Recommended', note:'Recommended for most of Latin America, especially Mexico, Peru, Bolivia, and Central America — particularly if eating outside tourist restaurants.' },
      { type:'con', name:'Yellow Fever', badge:'Required for some countries', note:'Required for entry to Bolivia and parts of Brazil when arriving from endemic countries. Also recommended for travel to jungle regions of Peru, Ecuador, Colombia, and the Amazon basin. Check entry requirements for your specific route.' },
      { type:'con', name:'Malaria (medication)', badge:'Consider for jungle/rural areas', note:'Risk is low in most cities and coastal areas. Prescription antimalarials recommended for travel to the Amazon basin, jungle regions, and rural parts of Central America. Confirm with a travel clinic based on your itinerary.' },
      { type:'con', name:'Rabies', badge:'Consider if adventuring', note:'Recommended for adventure travel, hiking, or travel to remote areas far from medical care. Pre-exposure series is 3 doses.' },
    ]
  },
  caribbean: {
    label: 'Caribbean',
    countries: 'Dominican Republic, Jamaica, Cuba, Barbados, The Bahamas, Trinidad, Puerto Rico, and most Caribbean islands',
    cards: [
      { type:'rec', name:'Hepatitis A', badge:'Recommended', note:'Risk is present across the Caribbean, especially outside large resorts. Two doses provide long-term protection.' },
      { type:'con', name:'Typhoid', badge:'Consider', note:'Recommended for travel to Haiti and the Dominican Republic, or if eating at local restaurants away from resort food service.' },
    ]
  },
  mideast: {
    label: 'Middle East',
    countries: 'Jordan, Israel, Egypt, Morocco, UAE, Saudi Arabia, Turkey, Lebanon',
    cards: [
      { type:'rec', name:'Hepatitis A', badge:'Recommended', note:'Spread through food and water. Risk is present across the region. Two doses provide long-term protection.' },
      { type:'con', name:'Typhoid', badge:'Consider', note:'Recommended for Egypt and Morocco, especially if eating outside tourist restaurants. Lower risk in the Gulf states and Israel.' },
    ]
  },
  'east-asia': {
    label: 'East Asia',
    countries: 'Japan, China, South Korea, Taiwan, Hong Kong',
    cards: [
      { type:'rec', name:'Hepatitis A', badge:'Recommended', note:'Standard recommendation for travel to China. Japan, South Korea, and Taiwan are lower risk but vaccination remains advisable for extended travel.' },
      { type:'con', name:'Japanese Encephalitis', badge:'Consider for rural stays', note:'Low risk in urban Japan and most tourist routes. Recommended for extended rural travel in China or rural Japan, or for stays involving significant outdoor activity. 2-dose vaccine series.' },
    ]
  },
  europe: {
    label: 'Western Europe',
    countries: 'France, Italy, Spain, Germany, UK, Portugal, Greece, Netherlands, and most of Western and Northern Europe',
    cards: [
      { type:'rec', name:'Hepatitis A', badge:'Recommended', note:'Standard recommendation for most international travel. Risk in Western Europe is low but vaccination remains advisable, particularly for extended trips or adventure travel.' },
    ]
  }
};

var ROUTINE = [
  { name:'MMR', sub:'Measles · Mumps · Rubella' },
  { name:'Flu', sub:'Annual — all travelers' },
  { name:'COVID-19', sub:'Up to date before travel' },
  { name:'Tdap', sub:'Tetanus · Diphtheria · Pertussis' },
  { name:'Chickenpox', sub:'If not previously vaccinated' },
  { name:'Hepatitis B', sub:'Most international travel' },
];

/* ── Render helpers ── */
function cardHTML(c) {
  return '<div class="vc-card ' + c.type + '">' +
    '<div class="vc-left"><div class="vc-name">' + c.name + '</div><div class="vc-badge">' + c.badge + '</div></div>' +
    '<div class="vc-note">' + c.note + '</div>' +
    '</div>';
}

function renderAll() {
  var html = '<div class="section-label">Recommended for all international travel</div><div class="vc-grid">';
  html += cardHTML({ type:'rec', name:'Hepatitis A', badge:'Recommended', note:'Spread through contaminated food and water worldwide. Recommended for travel to most non-Western destinations. Two doses provide 20+ years of protection.' });
  html += cardHTML({ type:'rec', name:'Hepatitis B', badge:'Recommended', note:'Recommended for most international travel, especially longer trips or destinations with limited medical infrastructure. Spread through blood and bodily fluids. 3-dose series; faster 2-dose schedule available.' });
  html += '</div>';
  html += '<div class="section-label">Routine vaccines — required for all destinations</div><div class="routine-grid">';
  ROUTINE.forEach(function(r) {
    html += '<div class="routine-chip">' + r.name + '<span>' + r.sub + '</span></div>';
  });
  html += '</div>';
  html += '<div class="timing-bar"><strong>Plan ahead:</strong> Visit a travel clinic at least <strong>4–6 weeks before departure</strong> — some vaccines require multiple doses spaced weeks apart. CDC destination tool: <a href="https://wwwnc.cdc.gov/travel" target="_blank" rel="noopener">wwwnc.cdc.gov/travel</a>. Travel clinics are available at most CVS and Walgreens pharmacies without a referral.</div>';
  return html;
}

function renderRegion(key) {
  var r = REGIONS[key];
  if (!r) return '';
  var html = '<div class="dest-header">' + r.label + '<span>' + r.countries + '</span></div>';
  html += '<div class="vc-grid">';
  r.cards.forEach(function(c) { html += cardHTML(c); });
  html += '</div>';
  return html;
}

/* ── Init ── */
var allPanel = document.getElementById('all-panel');
var destPanel = document.getElementById('dest-panel');
allPanel.innerHTML = renderAll();

/* ── Region pills ── */
document.getElementById('region-bar').addEventListener('click', function(e) {
  var pill = e.target.closest('.rpill');
  if (!pill) return;
  document.querySelectorAll('.rpill').forEach(function(p) { p.classList.remove('active'); });
  pill.classList.add('active');
  var region = pill.dataset.region;
  if (region === 'all') {
    destPanel.classList.add('hidden');
    destPanel.innerHTML = '';
  } else {
    destPanel.innerHTML = renderRegion(region);
    destPanel.classList.remove('hidden');
  }
});

/* ── Search ── */
var ALL_SEARCH = [
  { name:'Routine vaccines', dest:'All destinations', note:'MMR, flu, COVID-19, Tdap, and chickenpox — be up to date before any international travel.' },
  { name:'Hepatitis A', dest:'Most non-Western destinations', note:'Recommended for Mexico, Central and South America, the Caribbean, Africa, Asia, Eastern Europe, and the Middle East. Two doses provide long-term protection.' },
  { name:'Hepatitis B', dest:'Most international travel', note:'Recommended for most international travel, especially longer trips. 3-dose series; faster 2-dose schedule available.' },
  { name:'Typhoid', dest:'South/Southeast Asia · Africa · Latin America', note:'Recommended for India, Nepal, Southeast Asia, sub-Saharan Africa, and parts of Latin America — particularly if eating outside tourist restaurants.' },
  { name:'Yellow Fever', dest:'Sub-Saharan Africa · South America', note:'Required for entry to some countries in Africa and South America. Proof of vaccination required on arrival in many countries. Given at certified travel clinics — one dose lasts for life.' },
  { name:'Malaria (medication)', dest:'Sub-Saharan Africa · Southeast Asia · Latin America', note:'No vaccine — requires prescription medication (atovaquone-proguanil, doxycycline, or mefloquine). See a travel doctor at least 4–6 weeks before departure.' },
  { name:'Japanese Encephalitis', dest:'Rural Southeast Asia · China · India', note:'Recommended for rural Asia stays over one month, or significant outdoor time. Low risk on urban tourist routes. 2-dose vaccine series.' },
  { name:'Rabies', dest:'Adventure travel · rural areas globally', note:'Recommended for hikers, cyclists, and anyone far from urban medical care. 3-dose pre-exposure series. Seek care immediately after any animal bite regardless of vaccination status.' },
];

var searchInput = document.getElementById('vc-search');
var searchPanel = document.getElementById('search-panel');
var mainUI = document.getElementById('main-ui');
var noResults = document.getElementById('no-results');
var searchRows = document.getElementById('search-rows');

searchInput.addEventListener('input', function() {
  var q = searchInput.value.trim().toLowerCase();
  if (!q) {
    searchPanel.classList.remove('active');
    mainUI.classList.remove('hidden');
    noResults.style.display = 'none';
    return;
  }
  searchPanel.classList.add('active');
  mainUI.classList.add('hidden');
  var matches = ALL_SEARCH.filter(function(r) {
    return (r.name + r.dest + r.note).toLowerCase().indexOf(q) !== -1;
  });
  noResults.style.display = matches.length === 0 ? '' : 'none';
  searchRows.innerHTML = matches.map(function(r) {
    return '<div class="search-row match"><div class="sr-name">' + r.name + '</div><div class="sr-dest">' + r.dest + '</div><div class="sr-note">' + r.note + '</div></div>';
  }).join('');
});
</script>
<script src="../assets/toolbar.js?v=71"></script>
</body>
</html>
