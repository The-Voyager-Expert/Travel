<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../assets/_travel_style.css">
<title>Climate Finder</title>
<style>
/* Full-page reverse climate search. Pick a month + a daytime-high band; every
   destination whose typical high lands inside the band is listed. Climate data
   is the SAME baked set the Guides-index weather widget uses — sourced here from
   window.TravelClimate (set by assets/weather.js), never a second copy. */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg,#f5f4f0); color: var(--text,#1a1917);
  font-size: var(--fs-body,14px); line-height: 1.5;
  padding-left: 20px !important; padding-right: 20px !important; }

.cf-wrap { max-width: 1040px; margin: 8px auto 0; padding: 0 24px; }
.cf-intro { color: var(--muted,#6a6660); font-size: var(--fs-sub,12px); margin: 2px 0 16px; }

/* Controls card */
.cf-controls { background: var(--surface,#fff); border: 1px solid var(--border2,#e6e2da);
  border-radius: 12px; padding: 16px 18px; box-shadow: 0 2px 12px rgba(92,61,17,0.07);
  margin-bottom: 18px; }
.cf-block { margin-top: 14px; }
.cf-block:first-child { margin-top: 0; }
.cf-label { font-size: var(--fs-label,11px); text-transform: uppercase; letter-spacing: .06em;
  color: var(--muted,#6a6660); margin-bottom: 7px; }

/* Month pills */
.cf-months { display: grid; grid-template-columns: repeat(12, 1fr); gap: 6px; }
.cf-mon { border: 1px solid var(--border2,#e6e2da); border-radius: 7px; cursor: pointer;
  padding: 8px 0; font-family: var(--font); font-size: var(--fs-sub,12px); color: var(--text,#1a1917);
  background: #fff; transition: background .12s,color .12s,border-color .12s; }
.cf-mon:hover { border-color: var(--accent,#8a6c1a); color: var(--accent,#8a6c1a); }
.cf-mon.on { background: var(--accent,#8a6c1a); color: #fff; border-color: var(--accent,#8a6c1a); font-weight: 600; }

/* Range row */
.cf-rangerow { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }
.cf-rangerow .cf-to { color: var(--muted,#6a6660); }
.cf-spacer { flex: 1; }
/* Sliders */
.cf-sliderrow { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }
.cf-sliderrow input[type=range] { width: 130px; cursor: pointer; accent-color: var(--accent,#8a6c1a); }
.cf-tval { font-weight: 700; color: var(--accent,#8a6c1a); min-width: 52px; }

/* °C/°F + sort */
.cf-seg { display: inline-flex; border: 1px solid var(--border2,#e6e2da); border-radius: 8px; overflow: hidden; }
.cf-seg button { border: none; cursor: pointer; padding: 8px 13px; font-family: var(--font);
  font-size: var(--fs-sub,12px); font-weight: 600; background: #fff; color: var(--muted,#6a6660); }
.cf-seg button.on { background: var(--accent,#8a6c1a); color: #fff; }
.cf-sort { padding: 8px 10px; border: 1px solid var(--border2,#e6e2da); border-radius: 8px;
  font-family: var(--font); font-size: var(--fs-sub,12px); color: var(--text,#1a1917); background: #fff; cursor: pointer; }

/* Summary */
.cf-summary { font-size: var(--fs-sub,12px); color: var(--muted,#6a6660); margin: 4px 2px 12px;
  text-transform: uppercase; letter-spacing: .05em; }
.cf-summary b { color: var(--accent,#8a6c1a); font-weight: 700; }

/* Results grid */
.cf-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.cf-card { background: var(--surface,#fff); border: 1px solid var(--border2,#e6e2da); border-radius: 11px;
  padding: 14px 15px; box-shadow: 0 1px 6px rgba(92,61,17,0.05); }
a.cf-card { display: block; text-decoration: none; color: inherit; cursor: pointer;
  transition: border-color .15s, box-shadow .15s; }
a.cf-card:hover { border-color: var(--accent,#8a6c1a); box-shadow: 0 3px 10px rgba(138,108,26,.12); }
.cf-city { font-size: var(--fs-body,14px); font-weight: 700; color: var(--accent,#8a6c1a);
  display: flex; align-items: center; justify-content: space-between; gap: 4px; }
.cf-city-arrow { font-size: 11px; color: var(--muted,#6a6660); opacity: 0.55; flex-shrink: 0; }
a.cf-card:hover .cf-city-arrow { opacity: 1; color: var(--accent,#8a6c1a); }
.cf-temps { display: flex; align-items: baseline; gap: 14px; margin-top: 8px; }
.cf-hi { font-size: 26px; font-weight: 700; color: #a61c00; line-height: 1; }
.cf-lo { font-size: 26px; font-weight: 700; color: #3d5282; line-height: 1; }
.cf-tlab { font-size: var(--fs-label,11px); text-transform: uppercase; letter-spacing: .05em; color: var(--muted,#6a6660); }
.cf-strip { display: flex; align-items: flex-end; gap: 2px; height: 34px; margin-top: 12px; }
.cf-bar { flex: 1; position: relative; height: 34px; }
.cf-bar > span { position: absolute; left: 50%; transform: translateX(-50%); width: 4px; border-radius: 2px; }
.cf-empty { text-align: center; color: var(--muted,#6a6660); font-size: var(--fs-body,14px);
  padding: 40px 10px; line-height: 1.6; }

@media (max-width: 600px) {
  .cf-wrap { padding: 0 12px; }
  .cf-months { grid-template-columns: repeat(6, 1fr); }
  .cf-results { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
}
</style>

  'use strict';
  var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

                     'August','September','October','November','December'];

  function start() {
    var CLIM = window.TravelClimate || {};
    var resultsEl = document.getElementById('cf-results');
    var keys = Object.keys(CLIM).filter(function (k) { return CLIM[k] && CLIM[k].hi; });
    if (!keys.length) {
      resultsEl.innerHTML = '<div class="cf-empty">Climate data didn’t load.<br>Open this page from the site (or alongside the assets folder).</div>';
      document.getElementById('cf-summary').textContent = '';
      return;
    }

    var q = new URLSearchParams(location.search);
    function unit() { try { return localStorage.getItem('guideTempUnit') === 'F' ? 'F' : 'C'; } catch (e) { return 'C'; } }
    function setUnit(u) { try { localStorage.setItem('guideTempUnit', u); } catch (e) {} }
    function conv(c) { return unit() === 'F' ? Math.round(c * 9 / 5 + 32) : Math.round(c); }
    function toC(v) { return unit() === 'F' ? (v - 32) * 5 / 9 : v; }

    if (q.get('u') === 'F' || q.get('u') === 'C') setUnit(q.get('u'));

    var month = parseInt(q.get('mon'), 10); if (isNaN(month) || month < 0 || month > 11) month = new Date().getMonth();
    var minC = parseFloat(q.get('minc')); if (isNaN(minC)) minC = 18;
    var maxC = parseFloat(q.get('maxc')); if (isNaN(maxC)) maxC = 27;
    var sort = 'cool';

    /* Month pills */
    var monthsEl = document.getElementById('cf-months');
    monthsEl.innerHTML = MONTHS.map(function (m, i) {
      return '<button type="button" class="cf-mon" data-m="' + i + '">' + m + '</button>';
    }).join('');
    function paintMonths() {
      [].forEach.call(monthsEl.children, function (b, i) {
        b.classList.toggle('on', i === month);
      });
    }
    monthsEl.addEventListener('click', function (e) {
      var b = e.target.closest('.cf-mon'); if (!b) return;
      month = parseInt(b.dataset.m, 10); paintMonths(); renderResults();
    });

    /* Range sliders — always °C internally */
    var minI = document.getElementById('cf-min'), maxI = document.getElementById('cf-max');
    var minV = document.getElementById('cf-min-val'), maxV = document.getElementById('cf-max-val');
    function fillInputs() {
      minI.value = minC; maxI.value = maxC;
      minV.textContent = conv(minC) + '°' + unit();
      maxV.textContent = conv(maxC) + '°' + unit();
    }
    function readSlider(which) {
      minC = parseFloat(minI.value); maxC = parseFloat(maxI.value);
      minV.textContent = conv(minC) + '°' + unit();
      maxV.textContent = conv(maxC) + '°' + unit();
      renderResults();
    }
    minI.addEventListener('input', readSlider);
    maxI.addEventListener('input', readSlider);

    /* Unit toggle */
    var unitEl = document.getElementById('cf-unit');
    function paintUnit() {
      [].forEach.call(unitEl.children, function (b) { b.classList.toggle('on', b.dataset.u === unit()); });

    unitEl.addEventListener('click', function (e) {
      var b = e.target.closest('button'); if (!b) return;
      setUnit(b.dataset.u); paintUnit();
      minV.textContent = conv(minC) + '°' + unit();
      maxV.textContent = conv(maxC) + '°' + unit();
      renderResults();

    /* Mini 12-month strip for one record */
    function strip(rec) {
      var vals = rec.hi.concat(rec.lo);
      var lo0 = Math.min.apply(null, vals), hi0 = Math.max.apply(null, vals);
      var span = (hi0 - lo0) || 1, H = 34, out = '';
      for (var j = 0; j < 12; j++) {
        var sel = (j === month);
        var top = (1 - (rec.hi[j] - lo0) / span) * H;
        var bot = (1 - (rec.lo[j] - lo0) / span) * H;
        var bh = Math.max(2, bot - top);
        out += '<div class="cf-bar"><span style="top:' + top + 'px;height:' + bh + 'px;background:' +
          (sel ? '#8a6c1a' : 'rgba(138,108,26,.28)') + ';"></span></div>';
      }
      return '<div class="cf-strip">' + out + '</div>';
    }

    function renderResults() {
      var u = unit(), lo = conv(minC), hi = conv(maxC);
      var hits = keys.filter(function (k) {
        var v = CLIM[k].hi[month]; return v != null && v >= minC && v <= maxC;
      });
      if (sort === 'warm') hits.sort(function (a, b) { return CLIM[b].hi[month] - CLIM[a].hi[month]; });
      else if (sort === 'az') hits.sort(function (a, b) { return (CLIM[a].city || a).localeCompare(CLIM[b].city || b); });
      else hits.sort(function (a, b) { return CLIM[a].hi[month] - CLIM[b].hi[month]; });

      document.getElementById('cf-summary').innerHTML =
        hits.length ? ('<b>' + hits.length + '</b> place' + (hits.length > 1 ? 's' : '') +
          ' · high ' + lo + '–' + hi + '°' + u + ' in ' + MONTHS_LONG[month])
        : 'No matches';

      if (!hits.length) {
        resultsEl.innerHTML = '<div class="cf-empty">No destinations have a typical high of ' +
          lo + '–' + hi + '°' + u + ' in ' + MONTHS_LONG[month] + '.<br>Try widening the range.</div>';
        return;
      }
      resultsEl.innerHTML = hits.map(function (k) {
        var rec = CLIM[k];
        var href = GUIDE_LINKS[k];
        var tag = href ? 'a' : 'div';
        var attrs = href ? ' class="cf-card" href="' + href + '"' : ' class="cf-card"';
        var arrow = href ? '<span class="cf-city-arrow">→</span>' : '';
        return '<' + tag + attrs + '>' +
          '<div class="cf-city"><span>' + (rec.city || k) + '</span>' + arrow + '</div>' +
          '<div class="cf-temps">' +
            '<div><div class="cf-hi">' + conv(rec.hi[month]) + '°</div><div class="cf-tlab">High</div></div>' +
            '<div><div class="cf-lo">' + conv(rec.lo[month]) + '°</div><div class="cf-tlab">Low</div></div>' +
          '</div>' + strip(rec) +
        '</' + tag + '>';
      }).join('');
    }

    sortEl.value = sort;
    paintMonths(); fillInputs(); paintUnit(); renderResults();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();
}());
</script>
</body>
</html>
