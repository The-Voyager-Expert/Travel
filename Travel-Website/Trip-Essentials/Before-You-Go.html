<style>
/* This page's grid is compact — trim the global 80px trailing padding to a snug gap so it
   doesn't leave a big empty band under the cards. !important beats the shared safe-area
   @supports rule (mobile.css) that otherwise forces the padding back to the 80px base. */
body { padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px)) !important; }
.byg-wrap { width: 100%; box-sizing: border-box; padding: 0 32px; position: relative; }
/* Search stays centered on the page (middle column); month sits in the right column beside it */
.byg-pick { margin: 35px 0 16px; display: grid; grid-template-columns: 1fr 360px 1fr; align-items: center; column-gap: 10px; }
.byg-find-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
  line-height: 0; pointer-events: none; z-index: 1; color: var(--accent); }
.byg-select { width: 100%; min-width: 0; height: 36px; box-sizing: border-box; font-family: var(--font); font-size: 16px; font-weight: 600;
  color: var(--text,#1a1917); padding: 0 12px; border: 1px solid var(--border2,#e6e2da);
  border-radius: 6px; background-color: #fff; cursor: pointer; outline: none; }
.byg-month-row { grid-column: 3; justify-self: start; display: flex; align-items: center; gap: 8px; margin: 0; }
.byg-month-select { flex: 0 0 auto; width: auto; height: 40px; box-sizing: border-box; font-family: var(--font); font-size: 16px; font-weight: 500; color: var(--accent);
  padding: 0 28px 0 12px; border: 1.5px solid var(--border2,#e6e2da); border-radius: 6px;
  background-color: #fff; cursor: pointer; outline: none; }
.byg-month-select:hover { border-color: #b85c2a; }
/* Kill the loud gold keyboard-focus ring the shared sheet puts on selects — keep a subtle border cue */
.byg-select:focus, .byg-select:focus-visible,
.byg-month-select:focus, .byg-month-select:focus-visible { outline: none !important; border-color: #c8b99a; box-shadow: none; }
.byg-unit { display: inline-flex; border: 1px solid var(--border2,#e6e2da); border-radius: 6px; overflow: hidden; }
.byg-unit button { border: none; cursor: pointer; padding: 7px 11px; font-size: 12px; font-weight: 600;
  font-family: var(--font); background: transparent; color: var(--muted,#6a6660); }
.byg-unit button.on { background: #b85c2a; color: #fff; }
.byg-empty { text-align: center; color: var(--muted,#6a6660); font-size: var(--fs-body,14px);
  padding: 40px 10px; line-height: 1.6; }
/* Search input (replaces the city dropdown) */
#byg-find { width: 100%; min-width: 0; height: 40px; box-sizing: border-box; margin: 0; font-family: var(--font);
  font-size: 15px; color: var(--text,#1a1917); padding: 0 18px 0 36px;
  border: 1.5px solid var(--border2,#e6e2da); border-radius: 6px; background: #fff; outline: none; }
#byg-find::placeholder { color: #A8895A; }
#byg-find:focus, #byg-find:focus-visible { outline: none !important; border-color: #c8b99a; box-shadow: none; }
/* Autocomplete dropdown — uses shared TVESearch (.sa-suggest / .sa-row from web-travel-style.css) */
.byg-find-wrap { position: relative; grid-column: 2; }
.byg-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; align-items: start; max-width: 1120px; }
/* Plug Adapter is a full-width strip above the grid — socket types laid out horizontally */
.byg-plug-card { max-width: 1120px; margin-bottom: 14px; }
.byg-plug-card .byg-plug-row { display: flex; gap: 20px; margin-top: 8px; flex-wrap: wrap; }
.byg-plug-card .byg-plug-type { flex: 1; min-width: 180px; padding: 10px 14px; border: 1px solid var(--border2,#e6e2da); border-radius: 9px; background: var(--bg,#f5f3ef); }
.byg-plug-card .byg-plug-imgs { grid-template-columns: 1fr 1fr; gap: 12px; max-width: 230px; }
.byg-plug-card .byg-plug-imgs img { width: 100%; max-width: 104px; height: auto; aspect-ratio: 1; object-fit: contain; background: #fff; padding: 8px; }
.byg-plug-card .byg-plug-type-desc { font-size: 10px; }
.byg-col-stack { display: flex; flex-direction: column; gap: 14px; }
/* The four top info cards size to their content so each has the same bottom padding
   (no card is forced tall with a big empty band). Safety note clamped so it stays tidy. */
.byg-card-fixed, .byg-card-fixed-sm { height: auto; }
.byg-safety-note { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.byg-prep-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
.byg-prep-tile { display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; padding: 10px 6px; height: 70px; border: 1px solid var(--border2,#e6e2da); border-radius: 9px;
  background: var(--bg,#f5f3ef); text-decoration: none; text-align: center;
  transition: border-color .15s, background .15s; }
.byg-prep-tile:hover { border-color: #b85c2a; background: #fff; }
.byg-prep-tile-icon { font-size: 18px; }
.byg-prep-tile-label { font-size: 11px; font-weight: 600; color: var(--text,#1a1917);
  text-transform: uppercase; letter-spacing: .04em; line-height: 1.3; }
.byg-card { background: var(--surface,#fff); border: 1px solid var(--border2,#e6e2da);
  border-radius: 11px; padding: 16px 18px 20px; box-shadow: 0 1px 6px rgba(92,61,17,0.05); }
.byg-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.byg-card-icon { font-size: 18px; }
.byg-card-title { font-size: 13px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .05em; color: var(--text,#1a1917); }
.byg-row { display: flex; justify-content: space-between; align-items: baseline;
  padding: 6px 0; border-bottom: 1px solid var(--border2,#e6e2da); }
.byg-row:last-child { border-bottom: none; }
.byg-row-label { font-size: 12px; color: var(--muted,#6a6660); }
.byg-row-value { font-size: 14px; font-weight: 600; color: var(--text,#1a1917); text-align: right; }
.byg-unit-inline { display: inline-flex; border: 1px solid var(--border2,#e6e2da); border-radius: 6px; overflow: hidden; flex-shrink: 0; }
.byg-unit-inline button { border: none; cursor: pointer; padding: 5px 9px; font-size: 11px; font-weight: 600; background: var(--surface,#fff); color: var(--text,#1a1917); }
.byg-unit-inline button.on { background: #b85c2a; color: #fff; }
.byg-temps { display: flex; gap: 20px; margin: 8px 0 6px; }
.byg-hi { color: #a61c00; font-size: 32px; font-weight: 700; }
.byg-lo { color: #3d5282; font-size: 32px; font-weight: 700; }
.byg-rain-row { display: flex; gap: 14px; margin-top: 4px; }
.byg-rain-val { font-size: 14px; font-weight: 700; color: #4a7c9b; }
.byg-rain-lbl { font-size: 11px; color: var(--muted,#6a6660); }
.byg-link { display: inline-flex; align-items: center; gap: 4px; font-size: 13px;
  color: #3d3a32; padding: 6px 12px; border: 1px solid var(--border2,#e6e2da);
  border-radius: 6px; background: #fff; text-decoration: none;
  transition: border-color .15s, box-shadow .15s, transform .08s; margin-top: 8px; }
.byg-link:hover { border-color: #b85c2a; box-shadow: 0 3px 10px rgba(184,92,42,.12); transform: translateY(-1px); text-decoration: none; }
.byg-links-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.byg-safety-badge { display: inline-block; padding: 3px 10px; border-radius: 4px;
  font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
.byg-safety-verylow { background: #e8f5e9; color: var(--green); }
.byg-safety-low { background: #e8f5e9; color: var(--green); }
.byg-safety-safe { background: #e8f5e9; color: var(--green); }
.byg-safety-verysafe { background: #c8e6c9; color: #1b5e20; }
.byg-safety-moderate { background: #fff3e0; color: #e65100; }
.byg-safety-caution { background: #fbe9e7; color: #bf360c; }
.byg-cost-badge { display: inline-block; padding: 3px 10px; border-radius: 4px;
  font-size: 12px; font-weight: 700; }
.byg-cost-budget { background: #e8f5e9; color: var(--green); }
.byg-cost-moderate, .byg-cost-mid-range { background: #e3f2fd; color: #1565c0; }
.byg-cost-expensive { background: #fff3e0; color: #e65100; }
.byg-cost-premium, .byg-cost-luxury { background: #fce4ec; color: #ad1457; }
.byg-strip { display: flex; align-items: flex-end; gap: 2px; height: 40px; margin-top: 8px; }
.byg-bar { flex: 1; position: relative; height: 40px; }
.byg-bar > span { position: absolute; left: 50%; transform: translateX(-50%); width: 5px; border-radius: 3px; }
.byg-bar-label { font-size: 9px; color: var(--muted); text-align: center; margin-top: 2px; }
.byg-chart-wrap { margin-top: 4px; }
.byg-card-compact { padding: 10px 14px; }
.byg-card-compact .byg-row { padding: 4px 0; }
.byg-plug-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
.byg-plug-type { flex: 1; min-width: 0; }
.byg-plug-type-name { font-size: 11px; font-weight: 700; color: var(--text,#1a1917); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
.byg-plug-type-desc { font-size: 10px; color: var(--muted,#6a6660); margin-bottom: 6px; line-height: 1.3; }
.byg-plug-imgs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.byg-plug-img-lbl { font-size: 9px; color: var(--muted,#6a6660); text-align: center; margin-top: 3px; }
.byg-plug-divider { border: none; border-top: 1px solid var(--border2,#e6e2da); margin: 10px 0 0; }
.byg-voltage { font-size: 11px; color: var(--muted,#6a6660); margin-bottom: 8px; }
.byg-visa-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 6px; color: #fff; letter-spacing: .03em; }
.byg-visa-domestic { background: #888; }
.byg-visa-free { background: #1a7f4b; }
.byg-visa-card { background: #3b6fa0; }
.byg-visa-eta { background: #6747c7; }
.byg-visa-evisa { background: #c77a1b; }
.byg-visa-voa { background: #1a8080; }
.byg-visa-required { background: #c62828; }
.byg-visa-days { font-size: 22px; font-weight: 700; color: var(--text,#1a1917); margin: 8px 0 2px; }
.byg-visa-note { font-size: 11px; color: var(--muted,#6a6660); line-height: 1.4; margin-bottom: 6px; }
.byg-guide-pill { display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-size: 14px;
  font-weight: 600; color: #b85c2a; text-decoration: none; padding: 0 16px; height: 40px; box-sizing: border-box;
  border: 1.5px solid #b85c2a; border-radius: 6px;

.byg-guide-pill:hover { background: #b85c2a; color: #fff; }
@media (max-width: 700px) {
  .byg-wrap { padding: 0 14px; }
  .byg-plug-card .byg-plug-type { min-width: 0; flex: 1 1 100%; }
  .byg-cards { grid-template-columns: 1fr; }
  .byg-col-stack { gap: 12px; }
  .byg-pick { grid-template-columns: 1fr; row-gap: 8px; margin-top: 16px; }
  .byg-find-wrap { grid-column: 1; }
  .byg-month-row { grid-column: 1; justify-self: center; }
  /* Open Guide back in normal flow on mobile so it can't overlap the full-width search */
  #byg-guide-slot { position: static !important; top: auto !important; right: auto !important; text-align: center; margin-bottom: 8px; }
}

      if (t === 'moderate' || t === 'midrange' || t === 'mid') return 'byg-cost-moderate';
      if (t === 'expensive') return 'byg-cost-expensive';
      return 'byg-cost-premium';
    }

    function strip(rec, m) {

      var lo0 = Math.min.apply(null, vals), hi0 = Math.max.apply(null, vals);
      var span = (hi0 - lo0) || 1, H = 40, out = '', labels = '';
      var ML = ['J','F','M','A','M','J','J','A','S','O','N','D'];
      for (var j = 0; j < 12; j++) {
        var top = (1 - (rec.hi[j] - lo0) / span) * H;
        var bot = (1 - (rec.lo[j] - lo0) / span) * H;
        var bh = Math.max(2, bot - top);
        out += '<div class="byg-bar"><span style="top:' + top + 'px;height:' + bh + 'px;background:' +
          (j === m ? '#b85c2a' : 'rgba(184,92,42,.28)') + ';"></span></div>';
      }
      return '<div class="byg-strip">' + out + '</div>';
    }

    function calcSunTimes(lat, month) {
      var doy = [15,46,74,105,135,166,196,227,258,288,319,349];
      var N = doy[month];
      var B = (360/365*(N-81)) * Math.PI/180;
      var decl = 23.45 * Math.sin(B) * Math.PI/180;
      var latR = lat * Math.PI/180;
      var cosHA = -Math.tan(latR)*Math.tan(decl);
      if (cosHA <= -1) return {type:'sun'};
      if (cosHA >= 1)  return {type:'night'};
      var HA = Math.acos(cosHA)*180/Math.PI;
      var sr = 12 - HA/15, ss = 12 + HA/15;
      return {type:'normal', sr:sr, ss:ss, len:ss-sr};
    }

      if (mm === 60) { hh++; mm = 0; }

    }

      var COUNTRY_PLUG = {'United States':'USA','United Arab Emirates':'UAE','United Kingdom':'United_Kingdom','South Korea':'South_Korea','New Zealand':'New_Zealand','Sri Lanka':'Sri_Lanka','Costa Rica':'Costa_Rica','Czech Republic':'Czech_Republic','Hong Kong':'Hong_Kong','Puerto Rico':'Puerto_Rico','Sint Maarten':'Trinidad','Turks & Caicos':'USA','Cayman Islands':'Jamaica','French Polynesia':'France'};
      var plugAnchor = country ? (COUNTRY_PLUG[country] || country.replace(/ /g,'_')) : '';
      var plugHref = 'Plug-Adapter/Plug-Adapter-Guide.html' + (plugAnchor ? '#' + plugAnchor : '');

      // Plug Adapter — full-width strip above the grid, socket types laid out horizontally
      var plugInfo = plugAnchor ? PLUG_DATA[plugAnchor] : null;
      var plugHtml = '';
      if (plugInfo) {
        plugHtml += '<div class="byg-card byg-plug-card">';
        plugHtml += '<div class="byg-card-head" style="justify-content:space-between;">' +
          '<span style="display:inline-flex;align-items:center;gap:8px;"><span class="byg-card-icon">🔌</span><span class="byg-card-title">Plug Adapter</span> ' +
          '<span class="byg-voltage" style="display:inline-block;margin:0 0 0 8px;">' + plugInfo.v + '</span></span>' +
          '<a href="' + plugHref + '" class="byg-link" style="margin-top:0;">All plugs →</a>' +
          '</div>';
        plugHtml += '<div class="byg-plug-row">';
        for (var pi = 0; pi < plugInfo.types.length; pi++) {
          var pt = plugInfo.types[pi];
          plugHtml += '<div class="byg-plug-type">';
          plugHtml += '<div class="byg-plug-type-name">' + pt.t + '</div>';
          plugHtml += '<div class="byg-plug-type-desc">' + pt.desc + '</div>';
          plugHtml += '<div class="byg-plug-imgs">';
          plugHtml += '<div><img src="Plug-Adapter/' + pt.s + '" alt="' + pt.t + ' socket" loading="lazy"><div class="byg-plug-img-lbl">Socket</div></div>';
          plugHtml += '<div><img src="Plug-Adapter/' + pt.p + '" alt="' + pt.t + ' plug" loading="lazy"><div class="byg-plug-img-lbl">Plug</div></div>';
          plugHtml += '</div></div>';
        }
        plugHtml += '</div>';
        plugHtml += '</div>';
      } else {
        plugHtml += '<div class="byg-card byg-plug-card"><div class="byg-card-head" style="justify-content:space-between;">' +
          '<span style="display:inline-flex;align-items:center;gap:8px;"><span class="byg-card-icon">🔌</span><span class="byg-card-title">Plug Adapter</span></span>' +
          '<a href="' + plugHref + '" class="byg-link" style="margin-top:0;">All plugs →</a></div></div>';
      }

      // Col 3: Cost & Currency + Visa & Entry stacked
      html += '<div class="byg-col-stack">';

      // Cost & Currency card (col 3, top)
      if (costData) {
        var COUNTRY_CURRENCY = {'United States':'United_States','United Arab Emirates':'United_Arab_Emirates','United Kingdom':'United_Kingdom','South Korea':'South_Korea','New Zealand':'New_Zealand','Sri Lanka':'Sri_Lanka','Costa Rica':'Costa_Rica','Czech Republic':'Czech_Republic','Hong Kong':'Hong_Kong','Puerto Rico':'Puerto_Rico','Sint Maarten':'Sint_Maarten','Turks & Caicos':'Turks_and_Caicos','Cayman Islands':'Cayman_Islands','French Polynesia':'French_Polynesia'};
        var currAnchor = country ? (COUNTRY_CURRENCY[country] || country.replace(/ /g,'_')) : '';
        var currHref = 'Currency-Guide.html' + (currAnchor ? '#' + currAnchor : '');
        var rateInfo = currAnchor ? CURRENCY_RATES[currAnchor] : null;
        var rateHtml = '';
        if (rateInfo && rateInfo.r !== 1) {
          var r = rateInfo.r, sym = rateInfo.s;
          var fmtRate = r >= 100 ? Math.round(r).toLocaleString() : r >= 10 ? r.toFixed(1) : r >= 1 ? r.toFixed(2) : r.toFixed(3);
          rateHtml = '<div class="byg-row"><span class="byg-row-label">1 USD =</span><span class="byg-row-value" style="font-weight:700;">' + fmtRate + ' ' + sym + '</span></div>';
        }
        html += '<div class="byg-card byg-card-fixed-sm">' +
          '<div class="byg-card-head"><span class="byg-card-icon">💰</span><span class="byg-card-title">Cost &amp; Currency</span></div>' +
          '<div class="byg-row"><span class="byg-row-label">Cost level</span><span class="byg-cost-badge ' + costClass(costData.tier) + '">' + costData.tier + '</span></div>' +
          '<div class="byg-row"><span class="byg-row-label">Currency</span><span class="byg-row-value">' + costData.currency + '</span></div>' +
          rateHtml +
          '<div class="byg-links-row"><a href="' + currHref + '" class="byg-link">All currencies →</a></div>' +
          '</div>';
      }

      // Visa & Entry card (col 3, below Cost & Currency)
      if (visaInfo) {
        var visaTypeLabels = {"domestic":"Domestic","visa-free":"Visa-free","arrival-card":"Arrival Card","eta":"ETA Required","evisa":"eVisa Required","voa":"Visa on Arrival","visa-required":"Visa Required"};
        var visaTypeCss = {"domestic":"byg-visa-domestic","visa-free":"byg-visa-free","arrival-card":"byg-visa-card","eta":"byg-visa-eta","evisa":"byg-visa-evisa","voa":"byg-visa-voa","visa-required":"byg-visa-required"};
        var vLabel = visaTypeLabels[visaInfo.type] || visaInfo.type;
        var vCss = visaTypeCss[visaInfo.type] || 'byg-visa-domestic';
        html += '<div class="byg-card">';
        html += '<div class="byg-card-head"><span class="byg-card-icon">🛂</span><span class="byg-card-title">Visa &amp; Entry</span></div>';
        html += '<span class="byg-visa-badge ' + vCss + '">' + vLabel + '</span>';
        if (visaInfo.days) { html += '<div class="byg-visa-days">' + visaInfo.days + '</div>'; }
        if (visaInfo.note) { html += '<div class="byg-visa-note">' + visaInfo.note + '</div>'; }
        if (!isUS) {
          html += '<div class="byg-links-row"><a href="Visas.html" class="byg-link">Visas →</a><a href="Entry-Requirements.html" class="byg-link">Entry requirements →</a></div>';
        }
        html += '</div>';
      }

      html += '</div>'; // end col 3 stack

      html += '</div>';
      resultsEl.innerHTML = plugHtml + html;

      // Live clock
      if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
      var tz2 = CITY_TZ[k];
      if (tz2) {
        function tickClock() {
          var el = document.getElementById('byg-clock');
          var elTz = document.getElementById('byg-clock-tz');
          if (!el) { clearInterval(clockInterval); clockInterval = null; return; }
          var now = new Date();
          var time = now.toLocaleTimeString('en-US', {timeZone: tz2, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true});
          var tzName = now.toLocaleDateString('en-US', {timeZone: tz2, weekday: 'long'}) + ' · ' +
            now.toLocaleTimeString('en-US', {timeZone: tz2, timeZoneName: 'short'}).split(' ').pop();
          el.textContent = time;
          if (elTz) elTz.textContent = tzName;
        }
        tickClock();
        clockInterval = setInterval(tickClock, 1000);
      }

      var guideSlot = document.getElementById('byg-guide-slot');
      if (guideSlot) {
        var guideLink = GUIDE_LINKS[k];
        guideSlot.innerHTML = guideLink
          ? '<a href="' + guideLink + '" class="byg-guide-pill">🌐 Open Guide →</a>'
          : '';
      }
    }

    paintUnit();

    var hash = decodeURIComponent(location.hash.slice(1));
    if (hash && keys.indexOf(hash) >= 0) { selectedCity = hash; searchEl.value = CLIM[hash].city || hash; }
    render();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();
}());
</script>
</body>
</html>
