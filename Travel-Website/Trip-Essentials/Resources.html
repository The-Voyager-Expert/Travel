<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../assets/web-travel-style.css">
<title>Planning Resources</title><meta name="cache-bust" content="1782258309278613000">
<style>
body { background: #f5f4f0; }

/* .wrap — fluid width from web-travel-style.css */
   /* canonical warm site background (toolbar pages share it) */

/* ── Quick Launch masonry ── */
.launch-grid {
  columns: 4;
  column-gap: 14px;
  margin-top: 16px;
}
.cat-block {
  break-inside: avoid;
  display: inline-block;
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 14px 14px;
  margin-bottom: 14px;
}
.cat-head {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid #efece6;
}
.cat-head .ch-emoji { font-size: 15px; line-height: 1; }
.chips-wrap { display: flex; flex-direction: column; gap: 1px; }
a.chip-link {
  display: block;
  font-size: 13px;
  color: #3d3a32;
  text-decoration: none;
  padding: 5px 8px;
  border-radius: 6px;
  line-height: 1.35;
  transition: background .12s, color .12s;
}
a.chip-link:hover { background: var(--hover,#faefd8); color: var(--accent); }

/* ── Mobile ── */
@media (max-width: 600px) {
  .launch-grid { columns: 1; }
  a.chip-link { font-size: 14px; padding: 8px; }
}

</style>
<link rel="stylesheet" href="../assets/mobile.css?v=50">
</head>
<body>
<div id="toolbar-mount" data-depth="1" data-maxwidth="940"></div>
<script src="../assets/toolbar.js?v=99"></script>

<div class="wrap">

  <div class="page-header">
    <h1>Web Resources</h1>
  </div>
  <span class="updated-stamp">Updated June 2026</span>

    <div class="launch-grid">

      <!-- Tours -->
      <div class="cat-block">
        <div class="cat-head"><span class="ch-emoji">📅</span> Tours &amp; Tickets</div>
        <div class="chips-wrap">
          <a class="chip-link" href="https://www.viator.com" target="_blank" rel="noopener" title="Largest tour inventory worldwide — skip-the-line, private, day tours.">Viator</a>
          <a class="chip-link" href="https://www.getyourguide.com" target="_blank" rel="noopener" title="Strong in Europe — exclusive access and free-cancellation options.">GetYourGuide</a>
          <a class="chip-link" href="https://www.klook.com" target="_blank" rel="noopener" title="Best for Asia — city passes, transport cards, attraction tickets.">Klook</a>
          <a class="chip-link" href="https://www.tripadvisor.com/Attractions" target="_blank" rel="noopener" title="Reviews-backed tour listings — good cross-reference for ratings.">TripAdvisor</a>
        </div>
      </div>

      <!-- Shows -->
      <div class="cat-block">
        <div class="cat-head"><span class="ch-emoji">🎭</span> Shows</div>
        <div class="chips-wrap">
          <a class="chip-link" href="https://www.todaytix.com" target="_blank" rel="noopener" title="Broadway, West End, off-Broadway — lottery tickets and last-minute deals.">TodayTix</a>
          <a class="chip-link" href="https://www.stubhub.com" target="_blank" rel="noopener" title="Resale tickets for concerts, sports, and events worldwide.">StubHub</a>
          <a class="chip-link" href="https://www.ticketmaster.com" target="_blank" rel="noopener" title="Primary tickets for concerts and major events — US and international.">Ticketmaster</a>        </div>
      </div>

      <!-- Maps -->
      <div class="cat-block">
        <div class="cat-head"><span class="ch-emoji">🗺️</span> Maps &amp; Directions</div>
        <div class="chips-wrap">
          <a class="chip-link" href="https://maps.google.com" target="_blank" rel="noopener" title="Walk times, transit, saved places, restaurant searches with hours.">Google Maps</a>
          <a class="chip-link" href="https://maps.apple.com" target="_blank" rel="noopener" title="Turn-by-turn navigation, Look Around street view, city guides.">Apple Maps</a>
        </div>
      </div>


    </div>

</div><!-- /wrap -->

</body>
</html>
