<title>Sunrise &amp; Sunset</title>
<style>
.page-desc { font-size: 12px; color: var(--muted); margin: -8px 0 24px; }
/* Controls */
.sun-controls { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
.sun-controls select {
  height: 40px; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 0 14px; font-size: 14px; font-family: inherit;
  background: var(--surface); color: var(--text); cursor: pointer;
}
.sun-controls select:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
#sun-city { min-width: 220px; }
/* Result card */
.sun-card {
  background: var(--warm); border: 1px solid var(--border);
  border-radius: 10px; padding: 18px 20px; max-width: 500px;
}
.sun-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid var(--border2);
}
.sun-row:last-child { border-bottom: none; padding-bottom: 0; }
.sun-row-label { font-size: 13px; color: var(--muted); }
.sun-row-value { font-size: 14px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
.sun-golden .sun-row-label { color: #a06020; }
.sun-golden .sun-row-value { color: #a06020; }
.sun-special {
  font-size: 14px; color: var(--text); padding: 16px 18px;
  background: var(--warm); border: 1px solid var(--border);
  border-radius: 10px; max-width: 500px;
}
.sun-note { font-size: 11px; color: var(--muted); margin-top: 12px; }
@media (max-width: 600px) {
  .sun-controls { flex-direction: column; }
  .sun-controls select { width: 100%; box-sizing: border-box; min-width: 0; }
  .sun-card, .sun-special { max-width: 100%; }
}
</style>

function calcSunTimes(lat, month) {
  var doy = [15,46,74,105,135,166,196,227,258,288,319,349];
  var N   = doy[month];
  var B   = (360/365*(N-81)) * Math.PI/180;
  var decl = 23.45 * Math.sin(B) * Math.PI/180;
  var latR  = lat * Math.PI/180;
  var cosHA = -Math.tan(latR) * Math.tan(decl);
  if (cosHA <= -1) return {type:'sun'};
  if (cosHA >=  1) return {type:'night'};
  var HA = Math.acos(cosHA) * 180/Math.PI;
  var sr = 12 - HA/15, ss = 12 + HA/15;
  return {type:'normal', sr:sr, ss:ss, len:ss-sr};
}

function sunFmtTime(h) {
  var m  = ((Math.round(h*60) % 1440) + 1440) % 1440;
  var hh = Math.floor(m/60), mm = m%60;
  var ap = hh < 12 ? 'AM' : 'PM';
  hh = hh%12||12;
  return hh + ':' + (mm<10?'0':'') + mm + ' ' + ap;
}

function sunFmtLen(h) {
  var hh = Math.floor(h), mm = Math.round((h-hh)*60);
  if (mm === 60) { hh++; mm = 0; }
  return hh + 'h ' + (mm<10?'0':'') + mm + 'm';
}

function renderSun() {
  var sel = document.getElementById('sun-city');
  var mon = document.getElementById('sun-month');
  var res = document.getElementById('sun-result');
  if (!sel || !mon || !res) return;
  var idx   = parseInt(sel.value, 10);
  var month = parseInt(mon.value, 10);
  if (isNaN(idx) || isNaN(month)) { res.innerHTML = ''; return; }
  var d = DESTINATIONS[idx];
  if (!d) { res.innerHTML = ''; return; }
  var r = calcSunTimes(d.lat, month);
  if (r.type === 'sun') {
    res.innerHTML = '<div class="sun-special">☀️ Midnight sun — the sun does not set in ' + d.name + ' this month.</div>';
    return;
  }
  if (r.type === 'night') {
    res.innerHTML = '<div class="sun-special">🌑 Polar night — the sun does not rise in ' + d.name + ' this month.</div>';
    return;
  }
  var html = '<div class="sun-card">';
  html += '<div class="sun-row"><span class="sun-row-label">Sunrise</span><span class="sun-row-value">' + sunFmtTime(r.sr) + '</span></div>';
  html += '<div class="sun-row"><span class="sun-row-label">Sunset</span><span class="sun-row-value">'  + sunFmtTime(r.ss) + '</span></div>';
  html += '<div class="sun-row"><span class="sun-row-label">Day length</span><span class="sun-row-value">' + sunFmtLen(r.len) + '</span></div>';
  html += '<div class="sun-row sun-golden"><span class="sun-row-label">Golden hour · morning</span><span class="sun-row-value">' + sunFmtTime(r.sr) + ' – ' + sunFmtTime(r.sr+0.5) + '</span></div>';
  html += '<div class="sun-row sun-golden"><span class="sun-row-label">Golden hour · evening</span><span class="sun-row-value">' + sunFmtTime(r.ss-0.5) + ' – ' + sunFmtTime(r.ss) + '</span></div>';
  html += '</div>';
  res.innerHTML = html;
}

(function () {
  var sel = document.getElementById('sun-city');
  var mon = document.getElementById('sun-month');
  if (!sel || !mon) return;
  var sorted = DESTINATIONS.map(function(d, i) { return {d:d, i:i}; });
  sorted.sort(function(a, b) {
    var na = a.d.name.toLowerCase() + '\x00' + a.d.country;
    var nb = b.d.name.toLowerCase() + '\x00' + b.d.country;
    return na < nb ? -1 : na > nb ? 1 : 0;
  });
  for (var j = 0; j < sorted.length; j++) {
    var x = sorted[j];
    var o = document.createElement('option');
    o.value = x.i;
    o.textContent = x.d.name + ' · ' + x.d.country;
    sel.appendChild(o);
  }
  // Default: Seattle
  var seaIdx = 0;
  for (var k = 0; k < DESTINATIONS.length; k++) {
    if (DESTINATIONS[k].name === 'Seattle') { seaIdx = k; break; }
  }
  sel.value = seaIdx;
  mon.value = new Date().getMonth();
  sel.addEventListener('change', renderSun);
  mon.addEventListener('change', renderSun);
  renderSun();
}());
