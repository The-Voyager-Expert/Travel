<title>Tipping Guide</title>
<style>
:root {
  --bg:      #f5f4f0;
  --warm:    #fdf8f0;
  --surface: #ffffff;
  --border:  #d8d4cc;
  --border2: #e6e2da;
  --text:    #1a1917;
  --muted:   #6a6660;
  --accent:  #8a6c1a;
  --hover:   #faefd8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple Color Emoji', 'Segoe UI Emoji', Arial, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  padding-bottom: 80px;
}
/* .wrap — fluid width from _travel_style.css */

/* ── Legend ── */
.legend {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 16px;
}
.leg {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11.5px; color: var(--muted);
}
.leg-dot {
  display: inline-block; width: 10px; height: 10px; border-radius: 50%;
  flex-shrink: 0;
}
/* dots use each level's chip background + border so they read as mini chips */
.leg-dot.expected    { background: #e8f5e8; border: 2px solid #a0d8a0; }
.leg-dot.appreciated { background: #e8eef8; border: 2px solid #a0b8e8; }
.leg-dot.check       { background: #fdf5e0; border: 2px solid #e8c870; }
.leg-dot.skip        { background: #f0eeeb; border: 2px solid #d8d4cc; }

/* ── Controls ── */
.controls {
  display: flex; flex-direction: column; align-items: center; flex-wrap: wrap;
  gap: 14px; margin-bottom: 16px;
}
.controls input[type="search"] { margin-bottom: 0; order: -1; }

.pills { display: flex; gap: 4px; flex-wrap: wrap; }
.pill {
  padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border2);
  background: var(--warm); font-family: inherit; font-size: 13px; line-height: 1; color: var(--muted);
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.pill:hover, .pill.active { background: linear-gradient(135deg,#7a3b1e 0%,#b85c2a 55%,#d4874a 100%); color: #fff; border-color: #b85c2a; font-weight: 600; }

/* ── Country rows ── */
.country-list { display: flex; flex-direction: column; gap: 10px; }

.country-row {
  background: var(--surface); border: 1px solid var(--border2); border-radius: 8px;
  padding: 13px 16px; display: grid;
  grid-template-columns: 200px auto;
  gap: 0 20px;
}
.country-left { }
.country-name { font-size: 13px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 7px; }
.country-flag { font-size: 17px; line-height: 1; }
.country-cities {
  font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.5;
}

.country-right { }
.tip-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }

.norm-chip {
  display: inline-block; font-size: 10.5px; font-weight: 700;
  padding: 2px 8px; border-radius: 999px; letter-spacing: .02em;
  text-transform: uppercase; white-space: nowrap; flex-shrink: 0;
}
.norm-chip.expected    { background: #e8f5e8; color: #1a5a1a; border: 1px solid #a0d8a0; }
.norm-chip.appreciated { background: #e8eef8; color: #1a3a8b; border: 1px solid #a0b8e8; }
.norm-chip.check       { background: #fdf5e0; color: #7a4a00; border: 1px solid #e8c870; }
.norm-chip.skip        { background: #f0eeeb; color: #6a6660; border: 1px solid #d8d4cc; }

.tip-rows { display: flex; flex-direction: column; gap: 3px; }
.tip-row  { font-size: 12.5px; color: var(--text); display: flex; gap: 6px; }
.tip-label { color: var(--muted); flex-shrink: 0; width: 134px; }
.tip-note  { font-size: 11.5px; color: var(--muted); margin-top: 5px; line-height: 1.4; font-style: italic; }

.empty { text-align: center; padding: 48px 0; color: var(--muted); font-size: 13px; }

/* ── Mobile ── */
@media (max-width: 600px) {
  .controls { align-items: center; }
  .controls input[type="search"] { width: 100%; }
  .pills { flex-wrap: wrap; }
  /* .pill size comes from the shared filter-pill standard in assets/mobile.css */

  .country-row { grid-template-columns: 1fr; gap: 10px; }
  .tip-label { width: 110px; }
}
@media (max-width: 359px) {
  .wrap { padding: 0 14px; }
}
</style>

var activeRegion = 'all';
var searchVal    = '';

function norm(n) {
  var map = {expected:'Expected', appreciated:'Appreciated', check:'Check Bill', skip:'Not Customary'};
  return map[n] || n;
}

function renderCard(c) {
  var tipRows = c.tips.map(function(t) {
    return '<div class="tip-row"><span class="tip-label">' + t.label + '</span><span>' + t.value + '</span></div>';
  }).join('');
  return '<div class="country-row" data-region="' + c.region + '" data-search="' + (c.name + ' ' + c.cities).toLowerCase() + '">' +
    '<div class="country-left">' +
      '<div class="country-name"><span class="country-flag">' + c.flag + '</span>' + c.name + '</div>' +
      '<div class="country-cities">' + linkCities(c.cities) + '</div>' +
    '</div>' +
    '<div class="country-right">' +
      '<div class="tip-header"><span class="norm-chip ' + c.norm + '">' + norm(c.norm) + '</span></div>' +
      '<div class="tip-rows">' + tipRows + '</div>' +
      (c.note ? '<div class="tip-note">' + c.note + '</div>' : '') +
    '</div>' +
  '</div>';
}

function render() {
  var list = document.getElementById('list');
  var filtered = COUNTRIES.filter(function(c) {
    if (activeRegion !== 'all' && c.region !== activeRegion) return false;
    if (searchVal) {
      var q = searchVal;
      if ((c.name + ' ' + c.cities).toLowerCase().indexOf(q) === -1) return false;
    }
    return true;
  });
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">No results for "' + searchVal + '"</div>';
    return;
  }
  list.innerHTML = filtered.map(renderCard).join('');
}

document.getElementById('region-pills').addEventListener('click', function(e) {
  var btn = e.target.closest('.pill');
  if (!btn) return;
  activeRegion = btn.dataset.region;
  document.querySelectorAll('.pill').forEach(function(p) { p.classList.remove('active'); });
  btn.classList.add('active');
  render();
});

document.getElementById('search').addEventListener('input', function(e) {
  searchVal = e.target.value.toLowerCase().trim();
  render();
});

render();
</script>
