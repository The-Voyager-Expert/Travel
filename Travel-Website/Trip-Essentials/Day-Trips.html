bel":"trenitalia","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Pompeii","time":"30 min","desc":"The Roman city buried by Vesuvius in 79 AD — amphitheatre, bakery and charred loaves still in the ovens; the most visited archaeological site in the world.","book":[{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Torre Annunziata","time":"40 min","desc":"Oplontis — a UNESCO-listed Roman villa of extraordinary scale and fresco quality, buried by Vesuvius and far less crowded than Pompeii. The excavated Villa of Poppaea is a 5-minute walk at street level on exit.","book":[{"label":"trenitalia","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Herculaneum","time":"50 min","desc":"Buried by the same 79 AD eruption in pyroclastic surge — smaller than Pompeii but more richly preserved, with wooden furniture and painted ceilings still readable. Alight at Ercolano.","book":[{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Naples","time":"65 min","desc":"The birthplace of pizza — Spaccanapoli cutting through the old town, the National Archaeological Museum housing the greatest Pompeii finds, and the best street food in Italy.","book":[{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Split","folder":"Split","guide":"split_v1.html","url":"../Guides/Split/split_v1.html","trips":[{"dest":"Solin","time":"10 min","desc":"Roman Salona — the ancient capital of Dalmatia, with a 60,000-seat amphitheatre, city walls, basilicas and the mausoleum of Emperor Diocletian, all just outside town.","book":[{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Kaštela","time":"20 min","desc":"Seven medieval castle-villages strung along a coastal bay — each Kaštel built by a different noble family in the 15th and 16th centuries, with intact towers and walls running directly to the water's edge. Alight at Kaštel Stari.","book":[{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Šibenik","time":"1h 30 min","desc":"Historic Dalmatian town with a UNESCO-listed cathedral and the gateway to Krka National Park — a comfortable half-day rail excursion with return.","book":[{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Knin","time":"1h 45 min","desc":"A medieval fortress town perched on a sheer rock above the Krka canyon — the largest fortress in Croatia, and the junction where the Zagreb and Šibenik rail lines meet in the Dalmatian hinterland.","book":[{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Zagreb","time":"6h 30 min","desc":"The scenic daytime rail journey to Croatia's capital winds through the Lika mountains — best paired with a hotel night in Zagreb rather than used as a day trip.","book":[{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Stockholm","folder":"Stockholm","guide":"stockholm_v1.html","url":"../Guides/Stockholm/stockholm_v1.html","trips":[{"dest":"Uppsala","time":"38 min","desc":"Sweden's historic university city — Scandinavia's largest cathedral, the 16th-century castle, and the lively student quarters along the Fyris river. Trains run roughly every half hour, making it the easiest half-day escape on the rails.","book":[{"label":"SJ","url":"https://www.sj.se/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Mariefred","time":"38 min","desc":"A storybook lakeside town beside Gripsholm Castle, Gustav Vasa's red-brick stronghold on Lake Mälaren. Ride Mälartåg to Läggesta, where the volunteer-run ÖSlJ narrow-gauge steam railway rolls you into town on century-old carriages May through September.","book":[{"label":"SJ","url":"https://www.sj.se/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Västerås","time":"1 hr 5 min","desc":"A Viking-age capital on Lake Mälaren — the 13th-century cathedral with Sweden's tallest spire, the Anundshög burial mounds and runestone field just outside town, and a well-preserved medieval castle on the waterfront.","book":[{"label":"SJ","url":"https://www.sj.se/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Nyköping","time":"1 hr 10 min","desc":"A quiet medieval town on the Baltic coast — 13th-century Nyköping Castle, a compact old town and a harbour waterfront, reachable in just over an hour on direct SJ trains along the main southern mainline.","book":[{"label":"SJ","url":"https://www.sj.se/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Norrköping","time":"1 hr 19 min","desc":"Sweden's industrial-heritage showpiece — a riverscape of 19th-century textile mills turned museums, concert halls, and cafés along the Motala ström rapids, with around 35 direct trains a day.","book":[{"label":"SJ","url":"https://www.sj.se/en"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Strasbourg","folder":"Strasbourg","guide":"strasbourg_v1.html","url":"../Guides/Strasbourg/strasbourg_v1.html","trips":[{"dest":"Sélestat","time":"25 min","desc":"Historic Renaissance town with one of Europe's great humanist libraries and the gateway to the hilltop Haut-Koenigsbourg castle and the Wine Route villages.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Colmar","time":"30 min","desc":"Storybook Alsatian town with pastel half-timbered houses and the Little Venice canals — the classic Alsace day trip, an easy half-hour down the line.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Obernai","time":"30 min","desc":"A walled wine town on the Route des Vins — ramparts, a belfry, and a market square of flower-decked Alsatian houses, all a short walk to the old centre.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Baden-Baden","time":"Germany · 45 min","desc":"Elegant Black Forest spa town across the Rhine — thermal baths, belle-époque promenades, and a famous casino, an easy hop over the border.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Basel","time":"Switzerland · 1 hr 20 min","desc":"Rhine-side Swiss city with a renowned art scene — the Kunstmuseum and Fondation Beyeler — and a medieval old town wrapped around the river.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Stuttgart","folder":"Stuttgart","guide":"stuttgart_v1.html","url":"../Guides/Stuttgart/stuttgart_v1.html","trips":[{"dest":"Ludwigsburg","time":"15 min","desc":"The Versailles of Swabia — one of Europe's largest surviving Baroque palaces, 452 rooms and the vast Blühendes Barock gardens. A 15-minute S-Bahn ride to the heart of town.","book":[{"label":"Deutsche Bahn","url":"https://int.bahn.de/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Esslingen am Neckar","time":"15 min","desc":"A medieval town of 200-plus half-timbered houses, cobbled lanes and Germany's oldest sparkling-wine cellar, nicknamed Little Venice for its canals. Fifteen minutes by S-Bahn line S1.","book":[{"label":"Deutsche Bahn","url":"https://int.bahn.de/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Tübingen","time":"45 min","desc":"A postcard university town on the Neckar — punts gliding past pastel houses, a hilltop Renaissance castle and one of Germany's prettiest old towns. A 45-minute regional train ride.","book":[{"label":"Deutsche Bahn","url":"https://int.bahn.de/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Heidelberg","time":"45 min","desc":"Germany's most-visited town after Munich — a ruined red-sandstone castle looming above the old town, a Baroque Marktplatz, and the country's oldest university founded in 1386. Direct ICE trains run in under 45 minutes.","book":[{"label":"Deutsche Bahn","url":"https://int.bahn.de/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Baden-Baden","time":"1h","desc":"Europe's grand thermal spa town — the Roman Caracalla Baths, the Belle Époque Kurhaus casino, and 18th-century colonnades set in the Black Forest foothills. Direct regional trains run hourly on the Mannheim–Basel mainline.","book":[{"label":"Deutsche Bahn","url":"https://int.bahn.de/en"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Sydney","folder":"Sydney","guide":"sydney_v2.html","url":"../Guides/Sydney/sydney_v2.html","trips":[{"dest":"Royal National Park","time":"1h","desc":"The second-oldest national park in the world · 1879, 30 km south of Sydney. The coastal walk Bundeena–Otford runs 26 km along sandstone cliffs above the Tasman Sea. The Valley of the Waters waterfall circuit at Wentworth Falls is the most accessible rainforest walk in the park.","book":[{"label":"transportnsw.info","url":"https://www.transportnsw.info"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Central Coast — Terrigal","time":"1h 30 min","desc":"A quiet beach town on the Central Coast — calmer sea than Bondi, good surf at The Haven, and one long esplanade of restaurants facing the beach. The Skillion headland walk above town is a 15-minute scramble with a panoramic Pacific view.","book":[{"label":"transportnsw.info","url":"https://www.transportnsw.info"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Taipei","folder":"Taipei","guide":"taipei_v1.html","url":"../Guides/Taipei/taipei_v1.html","trips":[{"dest":"Taichung","time":"1 hr","desc":"Taiwan's second city — Rainbow Village is a neighbourhood painted in exuberant murals by a retired soldier, Miyahara is an ice cream parlour in a restored early-20th-century ophthalmologist's office, and Fengjia Night Market is the island's largest.","book":[{"label":"THSR","url":"https://www.thsrc.com.tw/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Tainan","time":"1 hr 25 min","desc":"Taiwan's oldest city and culinary capital — colonial-era forts, Qing-dynasty shrines, and a street-food culture denser than anywhere else on the island. Eat along Haian Road and the alleys around Chihkan Tower; the coffin bread and milkfish congee are morning staples.","book":[{"label":"THSR","url":"https://www.thsrc.com.tw/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Hualien","time":"2 hrs","desc":"Gateway to Taroko Gorge — a 19-km marble canyon with turquoise water, suspension bridges, and walking tunnels cut through cliffs. Travel by TRA; Hualien is not on the THSR network. Go early — gorge road access is managed after rainfall.","book":[{"label":"TRA","url":"https://www.railway.gov.tw/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Tallinn","folder":"Tallinn","guide":"tallinn_v1.html","url":"../Guides/Tallinn/tallinn_v1.html","trips":[{"dest":"Paldiski","time":"45 min","desc":"A Soviet-era port town on a limestone headland — abandoned nuclear submarine training facilities, a rugged coastal cliff walk, and almost no tourists; a strange and striking half-day.","book":[{"label":"Elron","url":"https://elron.ee/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Rakvere","time":"1 hr 15 min","desc":"A compact medieval castle town on the edge of the Lahemaa plateau — the 14th-century Rakvere Castle and its reconstructed battlement walk are the centrepiece, with a manageable old town and an excellent local food hall nearby.","book":[{"label":"Elron","url":"https://elron.ee/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Tartu","time":"2 hr","desc":"Estonia's university city and intellectual capital — the Tartu University Main Building, the botanical garden, and the Town Hall square make it a complete half-day on its own; the Estonian National Museum is a further hour on the edge of town.","book":[{"label":"Elron","url":"https://elron.ee/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Narva","time":"2 hr 30 min","desc":"Estonia's easternmost city on the Russian border — the 14th-century Narva Castle faces the Ivangorod Fortress directly across the Narva River, the most dramatic face-off of two medieval fortresses in the Baltic. The restored town hall square is compact and walkable.","book":[{"label":"Elron","url":"https://elron.ee/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Pärnu","time":"2 hr 30 min","desc":"Estonia's summer capital — a broad sandy beach, a compact Art Deco old town, and the Pärnu Mud Baths spa resort all within easy walking distance of the central station.","book":[{"label":"Elron","url":"https://elron.ee/en"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Tbilisi","folder":"Tbilisi","guide":"tbilisi_v1.html","url":"../Guides/Tbilisi/tbilisi_v1.html","trips":[{"dest":"Mtskheta","time":"30 min","desc":"The ancient capital of the Kingdom of Kartli — a UNESCO World Heritage Site at the confluence of the Mtkvari and Aragvi rivers, whose Svetitskhoveli Cathedral is one of the most revered churches in the Caucasus.","book":[{"label":"Omio","url":"https://www.omio.com/trains/tbilisi/mtskheta"}]},{"dest":"Gori","time":"1 hr 30 min","desc":"Birthplace of Stalin, with a Stalin Museum that remains one of the most unusual in the region — and the medieval Gori Fortress rising above the town on the Mtkvari River.","book":[{"label":"Omio","url":"https://www.omio.com/trains/tbilisi/gori"}]},{"dest":"Borjomi","time":"3 hr","desc":"A resort town in a deep gorge of the Lesser Caucasus, famous across the post-Soviet world for its mineral water. The spa park at its centre has carbonated springs rising through the rock.","book":[{"label":"Omio","url":"https://www.omio.com/trains/tbilisi/borjomi"}]},{"dest":"Kutaisi","time":"4 hr","desc":"Georgia's second city and historical capital of Colchis — home to Bagrati Cathedral and Gelati Monastery, both UNESCO World Heritage Sites, in a landscape of deep gorges above the Rioni River.","book":[{"label":"Omio","url":"https://www.omio.com/trains/tbilisi/kutaisi"}]},{"dest":"Batumi","time":"5 hr","desc":"A Black Sea resort city on the Turkish border — a striking mix of 19th-century European-style boulevards and a modern seafront with botanical gardens stretching along the coast.","book":[{"label":"Omio","url":"https://www.omio.com/trains/tbilisi/batumi"}]}]},{"city":"Tokyo","folder":"Tokyo","guide":"tokyo_v1.html","url":"../Guides/Tokyo/tokyo_v1.html","trips":[{"dest":"Mount Takao","time":"50 min","desc":"A forested mountain on the western edge of the city — 599 metres with six marked trails including a paved cable-car-assisted path and a steep forest route. Summit views take in the Kanto plain and, on clear winter days, Mount Fuji. Keio Line · Shinjuku to Takaosanguchi · no transfer.","book":[{"label":"Omio","url":"https://www.omio.com"},{"label":"Keio Railway","url":"https://www.keio.co.jp/english/"}]},{"dest":"Kamakura","time":"1h","desc":"Coastal town that served as Japan's medieval capital — home to the Great Buddha seated outdoors, and Tsurugaoka Hachimangu shrine connected to the sea by a ceremonial cherry-tree avenue. JR Yokosuka Line · direct · no transfer.","book":[{"label":"Omio","url":"https://www.omio.com"},{"label":"JR EAST","url":"https://www.jreast.co.jp/e/"}]},{"dest":"Hakone","time":"1h 30 min","desc":"Mountain resort in volcanic caldera country — hot spring onsen, an open-air sculpture museum, and the most reliable Mount Fuji view at Owakudani crater via ropeway. Hakone Freepass covers the Romancecar express, ropeway, and lake cruise. Odakyu Romancecar · Shinjuku to Hakone-Yumoto · advance reservation required.","book":[{"label":"Omio","url":"https://www.omio.com"},{"label":"Odakyu Railway","url":"https://www.odakyu.jp/english/romancecar/"}]}]},{"city":"Toledo","folder":"Toledo","guide":"toledo_v1.html","url":"../Guides/Toledo/toledo_v1.html","trips":[{"dest":"Madrid","time":"33 min","desc":"Renfe Avant high-speed regional train. Direct service to Madrid Atocha — runs roughly every 1–2 hours throughout the day. Easy day trip in either direction.","book":[{"label":"renfe.com","url":"https://www.renfe.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Aranjuez","time":"55 min","desc":"A royal Bourbon palace surrounded by formal French gardens on the banks of the Tagus — the Palacio Real de Aranjuez, its Hall of Mirrors, and the Garden of the Prince. Direct regional train via Algodor junction.","book":[{"label":"renfe","url":"https://www.renfe.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Segovia","time":"1h","desc":"A UNESCO World Heritage city — the soaring 1st-century Roman aqueduct, the fairy-tale Alcázar castle, and a cathedral crowning the walled hilltop. Change at Madrid Atocha onto the AVE high-speed service to Segovia.","book":[{"label":"renfe","url":"https://www.renfe.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Cuenca","time":"1h 30 min","desc":"A medieval UNESCO city perched above two river gorges — the Casas Colgadas hanging houses cantilevered over the cliff edge, and a cathedral with abstract modern art inside. Change at Madrid Atocha onto the high-speed service to Cuenca.","book":[{"label":"renfe","url":"https://www.renfe.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Ávila","time":"2h","desc":"The best-preserved medieval walled city in Spain — 2.5 km of 11th-century ramparts with 88 watchtowers still encircling the old town, and the birthplace of Saint Teresa. Change at Madrid Atocha onto the regional train to Ávila.","book":[{"label":"renfe","url":"https://www.renfe.com/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Toronto","folder":"Toronto","guide":"toronto_v1.html","url":"../Guides/Toronto/toronto_v1.html","trips":[{"dest":"Niagara Falls","time":"2 hr","desc":"The thundering Horseshoe Falls — GO trains reach Niagara Falls GO station year-round, seven days a week, and the WEGO bus links the station to the falls. Add Journey Behind the Falls or a Niagara City Cruise once there, and walk the river path to the Whirlpool if time allows.","book":[{"label":"GO Transit","url":"https://www.gotransit.com/en/partners-and-promotions/promo-take-go-transit-to-niagara-falls"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Turin","folder":"Turin","guide":"turin_v14.html","url":"../Guides/Turin/turin_v14.html","trips":[{"dest":"Asti","time":"30 min","desc":"The Piedmontese wine capital in the heart of Moscato and Barbera country — a medieval tower-studded skyline, the Palio d'Asti horse race held every September, and a cathedral considered the finest Gothic church in Piedmont.","book":[{"label":"trenitalia","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Alessandria","time":"45 min","desc":"A Piedmontese market city known for the Borsalino hat museum, a grand neoclassical cathedral, and a star-shaped 18th-century fortress — one of the largest Baroque defensive works in Europe still standing intact.","book":[{"label":"trenitalia","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Cuneo","time":"1h","desc":"A handsome Piedmontese town at the foot of the Maritime Alps — broad arcaded streets, a weekly Tuesday market renowned across the region, and the gateway to the Mondovì valleys with views of the alpine peaks.","book":[{"label":"trenitalia","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Genoa","time":"1h 50 min","desc":"Italy's largest historic port — Via Garibaldi's UNESCO-listed Palazzi dei Rolli · 16th-century mansions of the Genoese banking elite, the medieval Caruggi lanes descending to the Old Port, and the cathedral of San Lorenzo with its striped Romanesque–Gothic façade.","book":[{"label":"trenitalia.com","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Aosta","time":"2h","desc":"Italy's smallest regional capital at the foot of Mont Blanc — a Roman triumphal arch, a perfectly preserved amphitheatre, medieval towers, and a cathedral with an exceptional treasure museum, all encircled by the Alps at 583 m altitude.","book":[{"label":"trenitalia","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Venice","folder":"Venice","guide":"venice_v1.html","url":"../Guides/Venice/venice_v1.html","trips":[{"dest":"Padua","time":"25 min","desc":"Giotto's breathtaking Scrovegni Chapel frescoes, the great Basilica of St Anthony, and the grand Caffè Pedrocchi — a fast, easy hop on the train.","book":[{"label":"trenitalia.com","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Vicenza","time":"30 min","desc":"Palladio's UNESCO city of villas and the astonishing Teatro Olimpico, the oldest surviving indoor theatre in the world.","book":[{"label":"trenitalia.com","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Ferrara","time":"35 min","desc":"A perfectly preserved Renaissance city — the Este dynasty's Castello Estense rising above the old town, UNESCO-listed Renaissance streets on a grid plan, and the Palazzo dei Diamanti with its 8,500 marble pyramids. Direct regional trains run regularly.","book":[{"label":"trenitalia","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Verona","time":"1h 10 min","desc":"The Roman Arena that still stages summer opera, Juliet's balcony, and a romantic UNESCO old town on the Adige river.","book":[{"label":"trenitalia.com","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Bologna","time":"1h 20 min","desc":"Italy's food capital — 40 km of arcaded porticoes through a medieval old town, the leaning Asinelli and Garisenda towers, and the Emilian table that gave the world ragù, mortadella and tagliatelle. Direct Frecciarossa trains run every 30 minutes.","book":[{"label":"trenitalia","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Verona","folder":"Verona","guide":"verona_v1.html","url":"../Guides/Verona/verona_v1.html","trips":[{"dest":"Lake Garda","time":"15 min","desc":"Peschiera del Garda on Italy's largest lake — lakefront promenades, ferries to Sirmione's castle and Roman ruins.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Vicenza","time":"30 min","desc":"Palladio's Renaissance city — the Teatro Olimpico, the Basilica Palladiana and the hilltop Villa La Rotonda.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Padua","time":"45 min","desc":"Giotto's Scrovegni Chapel frescoes, the Basilica of St Anthony and the vast Prato della Valle square.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Mantua","time":"45 min","desc":"Gonzaga Renaissance capital ringed by three lakes, with the frescoed Palazzo Ducale and Palazzo Te.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Venice","time":"1 hr 10 min","desc":"St Mark's Square, the Grand Canal and the Rialto — Italy's incomparable lagoon city, an easy direct ride away.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Vienna","folder":"Vienna","guide":"vienna_v1.html","url":"../Guides/Vienna/vienna_v1.html","trips":[{"dest":"Baden bei Wien","time":"35 min","desc":"A Biedermeier spa town where Beethoven and Schubert both summered — thermal baths still flowing, a pedestrian old town, a rose garden in the Kurpark and a casino in the colonnaded Kurhaus. Direct S-Bahn S1 runs every 15 minutes.","book":[{"label":"oebb","url":"https://www.oebb.at/en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Krems an der Donau","time":"1h 10 min","desc":"The gateway to the Wachau UNESCO valley — a handsome medieval old town at the bend of the Danube, surrounded by terraced vineyards, the Göttweig abbey on the hill opposite, and the Kunsthalle Krems contemporary art museum in a converted tobacco factory.","book":[{"label":"oebb","url":"https://www.oebb.at/en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Budapest","time":"2 hrs 20 min","desc":"The twin capitals of Pest and Buda face each other across the Danube — Parliament, Buda Castle, thermal baths, and one of the world's great ruin-bar scenes. Bring valid ID or passport; this is a different country.","book":[{"label":"thetrainline.com","url":"https://www.thetrainline.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Salzburg","time":"2 hrs 22 min","desc":"Mozart's birthplace and Austria's Baroque festival city — the old town is UNESCO-listed, Hohensalzburg Fortress rises above the Salzach, and the surrounding hills provided the backdrop for The Sound of Music. Compact enough to walk in a day.","book":[{"label":"thetrainline.com","url":"https://www.thetrainline.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Graz","time":"2 hrs 36 min","desc":"Austria's second-largest city and most livable — a Renaissance old town, UNESCO-listed, the Kunsthaus Graz floating above the Mur, and the Schlossberg clock tower overlooking it all. A city still at ease with itself, without the crowds.","book":[{"label":"thetrainline.com","url":"https://www.thetrainline.com"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Washington DC","folder":"Washington-DC","guide":"washington-dc_v1.html","url":"../Guides/Washington-DC/washington-dc_v1.html","trips":[{"dest":"Baltimore","time":"40 min","desc":"Inner Harbor · National Aquarium · Fort McHenry, birthplace of the Star-Spangled Banner, all a short ride beyond Baltimore Penn Station.","book":[{"label":"amtrak.com","url":"https://www.amtrak.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"New York City","time":"2 hr 40 min","desc":"Acela and Northeast Regional reach Penn Station; 30th Street Station connects to Midtown for a full day.","book":[{"label":"amtrak.com","url":"https://www.amtrak.com"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Wellington","folder":"Wellington","guide":"wellington_v1.html","url":"../Guides/Wellington/wellington_v1.html","trips":[{"dest":"Kāpiti Coast","time":"1 hr","desc":"The electric Kāpiti Line runs up the coast to Paraparaumu and Waikanae — long surf beaches, the Southward car museum and boat tours out to the Kāpiti Island bird sanctuary.","book":[{"label":"Metlink","url":"https://www.metlink.org.nz"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Wairarapa","time":"1 hr 10 min","desc":"The Wairarapa Line climbs over the Remutaka Ranges to Featherston, gateway to the Martinborough vineyards and the heritage village of Greytown — New Zealand's pinot-noir country.","book":[{"label":"Metlink","url":"https://www.metlink.org.nz"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Zurich","folder":"Zurich","guide":"zurich_v1.html","url":"../Guides/Zurich/zurich_v1.html","trips":[{"dest":"Rapperswil","time":"40 min","desc":"The \"City of Roses\" on the southern shore of Lake Zurich — a medieval castle above rose gardens, a compact hilltop old town, and lakefront cafés. Easy half-day.","book":[{"label":"sbb.ch","url":"https://www.sbb.ch/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Luzern","time":"41 min","desc":"Chapel Bridge, the Lion Monument, and the Museggmauer medieval walls. Cable cars to Pilatus or Mount Rigi for Alpine panoramas. Trains every 30 minutes.","book":[{"label":"sbb.ch","url":"https://www.sbb.ch/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Rhine Falls + Stein am Rhein","time":"47 min","desc":"Europe's most powerful waterfall at Neuhausen am Rheinfall — boat ride to the central rock — then 20 minutes by S9 to Stein am Rhein, one of the finest medieval towns in Central Europe.","book":[{"label":"sbb.ch","url":"https://www.sbb.ch/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Basel","time":"53 min","desc":"Switzerland's art capital — the Kunstmuseum Basel holds one of Europe's oldest public art collections — and a beautifully preserved Rhine waterfront.","book":[{"label":"sbb.ch","url":"https://www.sbb.ch/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Bern","time":"57 min","desc":"UNESCO-listed capital with six kilometres of arcaded walkways, the Zytglogge astronomical clock, the Bear Park, and the Rose Garden panorama above the old town.","book":[{"label":"sbb.ch","url":"https://www.sbb.ch/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"St. Gallen","time":"1 hr","desc":"Home of the UNESCO-listed Abbey District — the Cathedral and the Stiftsbibliothek Abbey Library, one of the world's oldest libraries with a Baroque interior.","book":[{"label":"sbb.ch","url":"https://www.sbb.ch/en"},{"label":"Omio","url":"https://www.omio.com"}]}]}];

const list = document.getElementById('dt-list');
const stats = document.getElementById('dt-stats');
const search = document.getElementById('dt-search');
let openCity = null;

function renderStats(visible) {
  const trips = visible.reduce((s, c) => s + c.trips.length, 0);
  stats.innerHTML = `<span><b>${visible.length}</b> departure cities</span><span><b>${trips}</b> day trips</span>`;
}

function buildBook(book) {
  if (!book || !book.length) return '';
  const links = book.map(b =>
    `<a class="dt-book-link" href="${b.url}" target="_blank" rel="noopener">${b.label}</a>`
  ).join('');
  return `<div class="dt-book"><span class="dt-book-prefix">🎫</span>${links}</div>`;
}

function buildTrips(trips) {
  return trips.map(t => `
    <div class="dt-trip">
      <div class="dt-trip-head">
        <span class="dt-dest">${t.dest}</span>
        ${t.time ? `<span class="dt-time">${t.time}</span>` : ''}
      </div>
      <p class="dt-desc">${t.desc}</p>
      ${buildBook(t.book)}
    </div>
  `).join('');
}

function render(cities) {
  if (!cities.length) {
    list.innerHTML = '<div class="dt-empty">No cities match that search.</div>';
    renderStats([]);
    return;
  }
  renderStats(cities);
  list.innerHTML = cities.map((c, i) => `
    <div class="dt-city" data-idx="${i}" data-city="${c.city.toLowerCase()}">
      <div class="dt-city-head" role="button" aria-expanded="false" tabindex="0">
        <span class="dt-city-name">${c.city}</span>
        <span class="dt-city-count">${c.trips.length} trip${c.trips.length !== 1 ? 's' : ''}</span>
        <a class="dt-guide-link" href="${c.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Guide →</a>
        <span class="dt-city-arrow">▶</span>
      </div>
      <div class="dt-trips">${buildTrips(c.trips)}</div>
    </div>
  `).join('');

  list.querySelectorAll('.dt-city-head').forEach(head => {
    head.addEventListener('click', () => toggleCity(head.closest('.dt-city')));
    head.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleCity(head.closest('.dt-city')); }});
  });
}

function toggleCity(el) {
  const isOpen = el.classList.contains('open');
  list.querySelectorAll('.dt-city.open').forEach(o => {
    o.classList.remove('open');
    o.querySelector('.dt-city-head').setAttribute('aria-expanded', 'false');
  });
  if (!isOpen) {
    el.classList.add('open');
    el.querySelector('.dt-city-head').setAttribute('aria-expanded', 'true');
  }
}

function filter(q) {
  const lower = q.toLowerCase().trim();
  const visible = lower ? DATA.filter(c => c.city.toLowerCase().includes(lower)) : DATA;
  render(visible);
  if (lower && visible.length === 1) toggleCity(list.querySelector('.dt-city'));
}

search.addEventListener('input', () => filter(search.value));

if (window.TVESearch) {
  TVESearch.attach(search, {
    items: DATA.map(d => ({ name: d.city, sub: '' })),
    onPick: function(it) {
      search.value = it.name;
      filter(it.name);
    }
  });
}

// Initial render
render(DATA);
</script>
