<style>
/* ── Page tokens ──────────────────────────────────── */
:root {
  --dt-ink:     var(--text, #2c2a24);
  --dt-muted:   #6a6760;
  --dt-subtle:  #9c9790;
  --dt-bg:      var(--bg, #f5f3ee);
  --dt-card:    var(--surface, #ffffff);
  --dt-rule:    #dbd8d0;
  --dt-rule2:   #cbc8c0;
  --dt-accent:  var(--accent, #c8a44a);
  --dt-terra:   #b85c2a;
  --dt-terra-s: #f0e3da;
  --dt-shadow:  0 1px 3px rgba(0,0,0,.06), 0 4px 14px rgba(0,0,0,.07);
}

/* ── Layout ───────────────────────────────────────── */
.dt-wrap {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 32px 80px;
}

/* ── Search bar ───────────────────────────────────── */
.dt-search-wrap { display: flex; justify-content: center; margin: 28px 0 24px; }

/* ── Stats bar ────────────────────────────────────── */
.dt-stats {
  font-size: 13px;
  color: var(--dt-muted);
  margin-bottom: 20px;
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.dt-stats b { color: var(--dt-ink); font-weight: 650; }

/* ── City group ───────────────────────────────────── */
.dt-city {
  border: 1px solid var(--dt-rule);
  border-radius: 10px;
  margin-bottom: 10px;
  background: var(--dt-card);
  overflow: hidden;
  box-shadow: var(--dt-shadow);
}
.dt-city-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 18px;
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid transparent;
  transition: background .12s;
}
.dt-city-head:hover { background: var(--dt-terra-s); }
.dt-city.open .dt-city-head {
  border-bottom-color: var(--dt-rule);
  background: var(--dt-terra-s);
}
.dt-city-name {
  font-weight: 700;
  font-size: 15.5px;
  color: var(--dt-ink);
  flex: 1;
}
.dt-city-count {
  font-size: 12px;
  color: var(--dt-muted);
  font-family: ui-monospace, Menlo, Consolas, monospace;
  background: var(--dt-bg);
  border: 1px solid var(--dt-rule2);
  border-radius: 6px;
  padding: 2px 9px;
}
.dt-city-arrow {
  color: var(--dt-subtle);
  font-size: 13px;
  transition: transform .2s;
}
.dt-city.open .dt-city-arrow { transform: rotate(90deg); }
.dt-guide-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--dt-accent);
  text-decoration: none;
  padding: 3px 8px;
  border: 1px solid var(--dt-accent);
  border-radius: 5px;
  white-space: nowrap;
  font-family: ui-monospace, Menlo, Consolas, monospace;
}
.dt-guide-link:hover { background: var(--dt-terra-s); color: var(--dt-terra); border-color: var(--dt-terra); }

/* ── Trip entries ─────────────────────────────────── */
.dt-trips { padding: 0 18px 14px; display: none; }
.dt-city.open .dt-trips { display: block; }

.dt-trip {
  padding: 13px 0;
  border-bottom: 1px solid var(--dt-rule);
  display: grid;
  grid-template-columns: 1fr;
  gap: 5px;
}
.dt-trip:last-child { border-bottom: none; }

.dt-trip-head {
  display: flex;
  align-items: baseline;
  gap: 10px;
  flex-wrap: wrap;
}
.dt-dest {
  font-weight: 700;
  font-size: 15px;
  color: var(--dt-ink);
}
.dt-time {
  font-size: 12.5px;
  color: var(--dt-terra);
  font-family: ui-monospace, Menlo, Consolas, monospace;
  white-space: nowrap;
}
.dt-desc {
  font-size: 14px;
  color: var(--dt-ink);
  line-height: 1.55;
  margin: 0;
}
.dt-book {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
  margin-top: 3px;
}
.dt-book-link {
  font-size: 12px;
  color: var(--dt-muted);
  text-decoration: none;
  padding: 2px 9px;
  border: 1px solid var(--dt-rule2);
  border-radius: 5px;
  font-family: ui-monospace, Menlo, Consolas, monospace;
  background: var(--dt-bg);
  transition: border-color .12s, color .12s;
}
.dt-book-link:hover { border-color: var(--dt-accent); color: var(--dt-accent); }
.dt-book-prefix { font-size: 12px; color: var(--dt-subtle); align-self: center; }

/* ── Empty state ──────────────────────────────────── */
.dt-empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--dt-muted);
  font-size: 15px;
}

/* ── Mobile ───────────────────────────────────────── */
@media (max-width: 600px) {
  .dt-wrap { padding: 0 14px 60px; }
  .dt-city-head { padding: 11px 14px; }
  .dt-trips { padding: 0 14px 12px; }
}
</style>
</head>

<script>
const DATA = [{"city":"Aix en Provence","folder":"Aix-en-Provence","guide":"aix-en-provence_v1.html","url":"../Guides/Aix-en-Provence/aix-en-provence_v1.html","trips":[{"dest":"Avignon","time":"25 min","desc":"The walled papal city on the Rhône — the colossal Palais des Papes, the famous half-bridge of the song, and a compact medieval core reachable by direct TGV in under half an hour.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Marseille","time":"45 min","desc":"Provence's sun-baked port capital — the Vieux-Port, the Panier old town, the MuCEM, and the white-cliffed Calanques just beyond. Frequent regional trains run south through the day.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Arles","time":"1 hr","desc":"Roman Provence and Van Gogh's light — a UNESCO amphitheatre still hosting events, an antique theatre, and the café façades the painter immortalised.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Cassis","time":"1 hr 30 min","desc":"A pastel fishing port beneath dramatic limestone cliffs — gateway to the Calanques inlets and ringed by terraced vineyards.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Montpellier","time":"1 hr 45 min","desc":"Languedoc capital with a pedestrian-only medieval core, the oldest botanical garden in France, and a grand 19th-century aqueduct-fed water tower at Place de la Comédie.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Amsterdam","folder":"Amsterdam","guide":"amsterdam_v1.html","url":"../Guides/Amsterdam/amsterdam_v1.html","trips":[{"dest":"Haarlem","time":"20 min by NS Sprinter","desc":"One of the best-preserved medieval cities in the Netherlands. The Frans Hals Museum holds the world's greatest collection of Dutch Golden Age group portraits. The Grote Markt is among the finest medieval squares in Northern Europe.","book":[{"label":"ns.nl","url":"https://www.ns.nl"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Leiden","time":"35 min","desc":"University city and birthplace of Rembrandt, with a clutch of specialist museums — the Rijksmuseum van Oudheden holds a complete Egyptian temple — and a canal-laced medieval centre denser than Amsterdam.","book":[{"label":"ns.nl","url":"https://www.ns.nl/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Rotterdam","time":"40 min by NS Intercity","desc":"Europe's largest port and boldest modern skyline — the Cube Houses, Markthal, Depot Boijmans Van Beuningen, and Erasmusbrug define a city completely rebuilt after WWII. It looks like no other Dutch city.","book":[{"label":"ns.nl","url":"https://www.ns.nl"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"The Hague","time":"50 min","desc":"The Dutch seat of government and home of the Mauritshuis — one room holds Vermeer's Girl with a Pearl Earring and Rembrandt's The Anatomy Lesson. The Peace Palace and the North Sea beach at Scheveningen are 10 minutes apart.","book":[{"label":"ns.nl","url":"https://www.ns.nl/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Delft","time":"60 min by NS Intercity","desc":"The city of Vermeer and blue-and-white Delftware. Canals, gabled houses, and a fairy-tale Markt — the Nieuwe Kerk and Prinsenhof flank the square where Willem van Oranje was assassinated in 1584.","book":[{"label":"ns.nl","url":"https://www.ns.nl"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Annecy","folder":"Annecy","guide":"annecy_v1.html","url":"../Guides/Annecy/annecy_v1.html","trips":[{"dest":"Albertville","time":"30 min","desc":"Alpine town that hosted the 1992 Winter Olympics, with a compact medieval quarter in the Conflans district perched above the Arly river — a pleasant half-day alongside the 1992 Olympic museum and the Wednesday market.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Chambéry","time":"36 min","desc":"The historic capital of Savoy — an arcaded old town, the dukes' castle and the flamboyant Fontaine des Éléphants.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Geneva","time":"Switzerland · 1 hr 30 min","desc":"Lakeside Swiss city with the soaring Jet d'Eau fountain, a steep medieval Old Town and a long promenade along Lake Geneva.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Lyon","time":"2 hr","desc":"France's gastronomic capital — Renaissance Vieux Lyon, its hidden traboule passageways, the Fourvière basilica and the classic bouchon bistros.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Chamonix-Mont-Blanc","time":"2 hr 30 min","desc":"Alpine capital beneath Mont Blanc. Ride the Aiguille du Midi cable car to 3,842 m for glacier-and-summit panoramas, or the Montenvers rack railway to the Mer de Glace.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Athens","folder":"Athens","guide":"athens_v1.html","url":"../Guides/Athens/athens_v1.html","trips":[{"dest":"Kiato","time":"1 hr","desc":"Southern terminus of the Athens suburban railway on the Gulf of Corinth — a quiet seaside town with a fishing harbour and a pebble beach that makes a relaxed half-day escape; the Corinth Isthmus canal is 20 minutes further by local connection.","book":[{"label":"hellenictrain","url":"https://www.hellenictrain.gr/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Chalkida","time":"1 hr 20 min","desc":"Capital of Euboea, joined to the mainland by a short bridge over the Euripus Strait — a narrow channel whose tidal currents reverse direction several times a day. Aristotle studied the shifting water here; today the seafront promenade above it is lined with fish tavernas.","book":[{"label":"Hellenic Train","url":"https://www.hellenictrain.gr/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Thiva","time":"1 hr 30 min","desc":"Ancient Thebes, birthplace of Pindar and Oedipus, with an archaeological museum holding Mycenaean-era armour and Linear B tablets found nowhere else in continental Greece — a compact visit with far less competition than Athens or Delphi.","book":[{"label":"hellenictrain","url":"https://www.hellenictrain.gr/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Lamia","time":"2 hr","desc":"Central Greek market town below the Othrys mountains, with a Catalan-built medieval castle above the old quarter and a small but well-labelled archaeological museum — a low-key contrast to the tourist circuit and rarely visited by foreign travellers.","book":[{"label":"hellenictrain","url":"https://www.hellenictrain.gr/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Volos","time":"3 hr 15 min","desc":"Port city at the foot of Mount Pelion and the legendary home of the Argonauts, with a lively waterfront lined with tsipouradika — ouzo-and-meze taverns unique to the region — and a strong archaeological museum covering the prehistoric Dimini and Sesklo sites.","book":[{"label":"hellenictrain","url":"https://www.hellenictrain.gr/en"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Bangkok","folder":"Bangkok","guide":"bangkok_v1.html","url":"../Guides/Bangkok/bangkok_v1.html","trips":[{"dest":"Kanchanaburi","time":"2 hr 30 min","desc":"Site of the Death Railway and Bridge over the River Kwai, built by Allied POWs under Japanese occupation. The JEATH War Museum and Commonwealth War Cemetery anchor the visit; the surrounding valley is lush and peaceful. Recommended by Fodor's, Rough Guides, and Lonely Planet.","book":[{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Barcelona","folder":"Barcelona","guide":"barcelona_v1.html","url":"../Guides/Barcelona/barcelona_v1.html","trips":[{"dest":"Tarragona","time":"35 min","desc":"A UNESCO World Heritage Roman city with the finest Roman ruins on the Iberian Peninsula — amphitheater above the sea, a circus, aqueduct, and Romanesque cathedral above a well-preserved old town.","book":[{"label":"Renfe","url":"https://www.renfe.com/es/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Sitges","time":"40 min","desc":"A beautiful Art Nouveau resort town on the Costa Daurada — white-washed churches, a seafront promenade, and the Cau Ferrat museum built by painter Santiago Rusiñol. The architecture and atmosphere are the draw.","book":[{"label":"Renfe","url":"https://www.renfe.com/es/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Montserrat","time":"1 hr","desc":"The extraordinary serrated mountain crowned by the Benedictine Monastery of Montserrat and its revered Black Madonna. The jagged rock formations above the plain are as impressive as the monastery itself.","book":[{"label":"Renfe","url":"https://www.renfe.com/es/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Vic","time":"1 hr 15 min","desc":"Medieval Catalan market town with a Roman temple in the main square and a cathedral cloister that shelters a full-wall cycle of Josep Maria Sert murals — one of the most unusual painted interiors in Spain, repainted after Civil War destruction.","book":[{"label":"renfe","url":"https://www.renfe.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Figueres","time":"1 hr 30 min","desc":"The Dalí Theatre-Museum — the largest Surrealist object in the world, designed by Salvador Dalí as his own monument and final resting place. Contains his most comprehensive collection and is unlike any other museum.","book":[{"label":"Renfe","url":"https://www.renfe.com/es/en"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Beijing","folder":"Beijing","guide":"beijing_v1.html","url":"../Guides/Beijing/beijing_v1.html","trips":[{"dest":"Chengde","time":"2h 30min","desc":"The Qing summer capital — China's largest imperial garden complex ringed by eight extraordinary Tibetan-style temples. UNESCO World Heritage. Far less visited than the equivalent sites in the capital.","book":[{"label":"China Railway","url":"https://www.12306.cn/en/index.html"}]},{"dest":"Xi'an","time":"4h 30min","desc":"The Terracotta Army of Emperor Qin Shi Huang — 8000 life-size warrior figures in three excavation pits. The walled Tang-dynasty capital, Shaanxi History Museum, and Muslim Quarter food street complete the picture.","book":[{"label":"China Railway","url":"https://www.12306.cn/en/index.html"}]},{"dest":"Shanghai","time":"4h 30min","desc":"China's financial capital and one of the world's great Art Deco cities. The Bund's colonial waterfront facing Pudong's skyline is one of the great urban views. The French Concession, Yu Garden, and Shanghai Museum anchor the cultural itinerary.","book":[{"label":"China Railway","url":"https://www.12306.cn/en/index.html"}]}]},{"city":"Bergen","folder":"Bergen","guide":"bergen_v1.html","url":"../Guides/Bergen/bergen_v1.html","trips":[{"dest":"Dale","time":"50 min","desc":"Small fjord village in the Dalselvi valley, once home to a celebrated wool mill — the intact factory complex is now a heritage site, and the surrounding hillsides and the Veafjorden offer easy walks with no tourist crowds.","book":[{"label":"vy.no","url":"https://www.vy.no/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Voss","time":"1 hr 5 min","desc":"Norway's adrenaline capital, on a lake ringed by mountains — the Voss Gondol cable car climbs straight up beside the station, with rafting, hiking and stave-church country all around. An easy hour up the Bergen Line.","book":[{"label":"Vy","url":"https://www.vy.no/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Myrdal","time":"2 hr","desc":"High-mountain junction station on the Bergen-Oslo line at 866 m, where the snow-clad Hardangervidda plateau unfolds around the platforms — the drama of the descent alone justifies the trip, with steep snowfields visible even in early summer.","book":[{"label":"vy.no","url":"https://www.vy.no/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Flåm","time":"2 hr 30 min","desc":"Ride the Bergen Line to Myrdal, then the famous Flåm Railway down a near-vertical valley of waterfalls to the Aurlandsfjord, an arm of the UNESCO-listed Nærøyfjord. One of the world's great train descents.","book":[{"label":"Vy","url":"https://www.vy.no/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Geilo","time":"3 hr 30 min","desc":"Norway's most popular ski resort sits on the open Hardangervidda plateau at 800 m — in summer the same landscape turns to hiking trails across Europe's largest mountain plateau, with the train journey crossing some of the most dramatic high-altitude scenery in Scandinavia.","book":[{"label":"vy.no","url":"https://www.vy.no/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Berlin","folder":"Berlin","guide":"berlin_v1.html","url":"../Guides/Berlin/berlin_v1.html","trips":[{"dest":"Lutherstadt Wittenberg","time":"40 min","desc":"The small town where Martin Luther launched the Reformation — the Castle Church door, Luther's house, and a compact, walkable old centre.","book":[{"label":"Deutsche Bahn","url":"https://int.bahn.de/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Leipzig","time":"1 hr 15 min","desc":"A handsome, music-steeped city — Bach's Thomaskirche, grand 19th-century shopping arcades, and the peaceful-revolution history of the GDR's final days.","book":[{"label":"Deutsche Bahn","url":"https://int.bahn.de/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Magdeburg","time":"Germany · 1 hr 25 min","desc":"Otto von Guericke's city on the Elbe, rebuilt after near-total WWII destruction around its restored Romanesque cathedral — the oldest Gothic cathedral in Germany — with a bold post-war urban fabric and the striking Green Citadel by Hundertwasser added in 2005.","book":[{"label":"bahn.de","url":"https://www.bahn.de/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Hamburg","time":"1 hr 45 min","desc":"Germany's great port city — the warehouse district of Speicherstadt, the Elbphilharmonie, and the canals and harbour that give it a northern, maritime feel.","book":[{"label":"Deutsche Bahn","url":"https://int.bahn.de/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Dresden","time":"2 hr","desc":"The rebuilt baroque capital of Saxony on the Elbe — the domed Frauenkirche, the Zwinger palace, and the Old Masters gallery, all within an easy walk of the station.","book":[{"label":"Deutsche Bahn","url":"https://int.bahn.de/en"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Bilbao","folder":"Bilbao","guide":"bilbao_v1.html","url":"../Guides/Bilbao/bilbao_v1.html","trips":[{"dest":"Vitoria-Gasteiz","time":"40 min","desc":"The Basque capital and UNESCO City of Gastronomy. The medieval old town — the largest in Spain by surface area — rings the hill above a thriving modern city.","book":[{"label":"Renfe","url":"https://www.renfe.com/content/renfe/language-masters/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Miranda de Ebro","time":"45 min","desc":"A compact Castilian town on the Ebro River with a well-preserved old quarter, a Gothic church, and a Saturday market. Overlooked by virtually every visitor and genuinely local in feel.","book":[{"label":"Renfe","url":"https://www.renfe.com/content/renfe/language-masters/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Santander","time":"55 min","desc":"Cantabria's capital sits on a wide bay above one of Spain's most beautiful urban beaches. The Magdalena Peninsula and the Cantabrian Museum of Prehistory are worth the morning.","book":[{"label":"Renfe","url":"https://www.renfe.com/content/renfe/language-masters/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"San Sebastián","time":"1 hr 15 min","desc":"The Parte Vieja packed with Michelin-starred restaurants and world-class bars, La Concha bay, and Monte Igueldo above. An unmissable addition to any Basque Country trip.","book":[{"label":"Renfe","url":"https://www.renfe.com/content/renfe/language-masters/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Pamplona","time":"1 hr 40 min","desc":"The walled city of Hemingway and the Running of the Bulls. The old town is a remarkably intact medieval grid, the bar scene rivals San Sebastián, and the 4-kilometer wall walk is superb.","book":[{"label":"Renfe","url":"https://www.renfe.com/content/renfe/language-masters/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Burgos","time":"2 hr","desc":"Home to one of Spain's finest Gothic cathedrals and the tomb of El Cid. The cathedral's 15th-century spires and the cloister are UNESCO highlights; the old town is flat and easily walkable.","book":[{"label":"Renfe","url":"https://www.renfe.com/content/renfe/language-masters/en"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Bologna","folder":"Bologna","guide":"bologna_v1.html","url":"../Guides/Bologna/bologna_v1.html","trips":[{"dest":"Modena","time":"30 min","desc":"The golden Romanesque Duomo and Ghirlandina tower, the balsamic-vinegar acetaie, and the Enzo Ferrari Museum on the edge of town.","book":[{"label":"trenitalia.com","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Florence","time":"35 min","desc":"The Frecciarossa shoots under the Apennines in 35 minutes, delivering you to a city with the highest concentration of Renaissance masterworks in the world — the Uffizi, Accademia, Duomo baptistery doors, and a dozen palaces all within 20 minutes' walk of Santa Maria Novella station.","book":[{"label":"trenitalia","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Ferrara","time":"40 min","desc":"A flawlessly preserved Renaissance city — the moated Este Castle at its heart, cobbled medieval lanes, and some of the best cycling streets in Italy.","book":[{"label":"trenitalia.com","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Parma","time":"1 hr","desc":"Home of Parmigiano-Reggiano and prosciutto — a pink-marble Baptistery and Correggio's frescoed domes in a refined ducal capital.","book":[{"label":"trenitalia.com","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Ravenna","time":"1 hr 20 min","desc":"Eight UNESCO monuments glittering with the finest Byzantine mosaics on earth, and Dante's tomb tucked beside the basilica of San Francesco.","book":[{"label":"trenitalia.com","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Bordeaux","folder":"Bordeaux","guide":"bordeaux_v1.html","url":"../Guides/Bordeaux/bordeaux_v1.html","trips":[{"dest":"Libourne","time":"25 min","desc":"Market town at the confluence of the Dordogne and Isle rivers, gateway to Pomerol and Saint-Émilion wine country — the Saturday market around the medieval town hall is one of the best in the Gironde, and the riverside quays are unhurried by the day-tripper crowds.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Saint-Émilion","time":"35 min by TER","desc":"UNESCO wine village on a limestone hill — Romanesque churches, underground catacombs hewn into the hillside, and Grand Cru châteaux on every ridge. The monolithic church is the largest underground church in Europe.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Arcachon","time":"45 min by TER","desc":"Atlantic beach town on a sheltered bay — Arcachon oysters at the port, swimming, and the Dune du Pilat, the tallest sand dune in Europe at 104 metres.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Périgueux","time":"1 hr 15 min","desc":"Capital of the Dordogne, with a spectacular Byzantine-Romanesque cathedral of five domes visible across the river and a medieval core dense with Renaissance mansions — the city is also the closest urban base to the prehistoric cave paintings of the Vézère valley.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"La Rochelle","time":"1 hr 45 min by TGV","desc":"Best-preserved medieval port in France — UNESCO-listed harbour guarded by three medieval towers, a car-free historic centre, and white limestone arcaded streets.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Boston","folder":"Boston","guide":"boston_v1.html","url":"../Guides/Boston/boston_v1.html","trips":[{"dest":"Providence","time":"RI · 45 min","desc":"A revitalised arts city — WaterFire on the rivers, the RISD Museum of Art, Benefit Street's Federal Hill mansions, and one of the strongest food scenes on the East Coast.","book":[{"label":"Amtrak","url":"https://www.amtrak.com/trains/acela.html"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Rockport","time":"70 min","desc":"A rocky granite headland north of the city — lobster shacks, tidal pools, and the red fishing shack at Motif No. 1 that has been painted more times than any other building in America.","book":[{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Portland","time":"ME · 1 hr 50 min","desc":"Maine's regenerated port city — the cobbled Old Port district, James Beard-recognised restaurants, the historic lighthouses of Cape Elizabeth, and the best lobster stew on the coast.","book":[{"label":"Amtrak Downeaster","url":"https://www.amtrak.com/trains/downeaster.html"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Bruges","folder":"Bruges","guide":"bruges_v1.html","url":"../Guides/Bruges/bruges_v1.html","trips":[{"dest":"Ostend","time":"15 min","desc":"The nearest North Sea resort: a long sandy beach, a breezy promenade and a celebrated modern-art museum — a quick sea-air escape barely 15 minutes by train.","book":[{"label":"SNCB","url":"https://www.belgiantrain.be/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Ghent","time":"30 min","desc":"Bruges' larger medieval sister: the towering St Bavo's Cathedral holds the Ghent Altarpiece, while Gravensteen castle and the Graslei waterfront line the river Leie. Direct trains run several times an hour.","book":[{"label":"SNCB","url":"https://www.belgiantrain.be/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Brussels","time":"1 hr","desc":"Belgium's capital: the gilded Grand-Place, Art Nouveau façades, the Atomium and world-class museums — and one of Europe's great food-and-beer cities.","book":[{"label":"SNCB","url":"https://www.belgiantrain.be/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Ypres","time":"1 hr 15 min","desc":"The Flemish city destroyed and rebuilt after WWI, with the reconstructed Gothic Lakenhalle and Menin Gate — a memorial arch covered top-to-bottom in the names of 54,896 missing Commonwealth soldiers — and the In Flanders Fields Museum inside the Cloth Hall.","book":[{"label":"nmbs.be","url":"https://www.nmbs.be/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Antwerp","time":"1 hr 20 min","desc":"Rubens' city and Belgium's style capital: a vast Gothic cathedral, the cathedral-like railway station, fashion boutiques and the diamond quarter.","book":[{"label":"SNCB","url":"https://www.belgiantrain.be/en"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Brussels","folder":"Brussels","guide":"brussels_v1.html","url":"../Guides/Brussels/brussels_v1.html","trips":[{"dest":"Leuven","time":"25 min","desc":"Flanders' liveliest university town — the flamboyant Gothic town hall, the Old Market's \"longest bar in Europe,\" and the original Stella Artois brewery.","book":[{"label":"SNCB","url":"https://www.belgiantrain.be/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Ghent","time":"30 min","desc":"Gritty-gorgeous university city — the Castle of the Counts, the Van Eyck altarpiece in St Bavo's Cathedral, and the Graslei quay at golden hour. Closer and less crowded than Bruges.","book":[{"label":"SNCB","url":"https://www.belgiantrain.be/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Antwerp","time":"45 min","desc":"Port city of Rubens and diamonds — arrive through one of the world's most beautiful railway stations, then the Cathedral of Our Lady and the fashion quarter.","book":[{"label":"SNCB","url":"https://www.belgiantrain.be/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Bruges","time":"1 hr","desc":"Belgium's perfectly preserved medieval city — canals, the Markt belfry and the Basilica of the Holy Blood. Direct IC trains every half hour.","book":[{"label":"SNCB","url":"https://www.belgiantrain.be/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Namur","time":"1 hr","desc":"The Walloon capital at the confluence of the Meuse and Sambre — the Citadelle on its rocky promontory is the largest fortress in Belgium, with views over two rivers and the old town below. Direct IC train.","book":[{"label":"SNCB","url":"https://www.belgiantrain.be/en"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Budapest","folder":"Budapest","guide":"budapest_v1.html","url":"../Guides/Budapest/budapest_v1.html","trips":[{"dest":"Győr","time":"1 hr 20 min","desc":"The Baroque capital of western Hungary — a compact old town of palaces, churches, and covered arcades at the confluence of three rivers. The Episcopal Cathedral and Carmelite church are among the finest Baroque interiors outside Vienna.","book":[{"label":"Omio","url":"https://www.omio.com/trains/budapest/gyor"}]},{"dest":"Eger","time":"2 hr","desc":"A beautifully preserved Baroque city in northern Hungary with a medieval castle and the Valley of Beautiful Women — a ravine lined with wine cellars where Egri Bikavér is poured directly at the barrel.","book":[{"label":"Omio","url":"https://www.omio.com/trains/budapest/eger"}]},{"dest":"Bratislava","time":"2 hr 30 min","desc":"Slovakia's compact capital on the Danube — a medieval old town walkable in an afternoon, a hilltop castle with views into three countries, and a relaxed pace that makes it feel like Vienna's quieter neighbour.","book":[{"label":"Omio","url":"https://www.omio.com/trains/budapest/bratislava"}]},{"dest":"Vienna","time":"2 hr 45 min","desc":"The Habsburgs' capital, reachable by Railjet in under three hours. The Kunsthistorisches Museum, the Belvedere, the Naschmarkt, and the Ringstrasse can fill an entire day.","book":[{"label":"Omio","url":"https://www.omio.com/trains/budapest/vienna"}]},{"dest":"Pécs","time":"3 hr","desc":"Hungary's southernmost major city — Roman catacombs, an Ottoman mosque converted to a cathedral, the spectacular Zsolnay ceramic factory and museum, and a university town energy that fills the streets in the evening.","book":[{"label":"Omio","url":"https://www.omio.com/trains/budapest/pecs"}]}]},{"city":"Cairo","folder":"Cairo","guide":"cairo_v2.html","url":"../Guides/Cairo/cairo_v2.html","trips":[{"dest":"Luxor","time":"3 hr","desc":"An open-air museum on the Nile: Karnak and Luxor temples on the east bank, the Valley of the Kings and Hatshepsut's mortuary temple on the west bank.","book":[{"label":"Omio","url":"https://www.omio.com/trains/cairo"}]}]},{"city":"Cambridge","folder":"Cambridge","guide":"cambridge_v1.html","url":"../Guides/Cambridge/cambridge_v1.html","trips":[{"dest":"Ely","time":"15 min","desc":"A tiny city dominated by a vast medieval cathedral seen across the Fens — the Octagon Tower is an engineering marvel of 1322, and its stained glass museum is the only one of its kind in Britain.","book":[{"label":"Trainline","url":"https://www.thetrainline.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"London","time":"50 min","desc":"A half-day in London is entirely practical on the fast King's Cross service. The British Museum, the National Gallery and the South Bank are all within reach of the terminus.","book":[{"label":"Trainline","url":"https://www.thetrainline.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Peterborough","time":"50 min","desc":"One of England's great medieval cathedrals — the Norman nave is intact, Catherine of Aragon is buried in the north choir, and the west front is the finest Romanesque facade in Britain. Direct trains run hourly.","book":[{"label":"Trainline","url":"https://www.thetrainline.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Norwich","time":"1 hr 10 min","desc":"East Anglia's most characterful city — a Norman castle, a medieval cathedral, 32 surviving medieval churches within the old walls, and the cobbled Elm Hill, one of the best-preserved streets in England.","book":[{"label":"Trainline","url":"https://www.thetrainline.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Oxford","time":"1 hr 40 min","desc":"Cambridge's great rival — the Bodleian Library, Christ Church meadow, the Ashmolean Museum and punting on the Cherwell. Trains run via London, making it a full day trip. Fodor's and Rick Steves both recommend pairing the two.","book":[{"label":"Trainline","url":"https://www.thetrainline.com/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Cannes","folder":"Cannes","guide":"cannes_v1.html","url":"../Guides/Cannes/cannes_v1.html","trips":[{"dest":"Antibes","time":"12 minutes","desc":"Rampart-walled old town on the Riviera coast — the Picasso Museum in the Château Grimaldi and the largest yacht harbor in the Mediterranean. SNCF TER runs every 15 minutes direct.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Nice","time":"30 minutes","desc":"The French Riviera capital — the Promenade des Anglais · Vieux-Nice Baroque old town · Cours Saleya market. SNCF TER runs every 30 minutes direct.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Monaco","time":"50 minutes","desc":"The Prince's Palace above Monte-Carlo · the casino square · the Oceanographic Museum · the Formula 1 circuit. SNCF TER via Nice. Book early during race weekends.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Menton","time":"55 min","desc":"The most Italian town in France on the Italian border — the baroque Basilica Saint-Michel above a pastel waterfront, the Cocteau Museum, and lemon groves on the hillside. SNCF TER direct via Nice.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Ventimiglia","time":"Italy · 1h 5 min","desc":"The first Italian town across the border — a large Friday market, a medieval borgo above the modern town, and the coastal Roman ruins at Nervia. Cross-border SNCF TER runs hourly.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Carmel by the Sea","folder":"Carmel-by-the-Sea","guide":"carmel-by-the-sea_v1.html","url":"../Guides/Carmel-by-the-Sea/carmel-by-the-sea_v1.html","trips":[{"dest":"San Jose","time":"1 hr 30 min","desc":"Coast Starlight northbound to San Jose; connect to Caltrain for downtown San Francisco or Silicon Valley. Historic Japantown and SAP Center are walkable.","book":[{"label":"amtrak.com","url":"https://www.amtrak.com/"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"San Luis Obispo","time":"2 hr 45 min","desc":"Pacific Surfliner southbound to San Luis Obispo; college town with a historic mission, Mission Plaza, and Edna Valley wine country within 20 minutes.","book":[{"label":"amtrak.com","url":"https://www.amtrak.com/"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Cascais","folder":"Cascais","guide":"cascais_v2.html","url":"../Guides/Cascais/cascais_v2.html","trips":[{"dest":"Lisbon","time":"35 minutes","desc":"Portugal's capital — Alfama's Moorish lanes, the Manueline Belém Tower and Jerónimos Monastery, and Pombaline Baixa rebuilt after the 1755 earthquake. CP Linha de Cascais runs four trains per hour direct to Cais do Sodré.","book":[{"label":"cp.pt","url":"https://www.cp.pt"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Sintra","time":"1 hour 10 minutes","desc":"The royal hill town wrapped in UNESCO palaces — Pena Palace's painted volumes, the Moorish Castle's 8th-century walls, the Initiation Well at Quinta da Regaleira. Two-train route via Cais do Sodré and Lisbon Rossio Station.","book":[{"label":"cp.pt","url":"https://www.cp.pt"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Setúbal","time":"1h 15 min","desc":"A working port city on the Sado estuary — the gateway to Serra da Arrábida nature reserve and the Sado dolphin colony. Take CP Cascais line to Cais do Sodré, then Fertagus across the bridge to Setúbal.","book":[{"label":"cp.pt","url":"https://www.cp.pt"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Santarém","time":"1h 20 min","desc":"A clifftop Ribatejo city overlooking the Tagus plain — the Gothic Igreja de Santa Cruz, the panoramic Portas do Sol gardens, and Portugal's self-styled Gothic capital. CP Intercidades via Cais do Sodré.","book":[{"label":"cp.pt","url":"https://www.cp.pt"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Évora","time":"1h 45 min","desc":"Alentejo's walled Roman city — the Temple of Diana, a UNESCO cathedral quarter, and the bone chapel at Igreja de São Francisco. CP Intercidades service via Cais do Sodré and Entrecampos.","book":[{"label":"cp.pt","url":"https://www.cp.pt"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Charlotte","folder":"Charlotte","guide":"charlotte_v1.html","url":"../Guides/Charlotte/charlotte_v1.html","trips":[{"dest":"Durham","time":"2 hr 15 min","desc":"Home to Duke University's West Campus — the Duke University Chapel and Nasher Museum of Art — and the revitalized American Tobacco Campus. Reachable on the Carolinian with a Durham station stop.","book":[{"label":"Amtrak","url":"https://www.amtrak.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Raleigh","time":"2 hr 30 min","desc":"North Carolina's capital: the NC Museum of Natural Sciences, the NC Museum of Art, the State Capitol grounds, and the Fayetteville Street corridor. Multiple daily departures on the Carolinian or Piedmont.","book":[{"label":"Amtrak","url":"https://www.amtrak.com"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Chiang Mai","folder":"Chiang-Mai","guide":"chiang-mai_v1.html","url":"../Guides/Chiang-Mai/chiang-mai_v1.html","trips":[{"dest":"Lamphun","time":"30 min","desc":"The ancient Hariphunchai kingdom capital — a small moated city with the Lamphun National Museum, Wat Chama Thewi, and a remarkably intact old town. One of the quietest and best-preserved historic cities in northern Thailand. Recommended by Lonely Planet and Rough Guides.","book":[{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Bangkok","time":"12 hr","desc":"The overnight sleeper train is one of Thailand's classic rail journeys — first-class sleeper carriages with folding berths and dining service, traversing the central plains and arriving at Bang Sue Grand Station. Recommended by Lonely Planet and The Guardian.","book":[{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Chicago","folder":"Chicago","guide":"chicago_v2.html","url":"../Guides/Chicago/chicago_v2.html","trips":[{"dest":"Springfield","time":"3 hr 30 min","desc":"Illinois's capital city and the heart of Abraham Lincoln's biography — his home, law office, and Presidential Library, and the only Capitol building Lincoln himself worked in.","book":[{"label":"amtrak.com/lincoln-service-train","url":"https://www.amtrak.com/lincoln-service-train"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Chongqing","folder":"Chongqing","guide":"chongqing_v1.html","url":"../Guides/Chongqing/chongqing_v1.html","trips":[{"dest":"Dazu","time":"40 min","desc":"The Dazu Rock Carvings — a UNESCO World Heritage constellation of more than 50,000 Buddhist, Taoist and Confucian figures cut into cliff faces between the 9th and 13th centuries. The Baodingshan circuit is the showpiece: a horseshoe valley of giant reclining Buddhas and a thousand-armed Guanyin in still-vivid pigment.","book":[{"label":"China Railway","url":"https://www.12306.cn/en/index.html"}]},{"dest":"Chengdu","time":"1 hr","desc":"Sichuan's laid-back capital, one hour west by bullet train: giant pandas at the research base in the morning, bamboo-chair teahouses and ear-cleaners in People's Park after lunch, and the lantern-lit alleys of Kuanzhai Xiangzi before the evening train home. The classic two-city pairing.","book":[{"label":"China Railway","url":"https://www.12306.cn/en/index.html"}]},{"dest":"Wulong","time":"2 hrs","desc":"Gateway to the Wulong Karst, the UNESCO-listed valley of the Three Natural Bridges — colossal limestone arches over a mossy gorge threaded with walkways, with the Longshuixia Fissure's slot canyon next door. Morning departures put you at the park entrance shuttle before midday.","book":[{"label":"China Railway","url":"https://www.12306.cn/en/index.html"}]}]},{"city":"Cinque Terre","folder":"Cinque-Terre","guide":"cinque-terre_v1.html","url":"../Guides/Cinque-Terre/cinque-terre_v1.html","trips":[{"dest":"Levanto","time":"4 min","desc":"The sandy beach town just north of Monterosso — surf, a long crescent of sand, and a flat seaside cycle path through old rail tunnels to Bonassola and Framura. An easy, low-key half-day by the sea.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"La Spezia","time":"25 min","desc":"The gateway city at the head of the Gulf of Poets — a lively covered market, the Amedeo Lia art museum, a naval museum, and a palm-lined waterfront. The transfer point for high-speed trains and the ferry.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Santa Margherita Ligure","time":"50 min","desc":"An elegant Belle Époque resort on the Riviera, palm-fringed and full of pastel villas — and the easy gateway to Portofino, a short bus or boat ride further along the headland.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Genoa","time":"1 hr 30 min","desc":"Liguria's grand maritime capital — a vast medieval old town of caruggi, the Rolli palaces of Via Garibaldi, Europe's biggest aquarium, and the birthplace of pesto and focaccia.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Pisa","time":"1 hr 30 min","desc":"The Leaning Tower and the Piazza dei Miracoli, with its cathedral and baptistery, make an easy day out — change at La Spezia for the direct regional line down to Pisa Centrale.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Colmar","folder":"Colmar","guide":"colmar_v1.html","url":"../Guides/Colmar/colmar_v1.html","trips":[{"dest":"Mulhouse","time":"15 min","desc":"Home to the Cité de l'Automobile — the world's largest collection of historic cars, including royal carriages and Formula One machines. Also the Cité du Train railway museum. Unmissable for enthusiasts; direct TER service.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Sélestat","time":"15 min","desc":"An Alsatian market town with one of the great Renaissance libraries in Europe — the Bibliothèque Humaniste holds the first chart to name America and a 1507 Waldseemüller globe. The walled old town is unhurried and largely uncommercialized. Direct TER.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Strasbourg","time":"30 min","desc":"Alsace's capital and seat of the European Parliament — the Gothic Cathédrale Notre-Dame, the half-timbered Petite France district and one of the great urban waterfronts in France. Direct TER service.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Basel","time":"Switzerland · 30 min","desc":"A world-class museum city on the Rhine — the Kunstmuseum, the Fondation Beyeler and Art Basel's permanent home. The medieval Altstadt sits above the river; the city straddles three countries. Direct TER to Basel SBB.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Obernai","time":"45 min","desc":"One of Alsace's best-preserved walled towns — the Kapellturm tower, the sixteenth-century market hall, and the covered well on Place du Marché. Quieter and less visited than Colmar itself. TER via Sélestat and Barr.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Cologne","folder":"Cologne","guide":"cologne_v1.html","url":"../Guides/Cologne/cologne_v1.html","trips":[{"dest":"Bonn","time":"25 min","desc":"Beethoven's birthplace and former West German capital; the Beethoven-Haus museum, Bundeskunsthalle contemporary art museum, and the riverside Rheinaue park cluster around a relaxed town centre.","book":[{"label":"Deutsche Bahn","url":"https://www.bahn.de/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Düsseldorf","time":"25 min","desc":"Rhine rival city with a legendary Altstadt pub district, the K20 and K21 modern art museums, and a striking harbour district of Gehry-designed towers.","book":[{"label":"Deutsche Bahn","url":"https://www.bahn.de/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Aachen","time":"50 min","desc":"Charlemagne's imperial capital — the Carolingian Cathedral still holds his throne and golden reliquary; the old town treasury and hot spring spas complete an exceptional half-day or full day.","book":[{"label":"Deutsche Bahn","url":"https://www.bahn.de/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Koblenz","time":"1 hr","desc":"The German Corner — where the Moselle meets the Rhine — with a cable car up to Ehrenbreitstein fortress and panoramic views over both rivers; the Rhine Gorge UNESCO landscape begins here heading south.","book":[{"label":"Deutsche Bahn","url":"https://www.bahn.de/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Frankfurt am Main","time":"1 hr 30 min","desc":"Germany's financial capital, with the reconstructed Römerberg medieval square, Sachsenhausen cider-house district, the Städel Museum, and a skyline unlike anywhere else in Germany.","book":[{"label":"Deutsche Bahn","url":"https://www.bahn.de/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Maastricht, Netherlands","time":"1 hr 30 min","desc":"One of the Netherlands' most beautiful historic cities — a compact medieval core with Roman catacombs, the Vrijthof square, Burgundian food culture, and sophisticated shopping along the Maas.","book":[{"label":"Deutsche Bahn","url":"https://www.bahn.de/en"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Copenhagen","folder":"Copenhagen","guide":"copenhagen_v1.html","url":"../Guides/Copenhagen/copenhagen_v1.html","trips":[{"dest":"Roskilde","time":"30 min","desc":"The Viking capital — five original Viking longships preserved in the UNESCO-listed Viking Ship Museum, and Roskilde Cathedral where every Danish monarch since the 12th century is interred. A compact medieval city consistently overlooked in favour of Kronborg.","book":[{"label":"dsb.dk","url":"https://www.dsb.dk/en/tickets-and-services/"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Frederiksborg Castle","time":"35 min","desc":"A Renaissance castle of extraordinary scale built across three lake islands in Hillerød, its reflection perfect in the still water below. Houses Denmark's National History Museum. Often ranked the most beautiful castle in Scandinavia — quieter than Kronborg.","book":[{"label":"dsb.dk","url":"https://www.dsb.dk/en/tickets-and-services/"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Malmö","time":"Sweden · 35 min","desc":"Sweden's third city across the Øresund Bridge — Stortorget square, the Turning Torso tower, the canal district of Gamla Väster, and Lilla Torg. The Øresundståg runs every 20 minutes direct on the cross-border line.","book":[{"label":"dsb.dk","url":"https://www.dsb.dk/en/tickets-and-services/"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Køge","time":"45 min","desc":"A well-preserved medieval market town on Køge Bay — the half-timbered high street is among the finest in Denmark, and the Køge Museum holds Viking-era artefacts. S-tog line E runs every 20 minutes on the direct line.","book":[{"label":"dsb.dk","url":"https://www.dsb.dk/en/tickets-and-services/"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Odense","time":"1h 30 min","desc":"Hans Christian Andersen's birthplace on Funen — the H.C. Andersen Museum, the medieval St Canute's Cathedral, and the preserved Møntergården old town quarter. IC train runs hourly on the direct line.","book":[{"label":"dsb.dk","url":"https://www.dsb.dk/en/tickets-and-services/"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Curitiba","folder":"Curitiba","guide":"curitiba_v1.html","url":"../Guides/Curitiba/curitiba_v1.html","trips":[{"dest":"Morretes","time":"3 hr 30 min","desc":"One of South America's most scenic rail journeys — a descent through Atlantic Forest cloud forest to the colonial town of Morretes on the coast. The rack railway crosses 14 tunnels and 30 bridges. Train departs at 8:30am daily. Return at 3:00pm. In Morretes, try barreado at a riverside restaurant.","book":[{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Denver","folder":"Denver","guide":"denver_v1.html","url":"../Guides/Denver/denver_v1.html","trips":[{"dest":"Winter Park","time":"2 hr","desc":"Amtrak's seasonal Winter Park Express runs straight to the base of Winter Park Resort on winter weekends — the one true same-day train trip the city offers. Boulder, Colorado Springs, and Rocky Mountain National Park have no useful passenger rail and need a car.","book":[{"label":"Amtrak","url":"https://www.amtrak.com/winter-park-express"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Dublin","folder":"Dublin","guide":"dublin_v1.html","url":"../Guides/Dublin/dublin_v1.html","trips":[{"dest":"Bray","time":"35 min","desc":"A Victorian seaside town at the foot of Bray Head — the pebble beach promenade, a cliff walk to Greystones, and the Heritage Centre in the old Town Hall. DART runs every 15 minutes direct on the coastal line.","book":[{"label":"Trainline","url":"https://www.thetrainline.com/"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Maynooth","time":"35 min","desc":"A university town with a Norman castle and the grounds of Maynooth University, one of Ireland's oldest colleges. The ruined 13th-century Maynooth Castle is freely accessible. Irish Rail commuter service runs frequently.","book":[{"label":"Trainline","url":"https://www.thetrainline.com/"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Drogheda","time":"1 hr","desc":"A medieval port town on the Boyne — the Millmount citadel with panoramic river views, St Peter's Church housing the head of St Oliver Plunkett, and the nearby Brú na Bóinne Neolithic tombs at Newgrange. Irish Rail Enterprise service direct.","book":[{"label":"Trainline","url":"https://www.thetrainline.com/"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Wicklow Town","time":"75 min","desc":"A small coastal town serving as a gateway to Wicklow Mountains National Park; buses and taxis connect to Glendalough, the hauntingly beautiful 6th-century monastic ruins set between two dark mountain lakes in a glacial valley. Recommended by Fodor's and Rick Steves as a half-day or full-day excursion.","book":[{"label":"thetrainline.com","url":"https://www.thetrainline.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Dundalk","time":"1h 20 min","desc":"A border town with a strong medieval heritage — Dundalk Castle remains, the County Museum in the 18th-century distillery, and the traditional market quarter. Enterprise service runs hourly toward Belfast.","book":[{"label":"Trainline","url":"https://www.thetrainline.com/"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Edinburgh","folder":"Edinburgh","guide":"edinburgh_v1.html","url":"../Guides/Edinburgh/edinburgh_v1.html","trips":[{"dest":"Dunbar","time":"26 min","desc":"A small East Lothian harbour town at the foot of the Lammermuir Hills — a ruined clifftop castle, a working fishing harbour and the start of the John Muir Way long-distance trail. Fast direct East Coast Main Line trains stop here.","book":[{"label":"scotrail.co.uk","url":"https://www.scotrail.co.uk"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"North Berwick","time":"35 min","desc":"Charming East Lothian seaside town with a long sandy beach and rock pools. Bass Rock — a volcanic stack with one of the world's largest gannet colonies — is the visual highlight.","book":[{"label":"thetrainline.com","url":"https://www.thetrainline.com/"},{"label":"Omio","url":"https://www.omio.com/trains/edinburgh/north-berwick-tti3k"}]},{"dest":"Glasgow","time":"50 min","desc":"Scotland's largest city with world-class art galleries at Kelvingrove · the vibrant West End · and a thriving food scene that is entirely its own. Trains run every 15 min.","book":[{"label":"thetrainline.com","url":"https://www.thetrainline.com/"},{"label":"Omio","url":"https://www.omio.com/trains/edinburgh/glasgow"}]},{"dest":"Perth","time":"1h 20 min","desc":"The \"Fair City\" on the Tay — Scone Palace where Scottish kings were crowned on the Stone of Destiny, the Black Watch Castle and Museum, and a handsome Georgian centre with North and South Inch parks flanking the river.","book":[{"label":"scotrail.co.uk","url":"https://www.scotrail.co.uk"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Dundee","time":"1h 20 min","desc":"Scotland's fourth city transformed by V A Dundee — the first V A museum outside London, designed by Kengo Kuma on the Tay waterfront — alongside RRS Discovery, the ship that carried Scott to Antarctica, moored just beside it.","book":[{"label":"scotrail.co.uk","url":"https://www.scotrail.co.uk"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Florence","folder":"Florence","guide":"florence_v1.html","url":"../Guides/Florence/florence_v1.html","trips":[{"dest":"Bologna","time":"35 min","desc":"Italy's food capital — tortellini, tagliatelle al ragù and mortadella under forty kilometers of medieval porticoes, plus Europe's oldest university and the Two Towers. Closer to Florence by train than most Florentine suburbs.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Arezzo","time":"40 min","desc":"A hillside Tuscan city of Piero della Francesca frescoes in the Basilica of San Francesco, a sloping Piazza Grande lined with medieval palazzi, and an antique market that fills every first Sunday. Frequent regional and fast trains via Santa Maria Novella.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Pisa","time":"50 min","desc":"The Leaning Tower is just the opener — Piazza dei Miracoli's cathedral and baptistery form one of Italy's great architectural ensembles, with a lively university town and Arno riverfront beyond the lawns.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com/trains/florence/pisa"}]},{"dest":"Lucca","time":"1 hr 20 min","desc":"A perfectly preserved walled city you can circle by bike atop its Renaissance ramparts — a Roman amphitheater square, a hundred churches and Puccini's birthplace, all blissfully car-light.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com/trains/florence/lucca"}]},{"dest":"Siena","time":"1 hr 30 min","desc":"The Gothic rival of Florence — the shell-shaped Piazza del Campo of Palio fame, a zebra-striped Duomo and intact medieval lanes. The station sits below town; escalators climb to the center.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Frankfurt","folder":"Frankfurt","guide":"frankfurt_v1.html","url":"../Guides/Frankfurt/frankfurt_v1.html","trips":[{"dest":"Mainz","time":"20 min","desc":"Rhine-side state capital with a Romanesque Cathedral, the Gutenberg Museum — birthplace of moveable type printing — and a preserved Altstadt with wine taverns.","book":[{"label":"Deutsche Bahn","url":"https://www.bahn.de"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Heidelberg","time":"40 min","desc":"Germany's oldest university city on the Neckar River; Heidelberg Castle ruins overlooking the Altstadt, the Philosophenweg ridge walk, and a largely intact historic center. The most popular Frankfurt day trip.","book":[{"label":"Deutsche Bahn","url":"https://www.bahn.de"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Cologne","time":"1 hr (ICE)","desc":"Rhine metropolis with Germany's most-visited monument — the twin-spired Gothic Cologne Cathedral — plus the Chocolate Museum, Old Town riverfront, and the Ludwig Museum modern art collection.","book":[{"label":"Deutsche Bahn","url":"https://www.bahn.de"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Würzburg","time":"1 hr 10 min (ICE)","desc":"Baroque city on the Main River at the northern end of the Romantic Road; the UNESCO-listed Würzburg Residence, Marienberg Fortress, and wine taverns in sandstone-cave cellars.","book":[{"label":"Deutsche Bahn","url":"https://www.bahn.de"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Rothenburg ob der Tauber","time":"1 hr 30 min (via transfer)","desc":"The best-preserved medieval walled town in Germany; intact ramparts walkable for their entire circuit, half-timbered market square, and the Plönlein — the most-photographed medieval streetscape in Europe.","book":[{"label":"Deutsche Bahn","url":"https://www.bahn.de"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Munich","time":"2 hr (ICE)","desc":"Bavaria's capital; Marienplatz and the Neues Rathaus, the Englischer Garten, Deutsches Museum — the world's largest science museum — Nymphenburg Palace, and the Pinakothek art museums. A full day is needed.","book":[{"label":"Deutsche Bahn","url":"https://www.bahn.de"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Luxembourg City","time":"2 hr 30 min","desc":"The Grand Duchy's capital perched on sandstone cliffs; the UNESCO-listed Bock Casemates, the Grund valley, Adolphe Bridge, and the MUDAM contemporary art museum in an I.M. Pei building.","book":[{"label":"Deutsche Bahn","url":"https://www.bahn.de"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Geneva","folder":"Geneva","guide":"geneva_v1.html","url":"../Guides/Geneva/geneva_v1.html","trips":[{"dest":"Lausanne","time":"38 min","desc":"Lake Geneva's second city climbs steep hills above the water — the Gothic Cathédrale de Lausanne, the buzzing Flon district and the Olympic Museum on the lakefront at Ouchy. Fast, frequent direct trains.","book":[{"label":"SBB","url":"https://www.sbb.ch/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Montreux","time":"1 hr 3 min","desc":"The Swiss Riviera resort on the lake's eastern end, with palm-lined promenades and the lakeside Château de Chillon a short ride beyond — one of Europe's best-preserved medieval castles.","book":[{"label":"SBB","url":"https://www.sbb.ch/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Annecy","time":"France · 1h 30 min","desc":"A French Alpine town on a glacial lake so clear it is simply called the Venice of the Alps — a medieval canal quarter, a lakeside château, pedalos and paragliders overhead, and one of the most scenic waterfronts in France. SNCF TER trains cross the border direct.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Bern","time":"1 hr 51 min","desc":"Switzerland's capital, a UNESCO-listed medieval Old Town wrapped in a bend of the Aare — six kilometres of sandstone arcades, the Zytglogge clock tower and the Bear Park.","book":[{"label":"SBB","url":"https://www.sbb.ch/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Lyon","time":"France · 2h","desc":"France's gastronomic capital — bouchon bistros, the UNESCO traboules network of Renaissance covered passages, the Vieux-Lyon old town, and Fourvière basilica above the Saône. TGV Lyria and SNCF TER both make the cross-border run.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Glacier National Park","folder":"Glacier-National-Park","guide":"glacier-national-park_v2.html","url":"../Guides/Glacier-National-Park/glacier-national-park_v2.html","trips":[{"dest":"Whitefish","time":"30 min","desc":"30 min north on Empire Builder to Whitefish; larger town with restaurants, galleries, and shops. Return same day on evening train.","book":[{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Glasgow","folder":"Glasgow","guide":"glasgow_v1.html","url":"../Guides/Glasgow/glasgow_v1.html","trips":[{"dest":"Falkirk","time":"21 min","desc":"Home to the Falkirk Wheel — the world's only rotating boat lift, a feat of engineering connecting two canal systems — plus the Kelpies, a pair of 30-metre steel horse-head sculptures rising above the Forth and Clyde Canal flats. Fast direct trains via Queen Street.","book":[{"label":"scotrail.co.uk","url":"https://www.scotrail.co.uk"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Stirling","time":"31 min","desc":"Hilltop Stirling Castle, the Wallace Monument and the Old Town — a gateway to the Highlands. A quick direct hop.","book":[{"label":"ScotRail","url":"https://www.scotrail.co.uk"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Loch Lomond","time":"46 min","desc":"Britain's largest loch — lochside walks, cruises and Balloch Country Park. A scenic direct run to Balloch.","book":[{"label":"ScotRail","url":"https://www.scotrail.co.uk"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Ayr","time":"54 min","desc":"A Victorian Firth-of-Clyde seaside town in Burns country, with an onward bus to Culzean Castle. A direct coastal service.","book":[{"label":"ScotRail","url":"https://www.scotrail.co.uk"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Edinburgh","time":"1 hr 7 min","desc":"Scotland's capital — Edinburgh Castle, the Royal Mile, Holyrood, Arthur's Seat and the Georgian New Town. A fast, frequent direct service.","book":[{"label":"ScotRail","url":"https://www.scotrail.co.uk"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Gothenburg","folder":"Gothenburg","guide":"gothenburg_v1.html","url":"../Guides/Gothenburg/gothenburg_v1.html","trips":[{"dest":"Trollhättan","time":"35 min","desc":"Industrial-heritage town on the Göta River known for its canal locks and waterfalls, released on scheduled summer days, plus the Trollywood film studios.","book":[{"label":"SJ","url":"https://www.sj.se/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Alingsås","time":"40 min","desc":"Sweden s self-styled café capital, famous for fika, cinnamon buns and a cozy wooden old town — a short, frequent commuter-rail hop east of the city.","book":[{"label":"SJ","url":"https://www.sj.se/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Varberg","time":"42 min","desc":"Coastal Halland town with a dramatic 13th-century seafront fortress, a wooden kallbadhus cold-bath house and long sandy beaches — frequent regional trains make it an easy half-day.","book":[{"label":"SJ","url":"https://www.sj.se/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Borås","time":"55 min","desc":"Sweden's textile capital turned street-art city — an outdoor sculpture museum with works by Yoko Ono and Antony Gormley scattered across the centre, a zoo famous for giant pandas, and a compact riverside old town. Frequent SJ regional trains throughout the day.","book":[{"label":"SJ","url":"https://www.sj.se/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Malmö","time":"2h 20 min","desc":"Sweden's third city on the Øresund strait, connected to Copenhagen by the iconic Øresund Bridge — the Turning Torso skyscraper, a restored medieval Old Town, a lively food hall in Västra Hamnen and easy onward access to Denmark. Direct SJ intercity services.","book":[{"label":"SJ","url":"https://www.sj.se/en"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Hamburg","folder":"Hamburg","guide":"hamburg_v1.html","url":"../Guides/Hamburg/hamburg_v1.html","trips":[{"dest":"Lüneburg","time":"30 min","desc":"A well-preserved medieval salt-trading town of crooked gabled houses, brick architecture and an old harbour quarter — the quickest of these trips to reach.","book":[{"label":"Deutsche Bahn","url":"https://int.bahn.de/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Lübeck","time":"45 min","desc":"A UNESCO-listed Hanseatic old town on an island, entered through the medieval Holstentor gate — famous for its brick Gothic churches and marzipan.","book":[{"label":"Deutsche Bahn","url":"https://int.bahn.de/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Bremen","time":"1 hr","desc":"A Hanseatic city with a UNESCO-listed Marktplatz, the Town Hall and Roland statue, the Town Musicians of Bremen sculpture, and the medieval Schnoor lane quarter.","book":[{"label":"Deutsche Bahn","url":"https://int.bahn.de/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Schwerin","time":"1 hr","desc":"Capital of Mecklenburg-Vorpommern, where the fairytale Schweriner Schloss sits on its own island in Lake Schwerin, ringed by a well-preserved center and a chain of lakes.","book":[{"label":"Deutsche Bahn","url":"https://int.bahn.de/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Stade","time":"1 hr","desc":"A historic Hanseatic port town with a well-preserved old town of half-timbered houses, the Alter Hansehafen and the Schwedenspeicher museum.","book":[{"label":"Deutsche Bahn","url":"https://int.bahn.de/en"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Hanoi","folder":"Hanoi","guide":"hanoi_v1.html","url":"../Guides/Hanoi/hanoi_v1.html","trips":[{"dest":"Ninh Binh","time":"2 hr","desc":"The UNESCO-listed Trang An Scenic Landscape Complex — karst towers amid flooded rice paddies, boat rides through limestone caves at Tam Coc, and the ancient capital of Hoa Lu. Climb Mua Cave for a panoramic view of the valley.","book":[{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Hai Phong","time":"2 hr 30 min","desc":"A port city with French colonial architecture and a gateway to Cat Ba Island and Lan Ha Bay — a quieter alternative to Ha Long Bay with equally dramatic limestone karsts.","book":[{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Helsinki","folder":"Helsinki","guide":"helsinki_v1.html","url":"../Guides/Helsinki/helsinki_v1.html","trips":[{"dest":"Riihimäki","time":"55 min","desc":"A compact railway town whose Finnish Glass Museum holds the finest collection of Nordic glass art in the world — art nouveau, modernist and contemporary pieces by Arabia, Iittala and Nuutajärvi in a striking purpose-built museum. Direct VR trains run several times an hour.","book":[{"label":"vr.fi","url":"https://www.vr.fi/en/train-tickets"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Hämeenlinna","time":"1h by IC","desc":"A lakeside town home to Häme Castle — a grey granite medieval fortress on Lake Vanajavesi and one of the best-preserved in Finland. Birthplace of composer Jean Sibelius.","book":[{"label":"vr.fi","url":"https://www.vr.fi/en/train-tickets"},{"label":"Omio","url":"https://www.omio.com/trains/helsinki/haemeenlinna-y4hup"}]},{"dest":"Lahti","time":"1h","desc":"A sporty lakeside city at the foot of ski jump towers that dominate the skyline — the Lahti Ski Jump offers a lift to the top year-round, and the waterfront Sibelius Hall is one of Finland's finest concert venues. Fast direct IC trains on the Kerava–Lahti direct line.","book":[{"label":"vr.fi","url":"https://www.vr.fi/en/train-tickets"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Turku","time":"2h by IC/Pendolino","desc":"Finland's former capital and oldest city, with a well-preserved medieval castle on the Aura riverbank — one of the largest surviving medieval fortresses in Scandinavia. Turku Cathedral is currently closed for renovation.","book":[{"label":"vr.fi","url":"https://www.vr.fi/en/train-tickets"},{"label":"Omio","url":"https://www.omio.com/trains/helsinki/turku"}]},{"dest":"Kouvola","time":"2h","desc":"The gateway to the Repovesi National Park wilderness and the Tykkimäki amusement park, with the renowned Arboretum Mustila — a 120-hectare forest of exotic conifers and Japanese maples at their peak in autumn. Direct IC and regional trains on the main eastern line.","book":[{"label":"vr.fi","url":"https://www.vr.fi/en/train-tickets"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Hong Kong","folder":"Hong-Kong","guide":"hong-kong_v1.html","url":"../Guides/Hong-Kong/hong-kong_v1.html","trips":[{"dest":"Shenzhen","time":"14 min","desc":"China's technology megacity — futurist architecture, a food scene built by migration across China's provinces, and a skyline that transformed faster than any city in history.","book":[{"label":"Omio","url":"https://www.omio.com"},{"label":"MTR","url":"https://www.mtr.com.hk"}]},{"dest":"Guangzhou","time":"48 min","desc":"China's third city and the undisputed capital of Cantonese cuisine — the original source of everything the city eats. Dim sum at its origin and a 2,000-year-old city that built the Pearl River Delta.","book":[{"label":"Omio","url":"https://www.omio.com"},{"label":"MTR","url":"https://www.mtr.com.hk"}]}]},{"city":"Istanbul","folder":"Istanbul","guide":"istanbul_v2.html","url":"../Guides/Istanbul/istanbul_v2.html","trips":[{"dest":"İzmit","time":"1h 15min","desc":"A historic city on İzmit Bay — ancient Nicomedia, briefly the Eastern Roman capital in the 3rd century. Marmaray eastbound to Gebze, then TCDD regional train to İzmit.","book":[{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Adapazarı","time":"1h 30min","desc":"A traditional market city in the Sakarya River valley — known for its lokum and a compact historic center. Marmaray eastbound to Gebze, then TCDD regional train to Adapazarı.","book":[{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Edirne","time":"2h 30min","desc":"The former Ottoman capital on the Bulgarian border — Selimiye Mosque is Sinan's acknowledged masterpiece, built when he was 80 and considered superior to all his earlier work including Süleymaniye. Marmaray westbound to Halkalı, then TCDD intercity train to Edirne.","book":[{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Eskişehir","time":"3h 30min","desc":"A vibrant Ottoman city on the Porsuk River — wooden Ottoman houses, a canal district, and the Museum of Meerschaum. TCDD YHT high-speed train, departing Pendik station.","book":[{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Ankara","time":"4h 30min","desc":"Turkey's capital and home to Anıtkabir — Atatürk's mausoleum — and the Museum of Anatolian Civilizations, one of the finest collections of Hittite art anywhere. TCDD YHT high-speed train, departing Pendik station.","book":[{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Kraków","folder":"Kraków","guide":"krakow_v1.html","url":"../Guides/Kraków/krakow_v1.html","trips":[{"dest":"Wieliczka","time":"30 min","desc":"The UNESCO-listed Wieliczka Salt Mine has been excavated since the 13th century and descends to 135 meters through a labyrinth of chambers, lakes, and chapels carved in salt — including the stunning St. Kinga's Chapel. One of the most visited sites in Poland.","book":[{"label":"PKP","url":"https://www.pkp.pl/en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Częstochowa","time":"1 hr 22 min","desc":"Jasna Góra Monastery — Poland's most sacred site and the heart of the nation's Catholic identity. The Black Madonna icon, venerated for over six centuries, is housed in a gilded chapel inside the monastery fortress that withstood the 1655 Swedish Siege. PKP TLK direct trains run several times daily.","book":[{"label":"PKP","url":"https://www.pkp.pl/en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Oświęcim","time":"1 hr 30 min","desc":"The largest Nazi concentration and extermination camp complex, Auschwitz I and Birkenau are a UNESCO World Heritage Site and essential memorial. Allow a full day; advance reservation is required for most visiting periods.","book":[{"label":"PKP","url":"https://www.pkp.pl/en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Warsaw","time":"2 hr 30 min","desc":"Poland's capital by high-speed Pendolino train contrasts Kraków's medieval preservation with Warsaw's dramatic story of destruction and rebuilding. The rebuilt Old Town, POLIN Jewish history museum, and Palace of Culture are the highlights.","book":[{"label":"PKP","url":"https://www.pkp.pl/en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Wrocław","time":"3 hr","desc":"Silesia's capital built on 12 islands in the Oder river, with a spectacular Market Square, Gothic cathedral island at Ostrów Tumski, and the Panorama of the Battle of Racławice. Direct PKP trains run several times daily.","book":[{"label":"PKP","url":"https://www.pkp.pl/en/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Kyoto","folder":"Kyoto","guide":"kyoto_v1.html","url":"../Guides/Kyoto/kyoto_v1.html","trips":[{"dest":"Osaka","time":"15 min by Shinkansen","desc":"Japan's kitchen and commercial capital — Dotonbori neon district, takoyaki and okonomiyaki street food, Osaka Castle, and Kuromon Ichiba market. The contrast with quiet restraint is immediate. Easiest day trip.","book":[{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Nara","time":"35 min by JR Nara Line","desc":"Japan's first permanent capital — Todai-ji Temple housing the largest bronze Buddha in Japan, Kasuga Taisha shrine, and over 1,000 free-roaming deer designated as national treasures. The entire historic area is UNESCO listed and within a 15-minute walk of Kintetsu Nara Station.","book":[{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Hiroshima","time":"1 hr 40 min by Nozomi Shinkansen","desc":"The Peace Memorial Museum and Atomic Bomb Dome deliver one of the most sobering experiences in Japan. A 15-min ferry reaches Miyajima Island and the floating torii gate of Itsukushima Shrine — one of Japan's most iconic images. Full day needed.","book":[{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Lagos","folder":"Lagos","guide":"lagos_v1.html","url":"../Guides/Lagos/lagos_v1.html","trips":[{"dest":"Portimão","time":"20 min","desc":"A working riverfront city just up the line and the gateway to Praia da Rocha, where a boardwalk runs beneath honey-coloured cliffs and rock stacks. The old sardine-canning quay is now lined with grills.","book":[{"label":"CP","url":"https://www.cp.pt"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Silves","time":"35 min","desc":"The former Moorish capital of the Algarve, crowned by a red-sandstone castle above a tangle of old streets and a riverside Gothic cathedral. The station sits below town with a short connecting hop.","book":[{"label":"CP","url":"https://www.cp.pt"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Albufeira","time":"1h 5 min","desc":"The Algarve's most visited resort town, with a cliff-backed Old Town of whitewashed lanes above a beach, a lively marina, sea-cave boat trips and the famous Falesia beach to the east. The station at Ferreiras sits 6 km north of the centre; local buses and taxis connect in minutes.","book":[{"label":"CP","url":"https://www.cp.pt"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Faro","time":"1 hr 40 min","desc":"The Algarve capital, with a walled old town of cobbled lanes, a cathedral you can climb, a macabre bone chapel, and boats out into the Ria Formosa lagoon and its islands.","book":[{"label":"CP","url":"https://www.cp.pt"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Tavira","time":"2 hr 30 min","desc":"A graceful eastern-Algarve town of whitewashed churches straddling a river crossed by a Roman-era bridge, with a castle viewpoint and a ferr
