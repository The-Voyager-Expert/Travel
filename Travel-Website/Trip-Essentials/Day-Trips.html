y out to the sandbar beaches of Ilha de Tavira.","book":[{"label":"CP","url":"https://www.cp.pt"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Lake Como","folder":"Lake-Como","guide":"lake-como_v1.html","url":"../Guides/Lake-Como/lake-como_v1.html","trips":[{"dest":"Milan","time":"40 min","desc":"Italy s capital of fashion and design, half an hour down the line: the spiked Duomo, the Galleria Vittorio Emanuele II, Leonardo s Last Supper, and the canal-side Navigli at dusk.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Lugano","time":"Switzerland · 40 min","desc":"A lakeside Swiss city just over the border, with a palm-lined promenade, the funicular up Monte Brè, and an old town of arcaded squares and chocolate shops.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Varese","time":"50 min","desc":"A Lombard lakeside city set around a chain of glacial lakes, with the Villa Panza collection of American minimalist and conceptual art in a Baroque estate and the cable-car ascent to the medieval Sacro Monte di Varese — a UNESCO World Heritage pilgrimage route.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Lecco","time":"1 hr","desc":"The lake s eastern town at the foot of the jagged Grigne peaks — Manzoni s home city, a handsome waterfront, and some of the most dramatic mountain scenery on the lake.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Bergamo","time":"1h 45 min","desc":"A double city: a medieval Città Alta of Venetian walls and narrow lanes on the hill, and a prosperous lower town below. The Accademia Carrara holds one of Italy's great painting collections. Change at Milano Centrale or Milano Porta Garibaldi.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Lecce","folder":"Lecce","guide":"lecce_v1.html","url":"../Guides/Lecce/lecce_v1.html","trips":[{"dest":"Brindisi","time":"30 min","desc":"Ancient port city at the end of the Via Appia, with Roman columns marking the road's terminus, a Swabian castle, and a cathedral housing a 12th-century mosaic floor.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Ostuni","time":"50 min","desc":"The White City on a hilltop — a maze of whitewashed alleys and panoramic viewpoints above an endless sea of olive trees, reachable on foot via a steep 20-minute climb.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Martina Franca","time":"1 hr 10 min","desc":"Baroque hilltop town in the Itria Valley known for the Festival della Valle d'Itria opera season, elegant palazzi, whitewashed streets, and capocollo — a local cured meat aged in the town's caves.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Gallipoli","time":"1 hr 20 min","desc":"Fortified island old town connected to the mainland by a 17th-century bridge, with an Angevin castle jutting into the sea, Baroque churches, and sandy beaches along the Ionian coast.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Bari","time":"1 hr 30 min","desc":"Puglia's capital with a walled old town on a peninsula, the Basilica di San Nicola housing the saint's relics, and a lively seafront promenade where grandmothers shape orecchiette in doorways.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Lille","folder":"Lille","guide":"lille_v1.html","url":"../Guides/Lille/lille_v1.html","trips":[{"dest":"Arras","time":"30 min","desc":"Two spectacular gabled squares, a Gothic belfry and Wellington Quarry — the underground tunnels where 24,000 soldiers waited before the 1917 dawn attack at Arras.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Brussels","time":"35 min","desc":"The Belgian capital next door — Grand-Place, Manneken Pis, the Magritte Museum and the finest moules-frites in the world. One of Europe's fastest capital-to-capital rail trips.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Lens","time":"40 min","desc":"A former mining town transformed by the Louvre-Lens — a stunning glass-and-aluminium satellite of the Paris Louvre set in landscaped pit-head grounds, showing rotating Louvre masterworks in the Galerie du Temps — permanent collection free. Direct TER trains.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Bruges","time":"1 hr","desc":"Belgium's perfectly preserved medieval city — canals, the Markt belfry, the Basilica of the Holy Blood and the Groeningemuseum's Flemish Primitives. Change at Kortrijk or Brussels-Midi.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Paris","time":"1 hr","desc":"The capital an hour away by TGV — the Louvre, the Seine and the Eiffel Tower all reachable before noon on a Saturday morning.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Lisbon","folder":"Lisbon","guide":"lisbon_v4.html","url":"../Guides/Lisbon/lisbon_v4.html","trips":[{"dest":"Queluz","time":"25 min","desc":"18th-century rococo palace — Portugal's \"Versailles\" — with ornate state rooms, formal gardens, and the original palace kitchen. The quickest palace day trip on the CP network.","book":[{"label":"cp.pt","url":"https://www.cp.pt/passageiros/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Sintra","time":"40 min","desc":"UNESCO World Heritage mountain village with palaces embedded in forest — Pena Palace · fairytale Gothic-Romantic hilltop, the Moorish Castle, Quinta da Regaleira · esoteric gardens and initiation well. The most worth doing of all the day trips; go early to beat the crowds.","book":[{"label":"cp.pt","url":"https://www.cp.pt/passageiros/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Cascais","time":"40 min","desc":"Elegant coastal town at the mouth of the Tagus — Atlantic seafront promenade, the Boca do Inferno sea-cave viewpoint, the old fishing quarter, and the best esplanade lunch spots on the Lisbon coast. Relaxed and easy — a complete contrast to Lisbon's hills.","book":[{"label":"cp.pt","url":"https://www.cp.pt/passageiros/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Santarém","time":"48 min","desc":"The Gothic capital of Portugal — a walled hilltop city above the Tagus floodplain with a remarkable concentration of Manueline and Gothic churches; views at the Portas do Sol terrace across the river plains are some of the finest in the country.","book":[{"label":"cp.pt","url":"https://www.cp.pt/passageiros/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Évora","time":"1 hr 20 min","desc":"UNESCO-listed Alentejo walled city — Roman temple · 1st–2nd c. AD, Gothic Évora Cathedral, and the Chapel of Bones · Igreja de São Francisco built with 5,000 skulls. Walkable in an afternoon; Alentejo wine and pork make the lunch stop essential.","book":[{"label":"cp.pt","url":"https://www.cp.pt/passageiros/en"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Ljubljana","folder":"Ljubljana","guide":"ljubljana_v1.html","url":"../Guides/Ljubljana/ljubljana_v1.html","trips":[{"dest":"Lake Bled","time":"40 min","desc":"Slovenia's postcard lake — an island church reached by wooden pletna boat, a clifftop castle, and a lakeside path. Trains reach Lesce-Bled, and a short bus or taxi covers the last four kilometres to the water.","book":[{"label":"Slovenske železnice","url":"https://potniski.sz.si/en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Postojna","time":"1 hr","desc":"One of the world's great show caves: an electric train rolls deep into twenty-four kilometres of karst galleries and dripstone halls. The station sits a short walk-plus-shuttle to the cave entrance.","book":[{"label":"Slovenske železnice","url":"https://potniski.sz.si/en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Celje","time":"1h 20 min","desc":"Slovenia's third city beneath a dramatic hilltop castle — the ruins of the Counts of Celje's medieval stronghold with panoramic views over the Savinja valley, and a well-preserved old town of Baroque houses below. Direct IC trains run several times a day on the main Ljubljana–Maribor line.","book":[{"label":"Slovenske železnice","url":"https://potniski.sz.si/en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Maribor","time":"2 hr","desc":"Slovenia's second city on the Drava, home to the world's oldest grapevine and a compact riverside Old Town of squares and wine cellars. Direct InterCity trains run several times a day.","book":[{"label":"Slovenske železnice","url":"https://potniski.sz.si/en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Zagreb","time":"Croatia · 2h 30 min","desc":"The Croatian capital — a leafy Upper Town of Gothic churches and a funicular, a vibrant Lower Town of Austro-Hungarian boulevards, the Dolac farmers market, the Museum of Broken Relationships and a café culture running morning to midnight. Direct trains cross the border several times daily.","book":[{"label":"Slovenske železnice","url":"https://potniski.sz.si/en/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"London","folder":"London","guide":"london_v5.html","url":"../Guides/London/london_v5.html","trips":[{"dest":"Canterbury","time":"55 min","desc":"England's most sacred city — Canterbury Cathedral has been a pilgrimage destination since Thomas Becket's murder in 1170. The medieval city walls · the ruins of St Augustine's Abbey · and the Cathedral quarter are a UNESCO World Heritage Site.","book":[{"label":"thetrainline.com","url":"https://www.thetrainline.com/"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Oxford","time":"1h","desc":"England's oldest university city — the Bodleian Library · Radcliffe Camera · Christ Church · and the Covered Market. A city of spires and colleges that rewards an afternoon of wandering as much as any museum visit.","book":[{"label":"thetrainline.com","url":"https://www.thetrainline.com/"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Brighton","time":"1h","desc":"England's most exuberant seaside city — the Royal Pavilion · the Brighton Lanes · a pebble beach · and the oldest operating electric railway in the world. The unofficial capital of English eccentricity.","book":[{"label":"thetrainline.com","url":"https://www.thetrainline.com/"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Winchester","time":"1h","desc":"England's medieval capital — Winchester Cathedral holds Jane Austen's grave and medieval mortuary chests; the Great Hall displays the Arthurian Round Table. Direct trains via Waterloo.","book":[{"label":"thetrainline.com","url":"https://www.thetrainline.com/"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Stratford-upon-Avon","time":"2h","desc":"Shakespeare's birthplace — the half-timbered house on Henley Street · Holy Trinity Church where he is buried · and the Royal Shakespeare Company theatre on the Avon. A small market town that rewards a full day.","book":[{"label":"thetrainline.com","url":"https://www.thetrainline.com/"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Los Angeles","folder":"Los-Angeles","guide":"los-angeles_v1.html","url":"../Guides/Los-Angeles/los-angeles_v1.html","trips":[{"dest":"Santa Barbara","time":"2 hr 45 min","desc":"The \"American Riviera\" — a red-tiled Spanish-Revival downtown, a palm-lined waterfront, and the hilltop Old Mission. The Pacific Surfliner hugs the coast for one of the most scenic rail rides in the country.","book":[{"label":"Amtrak","url":"https://www.amtrak.com/pacific-surfliner-train"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"San Diego","time":"2 hr 50 min","desc":"Balboa Park's museums and gardens, the historic Gaslamp Quarter, and a walkable waterfront, all linked by an easy coastal Surfliner ride down the SoCal shore.","book":[{"label":"Amtrak","url":"https://www.amtrak.com/pacific-surfliner-train"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Luang Prabang","folder":"Luang-Prabang","guide":"luang-prabang_v1.html","url":"../Guides/Luang-Prabang/luang-prabang_v1.html","trips":[{"dest":"Vang Vieng","time":"50 min","desc":"A riverside town in a limestone karst valley, with Blue Lagoon cave swimming, tubing on the Nam Song River, and hot springs within a few kilometres of the station.","book":[{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Vientiane","time":"2 hr","desc":"The Lao capital is two hours south — journey time each way leaves only a few hours in the city, making it better suited as an overnight stay than a day return.","book":[{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Lucerne","folder":"Lucerne","guide":"lucerne_v1.html","url":"../Guides/Lucerne/lucerne_v1.html","trips":[{"dest":"Zug","time":"20 min","desc":"A small lakeside town with a picture-book medieval core, clock towers and Lake Zug sunsets — the quickest worthwhile escape.","book":[{"label":"SBB","url":"https://www.sbb.ch/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Zürich","time":"41 min","desc":"Switzerland's largest city — a compact lakeside old town, the Bahnhofstrasse, and the Kunsthaus — an easy direct hop via Zug.","book":[{"label":"SBB","url":"https://www.sbb.ch/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Engelberg","time":"43 min","desc":"An alpine resort and monastery village at the foot of Mount Titlis, reached on the scenic Luzern–Engelberg Express.","book":[{"label":"SBB","url":"https://www.sbb.ch/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Bern","time":"1 hr","desc":"The Swiss capital's UNESCO-listed medieval centre — arcaded sandstone streets, the Zytglogge clock tower, and the looping Aare river.","book":[{"label":"SBB","url":"https://www.sbb.ch/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Interlaken","time":"1 hr 50 min","desc":"The Bernese Oberland gateway, reached on the panoramic Luzern–Interlaken Express — one of Switzerland's prettiest rail rides, threading past lakes and gorges.","book":[{"label":"SBB","url":"https://www.sbb.ch/en"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Luxembourg","folder":"Luxembourg","guide":"luxembourg_v1.html","url":"../Guides/Luxembourg/luxembourg_v1.html","trips":[{"dest":"Trier","time":"Germany · 50 min","desc":"Germany's oldest city, founded by the Romans. The colossal Porta Nigra gate, the imperial baths, the basilica and the cathedral make a UNESCO-listed core that is an easy direct ride over the border.","book":[{"label":"CFL","url":"https://www.cfl.lu/en-gb/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Metz","time":"France · 50 min","desc":"An elegant French city of golden Jaumont stone, crowned by the soaring Cathédrale Saint-Étienne and its acres of stained glass, plus the bold Centre Pompidou-Metz. Fast trains run city-centre to city-centre.","book":[{"label":"CFL","url":"https://www.cfl.lu/en-gb/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Vianden","time":"1 hr","desc":"A storybook village in the Our valley beneath one of Europe's finest hilltop castles, the restored Château de Vianden. Reached by train to Ettelbruck and a connecting bus through the Ardennes.","book":[{"label":"CFL","url":"https://www.cfl.lu/en-gb/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Clervaux","time":"1 hr","desc":"A castle town deep in the northern Ardennes, home to the white château that houses Edward Steichen's \"The Family of Man\" photography exhibition, a UNESCO Memory of the World collection.","book":[{"label":"CFL","url":"https://www.cfl.lu/en-gb/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Brussels","time":"Belgium · 3h 10 min","desc":"Art Nouveau capital of Europe — Grand-Place, Manneken Pis, Musées Royaux des Beaux-Arts, and the Atomium. Direct intercity train via Liège with no changes required.","book":[{"label":"cfl.lu","url":"https://www.cfl.lu/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Lyon","folder":"Lyon","guide":"lyon_v1.html","url":"../Guides/Lyon/lyon_v1.html","trips":[{"dest":"Grenoble","time":"1 hr 30 min","desc":"The capital of the French Alps — surrounded on three sides by mountain ranges, with a cable car ascending to the 18th-century Bastille fortress above the city. The Musée de Grenoble is one of the finest modern art museums in France.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Beaune","time":"1 hr 40 min","desc":"The wine capital of Burgundy — a compact medieval walled city built around the Hôtel-Dieu, surrounded by the greatest Pinot Noir vineyards in the world. The Marché aux Vins lets you taste across multiple appellations in one building.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Geneva","time":"Switzerland · 1 hr 55 min","desc":"Lakeside Swiss city at the foot of the Alps — the jet d'eau fountain on Lake Geneva, the Palais des Nations, old town with Saint-Pierre Cathedral, and the Carouge quarter. Direct TGV with frequent departures via Lyon Part-Dieu station.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Annecy","time":"2 hrs","desc":"A medieval lakeside city ringed by the Alps — the lake water is the clearest in Europe, the old town is built along canals, and the Château d'Annecy dates to the 11th century. Best of the Alpine day trips.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Dijon","time":"2 hrs","desc":"The capital of Burgundy and of mustard — a preserved medieval city with the Palais des Ducs de Bourgogne, a covered market full of regional cheeses and wines, and the starting point for the Route des Grands Crus wine road.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Madrid","folder":"Madrid","guide":"madrid_v1.html","url":"../Guides/Madrid/madrid_v1.html","trips":[{"dest":"Segovia","time":"30 min","desc":"A 1st-century Roman aqueduct still intact after 2,000 years, the fairy-tale Alcázar castle, and a medieval old city on a granite ridge — all 30 minutes by high-speed train.","book":[{"label":"renfe.com","url":"https://www.renfe.com/es/en/inspirate/rutas/madrid-segovia"},{"label":"Omio","url":"https://www.omio.com/trains/madrid/segovia"}]},{"dest":"Aranjuez","time":"48 min","desc":"Royal palace town on the Tagus — the Palacio Real de Aranjuez with its Hall of Mirrors, manicured Parterre and Island Gardens, and the Strawberry Train heritage railway. A UNESCO World Heritage Cultural Landscape.","book":[{"label":"renfe.com","url":"https://www.renfe.com/es/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"El Escorial","time":"1 hr","desc":"Philip II's monastery-palace-mausoleum, one of the most austere and powerful buildings in Europe — built in the Guadarrama foothills with a royal pantheon, vast library, and basilica where generations of Spanish monarchs are buried.","book":[{"label":"Renfe Cercanías C3","url":"https://www.renfe.com/es/en/suburban/suburban-madrid"},{"label":"Omio","url":"https://www.omio.com/trains/madrid/el-escorial"}]},{"dest":"Cuenca","time":"1 hr","desc":"A medieval city of hanging houses perched on cliffs above two river gorges — the Casas Colgadas, the abstract art museum inside a 14th-century house, and the Cathedral of Cuenca. A UNESCO World Heritage City reached by high-speed AVE train.","book":[{"label":"renfe.com","url":"https://www.renfe.com/es/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Ávila","time":"1 hr 40 min","desc":"The best-preserved medieval walled city in Spain — 2.5 km of 11th-century granite walls with 88 towers, still fully intact and walkable on top. The Gothic cathedral and birthplace of Santa Teresa complete the picture.","book":[{"label":"renfe.com","url":"https://www.renfe.com/es/en"},{"label":"Omio","url":"https://www.omio.com/trains/madrid/avila"}]}]},{"city":"Malaga","folder":"Malaga","guide":"malaga_v1.html","url":"../Guides/Malaga/malaga_v1.html","trips":[{"dest":"Antequera","time":"20 min","desc":"UNESCO-listed dolmens among Europe's oldest monumental structures. The town offers a Renaissance old town · the Alcazaba fortress · El Torcal's surreal limestone karst formations.","book":[{"label":"Renfe","url":"https://www.renfe.com/es/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Fuengirola","time":"35 min","desc":"A relaxed Costa del Sol beach town by Cercanías rail — the Sohail Castle · the long promenade · the old fishermen's quarter for a slower-paced half-day alternative.","book":[{"label":"Renfe","url":"https://www.renfe.com/es/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Córdoba","time":"1 hr","desc":"The Mezquita-Catedral — 856 double-arched columns in an endless forest of red-and-white striped stone. The Jewish Quarter and Alcázar de los Reyes Cristianos are within distance.","book":[{"label":"Renfe","url":"https://www.renfe.com/es/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Granada","time":"1 hr 30 min","desc":"The Alhambra palace complex — Nasrid Palaces · Generalife gardens · the Alcazaba fortress — set against the Sierra Nevada. The Albaicín quarter offers whitewashed streets and Mirador de San Nicolás views.","book":[{"label":"Renfe","url":"https://www.renfe.com/es/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Seville","time":"2 hr","desc":"Spain's largest cathedral · the Real Alcázar palace complex · the sweeping Plaza de España — Seville's monumental center and vibrant Triana quarter across the river.","book":[{"label":"Renfe","url":"https://www.renfe.com/es/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Ronda","time":"2 hr via Antequera","desc":"A dramatic clifftop town split by the El Tajo gorge · spanned by the Puente Nuevo. One of Spain's most scenic rail approaches through the Serranía de Ronda mountains.","book":[{"label":"Renfe","url":"https://www.renfe.com/es/en"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Malibu","folder":"Malibu","guide":"malibu_v1.html","url":"../Guides/Malibu/malibu_v1.html","trips":[{"dest":"Ventura","time":"50 min","desc":"A small coastal city with a historic downtown, Mission San Buenaventura founded in 1782, a walkable Main Street, and access to Channel Islands National Park boat tours.","book":[{"label":"amtrak.com","url":"https://www.amtrak.com/pacific-surfliner-train"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Santa Barbara","time":"2 hr","desc":"Known for Spanish Colonial Revival architecture, the Santa Barbara County Courthouse, Mission Santa Barbara, and the State Street arts and restaurant corridor.","book":[{"label":"amtrak.com","url":"https://www.amtrak.com/pacific-surfliner-train"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Marktoberdorf","folder":"Marktoberdorf","guide":"marktoberdorf_v1.html","url":"../Guides/Marktoberdorf/marktoberdorf_v1.html","trips":[{"dest":"Kaufbeuren","time":"13 min","desc":"A well-preserved medieval old town ringed by intact walls and towers — an easy short hop down the Füssen line.","book":[{"label":"Deutsche Bahn","url":"https://www.bahn.de/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Memmingen","time":"32 min","desc":"A well-preserved medieval town with intact city walls, the Gothic Martinskirche, and a vibrant market square — one of the most handsome small cities in Swabia.","book":[{"label":"bahn.de","url":"https://www.bahn.de/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Kempten","time":"33 min","desc":"One of Germany's oldest cities — Roman Cambodunum, the Baroque prince-abbots' Residence and St. Lorenz Basilica, and a lively old town.","book":[{"label":"Deutsche Bahn","url":"https://www.bahn.de/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Füssen","time":"38 min","desc":"Gateway to King Ludwig's Neuschwanstein and Hohenschwangau castles and the Alpine lakes — the castle village lies a short walk uphill on a signposted path.","book":[{"label":"Deutsche Bahn","url":"https://www.bahn.de/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Augsburg","time":"1 hr 10 min","desc":"A 2,000-year-old city with the UNESCO-listed Fuggerei, Renaissance canals and the grand Maximilianstraße.","book":[{"label":"Deutsche Bahn","url":"https://www.bahn.de/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Marseille","folder":"Marseille","guide":"marseille_v1.html","url":"../Guides/Marseille/marseille_v1.html","trips":[{"dest":"Cassis","time":"25 min by TER","desc":"A small fishing port at the foot of the highest sea cliffs in France, gateway to the Calanques national park — a UNESCO-protected landscape of turquoise inlets and white limestone pinnacles. Recommended by Fodor's, Rough Guides and National Geographic.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Aix-en-Provence","time":"35 min by TER","desc":"Elegant Provençal university city of Cézanne, fountains and the Cours Mirabeau — one of France's most beautiful provincial capitals. Recommended by Fodor's and Rick Steves.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Avignon","time":"35 min by TGV","desc":"The papal city of the Middle Ages — the Palais des Papes, the largest Gothic palace in Europe, and the Pont Saint-Bénézet are all UNESCO World Heritage Sites. Recommended by Fodor's and Rick Steves.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Toulon","time":"55 min","desc":"France's main naval base on a deep natural harbour — the old port, the atmospheric cours Lafayette market, and the cable car to Mont Faron with panoramic views over the bay. The port connects to ferries for the Îles d'Hyères.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Nîmes","time":"1 hr 25 min by TER","desc":"The Roman city of the south — the Arènes de Nîmes amphitheatre, built 70 AD and among the best-preserved in Europe, the Maison Carrée temple, which inspired Thomas Jefferson's Virginia State Capitol, and access to the Pont du Gard aqueduct. Less visited than Arles, with all the same Roman gravitas.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Melbourne","folder":"Melbourne","guide":"melbourne_v1.html","url":"../Guides/Melbourne/melbourne_v1.html","trips":[{"dest":"Geelong","time":"1 hr","desc":"Victoria's second city on Corio Bay — a revitalized waterfront precinct, the Geelong Gallery, and a historic carousel operating since 1892. Also the gateway to the Great Ocean Road. The waterfront is steps away on arrival.","book":[{"label":"ptv.vic.gov.au","url":"https://www.ptv.vic.gov.au"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Ballarat","time":"1 hr 20 min","desc":"Victoria's Gold Rush capital — Sovereign Hill recreates an 1850s goldfield where visitors pan for real gold and descend actual mine shafts. The Art Gallery of Ballarat is two minutes on foot; Lake Wendouree provided the 1956 Olympic rowing course.","book":[{"label":"ptv.vic.gov.au","url":"https://www.ptv.vic.gov.au"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Bendigo","time":"2 hrs","desc":"Gold Rush boomtown turned UNESCO Creative City of Gastronomy — the Central Deborah Gold Mine descends 228 metres underground; the Golden Dragon Museum holds Australia's largest collection of Chinese processional dragons; the Bendigo Art Gallery is among the finest regional galleries in the country.","book":[{"label":"ptv.vic.gov.au","url":"https://www.ptv.vic.gov.au"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Miami","folder":"Miami","guide":"miami_v1.html","url":"../Guides/Miami/miami_v1.html","trips":[{"dest":"Fort Lauderdale","time":"30 min","desc":"Brightline's express trains run nonstop to Fort Lauderdale in 30 minutes. Stroll Las Olas Boulevard, ride a water taxi through the canal city, and walk the wide Atlantic beachfront promenade.","book":[{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"West Palm Beach","time":"1 hr 15 min","desc":"Brightline reaches West Palm Beach in 75 minutes. Browse Clematis Street and Rosemary Square, then cross the bridge to Palm Beach for Worth Avenue and the Flagler-era mansions.","book":[{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Milan","folder":"Milan","guide":"milan_v1.html","url":"../Guides/Milan/milan_v1.html","trips":[{"dest":"Pavia","time":"35 min","desc":"The Certosa di Pavia — one of the most elaborate Renaissance monasteries in Italy, with an intricate marble facade and frescoed cloisters — sits just outside a university city of Roman bridges and Lombard churches. Direct regional train.","book":[{"label":"trenitalia.com","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Lake Como","time":"40 min","desc":"Italy's most glamorous lake, ringed by villa gardens and steep wooded shores. A half-hour train ride drops you on the Como waterfront, where ferries reach Bellagio, Varenna, and Menaggio.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Turin","time":"1 hr","desc":"The elegant former royal capital, all arcaded boulevards and baroque squares, home to the world-class Museo Egizio — the greatest hoard of Egyptian antiquities after Cairo — and the soaring Mole Antonelliana.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Bologna","time":"1 hr","desc":"The culinary capital of Italy — birthplace of ragù, tortellini, and mortadella — with Europe's oldest university, a stunning leaning towers skyline, and 40 km of medieval porticoes sheltering the historic center. Frecciarossa direct.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Verona","time":"1 hr 20 min","desc":"Shakespeare's city of Romeo and Juliet, built around a remarkably preserved Roman arena that still hosts summer opera. Pastel palazzi, the Adige river, and Piazza delle Erbe make it a romantic day out.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Monaco","folder":"Monaco","guide":"monaco_v1.html","url":"../Guides/Monaco/monaco_v1.html","trips":[{"dest":"Èze-sur-Mer","time":"10 min","desc":"The seaside foot of the medieval village of Èze, perched high on its rock. A steep coastal path climbs through pine and cactus to the village and its exotic garden.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Menton","time":"11 min","desc":"The last French town before Italy — a pastel-coloured old town stacked above the sea, citrus gardens, and the Jean Cocteau museum. Known for its lemon festival each winter.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Nice","time":"25 min","desc":"The Riviera's capital — the curving Promenade des Anglais, the ochre lanes and market of Vieux Nice, and the hilltop Colline du Château with views over the Baie des Anges. TER trains run along the coast every few minutes.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Ventimiglia Italy","time":"25 min","desc":"The first Italian town across the border, with a hillside medieval quarter and a sprawling Friday market that draws crowds along the whole coast.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Antibes","time":"30 min","desc":"A walled Provençal port with the largest pleasure harbour in Europe — the Picasso Museum occupies the castle where he painted in 1946, the covered market is among the finest on the Côte d'Azur, and the old town ramparts overlook the sea.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Montreal","folder":"Montreal","guide":"montreal_v1.html","url":"../Guides/Montreal/montreal_v1.html","trips":[{"dest":"Ottawa","time":"1h 45min","desc":"Canada's capital — Parliament Hill and the Peace Tower, the Rideau Canal, the Byward Market neighborhood, and three world-class free national museums: the Canadian Museum of History, the National Gallery, and the Canadian War Museum.","book":[{"label":"viarail.ca","url":"https://www.viarail.ca"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Québec City","time":"3h","desc":"UNESCO World Heritage walled city on the St. Lawrence — Château Frontenac, the Dufferin Terrace boardwalk, the historic Quartier Petit-Champlain below the cliff, and the Plains of Abraham. North America's most European city.","book":[{"label":"viarail.ca","url":"https://www.viarail.ca"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Munich","folder":"Munich","guide":"munich_v2.html","url":"../Guides/Munich/munich_v2.html","trips":[{"dest":"Dachau","time":"20 min","desc":"The first Nazi concentration camp, opened in 1933 and now a memorial and documentation centre — one of the most important historical sites in Germany. The old town of Dachau also has a palace, parks, and a long tradition as an artist colony predating the Third Reich.","book":[{"label":"bahn.de","url":"https://www.bahn.de/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Augsburg","time":"35 min","desc":"A 2,000-year-old Roman city — the UNESCO-listed Fuggerei is the world's oldest social housing settlement, still inhabited and founded in 1516. The Maximilianstraße, Renaissance fountains, and the Goldener Saal are all walkable via the main station.","book":[{"label":"bahn.de","url":"https://www.bahn.de/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Landsberg am Lech","time":"55 min","desc":"A beautifully preserved medieval walled town on the Lech river — the Bayertor gate, frescoed Baroque Rathaus, and river promenade make it one of Bavaria's most attractive small towns. Direct regional train on the Augsburg line.","book":[{"label":"bahn.de","url":"https://www.bahn.de/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Regensburg","time":"1h 30 min","desc":"UNESCO-listed medieval Altstadt on the Danube — the Stone Bridge built in 1146, Gothic cathedral, and the oldest continuously running sausage kitchen in the world at the bridge's foot. The cleanest preserved old town in Bavaria.","book":[{"label":"bahn.de","url":"https://www.bahn.de/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Passau","time":"2h","desc":"A Baroque city at the confluence of three rivers — the Danube, Inn, and Ilz — with the Veste Oberhaus fortress above the old town and St. Stephen's Cathedral, home to the largest church organ in the world.","book":[{"label":"bahn.de","url":"https://www.bahn.de/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Napa","folder":"Napa","guide":"napa_v1.html","url":"../Guides/Napa/napa_v1.html","trips":[{"dest":"Martinez Station → San Francisco","time":"1 hr 15 min","desc":"Capitol Corridor train to Emeryville, then the Amtrak bus shuttle to downtown San Francisco. The Ferry Building, Embarcadero, and Union Square are all within walking distance of the shuttle terminus.","book":[{"label":"Amtrak","url":"https://www.amtrak.com/california-zephyr-train.html"},{"label":"Omio","url":"https://www.omio.com/trains/martinez/san-francisco"}]},{"dest":"Martinez Station → Sacramento","time":"1 hr 15 min","desc":"Capitol Corridor or San Joaquins east to Sacramento. Old Sacramento waterfront and the California State Capitol are accessible on foot at the station.","book":[{"label":"Amtrak","url":"https://www.amtrak.com/california-zephyr-train.html"},{"label":"Omio","url":"https://www.omio.com/trains/martinez/sacramento"}]}]},{"city":"Naples","folder":"Naples","guide":"naples_v1.html","url":"../Guides/Naples/naples_v1.html","trips":[{"dest":"Herculaneum","time":"20 min","desc":"Pompeii's smaller, better-preserved sibling — buried under 20m of volcanic rock rather than ash, which kept organic matter intact. Fewer crowds and more to see per square metre.","book":[{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Pompeii","time":"40 min","desc":"The preserved Roman city buried by Vesuvius in 79 AD — streets, bakeries, thermopolia, and frescoed villas frozen in time. The most visited archaeological site in the world, and still the most affecting.","book":[{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Caserta","time":"40 min","desc":"The Royal Palace of Caserta — a Versailles-scale Bourbon palace with 1,200 rooms, Europe's longest garden, and a waterfall cascade that stretches 3km uphill. Dramatically undervisited.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Sorrento","time":"1h 10 min","desc":"The clifftop resort town at the southern end of the Bay of Naples — the launch point for Capri, Positano, and the Amalfi Coast. The Circumvesuviana passes through Pompeii and Herculaneum on the way.","book":[{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Rome","time":"1h 10 min","desc":"The capital — Colosseum, Vatican, and Pantheon a high-speed train ride away. Frecciarossa and Italo run frequently through the day with the fastest connection just over an hour.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"New Orleans","folder":"New-Orleans","guide":"new-orleans_v1.html","url":"../Guides/New-Orleans/new-orleans_v1.html","trips":[{"dest":"Bay St. Louis","time":"MS · 1 hr","desc":"Gulf Coast arts community with independent galleries, beach access, and a walkable historic downtown on the Mardi Gras Service Amtrak line — a quieter and distinct stop than the casino resorts further east.","book":[{"label":"Amtrak","url":"https://www.amtrak.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Biloxi","time":"MS · 1 hr 30 min","desc":"Gulf Coast beach town with casino resorts, the Ohr-O'Keefe Museum of Art, and fresh Gulf seafood. The Amtrak Mardi Gras Service runs two round trips daily on this line.","book":[{"label":"Amtrak","url":"https://www.amtrak.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Mobile","time":"AL · 3 hr","desc":"Port city with a compact antebellum historic district, the USS Alabama Battleship Memorial Park, and a distinct Gulf Coast identity. Eastern terminus of the Mardi Gras Service line.","book":[{"label":"Amtrak","url":"https://www.amtrak.com"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"New York","folder":"New-York","guide":"new-york_v1.html","url":"../Guides/New-York/new-york_v1.html","trips":[{"dest":"New Haven","time":"1 hr 45 min","desc":"Yale's campus includes the Beinecke Rare Book Library and the Yale Center for British Art — two world-class institutions in a walkable collegiate town.","book":[{"label":"Amtrak","url":"https://www.amtrak.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Washington DC","time":"2 hr 45 min","desc":"The Mall, the Capitol, the Library of Congress, the Smithsonian museums, the Lincoln Memorial at dusk. A dense day possible by departing early; the Acela shaves 45 minutes each way.","book":[{"label":"Amtrak","url":"https://www.amtrak.com/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Nice","folder":"Nice","guide":"nice_v1.html","url":"../Guides/Nice/nice_v1.html","trips":[{"dest":"Villefranche-sur-Mer","time":"8 min","desc":"A pastel fishing harbour wrapped around a deep blue bay, one stop east, with a baroque old town and the Cocteau-painted Chapelle Saint-Pierre on the quay.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/train/timetables/nice/menton"},{"label":"Omio","url":"https://www.omio.com/trains/nice/menton"}]},{"dest":"Monaco Monte-Carlo","time":"20 min","desc":"The glittering principality 20 minutes east — the Casino de Monte-Carlo, the Prince's Palace, the old town of Monaco-Ville and the Oceanographic Museum, all walkable once you arrive.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/train/timetables/nice/monaco"},{"label":"Omio","url":"https://www.omio.com/trains/nice-ville/monaco-monte-carlo-1mbl1"}]},{"dest":"Antibes","time":"20 min","desc":"A walled seaside town 20 minutes west with a ramparts walk, the Picasso Museum in the Château Grimaldi, and Europe's largest yacht harbour at Port Vauban.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/train/timetables/nice/cannes"},{"label":"Omio","url":"https://www.omio.com/trains/nice/antibes"}]},{"dest":"Menton","time":"30 min","desc":"The \"pearl of France\" on the Italian border — a lemon-scented town of ochre houses, terraced gardens and a steep baroque old town, 30 minutes east.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/train/timetables/nice/menton"},{"label":"Omio","url":"https://www.omio.com/trains/nice/menton"}]},{"dest":"Cannes","time":"40 min","desc":"Riviera glamour 40 minutes west — La Croisette, the film-festival Palais, the sandy beaches and the old quarter of Le Suquet climbing above the port.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/train/timetables/nice/cannes"},{"label":"Omio","url":"https://www.omio.com/trains/nice/cannes"}]}]},{"city":"Orlando","folder":"Orlando","guide":"orlando_v1.html","url":"../Guides/Orlando/orlando_v1.html","trips":[{"dest":"Winter Park","time":"26 min","desc":"Orlando's elegant old-money neighbor — brick-paved Park Avenue boutiques and sidewalk cafés, the Morse Museum's unmatched Tiffany-glass collection, and a pontoon cruise through canals linking the chain of lakes. SunRail runs weekdays only.","book":[{"label":"SunRail","url":"https://sunrail.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"West Palm Beach","time":"2 hr","desc":"Brightline's smooth intercity run ends steps off Clematis Street — palm-lined waterfront, the Norton Museum of Art, and a quick bridge-hop over to Palm Beach's Worth Avenue. Hourly departures make a long Atlantic-coast day realistic.","book":[{"label":"Brightline","url":"https://www.gobrightline.com"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Osaka","folder":"Osaka","guide":"osaka_v1.html","url":"../Guides/Osaka/osaka_v1.html","trips":[{"dest":"Kyoto","time":"15 min","desc":"Shinkansen or 30 min JR Special Rapid. Ancient capital with 2,000 temples, bamboo groves, geisha districts, and imperial palaces across 17 UNESCO World Heritage Sites.","book":[{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Kobe","time":"20 min","desc":"JR Special Rapid. Compact port city known for wagyu beef, Chinatown, sake breweries in Nada, and the Nunobiki Herb Garden ropeway overlooking the harbour.","book":[{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Nara","time":"45 min","desc":"JR Yamatoji Line direct. Japan's first permanent capital with free-roaming deer, the colossal bronze Buddha at Todai-ji, and 1,300-year-old Kasuga Taisha shrines in a forested park.","book":[{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Oslo","folder":"Oslo","guide":"oslo_v1.html","url":"../Guides/Oslo/oslo_v1.html","trips":[{"dest":"Drammen","time":"35 min","desc":"Compact city at the head of the Drammenselva river — the Bragernes church with the hilltop view over the region, the revitalized Strømsø waterfront district, and the Drammen Museum. An easy half-day for travelers who want a quieter Norwegian town.","book":[{"label":"vy.no","url":"https://www.vy.no/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Hamar","time":"1h 10min","desc":"Lakeside town on Mjøsa's eastern shore, home to the Norwegian Railway Museum — engine sheds, vintage carriages, steam locomotives, and Norway's shortest working railway line, a narrow-gauge track that shuttles visitors through the museum grounds.","book":[{"label":"vy.no","url":"https://www.vy.no/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Kongsberg","time":"1h 30min","desc":"Former silver-mining town where a small mine train clatters visitors deep into the mountain to the King's Mine, hundreds of metres underground. The Norwegian Mining Museum in the town centre covers the silver rush, coin-minting history, and Kongsberg's ski heritage under one roof.","book":[{"label":"vy.no","url":"https://www.vy.no/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Halden","time":"1h 45min","desc":"Border town on the Østfold Line, dominated by Fredriksten Fortress on a hilltop above the Iddefjord — an open-air museum of bastions, tunnels, and ramparts with sweeping views toward Sweden. The revitalized waterfront below has restaurants along a sunny promenade.","book":[{"label":"vy.no","url":"https://www.vy.no/en"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Lillehammer","time":"2h","desc":"Olympic city on the northern shore of Lake Mjøsa — the Lysgårdsbakken ski jump open for sightseeing, the Norwegian Olympic Museum, the open-air Maihaugen folk museum, and the historic wooden town of Storgata. Best visited in summer when Maihaugen is fully open.","book":[{"label":"vy.no","url":"https://www.vy.no/en"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Oxford","folder":"Oxford","guide":"oxford_v1.html","url":"../Guides/Oxford/oxford_v1.html","trips":[{"dest":"Moreton-in-Marsh","time":"35 min","desc":"The fastest gateway to the Cotswolds — a direct GWR run on the Cotswold Line deposits you in a handsome market town with access to Bourton-on-the-Water, Chipping Campden and the Batsford Arboretum by local bus or taxi.","book":[{"label":"Great Western Railway","url":"https://www.gwr.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"London","time":"50 min","desc":"The capital sits under an hour away on direct Great Western Railway trains to Paddington — world-class museums, galleries, theatre and landmarks make for an easy full-day escape.","book":[{"label":"Great Western Railway","url":"https://www.gwr.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Bath","time":"1 hr 10 min","desc":"Georgian Bath — the Roman Baths, honey-stone crescents and the abbey — is a scenic ride on GWR, changing once at Didcot Parkway.","book":[{"label":"Great Western Railway","url":"https://www.gwr.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Bristol","time":"1 hr 10 min","desc":"Direct GWR train to one of England's most creative cities — Clifton Suspension Bridge, Brunel's SS Great Britain, a thriving street-art scene anchored by Stokes Croft, and the Arnolfini contemporary arts centre on the harbourside.","book":[{"label":"Great Western Railway","url":"https://www.gwr.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Stratford-upon-Avon","time":"1 hr 18 min","desc":"Shakespeare's birthplace on the Avon — the half-timbered Henley Street house, Anne Hathaway's Cottage and a Royal Shakespeare Company performance if timed right. Chiltern Railways or CrossCountry with a change at Leamington Spa.","book":[{"label":"Chiltern Railways","url":"https://www.chilternrailways.co.uk"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Paris","folder":"Paris","guide":"paris_v7.html","url":"../Guides/Paris/paris_v7.html","trips":[{"dest":"Fontainebleau","time":"40 min","desc":"A royal château with 1,500 rooms spanning every French style — François I Renaissance to Napoleon III Empire — set at the edge of a great forest. Transilien R trains depart Gare de Lyon direct to Fontainebleau-Avon.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Amiens","time":"1h 10 min","desc":"Notre-Dame d'Amiens — the largest Gothic cathedral in France, twice the volume of Notre-Dame de Paris, with the original polychrome interior intact. Direct TGV, Gare du Nord.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Rouen","time":"1 hr 25 min","desc":"Normandy's medieval capital — Rouen Cathedral is the Gothic façade Monet painted 30 times. The half-timbered lanes around the Gros-Horloge are the best-preserved in northern France, and Place du Vieux-Marché marks where Joan of Arc was burned in 1431.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Strasbourg","time":"1 hr 48 min","desc":"The Franco-German capital of Alsace — Petite France's canals and timbered winemakers' houses are a UNESCO quarter. The pink-sandstone cathedral spire was Europe's tallest until 1874. Compact, walkable, lunch in a winstub.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Lyon","time":"2 hrs","desc":"France's second city and gastronomic capital — Vieux Lyon's Renaissance traboules, the hilltop basilica of Fourvière with Roman-amphitheatre remains, and the silk-weavers' Croix-Rousse. A bouchon lunch is as non-negotiable as any monument.","book":[{"label":"SNCF Connect","url":"https://www.sncf-connect.com/en-en/"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Philadelphia","folder":"Philadelphia","guide":"philadelphia_v1.html","url":"../Guides/Philadelphia/philadelphia_v1.html","trips":[{"dest":"Baltimore","time":"55 min","desc":"The Inner Harbor, the National Aquarium, Fort McHenry, and the American Visionary Art Museum make for an easy half-day or full day out.","book":[{"label":"Amtrak","url":"https://www.amtrak.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"New York City","time":"1 hr 20 min","desc":"The Metropolitan Museum, Central Park, Brooklyn Bridge, and Times Square are all within reach on a comfortable day trip via the Acela or Northeast Regional.","book":[{"label":"Amtrak","url":"https://www.amtrak.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Washington DC","time":"1 hr 35 min","desc":"The National Mall, Smithsonian museums, Lincoln Memorial, and the US Capitol are all free to visit. The Acela cuts the journey to just over an hour.","book":[{"label":"Amtrak","url":"https://www.amtrak.com/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Pisa","folder":"Pisa","guide":"pisa_v1.html","url":"../Guides/Pisa/pisa_v1.html","trips":[{"dest":"Viareggio","time":"20 min","desc":"The closest beach resort on the Versilia coast — a long promenade of Liberty-style bathhouses, pine-backed sands, and seafood restaurants. Regional trains run throughout the day on the Pisa-Genova line.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Lucca","time":"30 min","desc":"A flawlessly intact walled city you can circle on foot or by bike along the broad tree-topped ramparts. Inside: the oval Piazza dell'Anfiteatro, Romanesque churches, and the Torre Guinigi crowned with a little oak grove.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Florence","time":"1 hr","desc":"The cradle of the Renaissance — Brunelleschi's Duomo, the Uffizi's galleries, Michelangelo's David and the goldsmith-lined Ponte Vecchio, all within a walkable historic core around Santa Maria Novella station.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"La Spezia","time":"1 hr","desc":"The gateway port to Cinque Terre and the Gulf of Poets — the Museo Navale, the Castello di San Giorgio, and a thriving covered market in the centro storico. Trenitalia regional trains run on the hour along the Tyrrhenian coast.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Cinque Terre","time":"1 hr 15 min","desc":"Five pastel fishing villages stacked above the Ligurian Sea, linked by a cliff-hugging coastal railway. Change at La Spezia for the local line that hops between Riomaggiore, Manarola, Corniglia, Vernazza and Monterosso.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Portland","folder":"Portland","guide":"portland_v1.html","url":"../Guides/Portland/portland_v1.html","trips":[{"dest":"Eugene","time":"2 hrs 20 min","desc":"Two daily round trips on Amtrak Cascades connect the city to Eugene, home to the University of Oregon, the 5th Street Public Market, and access to the Oregon coast and Cascade Range.","book":[{"label":"amtrak.com","url":"https://www.amtrak.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Seattle","time":"3 hrs 30 min","desc":"Amtrak Cascades runs multiple daily departures to Seattle. Pike Place Market, the Space Needle, and the waterfront make a full-day excursion with easy return service.","book":[{"label":"amtrak.com","url":"https://www.amtrak.com"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Porto","folder":"Porto","guide":"porto_v2.html","url":"../Guides/Porto/porto_v2.html","trips":[{"dest":"Braga","time":"1 hour","desc":"Portugal's ecclesiastical capital holds some of the oldest churches in the country and the dramatic Bom Jesus staircase — a Baroque pilgrimage site above the city. The compact old town centres on the medieval Sé cathedral and treasury. A half-day covers the main sights.","book":[{"label":"cp.pt","url":"https://www.cp.pt"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Guimaraes","time":"1 hour","desc":"The birthplace of Portugal — the 10th-century castle where the first king of Portugal was born, the Ducal Palace of the Bragancans, and a UNESCO medieval centre of granite arcades and yellow buildings.","book":[{"label":"cp.pt","url":"https://www.cp.pt"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Viana do Castelo","time":"1 hour","desc":"A handsome coastal town at the mouth of the Lima river — the Praca da Republica, the hilltop Basilica of Santa Luzia reached by funicular, and long Atlantic beaches. CP trains run on the Minho line throughout the day.","book":[{"label":"cp.pt","url":"https://www.cp.pt"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Aveiro","time":"1 hour 10 minutes","desc":"A small canal city with colourful moliceiro boats, Art Nouveau facades, and ovos moles — egg-yolk pastries in wafer shells. Take the canal boat first, then walk the old quarter past tiled facades. The Aveiro Museum and São Gonçalinho chapel are the highlights.","book":[{"label":"cp.pt","url":"https://www.cp.pt"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Douro Valley","time":"2 hours","desc":"Portugal's wine country — terraced vineyards on steep schist slopes producing port. The Linha do Douro train offers a window-seat journey through the valley. Régua and Pinhão are the best stops; Pinhão station has celebrated azulejo panels on its platforms.","book":[{"label":"cp.pt","url":"https://www.cp.pt"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Porto Alegre","folder":"Porto-Alegre","guide":"porto-alegre_v1.html","url":"../Guides/Porto-Alegre/porto-alegre_v1.html","trips":[{"dest":"São Leopoldo","time":"35 min","desc":"One of Brazil's oldest cities of German immigration, founded in 1824 — with a walkable historic center, the Museu do Imigrante, and streets that preserve the early colonist character of the Serra Gaúcha foothills.","book":[{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Prague","folder":"Prague","guide":"prague_v1.html","url":"../Guides/Prague/prague_v1.html","trips":[{"dest":"Karlštejn","time":"40 min","desc":"Charles IV's 14th-century Gothic crown-jewel fortress, rising dramatically over the forested Berounka valley.","book":[{"label":"ČD","url":"https://www.cd.cz/en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Kutná Hora","time":"1 hr","desc":"UNESCO silver town: the bone-filled Sedlec Ossuary, decorated with 40,000 skeletons, and the soaring Gothic St. Barbara's Cathedral.","book":[{"label":"ČD","url":"https://www.cd.cz/en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Plzeň","time":"1 hr 30 min","desc":"Birthplace of pilsner — tour the original Pilsner Urquell brewery and taste unfiltered lager down in the cellars.","book":[{"label":"ČD","url":"https://www.cd.cz/en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Dresden","time":"2 hr 15 min","desc":"Saxony's baroque capital across the German border — the Zwinger palace, the rebuilt Frauenkirche, and the Old Masters gallery.","book":[{"label":"ČD","url":"https://www.cd.cz/en/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Český Krumlov","time":"2 hr 45 min","desc":"A fairy-tale UNESCO town wrapped in a bend of the Vltava beneath a vast Renaissance castle and painted tower.","book":[{"label":"ČD","url":"https://www.cd.cz/en/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Quebec City","folder":"Quebec-City","guide":"quebec-city_v1.html","url":"../Guides/Quebec-City/quebec-city_v1.html","trips":[{"dest":"Montréal","time":"3h 10min","desc":"Montréal is Québec City's urban counterpart — the Cathedral of Notre-Dame Basilica, the cobblestone streets of Old Montréal, the Mount Royal summit lookout, and the Plateau Mont-Royal's bohemian Saint-Laurent boulevard. A long but rewarding same-day excursion by VIA Rail.","book":[{"label":"viarail.ca","url":"https://www.viarail.ca"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Rome","folder":"Rome","guide":"rome_v1.html","url":"../Guides/Rome/rome_v1.html","trips":[{"dest":"Frascati","time":"35 min","desc":"The most famous of the Castelli Romani hill towns — villas, vineyards and the broad panorama of Rome and the Campagna below. The local white wine is drunk at source; the Villa Aldobrandini gardens are free to visit.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Tivoli","time":"1 hr","desc":"Two UNESCO sites in the hills east of the city: Villa d'Este's terraced Renaissance fountains and the sprawling ruins of Hadrian's imperial Villa Adriana. Regional trains run through the day.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Naples","time":"1 hr 10 min","desc":"Vibrant southern port — the National Archaeological Museum the birthplace of pizza and the gateway to Pompeii and the Amalfi Coast. Reached by fast train in just over an hour.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Florence","time":"1 hr 30 min","desc":"Renaissance capital of the Duomo the Uffizi Ponte Vecchio and Michelangelo's David. High-speed Frecciarossa and Italo trains run through the day.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Siena","time":"1 hr 45 min","desc":"Medieval Tuscany at its most complete — the shell-shaped Piazza del Campo, the striped marble Duomo, and the narrow contrada lanes little changed since the 13th century. Regional trains connect via Chiusi or Empoli.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Salzburg","folder":"Salzburg","guide":"salzburg_v1.html","url":"../Guides/Salzburg/salzburg_v1.html","trips":[{"dest":"Linz","time":"1 hr 10 min","desc":"Upper Austria's third city — the Lentos Museum of modern art on the Danube, the vast Ars Electronica Center on digital culture, and the old city around Hauptplatz. Fast Railjet trains run direct on the Westbahn corridor.","book":[{"label":"oebb.at","url":"https://www.oebb.at/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Bad Ischl","time":"1 hr 20 min","desc":"Emperor Franz Joseph's summer retreat on the Traun river — the Kaiservilla where he hunted for 60 summers, the Imperial Salt Spa and the lakeside market town that anchors the Salzkammergut; change at Attnang-Puchheim.","book":[{"label":"oebb.at","url":"https://www.oebb.at/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Kufstein","time":"1 hr 20 min","desc":"Tyrolean market town on the Inn River dominated by a medieval hilltop fortress — the Heldenorgel is the world's largest outdoor pipe organ, 4,948 pipes bored into the Bürgerturm, playing a daily noon concert; also a military history museum, cobblestone old town, and alpine views into Bavaria.","book":[{"label":"oebb.at","url":"https://www.oebb.at/en"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Munich","time":"1 hr 30 min","desc":"Bavaria's capital across the border — Marienplatz, the Residenz and the English Garden; direct regional and EuroCity trains run there in 1 hr 30 min.","book":[{"label":"oebb.at","url":"https://www.oebb.at/en"},{"label":"Omio","url":"https://www.omio.com/trains/salzburg/munich"}]},{"dest":"Hallstatt","time":"2 hr 35 min","desc":"Storybook lakeside village of pastel houses below alpine cliffs; the train runs to a pier where a short ferry crosses the Hallstättersee to the old town, changing at Attnang-Puchheim.","book":[{"label":"oebb.at","url":"https://www.oebb.at/en"},{"label":"Omio","url":"https://www.omio.com/trains/salzburg/hallstatt"}]}]},{"city":"San Diego","folder":"San-Diego","guide":"san-diego_v1.html","url":"../Guides/San-Diego/san-diego_v1.html","trips":[{"dest":"Santa Barbara","time":"5 hrs","desc":"The American Riviera — red-tile Spanish Colonial architecture, State Street, the Funk Zone wine district, and one of California's most beautiful missions; all spread across a waterfront plain between the mountains and the Pacific.","book":[{"label":"amtrak.com","url":"https://www.amtrak.com"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"San Jose","folder":"San-Jose","guide":"san-jose_v1.html","url":"../Guides/San-Jose/san-jose_v1.html","trips":[{"dest":"San Francisco","time":"1 hr 10 min","desc":"Caltrain express to San Francisco 4th King. Golden Gate views, Fisherman's Wharf, Union Square, and the Financial District are all within walking distance of the terminal.","book":[{"label":"Amtrak","url":"https://www.amtrak.com"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"San Sebastian","folder":"San-Sebastian","guide":"san-sebastian_v1.html","url":"../Guides/San-Sebastian/san-sebastian_v1.html","trips":[{"dest":"Zarautz","time":"20 min","desc":"The surf capital of the Basque Country — a 2.5 km crescent beach that hosts the WSL championship, a compact old town, and the clifftop promenade with views of the coast. EuskoTren runs several times an hour on the coastal line.","book":[{"label":"trainline.com","url":"https://www.thetrainline.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Hendaye","time":"35 min","desc":"A French Basque seaside town at the mouth of the Bidasoa river — wide beaches, the old town of Hendaye-Ville, and views of the Basque coast across the estuary.","book":[{"label":"trainline.com","url":"https://www.thetrainline.com/train-times/san-sebastian-to-hendaye"},{"label":"Omio","url":"https://www.omio.com/trains/san-sebastian/hendaye"}]},{"dest":"Pamplona","time":"1 hr","desc":"Navarre's walled capital — the medieval citadel, the Camino de Santiago pilgrimage route through the old town, and the bullring made famous by Hemingway's The Sun Also Rises. Renfe Alvia trains run direct on the San Sebastian-Pamplona line.","book":[{"label":"renfe.com","url":"https://www.renfe.com"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Vitoria-Gasteiz","time":"1 hr 10 min","desc":"The Basque Country's quiet capital — a medieval almond-shaped Casco Viejo, the Fine Arts Museum with its El Greco and Rubens, and one of Europe's most successful urban green-ring park systems. Renfe trains run direct on the Donostia-Vitoria line.","book":[{"label":"renfe.com","url":"https://www.renfe.com"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Bilbao","time":"2 hr 30 min","desc":"The Guggenheim Bilbao, the Casco Viejo old quarter, and a city with its own Michelin-starred scene — a full-day trip on the scenic EuskoTren coastal line.","book":[{"label":"trainline.com","url":"https://www.thetrainline.com/train-times/san-sebastian-to-bilbao"},{"label":"Omio","url":"https://www.omio.com/trains/san-sebastian/bilbao"}]}]},{"city":"Santa Barbara","folder":"Santa-Barbara","guide":"santa-barbara_v1.html","url":"../Guides/Santa-Barbara/santa-barbara_v1.html","trips":[{"dest":"Ventura","time":"42 min","desc":"A compact coastal city 38 miles south — Mission San Buenaventura, the Ventura Harbor, and a walkable arts district along Main Street.","book":[{"label":"amtrak.com","url":"https://www.amtrak.com/pacific-surfliner-train"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Los Angeles","time":"2 hr 36 min","desc":"Pacific Surfliner runs directly to LA Union Station — Getty Center, Griffith Observatory, or Santa Monica Beach are all reachable without a car.","book":[{"label":"amtrak.com","url":"https://www.amtrak.com/pacific-surfliner-train"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"San Luis Obispo","time":"2 hr 40 min","desc":"A college town with a pedestrian-friendly downtown, Mission San Luis Obispo de Tolosa, and access to Edna Valley wine country.","book":[{"label":"amtrak.com","url":"https://www.amtrak.com/pacific-surfliner-train"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Santa Fe","folder":"Santa-Fe","guide":"santa-fe_v1.html","url":"../Guides/Santa-Fe/santa-fe_v1.html","trips":[{"dest":"Albuquerque","time":"1 hr 30 min","desc":"New Mexico's largest city — 90 minutes south on the Rail Runner. Explore Old Town Albuquerque's 18th-century plaza and the Indian Pueblo Cultural Center.","book":[{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Santa Monica","folder":"Santa-Monica","guide":"santa-monica_v1.html","url":"../Guides/Santa-Monica/santa-monica_v1.html","trips":[{"dest":"Culver City","time":"20 min","desc":"Mid-route Metro E Line stop. Museum of Jurassic Technology, Platform LA, and Washington Boulevard restaurants.","book":[{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Downtown Los Angeles","time":"45 min","desc":"Direct Metro E Line to 7th Street/Metro Center. Grand Central Market, Walt Disney Concert Hall, The Broad, and the Arts District.","book":[{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Santiago","folder":"Santiago","guide":"santiago_v1.html","url":"../Guides/Santiago/santiago_v1.html","trips":[{"dest":"Rancagua","time":"1 hr 10 min","desc":"Gateway to the Rapel wine valley and O'Higgins region — scenic ride through the agricultural heartland south of the capital. Metrotren commuter service runs frequently throughout the day.","book":[{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Seattle","folder":"Seattle","guide":"seattle_v1.html","url":"../Guides/Seattle/seattle_v1.html","trips":[{"dest":"Edmonds","time":"26 min","desc":"A walkable waterfront town 26 minutes north by rail: beaches at Brackett's Landing beside the Kingston ferry dock, an underwater dive park, independent shops and restaurants in a compact downtown, and Olympic Mountain views across Puget Sound — most of it within a mile of the station.","book":[{"label":"Amtrak","url":"https://www.amtrak.com/cascades-train"},{"label":"Omio","url":"https://www.omio.com/companies/trains/amtrak"}]},{"dest":"Tacoma","time":"48 min","desc":"Tacoma's compact museum district is the draw: the Museum of Glass honors native son Dale Chihuly, whose installations thread through downtown, alongside the Tacoma Art Museum, the Washington State History Museum, and LeMay – America's Car Museum. Point Defiance Zoo Aquarium rounds out a full, easy day south.","book":[{"label":"Amtrak","url":"https://www.amtrak.com/cascades-train"},{"label":"Omio","url":"https://www.omio.com/companies/trains/amtrak"}]},{"dest":"Portland","time":"3 hr 25 min","desc":"Portland rewards a long day: Powell's City of Books, the Pearl District, food carts, and a celebrated craft-beer scene, all an easy walk off Union Station. Cascades train 503 departs at 7:10am; the last return, train 508, leaves Portland at 7:25pm and arrives back at 10:50pm.","book":[{"label":"Amtrak","url":"https://www.amtrak.com/cascades-train"},{"label":"Omio","url":"https://www.omio.com/companies/trains/amtrak"}]}]},{"city":"Seoul","folder":"Seoul","guide":"seoul_v1.html","url":"../Guides/Seoul/seoul_v1.html","trips":[{"dest":"Gyeongju","time":"2 hrs by KTX","desc":"The former capital of the thousand-year Silla Kingdom — royal burial mounds at Tumuli Park, Asia's oldest observatory at Cheomseongdae, Bulguksa Temple against forested hills, and the stone-carved cave shrine of Seokguram. UNESCO World Heritage.","book":[{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Seville","folder":"Seville","guide":"seville_v1.html","url":"../Guides/Seville/seville_v1.html","trips":[{"dest":"Córdoba","time":"45 min","desc":"Roman columns, the Mezquita-Catedral, and a labyrinthine Jewish quarter — Spain's most perfectly preserved medina, one high-speed stop away.","book":[{"label":"renfe.com","url":"https://www.renfe.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Jerez de la Frontera","time":"1h","desc":"The birthplace of flamenco, sherry, and Andalusian horsemanship — Royal Andalusian School and sherry bodegas make for a complete day out.","book":[{"label":"renfe.com","url":"https://www.renfe.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Huelva","time":"1 hr 30 min","desc":"The gateway to Columbus's 1492 voyage — La Rabida monastery where the expedition was planned and the Donana wetlands on the doorstep. The old town holds the Columbus monument and the provincial museum. Renfe regional trains run direct on the Seville-Huelva line.","book":[{"label":"renfe.com","url":"https://www.renfe.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Cadiz","time":"1 hr 40 min","desc":"Europe's oldest continually inhabited city — a compact peninsula fortress of golden-stone streets, two cathedrals, and 18th-century watchtowers. The Mercado Central and waterfront Parque Genoves reward a half-day. Renfe MD trains run direct on the Seville-Cadiz line.","book":[{"label":"renfe.com","url":"https://www.renfe.com"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Malaga","time":"2 hr","desc":"Picasso's birthplace on the Costa del Sol — the Museo Picasso Malaga, the Alcazaba Moorish fortress, the Roman theatre below it, and the restored Soho street-art district along the riverbank. Renfe Avant trains run direct on the Seville-Malaga line.","book":[{"label":"renfe.com","url":"https://www.renfe.com"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Shanghai","folder":"Shanghai","guide":"shanghai_v1.html","url":"../Guides/Shanghai/shanghai_v1.html","trips":[{"dest":"Hangzhou","time":"50 min","desc":"West Lake — ranked among China's most beautiful landscapes for a thousand years — pagodas, causeways, tea plantations and the Lingyin Temple in a city Marco Polo called the finest in the world.","book":[{"label":"China Railway","url":"https://www.12306.cn/en/index.html"}]}]},{"city":"Sicily","folder":"Sicily","guide":"sicily_v1.html","url":"../Guides/Sicily/sicily_v1.html","trips":[{"dest":"Catania","time":"45 min","desc":"UNESCO Baroque city rebuilt in black volcanic lava stone after the 1693 earthquake. Piazza del Duomo with its elephant fountain, vibrant fish market, Roman theatre, and the Benedictine Monastery — all in dark volcanic contrast with white limestone facades.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Messina","time":"45 min","desc":"Gateway to Sicily at the narrowest point of the Strait. The Norman Cathedral houses Europe's largest astronomical clock with a daily mechanical show at noon. Views across to mainland Calabria.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Syracuse","time":"2 hr 10 min","desc":"Once the most powerful city in the Greek world. The Neapolis Archaeological Park holds a massive Greek Theatre and the Ear of Dionysius cave; Ortigia island has a cathedral built into a Greek temple and the mythological Fountain of Arethusa. UNESCO World Heritage.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Cefalù","time":"2 hr 30 min","desc":"Medieval town pressed between a 270-metre rock promontory and the sea. The Norman cathedral contains Sicily's oldest Byzantine mosaics — a monumental Christ Pantocrator predating Monreale. UNESCO World Heritage.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Noto","time":"2 hr 30 min","desc":"The Baroque capital of Sicily, rebuilt entirely after 1693 in golden limestone. Via Nicolaci's ornate palazzo balconies and the Cathedral represent the apex of Sicilian Baroque. UNESCO World Heritage.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/en.html"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Siena","folder":"Siena","guide":"siena_v1.html","url":"../Guides/Siena/siena_v1.html","trips":[{"dest":"Poggibonsi","time":"30 min","desc":"A Chianti town on the direct Siena-Empoli regional line and the closest train stop to San Gimignano — the medieval towers visible on the hillside. The town holds the unfinished Fortezza Medicea and Benozzo Gozzoli frescoes in the municipal museum.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Asciano","time":"30 min","desc":"A quiet hill town set in the lunar clay badlands of the Crete Senesi — the Museum of Sacred Art with Duccio-school panels, and rolling ochre ridges that look nothing like the rest of Tuscany. Direct train on the scenic Trenitalia line via Siena FS.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Empoli","time":"50 min","desc":"A Valdarno market town with the Museo della Collegiata holding Masolino and Pontormo altarpieces. The direct Siena-Empoli regional train terminates here at a mainline junction for Florence and Pisa.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Chiusi","time":"1 hr","desc":"An Etruscan hilltop city perched above the Val di Chiana — the National Etruscan Museum with bucchero ware and bronze mirrors, a network of underground Etruscan tunnels, and a medieval labyrinth open for guided visits. Trenitalia regional trains serve Chiusi-Chianciano Terme on the Siena FS line.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]},{"dest":"Florence","time":"1 hr 11 min","desc":"The cradle of the Renaissance — the Uffizi, the Duomo, the Accademia's David, and Ponte Vecchio. A direct Trenitalia regional train links Siena to Florence with no change.","book":[{"label":"Trenitalia","url":"https://www.trenitalia.com/"},{"label":"Omio","url":"https://www.omio.com/"}]}]},{"city":"Sintra","folder":"Sintra","guide":"sintra_v2.html","url":"../Guides/Sintra/sintra_v2.html","trips":[{"dest":"Lisbon","time":"40 minutes","desc":"Portugal's capital — Alfama's Moorish lanes, the Manueline Belém Tower and Jerónimos Monastery, and Pombaline Baixa rebuilt after the 1755 earthquake. CP Linha de Sintra runs four trains an hour direct to Rossio Station in the centre.","book":[{"label":"cp.pt","url":"https://www.cp.pt"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Cascais","time":"1 hour 10 minutes","desc":"The fishing village turned royal retreat on the Estoril coast — old town, harbour, the Boca do Inferno blowhole, and the wild Atlantic of Praia do Guincho. Two-train route via Cais do Sodré in Lisbon.","book":[{"label":"cp.pt","url":"https://www.cp.pt"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Setubal","time":"1 hr 25 min","desc":"A working port at the mouth of the Sado estuary and the gateway to the Serra da Arrabida — limestone cliffs above turquoise coves, a Moorish hilltop fort, and the Igreja de Jesus with the earliest Manueline stonework in Portugal. Train via Lisboa Oriente and Fertagus.","book":[{"label":"cp.pt","url":"https://www.cp.pt"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Evora","time":"1 hr 40 min","desc":"A UNESCO-listed Alentejan city — a Roman temple of Diana standing in the middle of town, a Gothic cathedral, the Chapel of Bones, and a medieval aqueduct. AP and IC trains depart Lisboa Oriente direct to Évora station.","book":[{"label":"cp.pt","url":"https://www.cp.pt"},{"label":"Omio","url":"https://www.omio.com"}]},{"dest":"Coimbra","time":"2 hr 30 min","desc":"Portugal's medieval university city on the Mondego river — the Baroque Biblioteca Joanina, the Romanesque Se Velha cathedral, and the student quarter where fado originated. Alfa Pendular trains depart Lisboa Oriente direct to Coimbra-B station.","book":[{"label":"cp.pt","url":"https://www.cp.pt"},{"label":"Omio","url":"https://www.omio.com"}]}]},{"city":"Sorrento","folder":"Sorrento","guide":"sorrento_v1.html","url":"../Guides/Sorrento/sorrento_v1.html","trips":[{"dest":"Castellammare di Stabia","time":"20 min","desc":"Ancient Stabiae — Roman villas excavated on the ridge above town, a hillside thermal spa still operating since antiquity, and views across the Bay of Naples to Vesuvius.","book":[{"la
