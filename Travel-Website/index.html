<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="assets/_travel_style.css">
<title>The Voyager Expert</title>
<style>
/* Landing hub — page-specific layout only.
   Title banner (.site-header/.site-title), search input and links are styled
   site-wide in _travel_style.css; not overridden here. */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg,#f5f4f0); color: var(--text,#1a1917);
  font-size: var(--fs-body,14px); line-height: 1.5; }
.index-section { max-width: none; margin: 8px auto 0; padding: 0 32px; }

/* ── Highlight-reel hero — one big white box ── */
.hero { background: var(--surface,#fff); border: 1px solid var(--border,#d8d4cc); border-radius: 16px;
  box-shadow: 0 10px 30px rgba(92,61,17,.08); padding: 36px 30px; margin: 18px 0 26px;
  display: flex; flex-direction: column; align-items: center; gap: 28px; }
.hero-stats { display: flex; flex-wrap: wrap; justify-content: center; gap: 28px 46px; }
.hero-stat { text-align: center; }
.hero-stat .n { font-size: 46px; font-weight: 700; line-height: 1; color: #b85c2a;
  background: linear-gradient(135deg,#7a3b1e 0%,#b85c2a 55%,#d4874a 100%);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.hero-stat .l { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted,#6a6660); margin-top: 8px; }
.hero-feats { display: grid; grid-template-columns: repeat(auto-fit, 168px); justify-content: center; gap: 14px; width: 100%; }
.hero-feat { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
  min-height: 98px; padding: 14px 12px; text-align: center; border: 1px solid var(--border,#d8d4cc); border-radius: 10px;
  background: var(--surface,#fff); box-shadow: 0 1px 3px rgba(0,0,0,.05), 0 4px 12px rgba(92,61,17,.05);
  color: var(--text,#1a1917); font-size: 14px; font-weight: 600; text-decoration: none;
  transition: box-shadow .18s, border-color .18s, transform .18s; }
a.hero-feat:hover { border-color: var(--accent,#8a6c1a); box-shadow: 0 8px 20px rgba(92,61,17,.14);
  transform: translateY(-3px); text-decoration: none; }
.hero-feat .fl { font-size: 12px; font-weight: 600; color: var(--muted,#6a6660); }
.hero-feat .fl a { color: var(--accent,#8a6c1a); text-decoration: none; }
.hero-feat .fl a:hover { text-decoration: underline; }

@media (max-width: 600px) {
  .index-section { padding: 0 12px; }
  .hero { padding: 24px 16px; gap: 22px; }
  .hero-stats { gap: 18px 28px; }
  .hero-stat .n { font-size: 34px; }
}
</style>
<link rel="stylesheet" href="assets/mobile.css">
</head>
<body>

<div id="toolbar-mount" data-depth="0" data-maxwidth="940"></div>
<script src="assets/toolbar.js?v=69"></script>

<div class="index-section">
  <div class="site-header">
    <h1 class="site-title">The Voyager Expert</h1>
  </div>

  <!-- ── One big white box: the highlight reel ── -->
  <div class="hero">
    <div class="hero-stats">
      <div class="hero-stat"><div class="n" id="stat-cities">157</div><div class="l">Cities</div></div>
      <div class="hero-stat"><div class="n" id="stat-places">6,300+</div><div class="l">Places mapped</div></div>
      <div class="hero-stat"><div class="n">60+</div><div class="l">Countries</div></div>
      <div class="hero-stat"><div class="n">6</div><div class="l">Continents</div></div>
    </div>

    <div class="hero-feats">
      <a class="hero-feat" href="Guides/Guides-Index.html">🌍 City Guides</a>
      <a class="hero-feat" href="Trip-Essentials/Maps/World-Map.html">🗺️ World Map</a>
      <a class="hero-feat" href="Trip-Essentials/Climate-Finder.html">🌤️ Explore by Climate</a>
      <a class="hero-feat" href="Trip-Essentials/Delta-Routes-Full.html">✈️ Flying Delta</a>
      <a class="hero-feat" href="Trip-Essentials/Lounges-US.html">💻 Lounges</a>
      <a class="hero-feat" href="Trip-Essentials/Time-Zones.html">🕐 Explore by Time Zones</a>
      <a class="hero-feat" href="Trip-Essentials/European-Train-Guide.html">🚆 European Trains</a>
      <div class="hero-feat">💰 Money
        <div class="fl"><a href="Trip-Essentials/Currency-Guide.html">Currency</a> · <a href="Trip-Essentials/Tipping-Guide.html">Tipping</a></div>
      </div>
      <div class="hero-feat">🎒 Know What to Carry
        <div class="fl"><a href="Trip-Essentials/Plug-Adapter/Plug-Adapter-Guide.html">Plug Adapters</a> · <a href="Trip-Essentials/SIM-Cards.html">SIM Cards</a></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ── Stat counts + count-up animation ── */
(function () {
  function setNum(id, v) { var el = document.getElementById(id); if (el && v) el.textContent = v; }

  // Count-up animation — the stat numbers tick up from 0 on load.
  function animateNum(el) {
    var txt = el.textContent.trim(), m = txt.match(/[\d,]+/);
    if (!m) return;
    var target = parseInt(m[0].replace(/,/g, ''), 10);
    if (!target) return;
    var prefix = txt.slice(0, m.index), suffix = txt.slice(m.index + m[0].length);
    var comma = m[0].indexOf(',') > -1 || target >= 1000, dur = 1000, t0 = null;
    function fmt(v) { return comma ? v.toLocaleString() : String(v); }
    function step(ts) {
      if (t0 === null) t0 = ts;
      var p = Math.min((ts - t0) / dur, 1), e = 1 - Math.pow(1 - p, 3);
      el.textContent = prefix + fmt(Math.round(target * e)) + suffix;
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }
  function animateStats() { [].forEach.call(document.querySelectorAll('.hero-stat .n'), animateNum); }

  fetch('assets/search_index.json').then(function (r) { return r.json(); }).then(function (data) {
    var raw = data.guides || [], seen = {}, n = 0;
    raw.forEach(function (g) { if (g.c && !seen[g.c]) { seen[g.c] = 1; n++; } });
    var places = raw.reduce(function (s, g) { return s + ((g.e && g.e.length) || 0); }, 0);
    setNum('stat-cities', n);                // unique cities
    if (places) setNum('stat-places', (Math.floor(places / 100) * 100).toLocaleString() + '+');
    animateStats();
  }).catch(animateStats);
})();
</script>
</body>
</html>
