<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="assets/_travel_style.css">
<title>The Voyager Expert</title>
<style>
/* Landing hub — page-specific layout only.
   Title banner (.site-header/.site-title), search input and links are styled
   site-wide in _travel_style.css; not overridden here. */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg,#f5f4f0); color: var(--text,#1a1917);
  font-size: var(--fs-body,14px); line-height: 1.5; }
.index-section { max-width: none; margin: 8px auto 0; padding: 0 32px; }

/* ── White-box landing — stat boxes + category cards, all on the page ── */
.stats, .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.stats { margin: 22px auto 14px; }
.cards { margin: 0 auto 26px; }
.box { background: var(--surface,#fff); border: 1px solid var(--border,#d8d4cc); border-radius: 12px;
  box-shadow: 0 1px 3px rgba(0,0,0,.05), 0 4px 12px rgba(92,61,17,.05);
  display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
  color: var(--text,#1a1917); text-decoration: none; transition: box-shadow .18s, border-color .18s, transform .18s; }
a.box:hover { border-color: var(--accent,#8a6c1a); box-shadow: 0 8px 20px rgba(92,61,17,.14); transform: translateY(-3px); text-decoration: none; }
.stat-box { min-height: 120px; padding: 20px 14px; gap: 8px; }
.stat-box .n { font-size: 44px; font-weight: 700; line-height: 1; color: #b85c2a;
  background: linear-gradient(135deg,#7a3b1e 0%,#b85c2a 55%,#d4874a 100%);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.stat-box .l { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted,#6a6660); }
.card { min-height: 100px; padding: 14px 12px; gap: 6px; font-size: 14px; font-weight: 600; }
.card .fl { font-size: 12px; font-weight: 600; color: var(--muted,#6a6660); }
.card .fl a { color: var(--accent,#8a6c1a); text-decoration: none; }
.card .fl a:hover { text-decoration: underline; }

@media (max-width: 600px) {
  .index-section { padding: 0 12px; }
  .stats, .cards { grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); }
  .stat-box .n { font-size: 34px; }
}
</style>
<link rel="stylesheet" href="assets/mobile.css">
</head>
<body>

<div id="toolbar-mount" data-depth="0" data-maxwidth="940"></div>
<script src="assets/toolbar.js?v=69"></script>

<div class="index-section">

  <div class="stats">
    <div class="box stat-box"><div class="n" id="stat-cities">157</div><div class="l">Cities</div></div>
    <div class="box stat-box"><div class="n" id="stat-places">6,300+</div><div class="l">Places mapped</div></div>
    <div class="box stat-box"><div class="n">60+</div><div class="l">Countries</div></div>
    <div class="box stat-box"><div class="n">6</div><div class="l">Continents</div></div>
  </div>

  <div class="cards">
    <a class="box card" href="Guides/Guides-Index.html">🌍 City Guides</a>
    <a class="box card" href="Trip-Essentials/Maps/World-Map.html">🗺️ World Map</a>
    <a class="box card" href="Trip-Essentials/Climate-Finder.html">🌤️ Explore by Climate</a>
    <a class="box card" href="Trip-Essentials/Delta-Routes-Full.html">✈️ Flying Delta</a>
    <a class="box card" href="Trip-Essentials/Lounges-US.html">💻 Lounges</a>
    <a class="box card" href="Trip-Essentials/Time-Zones.html">🕐 Explore by Time Zones</a>
    <a class="box card" href="Trip-Essentials/European-Train-Guide.html">🚆 European Trains</a>
    <div class="box card">💰 Money
      <div class="fl"><a href="Trip-Essentials/Currency-Guide.html">Currency</a> · <a href="Trip-Essentials/Tipping-Guide.html">Tipping</a></div>
    </div>
    <div class="box card">🎒 Know What to Carry
      <div class="fl"><a href="Trip-Essentials/Plug-Adapter/Plug-Adapter-Guide.html">Plug Adapters</a> · <a href="Trip-Essentials/SIM-Cards.html">SIM Cards</a></div>
    </div>
  </div>
</div>

<script>
/* ── Stat counts + count-up animation ── */
(function () {
  function setNum(id, v) { var el = document.getElementById(id); if (el && v) el.textContent = v; }

  // Count-up animation — the stat numbers tick up from 0 on load.
  function animateNum(el) {
    var txt = el.textContent.trim(), m = txt.match(/[\d,]+/);
    if (!m) return;
    var target = parseInt(m[0].replace(/,/g, ''), 10);
    if (!target) return;
    var prefix = txt.slice(0, m.index), suffix = txt.slice(m.index + m[0].length);
    var comma = m[0].indexOf(',') > -1 || target >= 1000, dur = 1000, t0 = null;
    function fmt(v) { return comma ? v.toLocaleString() : String(v); }
    function step(ts) {
      if (t0 === null) t0 = ts;
      var p = Math.min((ts - t0) / dur, 1), e = 1 - Math.pow(1 - p, 3);
      el.textContent = prefix + fmt(Math.round(target * e)) + suffix;
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }
  function animateStats() { [].forEach.call(document.querySelectorAll('.stat-box .n'), animateNum); }

  fetch('assets/search_index.json').then(function (r) { return r.json(); }).then(function (data) {
    var raw = data.guides || [], seen = {}, n = 0;
    raw.forEach(function (g) { if (g.c && !seen[g.c]) { seen[g.c] = 1; n++; } });
    var places = raw.reduce(function (s, g) { return s + ((g.e && g.e.length) || 0); }, 0);
    setNum('stat-cities', n);                // unique cities
    if (places) setNum('stat-places', (Math.floor(places / 100) * 100).toLocaleString() + '+');
    animateStats();
  }).catch(animateStats);
})();
</script>
</body>
</html>
