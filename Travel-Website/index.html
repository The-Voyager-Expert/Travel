<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="assets/_travel_style.css">
<title>The Voyager Expert</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg,#f5f4f0); color: var(--text,#1a1917);
  font-size: var(--fs-body,14px); line-height: 1.5; }
.index-section { max-width: 900px; margin: 22px auto 0; padding: 0 32px; }

/* ── Boxes — white, gold left accent (one look for stats + tiles) ── */
.tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.tile { display: block; background: var(--surface,#fff); border: 1px solid var(--border,#d8d4cc);
  border-left: 3px solid var(--accent,#8a6c1a); border-radius: 8px; padding: 16px 18px; min-height: 104px;
  text-decoration: none; color: var(--text,#1a1917); transition: box-shadow .15s, border-color .15s, transform .15s; }
.tile:hover { box-shadow: 0 4px 14px rgba(92,61,17,.12); transform: translateY(-2px); text-decoration: none; }
.stat-num { font-size: 32px; font-weight: 700; color: var(--accent,#8a6c1a); line-height: 1; }
.stat-label { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted,#6a6660); margin-top: 7px; }
.tile-emoji { font-size: 22px; line-height: 1; }
.tile-name { font-size: var(--fs-title,14px); font-weight: 700; margin-top: 8px; }
.tile-sub { font-size: var(--fs-sub,12px); color: var(--muted,#6a6660); margin-top: 2px; }

@media (max-width: 600px) {
  .index-section { padding: 0 12px; }
  .tiles { grid-template-columns: repeat(2,1fr); gap: 10px; }
}
</style>
<link rel="stylesheet" href="assets/mobile.css">
</head>
<body>

<div id="toolbar-mount" data-depth="0" data-maxwidth="940"></div>
<script src="assets/toolbar.js?v=69"></script>

<div class="index-section">
  <div class="tiles">

    <!-- Row 1 — stats -->
    <div class="tile">
      <div class="stat-num">157</div>
      <div class="stat-label">Cities</div>
    </div>
    <div class="tile">
      <div class="stat-num">60+</div>
      <div class="stat-label">Countries</div>
    </div>
    <div class="tile">
      <div class="stat-num">6,300+</div>
      <div class="stat-label">Places mapped</div>
    </div>

    <!-- Row 2 — section tiles (unchanged) -->
    <a class="tile" href="Guides/Guides-Index.html">
      <div class="tile-emoji">🌐</div>
      <div class="tile-name">City Guides</div>
      <div class="tile-sub">157 destinations</div>
    </a>
    <a class="tile" href="Website-Main-Pages-Links.html">
      <div class="tile-emoji">🧳</div>
      <div class="tile-name">Trip Essentials</div>
      <div class="tile-sub">25 planning tools</div>
    </a>
    <a class="tile" href="Trip-Essentials/Maps/World-Map.html">
      <div class="tile-emoji">🗺️</div>
      <div class="tile-name">World Map</div>
      <div class="tile-sub">Explore by region</div>
    </a>

    <!-- Row 3 — tiles -->
    <a class="tile" href="Trip-Essentials/Travel-Stats.html">
      <div class="tile-emoji">📊</div>
      <div class="tile-name">Travel Stats</div>
      <div class="tile-sub">Trips, regions, flights</div>
    </a>
    <a class="tile" href="Trip-Essentials/Lounges-US.html">
      <div class="tile-emoji">💻</div>
      <div class="tile-name">Lounges</div>
      <div class="tile-sub">US &amp; Europe airports</div>
    </a>
    <a class="tile" href="Trip-Essentials/Delta-Routes-Full.html">
      <div class="tile-emoji">✈️</div>
      <div class="tile-name">Flying Delta</div>
      <div class="tile-sub">Routes &amp; hubs</div>
    </a>

  </div>
</div>

</body>
</html>
