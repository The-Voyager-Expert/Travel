name: Deploy site (per-guide quarantine, no wholesale block)

# Hardened, isolating deploy gate.
#
# OLD behaviour (removed): a single bad guide → `exit 1` → the WHOLE deploy died,
# blocking every other valid guide. And the only "validation" was a grep that the
# <!-- validation: passed --> STRING existed, so 151 guides bulk hand-stamped on
# 2026-06-22 (identical timestamps, never validated) deployed unchecked.
#
# NEW behaviour:
#   • HARDEN  — re-run the REAL validator (Brain/scripts/validate_itinerary.py) on
#     every guide ADDED or MODIFIED in this push. A faked / hand-typed stamp can no
#     longer pass; the guide must actually validate.
#   • ISOLATE — a guide that fails is NOT allowed to block the deploy. Its published
#     page is swapped (in the artifact only) for a small "being updated" placeholder
#     at the same URL, so links / carousel chain / search keep resolving and nothing
#     404s. Every other guide ships normally.
#   • SCOPE   — only guides changed in THIS push are checked. The existing backlog is
#     published untouched; this gate stops NEW breakage, it does not pull the backlog.
#   • CANARY  — if the validator can't even pass a known-good guide on the runner, the
#     gate drops to report-only (publishes as-is) rather than mass-quarantining.
#
# Serving is unchanged: Travel-Website/ is staged at the artifact root + .nojekyll,
# so https://the-voyager-expert.github.io/Travel/Travel-Website/… URLs stay identical.
# (.github/ and .git are NOT published.)
#
# Rollback: restore the previous all-or-nothing version of this file, or set Pages
# build type back to "legacy" (Settings → Pages → Source → Deploy from a branch).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history so the script can diff this push (before → after) and,
          # on manual runs, fall back to HEAD~1.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate changed guides + stage artifact (per-guide quarantine)
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          # Published-only mode: skip the handful of validator checks that need
          # unpublished local authoring artifacts (CORE RULES checksums, per-guide
          # _build/ build-state + verification logs, photo-provenance module, and
          # the cross-surface FINAL GATEs — those are covered by check_coverage.py).
          # All guide-CONTENT checks still run. Default (unset) = full local validation.
          VALIDATOR_PUBLISHED_ONLY: "1"
          # FULL-FLEET RESET (2026-06-27): hold back EVERY guide as a placeholder,
          # no exceptions, until each is genuinely re-checked — cribs ran only
          # superficial validation and problems accumulated across the fleet.
          # To let guides return as they pass the real validator: remove this line
          # and set VALIDATE_ALL: "1" instead.
          QUARANTINE_ALL: "1"
        run: python3 .github/scripts/quarantine_failing_guides.py --stage _site

      - name: Cross-guide surface coverage (advisory — never blocks deploy)
        # Reports guides missing from index / maps / stats / search so drift is
        # visible, but does NOT fail the deploy: one guide's coverage gap must not
        # hold back the whole site. Hard enforcement lives per-guide in the
        # validator's FINAL GATE checks above.
        run: python3 .github/scripts/check_coverage.py || echo "::warning::coverage gaps reported above (advisory)"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
