name: Deploy site (verify signed proof, per-guide isolation)

# Deploy-time PROOF check. Validation itself runs LOCALLY (the crib runs the
# 400-rule validator and, on a clean pass, writes a content-bound SIGNED stamp —
# Brain/scripts/validation_stamp.py). This workflow does NOT re-run the validator.
#
# What it does:
#   • VERIFY  — check each guide's signed proof (a cheap HMAC over the guide's
#     content). A hand-typed / bulk-written stamp carries no matching signature,
#     and a guide edited after validation no longer matches its signature — both
#     are held back. This is the un-bypassable backstop for the local pre-push
#     hook, which `--no-verify` can skip.
#   • ISOLATE — a held-back guide does NOT block the deploy. Its published page is
#     swapped (in the artifact only) for a small "being updated" placeholder at the
#     same URL, so links / carousel chain / search keep resolving. Every other
#     guide ships normally.
#   • LEGACY GRACE — guides still carrying an old UNSIGNED stamp are served and
#     flagged, not held back, so the signed scheme rolls out without quarantining
#     the existing fleet. They get a signature next time they're validated locally.
#
# Serving is unchanged: Travel-Website/ is staged at the artifact root + .nojekyll,
# so https://the-voyager-expert.github.io/Travel/Travel-Website/… URLs stay identical.
# (.github/ and .git are NOT published.)
#
# Rollback: set Pages build type back to "legacy" (Settings → Pages → Source →
# Deploy from a branch).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history so the script can diff this push (before → after) and,
          # on manual runs, fall back to HEAD~1.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify each guide's signed validation proof, stage artifact
        # Validation runs LOCALLY (Brain/scripts/validate_itinerary.py writes a
        # content-bound signed stamp on a clean pass). This step does NOT re-run
        # the validator — it only verifies that signed proof (a cheap hash) and
        # holds back any guide whose signature doesn't match its content (a faked
        # stamp or a post-validation edit). Every other guide ships.
        env:
          # Optional: matching HMAC key for signature verification. Unset → the
          # public default key (still content-bound: defeats bulk/hand stamps and
          # post-validation edits). Set the secret AND the same value in the cribs'
          # Brain/scripts/.validation_key together for forgery resistance.
          VOYAGER_VALIDATION_KEY: ${{ secrets.VOYAGER_VALIDATION_KEY }}
        run: python3 .github/scripts/quarantine_failing_guides.py --stage _site

      - name: Cross-guide surface coverage (advisory — never blocks deploy)
        # Reports guides missing from index / maps / stats / search so drift is
        # visible, but does NOT fail the deploy: one guide's coverage gap must not
        # hold back the whole site. Hard coverage enforcement lives per-guide in
        # the LOCAL ship gate (guide_tools.py ship) and the validator's FINAL GATEs.
        run: python3 .github/scripts/check_coverage.py || echo "::warning::coverage gaps reported above (advisory)"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
